const CalendarioView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
  const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
  const [mode, setMode] = useState('TIMELINE'); 
  const [builderTipo, setBuilderTipo] = useState('Colaborador'); 
  const [tipoLancamento, setTipoLancamento] = useState('PLANTAO'); 
  const [motivoAus, setMotivoAus] = useState('Folga');
  const [selProf, setSelProf] = useState(''); const [selUnd, setSelUnd] = useState(''); const [selSala, setSelSala] = useState('');
  const [hIn, setHIn] = useState(''); const [hOut, setHOut] = useState(''); const [obs, setObs] = useState('');
  const [dates, setDates] = useState([]); 
  const [bMes, setBMes] = useState(new Date());
  
  const [calProf, setCalProf] = useState(isAd ? '' : user.nome); 
  const [mesAtual, setMesAtual] = useState(new Date()); 
  const [diaAtivo, setDiaAtivo] = useState(null); 
  const [buscaNome, setBuscaNome] = useState(''); const [showAuto, setShowAuto] = useState(false); 
  const [editData, setEditData] = useState(null);

  useEffect(() => { if(calProf) setBuscaNome(calProf); }, []);
  
  const toggleD = (dFmt) => { if(dates.includes(dFmt)) setDates(dates.filter(x=>x!==dFmt)); else setDates([...dates, dFmt]); };
  
  const gerar = async () => {
    if(!selProf || dates.length === 0) return alert("Preencha Profissional e as Datas no calendário!");
    const prof = profs.find(x => x.ID === selProf || x.Nome === selProf);
    let st = 'NO POSTO'; let s = selSala || 'A DEFINIR'; let h = (hIn && hOut) ? `${hIn} às ${hOut}` : 'A DEFINIR'; let o = obs;
    
    if(tipoLancamento === 'AUSENCIA') { 
      st = motivoAus === 'Folga' ? 'FOLGA' : 'AUSENTE'; 
      s = motivoAus.toUpperCase(); 
      h = '--:--'; 
      o = obs ? `${motivoAus} - ${obs}` : motivoAus; 
    }
    
    for(let d of dates) { 
      await onSave('ESCALAS', { Data: d, Unidade: tipoLancamento==='AUSENCIA'?'':selUnd, Sala: s, Nome_Profissional: prof.Nome, Cargo: prof.Cargo, Horario: h, Status: st, Cor: prof.Cor, ObsDia: o }); 
    }
    alert("Escalas geradas com sucesso!"); 
    setDates([]); setMode('TIMELINE'); onRefresh();
  };

  const bGrid = (dRef) => {
    const a = dRef.getFullYear(); const m = dRef.getMonth();
    return {
      v: Array.from({length: new Date(a, m, 1).getDay()}),
      d: Array.from({length: new Date(a, m+1, 0).getDate()}, (_, i) => ({ d: new Date(a, m, i+1), s: getStrDt(new Date(a, m, i+1)) }))
    };
  };

  const pOrd = ordenarPorNome(profs);
  const pBuilder = pOrd.filter(x => (x.StatusGeral === 'Ativo' || !x.StatusGeral) && x.Tipo === builderTipo);
  const pSel = profs.find(p => p.Nome === calProf);

  return (
    <div className="animate-fade-in max-w-5xl mx-auto space-y-6 pb-10">
      {isAd && (
        <div className="flex gap-2 border-b dark:border-slate-700 pb-4">
          <button onClick={()=>setMode('TIMELINE')} className={`px-4 py-2 rounded-xl font-bold text-sm transition ${mode==='TIMELINE'?'bg-primary text-white shadow':'bg-slate-100 dark:bg-slate-800'}`}><i className="ph-bold ph-calendar"></i> Calendário</button>
          <button onClick={()=>setMode('BUILDER')} className={`px-4 py-2 rounded-xl font-bold text-sm transition ${mode==='BUILDER'?'bg-accent text-white shadow':'bg-slate-100 dark:bg-slate-800'}`}><i className="ph-bold ph-magic-wand"></i> Multi-Datas</button>
        </div>
      )}
      
      {mode === 'BUILDER' ? (
        <div className="clean-card p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
          <div className="space-y-4">
            <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
              <button onClick={()=>{setBuilderTipo('Colaborador'); setSelProf('');}} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${builderTipo==='Colaborador'?'bg-white dark:bg-slate-700 shadow text-blue-600 dark:text-blue-400':'opacity-60'}`}>Equipe Base</button>
              <button onClick={()=>{setBuilderTipo('Médico'); setSelProf('');}} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${builderTipo==='Médico'?'bg-white dark:bg-slate-700 shadow text-red-600 dark:text-red-400':'opacity-60'}`}>Médicos</button>
            </div>
            <div>
              <label className="text-[10px] font-black uppercase opacity-60">Selecione o Profissional</label>
              <select value={selProf} onChange={e=>setSelProf(e.target.value)} className="w-full p-3 border rounded-xl font-bold dark:border-slate-700 dark:bg-slate-900 outline-none mt-1">
                <option value="">Abre a lista (A-Z)...</option>
                {pBuilder.map(x => <option key={x.ID} value={x.ID}>{x.Nome}</option>)}
              </select>
            </div>
            <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl my-4">
              <button onClick={()=>setTipoLancamento('PLANTAO')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${tipoLancamento==='PLANTAO'?'bg-white dark:bg-slate-700 shadow text-primary':'opacity-60'}`}>Plantão</button>
              <button onClick={()=>setTipoLancamento('AUSENCIA')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${tipoLancamento==='AUSENCIA'?'bg-white dark:bg-slate-700 shadow text-red-500':'opacity-60'}`}>Folga/Ausência</button>
            </div>
            
            {tipoLancamento === 'PLANTAO' ? (
              <div className="space-y-4 animate-fade-in">
                <select value={selUnd} onChange={e=>setSelUnd(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 outline-none"><option value="">Unidade (A DEFINIR)...</option>{(cfg?.unidades||[]).map((x,i)=><option key={i} value={x.nome}>{x.nome}</option>)}</select>
                <select value={selSala} onChange={e=>setSelSala(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 outline-none"><option value="">Sala/Posto (A DEFINIR)...</option>{(cfg?.postos||[]).map((x,i)=><option key={i} value={x.nome||x}>{x.nome||x}</option>)}</select>
                <div className="flex gap-2">
                  <input type="time" value={hIn} onChange={e=>setHIn(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" />
                  <input type="time" value={hOut} onChange={e=>setHOut(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" />
                </div>
              </div>
            ) : (
              <div className="animate-fade-in">
                <select value={motivoAus} onChange={e=>setMotivoAus(e.target.value)} className="w-full p-3 border border-red-200 rounded-xl bg-red-50 text-red-600 font-bold dark:border-red-900/30 dark:bg-red-900/10 dark:text-red-400 outline-none">
                  <option value="Folga">Folga Agendada</option><option value="Férias">Férias</option><option value="Atestado">Atestado Médico</option><option value="Trabalho Externo">Trabalho Externo</option><option value="Outros">Outros</option>
                </select>
              </div>
            )}
            <input type="text" value={obs} onChange={e=>setObs(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 outline-none" placeholder="Anotações adicionais (opcional)..." />
          </div>
          
          <div className="border-l border-slate-200 dark:border-slate-700 md:pl-8 space-y-4 flex flex-col">
            <div className="flex justify-between items-center">
              <button onClick={()=>setBMes(new Date(bMes.getFullYear(), bMes.getMonth()-1, 1))} className="p-2 bg-slate-100 dark:bg-slate-800 rounded hover:bg-slate-200 transition">{'<'}</button>
              <span className="font-black text-sm uppercase tracking-widest">{bMes.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</span>
              <button onClick={()=>setBMes(new Date(bMes.getFullYear(), bMes.getMonth()+1, 1))} className="p-2 bg-slate-100 dark:bg-slate-800 rounded hover:bg-slate-200 transition">{'>'}</button>
            </div>
            <div className="grid grid-cols-7 gap-1 text-center text-[10px] font-black opacity-50 uppercase"><div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div></div>
            <div className="grid grid-cols-7 gap-1">
              {bGrid(bMes).v.map((_, i) => <div key={'v'+i}></div>)}
              {bGrid(bMes).d.map((d, i) => {
                const isSel = dates.includes(d.s);
                return <button key={i} onClick={(e)=>{e.preventDefault(); toggleD(d.s);}} className={`p-2.5 rounded-lg text-xs font-bold transition hover:scale-105 ${isSel ? (tipoLancamento==='AUSENCIA'?'bg-red-500 text-white shadow-md':'bg-primary text-white shadow-md') : 'bg-slate-50 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700'}`}>{d.d.getDate()}</button>
              })}
            </div>
            <div className="text-[9px] font-bold opacity-50">{dates.length} dias selecionados</div>
            <button onClick={gerar} className={`w-full py-4 rounded-xl font-black mt-auto text-white shadow-lg transition hover:scale-[1.02] ${tipoLancamento==='AUSENCIA'?'bg-red-500':'bg-accent'}`}>Gravar no Servidor</button>
          </div>
        </div>
      ) : (
        <div className="space-y-6 animate-fade-in">
          <div className="clean-card p-5 flex flex-col lg:flex-row justify-between gap-4 items-center relative">
            <div className="flex items-center gap-4">
              <button onClick={()=>{setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()-1, 1)); setDiaAtivo(null);}} className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center hover:bg-slate-200 transition">{'<'}</button>
              <h2 className="text-lg font-black uppercase tracking-widest w-40 text-center">{mesAtual.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</h2>
              <button onClick={()=>{setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()+1, 1)); setDiaAtivo(null);}} className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center hover:bg-slate-200 transition">{'>'}</button>
            </div>
            <div className="relative w-full lg:w-96">
              <i className="ph-bold ph-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
              <input type="text" placeholder="Buscar profissional (Radar)..." value={buscaNome} onChange={e=>{setBuscaNome(e.target.value); setShowAuto(true); setCalProf(''); setDiaAtivo(null);}} onFocus={()=>setShowAuto(true)} className="w-full p-3 pl-10 rounded-xl border dark:border-slate-700 font-bold dark:bg-slate-900 outline-none shadow-sm focus:border-primary transition" />
              {showAuto && buscaNome && (
                <div className="absolute top-full mt-2 w-full bg-white dark:bg-slate-800 border dark:border-slate-700 shadow-2xl rounded-xl z-50 max-h-64 overflow-y-auto overflow-x-hidden">
                  {pOrd.filter(p => safeStr(p.Nome).toLowerCase().includes(buscaNome.toLowerCase())).map(p => (
                    <div key={p.ID} onClick={()=>{setBuscaNome(p.Nome); setCalProf(p.Nome); setShowAuto(false);}} className="p-3 border-b dark:border-slate-700 cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-700 transition flex items-center gap-3">
                      {p.FotoURL ? <img src={fmtImg(p.FotoURL)} className="w-8 h-8 rounded-full object-cover"/> : <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-[10px] font-black" style={{backgroundColor:p.Cor||'#0ea5e9'}}>{p.Nome[0]}</div>}
                      <div><p className="font-bold text-sm">{p.Nome}</p><p className="text-[10px] opacity-60 uppercase">{p.Cargo}</p></div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
          
          {!calProf ? (
            <div className="p-16 text-center opacity-50 font-bold border-dashed border-2 rounded-2xl dark:border-slate-700">
              <i className="ph-fill ph-calendar-plus text-6xl mb-4 text-slate-300 dark:text-slate-600"></i>
              <p className="text-lg">Selecione um profissional no radar acima para carregar as escalas.</p>
            </div>
          ) : (
            <div className="space-y-6 animate-fade-in">
              {pSel && (
                <div className="clean-card p-6 flex items-center gap-6 bg-gradient-to-r from-blue-50 to-white dark:from-slate-800 dark:to-slate-900 border-l-4 border-primary shadow-sm">
                  {pSel.FotoURL ? (
                    <img src={fmtImg(pSel.FotoURL)} className="w-20 h-20 md:w-24 md:h-24 rounded-full object-cover shadow-lg border-4 border-white dark:border-slate-700 shrink-0"/>
                  ) : (
                    <div className="w-20 h-20 md:w-24 md:h-24 rounded-full bg-primary text-white flex items-center justify-center text-4xl font-black shadow-lg border-4 border-white dark:border-slate-700 shrink-0" style={{backgroundColor:pSel.Cor||'#0ea5e9'}}>{pSel.Nome[0]}</div>
                  )}
                  <div>
                    <h2 className="text-2xl font-black text-slate-800 dark:text-white flex items-center gap-2 leading-tight">
                      {pSel.Nome} <BadgeConvenio cod={pSel.CodUnimed} logo={cfg?.logoConvenio}/>
                    </h2>
                    <p className="text-sm font-bold text-primary uppercase mt-1">{pSel.Cargo}</p>
                    <p className="text-[10px] font-black opacity-50 mt-1 uppercase tracking-widest bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded inline-block"><i className="ph-fill ph-map-pin"></i> Lotação: {pSel.UnidadeBase||'Geral'} • {pSel.Setor||'-'}</p>
                  </div>
                </div>
              )}
              
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="clean-card p-6 lg:col-span-2">
                  <div className="grid grid-cols-7 gap-2 mb-2 text-center text-[10px] font-black opacity-50 uppercase">
                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                  </div>
                  <div className="grid grid-cols-7 gap-2">
                    {bGrid(mesAtual).v.map((_, i) => <div key={'v'+i}></div>)}
                    {bGrid(mesAtual).d.map((d, i) => {
                      const isValid = escalas.some(e => e.Nome_Profissional === calProf && e.Data === d.s && isEscalaValida(e, cfg?.postos));
                      const isTj = d.s === getStrDt(new Date());
                      const isS = diaAtivo === d.s;
                      
                      return (
                        <div key={i} onClick={()=> isValid && setDiaAtivo(d.s)} className={`relative flex flex-col items-center justify-center p-3 rounded-xl border transition-all ${isValid?'cursor-pointer hover:border-primary shadow-sm':''} ${isS?'ring-2 ring-primary bg-blue-50 dark:bg-slate-800':isTj?'bg-slate-100 dark:bg-slate-700 border-slate-300 dark:border-slate-600':'bg-transparent dark:border-slate-800'}`}>
                          <span className={`text-sm font-bold ${isValid?'text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-600'}`}>{d.d.getDate()}</span>
                          {isValid && <span className="absolute bottom-1 w-1.5 h-1.5 rounded-full shadow" style={{backgroundColor:pSel?.Cor||'#0ea5e9'}}></span>}
                        </div>
                      )
                    })}
                  </div>
                </div>
                
                <div className="clean-card p-6 bg-slate-50 dark:bg-slate-800/50">
                  {diaAtivo ? (
                    <div className="animate-fade-in">
                      <h3 className="font-black text-lg text-primary border-b dark:border-slate-700 pb-2 mb-4 flex items-center gap-2"><i className="ph-fill ph-calendar-check"></i> {diaAtivo}</h3>
                      <div className="space-y-4">
                        {escalas.filter(e => e.Nome_Profissional === calProf && e.Data === diaAtivo && isEscalaValida(e, cfg?.postos)).map((esc, j) => {
                          const iF = esc.Status === 'FOLGA'; const iA = esc.Status === 'AUSENTE';
                          return (
                            <div key={j} className={`p-4 rounded-xl shadow-sm border relative overflow-hidden transition-all hover:shadow-md ${iF?'bg-slate-100 dark:bg-slate-800 opacity-80 dark:border-slate-700':iA?'bg-red-50 dark:bg-red-900/10 border-red-200 dark:border-red-900/30':'bg-white dark:bg-slate-900 dark:border-slate-700'}`}>
                              <div className="absolute left-0 top-0 bottom-0 w-1.5" style={{backgroundColor: iF?'#94a3b8':iA?'#ef4444':getCorDaSala(esc.Sala, cfg)}}></div>
                              
                              {(!iF && !iA && esc.Unidade) && <p className="text-[9px] font-black uppercase tracking-widest opacity-50 pl-1 mb-0.5">{esc.Unidade}</p>}
                              <h4 className={`font-black text-base pl-1 leading-tight ${iF||iA?'text-slate-600 dark:text-slate-400':''}`}>{esc.Sala} {esc.EmApoio?'(Apoio)':''}</h4>
                              
                              {(!iF && !iA) && <p className={`text-sm font-bold mt-1 pl-1 ${esc.Horario==='A DEFINIR'?'text-red-500':'opacity-80'}`}><i className="ph-fill ph-clock"></i> {esc.Horario}</p>}
                              {esc.Auxiliar && <p className="text-[9px] font-black text-purple-600 bg-purple-50 dark:bg-purple-900/30 px-2 py-0.5 rounded inline-block mt-1.5 ml-1"><i className="ph-fill ph-user-plus"></i> Auxiliar: {esc.Auxiliar}</p>}
                              {esc.MedicoApoio && <p className="text-[9px] font-black text-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 px-2 py-0.5 rounded inline-block mt-1.5 ml-1"><i className="ph-fill ph-stethoscope"></i> Apoio a: {esc.MedicoApoio}</p>}
                              
                              {esc.ObsDia && <p className={`text-[10px] mt-3 p-2 rounded ml-1 font-bold flex items-center gap-1 ${iF||iA?'bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300':'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-800 dark:text-yellow-500'}`}><i className="ph-bold ph-info text-sm"></i> {esc.ObsDia}</p>}
                              
                              {isAd && (
                                <div className="absolute top-2 right-2 flex gap-2">
                                  <button onClick={() => setEditData({...esc})} className="text-yellow-500 hover:scale-110 transition bg-yellow-50 dark:bg-slate-800 p-1.5 rounded"><i className="ph-fill ph-pencil-simple"></i></button>
                                  <button onClick={async()=>{if(confirm('Excluir turno permanentemente?')){await api.deleteRecord('ESCALAS', esc.ID); onRefresh(); setDiaAtivo(null)}}} className="text-red-500 hover:scale-110 transition bg-red-50 dark:bg-slate-800 p-1.5 rounded"><i className="ph-fill ph-trash"></i></button>
                                </div>
                              )}
                            </div>
                          )
                        })}
                      </div>
                    </div>
                  ) : (
                    <div className="h-full flex flex-col items-center justify-center opacity-30 min-h-[200px]">
                      <i className="ph-fill ph-cursor-click text-5xl mb-2"></i>
                      <p className="text-xs font-black uppercase tracking-widest">Selecione a Data</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      )}
      {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
    </div>
  );
};

// ================== ABA 6: TRABALHANDO HOJE ==================
const TrabalhandoHojeView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
  const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
  const [viewMode, setViewMode] = useState('MENU');
  const [infoProfModal, setInfoProfModal] = useState(null);
  const [editData, setEditData] = useState(null);
  
  const dStr = getStrDt(new Date()); 
  const escHjRaw = escalas.filter(e => e.Data === dStr && isEscalaValida(e, cfg?.postos) && e.Status !== 'FOLGA');

  const pC = []; const pM = [];
  escHjRaw.forEach(esc => {
    const pInfo = profs.find(p => p.Nome === esc.Nome_Profissional) || {Nome: esc.Nome_Profissional, Cargo: esc.Cargo, Cor: esc.Cor};
    const item = {...pInfo, esc: esc};
    if (pInfo.Tipo === 'Médico') pM.push(item); else pC.push(item);
  });

  const setStatus = async (esc, st) => { await api.saveRecord('ESCALAS', {...esc, Status:st}); onRefresh(); };

  return (
    <div className="animate-fade-in space-y-6 max-w-7xl mx-auto pb-10">
      {viewMode === 'MENU' ? (
        <div>
          <h2 className="text-2xl font-black mb-6">Visão Diária: Trabalhando Hoje</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div onClick={()=>setViewMode('Colaborador')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-primary hover:shadow-lg transition">
              <div className="w-20 h-20 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-full flex justify-center items-center text-4xl mb-4 group-hover:scale-110 transition"><i className="ph-fill ph-users-three"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest text-center">Colaboradores no Plantão</h3>
              <p className="text-sm font-black text-primary mt-2">{pC.length} Ativos Hoje</p>
            </div>
            <div onClick={()=>setViewMode('Médico')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-red-500 hover:shadow-lg transition">
              <div className="w-20 h-20 bg-red-50 dark:bg-red-900/20 text-red-500 dark:text-red-400 rounded-full flex justify-center items-center text-4xl mb-4 group-hover:scale-110 transition"><i className="ph-fill ph-stethoscope"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest text-center">Médicos no Plantão</h3>
              <p className="text-sm font-black text-red-500 mt-2">{pM.length} Ativos Hoje</p>
            </div>
          </div>
        </div>
      ) : (
        <div className="animate-fade-in space-y-6">
          <div className="flex items-center gap-4 border-b dark:border-slate-700 pb-4">
            <button onClick={()=>setViewMode('MENU')} className="w-10 h-10 clean-card flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 transition"><i className="ph-bold ph-arrow-left"></i></button>
            <div>
              <p className="text-[10px] font-bold uppercase opacity-50 tracking-widest">Resumo Diário do {getStrDt(new Date())}</p>
              <h2 className="text-2xl font-black">{viewMode === 'Médico' ? 'Corpo Clínico Ativo' : 'Colaboradores Ativos'}</h2>
            </div>
          </div>

          {(viewMode === 'Colaborador' ? pC : pM).length === 0 ? (
            <div className="p-16 text-center border-2 border-dashed dark:border-slate-700 rounded-2xl opacity-50">
              <i className="ph-fill ph-ghost text-6xl mb-4"></i><p className="font-black text-lg">Ninguém escalado e ativo nesta categoria hoje.</p>
            </div>
          ) : (
            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
              {(viewMode === 'Colaborador' ? pC : pM).map((p, i) => {
                const e = p.esc;
                const iI = e.Status === 'LANCHE'; const iA = e.Status === 'AUSENTE';
                const iM = checkIsMe(e.Nome_Profissional, user.email);

                return (
                  <div key={i} className={`clean-card p-4 flex flex-col items-center text-center relative shadow-sm border-t-4 transition hover:shadow-md ${iI?'border-t-orange-500 bg-orange-50 dark:bg-orange-900/10':iA?'border-t-red-500 bg-red-50 dark:bg-red-900/10':'border-t-primary'}`}>
                    {p.FotoURL ? (
                      <img src={fmtImg(p.FotoURL)} onClick={()=>setInfoProfModal(p)} className="w-14 h-14 rounded-full object-cover shadow mb-2 cursor-pointer hover:scale-105 transition" />
                    ) : (
                      <div onClick={()=>setInfoProfModal(p)} className="w-14 h-14 rounded-full flex items-center justify-center text-xl font-black text-white shadow mb-2 cursor-pointer hover:scale-105 transition" style={{backgroundColor:p.Cor||'#0ea5e9'}}>{safeStr(p.Nome)[0]}</div>
                    )}
                    
                    <h3 className="font-black text-xs truncate w-full flex justify-center items-center gap-1 cursor-pointer hover:text-primary" onClick={()=>setInfoProfModal(p)}>
                      {p.Nome} <BadgeConvenio cod={p.CodUnimed} logo={cfg?.logoConvenio} />
                    </h3>
                    
                    <div className="w-full bg-white dark:bg-slate-800 p-2 rounded-lg mt-2 border border-slate-100 dark:border-slate-700 text-left">
                      <p className="text-[10px] font-black uppercase truncate text-primary leading-tight">{e.Sala}</p>
                      <p className={`text-[8px] font-bold mt-0.5 ${e.Horario==='A DEFINIR'?'text-red-500':'opacity-60'}`}><i className="ph-fill ph-clock"></i> {e.Horario}</p>
                      {e.MedicoApoio && <p className="text-[8px] font-bold text-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 mt-1 px-1.5 py-0.5 rounded truncate"><i className="ph-fill ph-stethoscope"></i> {e.MedicoApoio}</p>}
                      {e.Auxiliar && <p className="text-[8px] font-bold text-purple-600 bg-purple-50 dark:bg-purple-900/30 mt-1 px-1.5 py-0.5 rounded truncate"><i className="ph-fill ph-user-plus"></i> {e.Auxiliar}</p>}
                    </div>

                    <div className="flex w-full justify-between items-center mt-3 pt-3 border-t border-slate-100 dark:border-slate-700">
                      <span className={`text-[8px] font-black px-2 py-1 rounded ${iA?'bg-red-100 text-red-600':iI?'bg-orange-100 text-orange-600':'bg-green-100 text-green-600 dark:bg-green-900/30'}`}>{e.Status === 'NO POSTO' ? 'ATIVO' : e.Status}</span>
                      <div className="flex gap-1">
                        {(!iI && !iA) ? (
                          <>
                            {(isAd || iM) && <button onClick={()=>setStatus(e, 'LANCHE')} title="Ir pro Lanche" className="w-7 h-7 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-orange-100 hover:text-orange-600 text-slate-500 transition"><i className="ph-fill ph-coffee"></i></button>}
                            {isAd && <button onClick={()=>setEditData(e)} title="Ações" className="w-7 h-7 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-blue-100 hover:text-blue-600 text-slate-500 transition"><i className="ph-fill ph-sliders"></i></button>}
                          </>
                        ) : (
                          <>
                            {(isAd || (iM && iI)) && <button onClick={()=>setStatus(e, 'NO POSTO')} className="px-2 py-1 bg-slate-800 dark:bg-slate-700 text-white rounded text-[8px] font-black hover:bg-slate-600 transition"><i className="ph-bold ph-arrow-u-down-left"></i> VOLTAR</button>}
                            {iA && isAd && <button onClick={()=>setEditData(e)} className="px-2 py-1 bg-primary text-white rounded text-[8px] font-black ml-1 hover:bg-blue-600 transition"><i className="ph-bold ph-sliders"></i> OPÇÕES</button>}
                          </>
                        )}
                      </div>
                    </div>
                  </div>
                )
              })}
            </div>
          )}
        </div>
      )}
      {infoProfModal && <CrachaVirtual profInfo={infoProfModal} cfg={cfg} onClose={()=>setInfoProfModal(null)} />}
      {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
    </div>
  )
};

// ================== ABA 4: MAPA DE PLANTÃO (RADAR/UNIDADES) ==================
const PainelHojeView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
  const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
  const [now, setNow] = useState(Date.now()); 
  const [actU, setActU] = useState(null);
  const [buscaGlobal, setBuscaGlobal] = useState(''); 
  const [infoProfModal, setInfoProfModal] = useState(null);
  const [editData, setEditData] = useState(null);

  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 10000); return () => clearInterval(t); }, []);

  const dStr = getStrDt(new Date()); 
  const escHjRaw = escalas.filter(e => e.Data === dStr && isEscalaValida(e, cfg?.postos));
  
  const unids = cfg?.unidades||[]; const setoresSis = cfg?.setores||[]; const postosSis = cfg?.postos||[];
  const setStatus = async (esc, st) => { await api.saveRecord('ESCALAS', {...esc, Status:st}); onRefresh(); };

  const renderPosto = (sala, ocupantes) => {
    ocupantes.sort((a,b)=> (a.Horario||'').localeCompare(b.Horario||''));
    const hStr = `${new Date(now).getHours().toString().padStart(2,'0')}:${new Date(now).getMinutes().toString().padStart(2,'0')}`;
    let currArr = []; let nxtArr = [];

    for(let o of ocupantes) {
      let pts = (o.Horario||'').split(' às '); let inH = pts[0]?.trim(); let outH = pts[1]?.trim();
      if(!inH || !outH || o.Horario === 'A DEFINIR') { currArr.push(o); continue; } 
      if(hStr >= inH && hStr <= outH) { currArr.push(o); } 
      else if (hStr < inH) { nxtArr.push(o); }
    }

    if(currArr.length === 0 && nxtArr.length === 0) return <div className="flex-1 flex flex-col items-center justify-center text-slate-400 py-6"><i className="ph-bold ph-ghost text-3xl mb-2 opacity-30"></i><span className="text-[9px] font-black uppercase">Turno Encerrado</span></div>;

    return (
      <div className="flex-1 p-2 flex flex-col gap-2">
        {currArr.map((curr, idx) => {
          const isInt = curr?.Status === 'LANCHE'; const isAus = curr?.Status === 'AUSENTE';
          const isMe = checkIsMe(curr?.Nome_Profissional, user.email);
          const pInfo = profs.find(p => p.Nome === curr.Nome_Profissional) || {Nome: curr.Nome_Profissional, Cargo: curr.Cargo, Cor: curr.Cor};

          return (
            <div key={'c'+idx} onClick={() => setInfoProfModal(pInfo)} className={`p-2.5 rounded-xl relative border shadow-sm transition-colors cursor-pointer hover:shadow-md ${isInt?'bg-orange-50 border-orange-200 dark:bg-orange-900/20 dark:border-orange-800':isAus?'bg-red-50 border-red-200 dark:bg-red-900/20 dark:border-red-800 opacity-70':'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 hover:border-primary'}`}>
              <div className="flex items-center gap-2 mb-2">
                {pInfo.FotoURL ? <img src={fmtImg(pInfo.FotoURL)} className="w-8 h-8 rounded-full object-cover shadow-md shrink-0" /> : <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-[10px] font-black shrink-0 shadow-md" style={{background:curr.Cor||'#0ea5e9'}}>{curr.Nome_Profissional[0]}</div>}
                <div className="truncate">
                  <div className={`text-[11px] font-black truncate text-slate-800 dark:text-white flex items-center gap-1 ${isAus?'line-through text-red-500 dark:text-red-400':''}`}>
                    <span className="truncate">{curr.Nome_Profissional}</span>
                    <BadgeConvenio cod={pInfo.CodUnimed} logo={cfg?.logoConvenio} />
                  </div>
                  <p className={`text-[8px] font-bold opacity-60 truncate mt-0.5 text-slate-600 dark:text-slate-300 ${curr.Horario==='A DEFINIR'?'text-red-500':''}`}>{curr.Cargo} • <i className="ph-fill ph-clock"></i> {curr.Horario}</p>
                </div>
              </div>
              
              {curr.Auxiliar && <p className="text-[8px] font-black text-purple-600 bg-purple-100 dark:bg-purple-900/30 px-1.5 py-0.5 rounded inline-block mb-1"><i className="ph-fill ph-user-plus"></i> Aux: {curr.Auxiliar}</p>}
              {curr.MedicoApoio && <p className="text-[8px] font-black text-indigo-600 bg-indigo-100 dark:bg-indigo-900/30 px-1.5 py-0.5 rounded inline-block mb-1"><i className="ph-fill ph-stethoscope"></i> Apoio: {curr.MedicoApoio}</p>}

              <div className="flex justify-between items-center border-t border-slate-100 dark:border-slate-700 pt-2 mt-1">
                <span className={`text-[8px] font-black px-2 py-1 rounded ${isAus?'bg-red-100 text-red-600':isInt?'bg-orange-100 text-orange-600':'bg-green-100 text-green-600 dark:bg-green-900/30'}`}>{curr.Status === 'NO POSTO' ? 'ATIVO' : curr.Status}</span>
                <div className="flex gap-1">
                  {(!isInt && !isAus) ? (
                    <>
                      {(isAd || isMe) && <button onClick={(e)=>{e.stopPropagation(); setStatus(curr, 'LANCHE');}} className="w-6 h-6 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-orange-100 hover:text-orange-600 transition text-slate-500"><i className="ph-fill ph-coffee"></i></button>}
                      {isAd && <button onClick={(e)=>{e.stopPropagation(); setEditData({...curr});}} className="w-6 h-6 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-blue-100 hover:text-blue-600 transition text-slate-500"><i className="ph-fill ph-sliders"></i></button>}
                    </>
                  ) : (
                    <>
                      {(isAd || (isMe && isInt)) && <button onClick={(e)=>{e.stopPropagation(); setStatus(curr, 'NO POSTO');}} className="px-2 py-1 bg-slate-800 dark:bg-slate-700 text-white rounded text-[8px] font-black hover:bg-slate-600 transition"><i className="ph-bold ph-arrow-u-down-left"></i> VOLTAR</button>}
                      {isAus && isAd && <button onClick={(e)=>{e.stopPropagation(); setEditData({...curr});}} className="px-2 py-1 bg-primary text-white rounded text-[8px] font-black hover:bg-blue-600 transition ml-1"><i className="ph-bold ph-sliders"></i> OPÇÕES</button>}
                    </>
                  )}
                </div>
              </div>
            </div>
          );
        })}

        {nxtArr.map((nxt, idx) => {
          const pInfoNxt = profs.find(p => p.Nome === nxt.Nome_Profissional) || {Nome: nxt.Nome_Profissional, Cor: nxt.Cor};
          return (
            <div key={'n'+idx} onClick={() => setInfoProfModal(pInfoNxt)} className="p-2 rounded-xl border border-slate-200 dark:border-slate-700 fade-next relative overflow-hidden cursor-pointer hover:border-primary transition">
              <p className="text-[8px] font-black text-primary uppercase tracking-widest mb-1">Próximo: {nxt.Horario.split(' ')[0]}</p>
              <div className="flex items-center gap-2 opacity-70">
                {pInfoNxt.FotoURL ? <img src={fmtImg(pInfoNxt.FotoURL)} className="w-5 h-5 rounded-full object-cover shrink-0" /> : <div className="w-5 h-5 rounded-full flex items-center justify-center text-white text-[8px]" style={{background:nxt.Cor||'#000'}}>{nxt.Nome_Profissional[0]}</div>}
                <div className="truncate max-w-[100px] flex items-center gap-1">
                  <p className="text-[9px] font-black text-slate-800 dark:text-white truncate">{nxt.Nome_Profissional}</p>
                </div>
              </div>
            </div>
          )
        })}
      </div>
    );
  };

  if(buscaGlobal.trim() !== '') {
    const termo = buscaGlobal.toLowerCase();
    const escEnc = escHjRaw.filter(e => e.Status !== 'FOLGA' && safeStr(e.Nome_Profissional).toLowerCase().includes(termo));
    const pRend = Array.from(new Set(escEnc.map(e => e.Sala)));

    return (
      <div className="animate-fade-in space-y-8 max-w-[1600px] mx-auto pb-10">
        <div className="flex flex-col md:flex-row justify-between md:items-center gap-4">
          <h2 className="text-2xl font-black flex items-center gap-2"><i className="ph-bold ph-radar text-primary"></i> Radar de Pessoas</h2>
          <div className="relative w-full md:w-96">
            <i className="ph-bold ph-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
            <input type="text" placeholder="Digite o nome..." value={buscaGlobal} onChange={e=>setBuscaGlobal(e.target.value)} className="w-full p-4 pl-12 rounded-2xl border-2 border-primary outline-none bg-white dark:bg-slate-900 font-bold shadow-lg" autoFocus/>
            <button onClick={()=>setBuscaGlobal('')} className="absolute right-4 top-4 text-slate-400 hover:text-red-500"><i className="ph-bold ph-x"></i></button>
          </div>
        </div>

        {pRend.length === 0 ? (
          <div className="p-20 text-center opacity-50 border-2 border-dashed rounded-2xl dark:border-slate-700">
            <i className="ph-bold ph-ghost text-6xl mb-4"></i><p className="font-bold text-lg">Nenhum plantão ativo hoje para "{buscaGlobal}"</p>
          </div>
        ) : (
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            {pRend.map((nomeS, i) => {
              const ocup = escHjRaw.filter(e => e.Sala === nomeS && e.Status !== 'FOLGA');
              const pInfo = postosSis.find(p => p.nome === nomeS) || {setor: 'Geral'};
              return (
                <div key={i} className="clean-card flex flex-col p-1 min-h-[140px] border-t-4 border-t-primary shadow-md">
                  <div className="p-2 bg-blue-50 dark:bg-blue-900/20 rounded-t-xl font-black text-[11px] uppercase tracking-widest text-center border-b border-blue-100 dark:border-blue-900/30 truncate px-2">
                    {nomeS} <span className="block text-[8px] opacity-50 font-normal">{pInfo.setor}</span>
                  </div>
                  {renderPosto(nomeS, ocup)}
                </div>
              )
            })}
          </div>
        )}
        {infoProfModal && <CrachaVirtual profInfo={infoProfModal} cfg={cfg} onClose={()=>setInfoProfModal(null)} />}
        {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
      </div>
    )
  }

  if(!actU) {
    return (
      <div className="animate-fade-in space-y-8 max-w-7xl mx-auto">
        <div className="relative max-w-2xl mx-auto">
          <i className="ph-bold ph-magnifying-glass absolute left-4 top-4 text-slate-400 text-xl"></i>
          <input type="text" placeholder="Onde a pessoa está? Digite o nome aqui para usar o Radar..." value={buscaGlobal} onChange={e=>setBuscaGlobal(e.target.value)} className="w-full p-4 pl-12 rounded-2xl border border-slate-200 dark:border-slate-700 outline-none bg-white dark:bg-slate-800 font-bold shadow-sm focus:border-primary transition" />
        </div>
        <h2 className="text-2xl font-black mb-4 flex items-center gap-2"><i className="ph-fill ph-hospital text-primary"></i> Selecione a Unidade</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
          {unids.map((u,i) => (
            <div key={i} onClick={()=>setActU(u.nome)} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-primary transition-all">
              <div className="w-20 h-20 bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-buildings"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest">{u.nome}</h3>
            </div>
          ))}
          {unids.length===0 && <div className="col-span-full p-10 text-center border-2 border-dashed rounded-2xl opacity-50 font-bold dark:border-slate-700">Vá em "Ajustes" e cadastre Prédios e Unidades.</div>}
        </div>
      </div>
    );
  }

  const setD = setoresSis.filter(s => safeStr(s.unidade).trim().toUpperCase() === safeStr(actU).trim().toUpperCase()).map(s => s.nome);
  
  return (
    <div className="animate-fade-in space-y-8 max-w-[1600px] mx-auto pb-10">
      <div className="flex items-center gap-4 border-b border-slate-200 dark:border-slate-800 pb-4"><button onClick={()=>setActU(null)} className="w-10 h-10 clean-card flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800"><i className="ph-bold ph-arrow-left"></i></button><div><p className="text-[10px] font-bold uppercase opacity-50 tracking-widest">Unidade Ativa</p><h2 className="text-2xl font-black">{actU}</h2></div></div>
      
      {setD.map(st => {
        const psts = postosSis.filter(p => safeStr(p.setor).trim().toUpperCase() === safeStr(st).trim().toUpperCase());
        if(psts.length === 0) return null; 
        
        return (
          <div key={st} className="space-y-4">
            <h3 className="text-lg font-black text-slate-600 dark:text-slate-400 uppercase tracking-widest flex items-center gap-2"><i className="ph-fill ph-squares-four opacity-50"></i> {st}</h3>
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
              {psts.map((pst, i) => {
                const ocup = escHjRaw.filter(e => e.Sala === pst.nome && e.Status !== 'FOLGA' && e.Status !== 'AUSENTE');
                return (
                  <div key={i} className={`clean-card flex flex-col p-1 min-h-[140px] border-t-4 ${ocup.length===0?'opacity-70 border-t-slate-300 dark:border-t-slate-600':'border-t-primary shadow-md'}`}>
                    <div className="p-2 bg-slate-50 dark:bg-slate-800/50 rounded-t-xl font-black text-[11px] uppercase tracking-widest text-center border-b border-slate-100 dark:border-slate-700 truncate px-2">{pst.nome}</div>
                    {ocup.length===0 ? <div className="flex-1 flex flex-col items-center justify-center text-slate-400 py-6"><i className="ph-bold ph-ghost text-3xl mb-2 opacity-30"></i><span className="text-[9px] font-black uppercase">Posto Livre</span></div> : renderPosto(pst.nome, ocup)}
                  </div>
                )
              })}
            </div>
          </div>
        )
      })}
      
      {infoProfModal && <CrachaVirtual profInfo={infoProfModal} cfg={cfg} onClose={()=>setInfoProfModal(null)} />}
      {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
    </div>
  );
};

// ================== ABA 5: MATRIZ DE GANTT VERTICAL ==================
const GanttModernoView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
  const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
  const [viewMode, setViewMode] = useState('MENU');
  const [dataBase, setDataBase] = useState(new Date());
  const [rangeDias, setRangeDias] = useState(1); 
  const [editData, setEditData] = useState(null);
  const [agora, setAgora] = useState(new Date());

  useEffect(() => { const timer = setInterval(() => setAgora(new Date()), 60000); return () => clearInterval(timer); }, []);

  // HORÁRIOS: 06h às 23h
  const H_INICIO = 6; const H_FIM = 23; const H_TOTAL = H_FIM - H_INICIO + 1;
  const HORAS_REGUA = Array.from({length: H_TOTAL}, (_, i) => H_INICIO + i);
  const PX_HORA = 60; 

  const diasRender = Array.from({length: rangeDias}, (_, i) => { let d = new Date(dataBase); d.setDate(d.getDate() + i); return d; });

  const TimeGrid = ({ dateObj }) => {
    const dStr = getStrDt(dateObj);
    const isToday = getStrDt(agora) === dStr;
    const escDia = escalas.filter(e => e.Data === dStr && isEscalaValida(e, cfg?.postos));

    let linhaAgora = null;
    if (isToday) {
      const hDecimal = agora.getHours() + (agora.getMinutes() / 60);
      if (hDecimal >= H_INICIO && hDecimal <= H_FIM + 1) linhaAgora = (hDecimal - H_INICIO) * PX_HORA;
    }

    // --- VISÃO MÉDICOS (Agrupado por Unidade, Colunas = Salas) ---
    if (viewMode === 'Médico') {
      const eMed = escDia.filter(e => {
        const pInfo = profs.find(p=>p.Nome === e.Nome_Profissional);
        return (pInfo && pInfo.Tipo === 'Médico') || e.Cargo?.toLowerCase().includes('médico');
      });
      const undsA = Array.from(new Set(eMed.map(e=>e.Unidade))).filter(Boolean).sort();

      if(undsA.length === 0) return <div className="mb-6"><h3 className="text-md font-black text-primary">{dStr}</h3><p className="opacity-50 text-xs">Nenhum médico escalado.</p></div>

      return (
        <div className="mb-10 animate-fade-in">
          <h3 className="text-xl font-black mb-4 flex items-center gap-2 border-b dark:border-slate-700 pb-2"><i className="ph-fill ph-calendar-blank text-primary"></i> {dateObj.toLocaleDateString('pt-BR', {weekday: 'long', day: '2-digit', month: 'long'}).toUpperCase()}</h3>
          {undsA.map(uNome => {
            const eU = eMed.filter(e=>e.Unidade === uNome);
            const sUsadas = Array.from(new Set(eU.map(e=>e.Sala))).sort();
            
            return (
              <div key={uNome} className="mb-8">
                <h4 className="text-sm font-black text-slate-600 dark:text-slate-400 mb-2 uppercase tracking-widest pl-2 border-l-4 border-slate-300">{uNome}</h4>
                <div className="matrix-container shadow-md">
                  <div className="matrix-time-col">
                    <div className="matrix-header">HORA</div>
                    {HORAS_REGUA.map(h => <div key={h} className="matrix-time-cell">{String(h).padStart(2,'0')}:00</div>)}
                  </div>
                  {sUsadas.map(sN => {
                    const blocos = eU.filter(e=>e.Sala === sN);
                    const pCfg = cfg?.postos?.find(p=>p.nome === sN);
                    return (
                      <div key={sN} className="matrix-data-col">
                        <div className="matrix-header">
                          <span className="font-black text-xs truncate w-full text-center px-1">{sN}</span>
                          <span className="text-[8px] opacity-50 truncate font-normal w-full text-center">{pCfg?.setor || 'Geral'}</span>
                        </div>
                        <div className="relative" style={{height: `${H_TOTAL * PX_HORA}px`}}>
                          {linhaAgora !== null && <div className="matrix-now-line" style={{top: `${linhaAgora}px`}}></div>}
                          {blocos.map((b, bIdx) => {
                            const isFolga = b.Status === 'FOLGA' || b.Status === 'AUSENTE';
                            let top = 0; let height = PX_HORA;
                            if (isFolga || b.Horario === 'A DEFINIR') { top = 4; height = 40; } 
                            else {
                              const vIn = parseHorario(b.Horario.split(' às ')[0]?.trim());
                              let vOut = parseHorario(b.Horario.split(' às ')[1]?.trim());
                              if(vIn !== null && vOut !== null) {
                                if(vOut <= vIn) vOut += 24; 
                                top = (vIn - H_INICIO) * PX_HORA; height = (vOut - vIn) * PX_HORA;
                                if(top < 0) { height += top; top = 0; } 
                              }
                            }
                            let bgColor = isFolga ? '#94a3b8' : getCorDaSala(b.Sala, cfg);
                            const pI = profs.find(p => p.Nome === b.Nome_Profissional) || {};

                            return (
                              <div key={bIdx} onClick={()=> isAd && setEditData({...b})} className="matrix-block" style={{top:`${top}px`, height:`${height-2}px`, backgroundColor: bgColor}}>
                                <span className="truncate w-full font-black text-[10px] leading-tight flex items-center gap-1">
                                  {b.Nome_Profissional} {pI.CodUnimed && <div className="w-1.5 h-1.5 bg-white rounded-full shrink-0 shadow"></div>}
                                </span>
                                {!isFolga && b.Horario !== 'A DEFINIR' && <span className="text-[9px] font-medium opacity-90">{b.Horario}</span>}
                                {b.Auxiliar && <span className="text-[8px] bg-black/20 px-1 rounded mt-1 truncate w-max">Aux: {b.Auxiliar}</span>}
                                {(isFolga || b.Horario==='A DEFINIR') && <span className="text-[8px] font-black text-red-100 mt-auto">{b.Status==='FOLGA'?'FOLGA':'A DEFINIR'}</span>}
                              </div>
                            )
                          })}
                        </div>
                      </div>
                    )
                  })}
                </div>
              </div>
            )
          })}
        </div>
      )
    }

    // --- MATRIZ COLABORADOR (Colunas = Nomes de Pessoas) ---
    const eC = escDia.filter(e => {
      const pInfo = profs.find(p=>p.Nome === e.Nome_Profissional);
      return pInfo ? pInfo.Tipo === 'Colaborador' : !e.Cargo?.toLowerCase().includes('médico');
    });
    const nC = Array.from(new Set(eC.map(e=>e.Nome_Profissional))).sort();

    if(nC.length === 0) return null; 

    return (
      <div className="mb-10 animate-fade-in">
        <h3 className="text-xl font-black mb-4 flex items-center gap-2 border-b dark:border-slate-700 pb-2"><i className="ph-fill ph-calendar-blank text-primary"></i> {dateObj.toLocaleDateString('pt-BR', {weekday: 'long', day: '2-digit', month: 'long'}).toUpperCase()}</h3>
        <div className="matrix-container shadow-md">
          <div className="matrix-time-col">
            <div className="matrix-header">HORA</div>
            {HORAS_REGUA.map(h => <div key={h} className="matrix-time-cell">{String(h).padStart(2,'0')}:00</div>)}
          </div>

          {nC.map((nNome, idx) => {
            const blocos = eC.filter(e=>e.Nome_Profissional === nNome);
            const pInfo = profs.find(p=>p.Nome === nNome) || {};
            
            return (
              <div key={idx} className="matrix-data-col">
                <div className="matrix-header" title={nNome}>
                  <span className="font-black text-[11px] truncate w-full text-center px-1">{nNome.split(' ')[0] + ' ' + (nNome.split(' ')[1]||'')}</span>
                  <span className="block text-[8px] font-normal opacity-50 truncate w-full text-center">{pInfo.Cargo || 'Geral'}</span>
                </div>
                <div className="relative" style={{height: `${H_TOTAL * PX_HORA}px`}}>
                  {linhaAgora !== null && <div className="matrix-now-line" style={{top: `${linhaAgora}px`}}></div>}
                  {blocos.map((b, bIdx) => {
                    const isFolga = b.Status === 'FOLGA' || b.Status === 'AUSENTE';
                    let top = 0; let height = PX_HORA; 
                    if (isFolga || b.Horario === 'A DEFINIR') { top = 4; height = 40; } 
                    else {
                      const vIn = parseHorario(b.Horario.split(' às ')[0]?.trim());
                      let vOut = parseHorario(b.Horario.split(' às ')[1]?.trim());
                      if(vIn !== null && vOut !== null) {
                        if(vOut <= vIn) vOut += 24; 
                        top = (vIn - H_INICIO) * PX_HORA; height = (vOut - vIn) * PX_HORA;
                        if(top < 0) { height += top; top = 0; } 
                      }
                    }
                    let bgColor = isFolga ? '#94a3b8' : getCorDaSala(b.Sala, cfg);

                    return (
                      <div key={bIdx} onClick={()=> isAd && setEditData({...b})} className="matrix-block" style={{top:`${top}px`, height:`${height-2}px`, backgroundColor: bgColor}}>
                        <span className="truncate w-full font-black text-[11px] leading-tight">{isFolga?'FOLGA':b.Sala}</span>
                        {!isFolga && b.Horario !== 'A DEFINIR' && <span className="text-[9px] font-medium opacity-90">{b.Horario}</span>}
                        {b.MedicoApoio && <span className="text-[8px] bg-black/20 px-1 py-0.5 rounded mt-1 truncate">Apoio: {b.MedicoApoio}</span>}
                        {(isFolga || b.Horario==='A DEFINIR') && <span className="text-[8px] font-black text-red-100 mt-auto">{b.Status==='FOLGA'?'FOLGA':'A DEFINIR'}</span>}
                      </div>
                    )
                  })}
                </div>
              </div>
            )
          })}
        </div>
      </div>
    )
  }

  return (
    <div className="animate-fade-in space-y-6 max-w-[1600px] mx-auto pb-10">
      {viewMode === 'MENU' ? (
        <div>
          <h2 className="text-2xl font-black mb-6">Visão Ampla (Gantt Vertical)</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div onClick={()=>setViewMode('Colaborador')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-primary hover:shadow-lg transition-all">
              <div className="w-20 h-20 bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-table"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest text-center">Matriz Colaboradores</h3>
              <p className="text-[10px] font-bold opacity-60 mt-2">Colunas = Pessoas</p>
            </div>
            <div onClick={()=>setViewMode('Médico')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-red-500 hover:shadow-lg transition-all">
              <div className="w-20 h-20 bg-red-50 text-red-600 dark:bg-red-900/20 dark:text-red-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-table"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest text-center">Matriz Médicos</h3>
              <p className="text-[10px] font-bold opacity-60 mt-2">Colunas = Salas por Unidade</p>
            </div>
          </div>
        </div>
      ) : (
        <div className="animate-fade-in space-y-6">
          <div className="flex flex-col lg:flex-row justify-between lg:items-center gap-4 border-b dark:border-slate-700 pb-4">
            <div className="flex items-center gap-4">
              <button onClick={()=>setViewMode('MENU')} className="w-10 h-10 clean-card flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800"><i className="ph-bold ph-arrow-left"></i></button>
              <div>
                <p className="text-[10px] font-bold uppercase opacity-50 tracking-widest">Matriz Vertical</p>
                <h2 className="text-2xl font-black">{viewMode === 'Médico' ? 'Ocupação de Salas' : 'Rota de Colaboradores'}</h2>
              </div>
            </div>
            <div className="flex flex-wrap items-center gap-4">
              <div className="flex items-center bg-white dark:bg-slate-800 p-1.5 rounded-xl shadow-sm border dark:border-slate-700">
                <button onClick={()=>setDataBase(new Date(dataBase.setDate(dataBase.getDate() - rangeDias)))} className="w-8 h-8 flex justify-center items-center hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition"><i className="ph-bold ph-caret-left"></i></button>
                <span className="font-black text-xs uppercase px-2 text-center min-w-[120px]">Início: {dataBase.toLocaleDateString('pt-BR')}</span>
                <button onClick={()=>setDataBase(new Date(dataBase.setDate(dataBase.getDate() + rangeDias)))} className="w-8 h-8 flex justify-center items-center hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition"><i className="ph-bold ph-caret-right"></i></button>
              </div>
              <select value={rangeDias} onChange={e=>setRangeDias(Number(e.target.value))} className="p-2.5 rounded-xl border dark:border-slate-700 outline-none bg-white dark:bg-slate-800 font-bold text-sm shadow-sm cursor-pointer">
                <option value={1}>Exibir 1 Dia</option>
                <option value={3}>Exibir 3 Dias</option>
                <option value={7}>Exibir 7 Dias</option>
                <option value={15}>Exibir 15 Dias</option>
                <option value={30}>Exibir 30 Dias</option>
              </select>
            </div>
          </div>
          <div className="space-y-8">
            {diasRender.map((d, i) => <TimeGrid key={i} dateObj={d} />)}
          </div>
        </div>
      )}
      {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
    </div>
  );
};

// ================== APP ROOT E ROTEAMENTO ==================
const App = () => {
  const [u, setU] = useState(null); const [l, setL] = useState(true); const [t, setT] = useState('HOJE');
  const [dbD, setDb] = useState({ PROFISSIONAIS:[], ESCALAS:[], CONFIGURACOES:{} });
  const [isD, setIsD] = useState(() => localStorage.getItem('theme') === 'dark');
  
  useEffect(() => { 
    if (isD) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); 
    localStorage.setItem('theme', isD?'dark':'light'); 
  }, [isD]);
  
  const f = async () => {
    const pr = await api.fetch('PROFISSIONAIS'); const es = await api.fetch('ESCALAS'); const cf = await api.fetch('CONFIGURACOES');
    const pCfg = cf.find(c=>c.ID==='parametros')||{}; const plCfg = cf.find(c=>c.ID==='plantao')||{};
    setDb({ PROFISSIONAIS: pr||[], ESCALAS: es||[], CONFIGURACOES: {...pCfg, ...plCfg} });
  };

  useEffect(() => { 
    const un = auth.onAuthStateChanged(async usr => { 
      if(usr){ 
        let role = 'Colaborador'; const eml = usr.email.toLowerCase();
        if (eml.includes('admin') || eml.includes('gestao') || eml.includes('diretor')) role = 'Admin';
        else if (eml.includes('supervis')) role = 'Supervisor';
        setU({email:usr.email, nome:usr.email.split('@')[0], nivel:role}); 
        await f(); 
      } else setU(null); 
      setL(false); 
    }); 
    return ()=>un(); 
  }, []);

  if (l) return <div className="min-h-screen flex items-center justify-center"><div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>;

  if (!u) return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-900">
      <div className="w-full max-w-md clean-card p-10">
        <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6"><i className="ph-fill ph-hospital"></i></div>
        <h1 className="text-3xl font-black text-center mb-8">Escalas SV</h1>
        <form onSubmit={async e=>{e.preventDefault();setL(true);try{await auth.signInWithEmailAndPassword(e.target.e.value, e.target.p.value);}catch(err){alert('Acesso Negado. Verifique os dados.');setL(false);}}} className="space-y-4">
          <input name="e" type="email" placeholder="E-mail" className="w-full p-4 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none font-bold" required />
          <input name="p" type="password" placeholder="Senha" className="w-full p-4 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none font-bold" required />
          <button type="submit" className="w-full bg-primary text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-600 transition">Entrar no Sistema</button>
        </form>
      </div>
    </div>
  );

  const isAd = u.nivel === 'Admin' || u.nivel === 'Supervisor';
  const menu = [ 
    {id:'HOJE', i:'ph-kanban', n:'Plantão'}, 
    {id:'DIARIO', i:'ph-users-three', n:'Lista Dia'}, 
    {id:'MATRIZ', i:'ph-table', n:'Gantt'}, 
    {id:'CALENDARIO', i:'ph-calendar-plus', n:'Escalas'}, 
    {id:'EQUIPE', i:'ph-address-book', n:'Equipe', adminOnly:true}, 
    {id:'CONFIG', i:'ph-gear', n:'Ajustes', adminOnly:true} 
  ];

  return (
    <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0">
      <aside className="hidden md:flex flex-col h-screen fixed z-30 w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
        <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3"><div className="w-10 h-10 bg-primary text-white rounded-lg flex justify-center items-center"><i className="ph-fill ph-heartbeat text-xl"></i></div><div><h2 className="font-black text-lg">Escalas SV</h2><p className="text-[9px] uppercase opacity-50 font-bold tracking-widest">ERP Hospitalar</p></div></div>
        <nav className="flex-1 px-4 py-6 space-y-2">{menu.filter(m=>!m.adminOnly||isAd).map(m=><button key={m.id} onClick={()=>setT(m.id)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold text-sm transition ${t===m.id?'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400':'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`}><i className={`ph-fill ${m.i} text-xl`}></i> {m.n}</button>)}</nav>
        <div className="p-4 border-t border-slate-100 dark:border-slate-800"><button onClick={()=>auth.signOut()} className="text-red-500 font-bold flex items-center gap-2 p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded w-full transition"><i className="ph-bold ph-sign-out text-lg"></i> Sair do App</button></div>
      </aside>
      
      <nav className="md:hidden fixed bottom-0 inset-x-0 border-t border-slate-200 dark:border-slate-800 z-50 flex justify-around p-2 pb-safe bg-white dark:bg-slate-900 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] overflow-x-auto hide-scroll">
        {menu.filter(m=>!m.adminOnly||isAd).map(m=><button key={m.id} onClick={()=>setT(m.id)} className={`flex flex-col items-center gap-1 p-2 rounded-xl min-w-[64px] transition ${t===m.id?'text-primary':'text-slate-400'}`}><i className={`ph-fill ${m.i} text-2xl`}></i><span className="text-[9px] font-black uppercase">{m.n}</span></button>)}
      </nav>
      
      <main className="flex-1 transition-all p-4 md:p-8 w-full md:ml-64 overflow-x-hidden">
        <TopHeader user={u} isDark={isD} toggleDark={()=>setIsD(!isD)} />
        
        {t==='HOJE' && <PainelHojeView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='DIARIO' && <TrabalhandoHojeView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='MATRIZ' && <GanttModernoView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='CALENDARIO' && <CalendarioView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='EQUIPE' && isAd && <EquipeView data={dbD.PROFISSIONAIS} cfg={dbD.CONFIGURACOES || {}} onSave={api.saveRecord} onDelete={api.deleteRecord} onRefresh={f} />}
        {t==='CONFIG' && isAd && <AjustesView cfg={dbD.CONFIGURACOES || {}} onSave={api.saveRecord} onRefresh={f} />}
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root')); 
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
