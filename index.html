<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, Component, useMemo } = React;

// CONFIGURAÇÃO FIREBASE
const firebaseConfig = { 
  apiKey: "AIzaSyAtywH5sc1OEs0xa-c7IDOpGA9764ZhU6c", 
  authDomain: "escalas-sao-vicente.firebaseapp.com", 
  projectId: "escalas-sao-vicente", 
  storageBucket: "escalas-sao-vicente.firebasestorage.app", 
  messagingSenderId: "256697542067", 
  appId: "1:256697542067:web:b8087390bb57d74def97c6" 
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(); 
const auth = firebase.auth();
db.enablePersistence({synchronizeTabs:true}).catch(e => console.log(e));

const api = {
  fetch: async (c) => { 
    try { const s = await db.collection(c).get(); return s.docs.map(d => ({ ID: d.id, ...d.data() })); } 
    catch(e){ return []; } 
  },
  saveRecord: async (c, d) => { 
    try { 
      let o = {...d}; let id = o.ID; delete o.ID; 
      if(id) await db.collection(c).doc(id).set(o, {merge:true}); 
      else await db.collection(c).add(o); 
      return true; 
    } catch(e){ return false; } 
  },
  deleteRecord: async (c, id) => { 
    try { await db.collection(c).doc(id).delete(); return true; } 
    catch(e){ return false; } 
  }
};

// FUNÇÕES AUXILIARES GERAIS
const safeStr = (v) => v == null ? '' : String(v);
const fmtImg = (u) => { 
  let s = safeStr(u).trim(); if(!s) return ''; 
  const match = s.match(/(?:file\/d\/|id=|v\/|u\/\d+\/p\/)([a-zA-Z0-9_-]{25,})/);
  if(match) return `https://drive.google.com/uc?export=view&id=${match[1]}`; 
  return s; 
};
const getStrDt = (d) => d ? String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() : '';
const ordenarPorNome = (lista) => [...lista].sort((a, b) => safeStr(a.Nome).localeCompare(safeStr(b.Nome)));
const checkIsMe = (nome, email) => {
  if(!nome || !email) return false;
  const p = safeStr(email).toLowerCase().split('@')[0].split(/[.\-_]/);
  const n = safeStr(nome).toLowerCase();
  return p.some(x => x.length > 2 && n.includes(x));
};

// FILTRO CAÇA-FANTASMAS
const isEscalaValida = (esc, postosCfg) => {
  const sala = safeStr(esc.Sala).trim().toUpperCase();
  if (['A DEFINIR', 'FOLGA', 'FÉRIAS', 'ATESTADO', 'TRABALHO EXTERNO', 'OUTROS'].includes(sala)) return true;
  return (postosCfg || []).some(p => safeStr(p.nome).trim().toUpperCase() === sala);
};

const getCorDaSala = (salaNome, cfg) => {
  const p = (cfg?.postos || []).find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(salaNome).trim().toUpperCase());
  if(!p) return '#94a3b8'; 
  const s = (cfg?.setores || []).find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(p.setor).trim().toUpperCase());
  return s?.cor || '#0ea5e9';
};

// LOGICA DE TEMPO
const parseHorario = (hStr) => {
  if(!hStr || hStr === 'A DEFINIR') return null;
  let parts = hStr.split(':'); if(parts.length < 2) return null;
  return parseInt(parts[0]) + (parseInt(parts[1])/60);
};

// COMPONENTES MENORES
const BadgeConvenio = ({ cod, logo }) => {
  if(!cod) return null;
  if(logo) return <img src={fmtImg(logo)} className="h-4 w-auto inline-block ml-1 rounded-sm bg-white" title={`Unimed: ${cod}`} />;
  return <span className="ml-1 bg-green-500 text-white text-[8px] px-1 rounded font-black">CONV.</span>;
};

class ErrorBoundary extends Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError(error) { return { hasError: true }; }
  render() { 
    if (this.state.hasError) return <div className="p-10 text-center text-red-500 font-bold">Ocorreu um erro na tela. <button onClick={()=>location.reload()} className="underline ml-2">Recarregar</button></div>; 
    return this.props.children; 
  }
}

const TopHeader = ({ user, isDark, toggleDark }) => {
  const [t, setT] = useState(new Date());
  useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);
  return (
    <div className="clean-card p-6 mb-6 flex justify-between items-center">
      <div className="flex items-center gap-4">
        <div className="w-12 h-12 rounded-xl flex items-center justify-center text-3xl bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400">
          <i className="ph-fill ph-hospital"></i>
        </div>
        <div>
          <h2 className="text-2xl font-black">{t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</h2>
          <p className="text-[10px] font-bold uppercase opacity-60 mt-1">Olá, {user?.nome?.split(' ')[0]}</p>
        </div>
      </div>
      <div className="flex items-center gap-4">
        <button onClick={toggleDark} className="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex justify-center items-center text-xl hover:scale-110 transition">
          <i className={isDark ? "ph-fill ph-sun text-yellow-400" : "ph-fill ph-moon"}></i>
        </button>
        <button onClick={() => auth.signOut()} className="md:hidden w-10 h-10 rounded-full bg-red-50 dark:bg-red-900/30 flex justify-center items-center text-xl text-red-500 hover:scale-110 transition">
          <i className="ph-bold ph-sign-out"></i>
        </button>
      </div>
    </div>
  );
};

// ================== SUPER MODAL (GERENCIAR ESCALA) ==================
const SuperActionModal = ({ escala, profs, cfg, onClose, onSave, onRefresh, isAd }) => {
  const [fd, setFd] = useState({...escala});
  const isMedico = fd.Cargo?.toLowerCase().includes('médico') || profs.find(p=>p.Nome===fd.Nome_Profissional)?.Tipo === 'Médico';
  const pOrd = ordenarPorNome(profs);

  const handleSave = async (e) => {
    e.preventDefault();
    if (fd.Nome_Profissional === "VAZIO") {
      if (confirm("Excluir este plantão permanentemente?")) { await api.deleteRecord('ESCALAS', fd.ID); onRefresh(); onClose(); }
      return;
    }
    const pInfo = profs.find(p => p.Nome === fd.Nome_Profissional);
    if(pInfo) { fd.Cor = pInfo.Cor; fd.Cargo = pInfo.Cargo; }
    await onSave('ESCALAS', fd); 
    onRefresh(); 
    onClose();
  };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 animate-fade-in" onClick={onClose}>
      <div className="clean-card w-full max-w-md p-6 max-h-[90vh] overflow-y-auto shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="flex justify-between items-center mb-4 border-b dark:border-slate-700 pb-2">
          <h3 className="text-xl font-black text-primary flex items-center gap-2"><i className="ph-fill ph-sliders"></i> Gerenciar Escala</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-red-500"><i className="ph-bold ph-x text-xl"></i></button>
        </div>
        <form onSubmit={handleSave} className="space-y-4">
          <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700">
            <p className="text-[10px] font-black uppercase opacity-60">Data Ref.</p><p className="font-bold">{fd.Data}</p>
          </div>
          {isAd && (
            <div>
              <label className="text-[10px] font-black uppercase opacity-60 text-blue-600 dark:text-blue-400">Transferir Plantão / Substituir</label>
              <select value={fd.Nome_Profissional} onChange={e=>setFd({...fd, Nome_Profissional: e.target.value})} className="w-full p-3 border rounded-xl bg-blue-50 dark:bg-slate-900 text-blue-700 dark:text-blue-400 font-bold dark:border-slate-700 outline-none">
                <option value={fd.Nome_Profissional}>Manter: {fd.Nome_Profissional}</option>
                <option value="VAZIO">🗑️ DEIXAR POSTO VAZIO (Excluir)</option>
                <option disabled>──────────</option>
                {pOrd.filter(p => p.Nome !== fd.Nome_Profissional).map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
              </select>
            </div>
          )}
          <div>
            <label className="text-[10px] font-black uppercase opacity-60">Status</label>
            <select value={fd.Status} onChange={e=>setFd({...fd, Status:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none">
              <option value="NO POSTO">🟢 Turno Normal (Ativo)</option>
              <option value="LANCHE">☕ Lanche / Pausa</option>
              <option value="FOLGA">⚪ Folga Agendada</option>
              <option value="AUSENTE">🔴 Ausente / Falta</option>
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div className="col-span-2">
              <label className="text-[10px] font-black uppercase opacity-60">Sala / Posto</label>
              <select value={fd.Sala} onChange={e=>setFd({...fd, Sala:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none">
                <option value="A DEFINIR">A DEFINIR...</option>
                <option value="FOLGA">FOLGA / FÉRIAS</option>
                <option disabled>──────────</option>
                {(cfg?.postos||[]).map((x,i)=><option key={i} value={x.nome||x}>{x.nome||x}</option>)}
              </select>
            </div>
            <div className="col-span-2">
              <label className="text-[10px] font-black uppercase opacity-60">Horário (Ex: 08:00 às 18:00)</label>
              <input type="text" value={fd.Horario} onChange={e=>setFd({...fd, Horario:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none"/>
            </div>
          </div>
          {isMedico ? (
            <div className="bg-purple-50 dark:bg-purple-900/10 p-3 rounded-xl border border-purple-200 dark:border-purple-900/30">
              <label className="text-[10px] font-black text-purple-600 dark:text-purple-400 flex items-center gap-1 mb-1"><i className="ph-fill ph-user-plus mr-1"></i> Auxiliar de Sala</label>
              <select value={fd.Auxiliar||''} onChange={e=>setFd({...fd, Auxiliar:e.target.value})} className="w-full p-2 border rounded dark:bg-slate-800 dark:border-slate-700 text-sm font-bold outline-none">
                <option value="">Sem auxiliar</option>
                {pOrd.filter(p=>p.Tipo==='Colaborador').map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
              </select>
            </div>
          ) : (
            <div className="bg-indigo-50 dark:bg-indigo-900/10 p-3 rounded-xl border border-indigo-200 dark:border-indigo-900/30">
              <label className="text-[10px] font-black text-indigo-600 dark:text-indigo-400 flex items-center gap-1 mb-1"><i className="ph-fill ph-stethoscope mr-1"></i> Prestando Apoio Ao Médico</label>
              <select value={fd.MedicoApoio||''} onChange={e=>setFd({...fd, MedicoApoio:e.target.value})} className="w-full p-2 border rounded dark:bg-slate-800 dark:border-slate-700 text-sm font-bold outline-none">
                <option value="">Atendimento Geral</option>
                {pOrd.filter(p=>p.Tipo==='Médico').map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
              </select>
            </div>
          )}
          <div>
            <label className="text-[10px] font-black uppercase opacity-60">Anotações / Motivo da Falta</label>
            <input type="text" value={fd.ObsDia||''} onChange={e=>setFd({...fd, ObsDia:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 outline-none"/>
          </div>
          <div className="flex justify-end gap-2 pt-4 border-t dark:border-slate-700">
            <button type="button" onClick={onClose} className="px-4 py-3 font-bold opacity-60 hover:opacity-100 transition">Cancelar</button>
            <button type="submit" className="bg-primary text-white px-8 py-3 rounded-xl font-black hover:bg-blue-600 transition">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  );
};

// ================== CRACHÁ VIRTUAL ==================
const CrachaVirtual = ({ profInfo, cfg, onClose }) => (
  <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-slate-900/60 animate-fade-in" onClick={onClose}>
    <div className="clean-card w-full max-w-sm p-0 overflow-hidden shadow-2xl relative" onClick={e=>e.stopPropagation()}>
      <div className="h-24 bg-gradient-to-r from-primary to-blue-400 relative">
        <button onClick={onClose} className="absolute top-4 right-4 text-white hover:scale-110"><i className="ph-bold ph-x text-xl"></i></button>
      </div>
      <div className="px-6 pb-6 pt-0 relative flex flex-col items-center text-center">
        <div className="w-24 h-24 rounded-full border-4 border-white dark:border-slate-800 shadow-lg -mt-12 bg-slate-100 dark:bg-slate-700 flex items-center justify-center overflow-hidden mb-3" style={{backgroundColor:profInfo.FotoURL?'':(profInfo.Cor||'#0ea5e9')}}>
          {profInfo.FotoURL ? <img src={fmtImg(profInfo.FotoURL)} className="w-full h-full object-cover" /> : <span className="text-4xl font-black text-white">{profInfo.Nome?.[0]}</span>}
        </div>
        <h3 className="text-xl font-black leading-tight flex items-center justify-center gap-1">
          {profInfo.Nome} <BadgeConvenio cod={profInfo.CodUnimed} logo={cfg?.logoConvenio} />
        </h3>
        <p className="text-xs font-bold text-primary uppercase mt-1">{profInfo.Cargo}</p>
        <div className="w-full mt-6 space-y-2 text-left">
          <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700">
            <p className="text-[9px] font-bold opacity-50 uppercase tracking-widest">Lotação Base</p>
            <p className="text-xs font-black">{profInfo.UnidadeBase||'Geral'} • {profInfo.Setor||'-'}</p>
          </div>
          {(profInfo.CRM || profInfo.CodUnimed) && (
            <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700 flex gap-4">
              {profInfo.CRM && <div className="flex-1"><p className="text-[9px] font-bold opacity-50 uppercase tracking-widest">CRM</p><p className="text-xs font-black">{profInfo.CRM}</p></div>}
              {profInfo.CodUnimed && <div className="flex-1"><p className="text-[9px] font-bold opacity-50 uppercase tracking-widest">Unimed</p><p className="text-xs font-black">{profInfo.CodUnimed}</p></div>}
            </div>
          )}
          {profInfo.TipoContrato && (
            <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700">
              <p className="text-[9px] font-bold opacity-50 uppercase tracking-widest">Vínculo</p>
              <p className="text-xs font-black">{profInfo.TipoContrato}</p>
            </div>
          )}
          {profInfo.ObservacoesGerais && (
            <div className="bg-yellow-50 dark:bg-yellow-900/20 p-3 rounded-xl border border-yellow-100 dark:border-yellow-900/30">
              <p className="text-[9px] font-bold text-yellow-600 uppercase tracking-widest"><i className="ph-fill ph-info"></i> Observações</p>
              <p className="text-xs text-yellow-800 dark:text-yellow-400">{profInfo.ObservacoesGerais}</p>
            </div>
          )}
        </div>
      </div>
    </div>
  </div>
);

// ================== ABA 1: AJUSTES (CONFIGURAÇÕES GERAIS) ==================
const AjustesView = ({ cfg, onSave, onRefresh }) => {
  const [u, setU] = useState([]); const [s, setS] = useState([]); const [p, setP] = useState([]); 
  const [h, setH] = useState([]); const [a, setA] = useState([]); 
  const [logoConv, setLogoConv] = useState(''); 
  const [loading, setL] = useState(false); const [mod, setMod] = useState(null); 

  useEffect(() => { 
    const fmt = arr => (arr||[]).map(x => typeof x==='string' ? {nome: x.toUpperCase()} : x);
    setU(fmt(cfg?.unidades)); setS(fmt(cfg?.setores)); setP(fmt(cfg?.postos)); 
    setH(cfg?.habilidades||[]); setA(cfg?.ausencias||[]); setLogoConv(cfg?.logoConvenio||''); 
  }, [cfg]);

  const salvar = async () => { 
    setL(true); 
    await onSave('CONFIGURACOES',{ID:'parametros',unidades:u,setores:s,postos:p,habilidades:h,ausencias:a,logoConvenio:logoConv}); 
    onRefresh(); setL(false); alert("Salvo com sucesso no Banco de Dados!"); 
  };

  const confirmMod = (e) => { 
    e.preventDefault(); const { t, act, idx, v1, v2, v3 } = mod; 
    let n1 = v1.trim().toUpperCase(); let n2 = v2.trim().toUpperCase(); 
    if(t==='p'||t==='h'||t==='a') n1 = v1.trim(); 
    
    if(act === 'add') { 
      if(t==='u') setU([...u, {nome:n1}]); if(t==='s') setS([...s, {nome:n1, unidade:n2, cor:v3}]); if(t==='p') setP([...p, {nome:n1, setor:n2}]); 
      if(t==='h') setH([...h, n1]); if(t==='a') setA([...a, n1]); 
    } else { 
      if(t==='u'){ let arr=[...u]; arr[idx].nome=n1; setU(arr); } 
      if(t==='s'){ let arr=[...s]; arr[idx].nome=n1; arr[idx].unidade=n2; arr[idx].cor=v3; setS(arr); } 
      if(t==='p'){ let arr=[...p]; arr[idx].nome=n1; arr[idx].setor=n2; setP(arr); } 
      if(t==='h'){ let arr=[...h]; arr[idx]=n1; setH(arr); } 
      if(t==='a'){ let arr=[...a]; arr[idx]=n1; setA(arr); } 
    } 
    setMod(null); 
  };

  const del = (t, i) => { 
    if(!confirm("Excluir item permanentemente?")) return; 
    if(t==='u') setU(u.filter((_,x)=>x!==i)); if(t==='s') setS(s.filter((_,x)=>x!==i)); if(t==='p') setP(p.filter((_,x)=>x!==i)); 
    if(t==='h') setH(h.filter((_,x)=>x!==i)); if(t==='a') setA(a.filter((_,x)=>x!==i)); 
  };

  const Lst = ({title, arr, tipo}) => (
    <div className="clean-card p-5">
      <div className="flex justify-between items-center mb-2">
        <h3 className="font-black text-sm">{title}</h3>
