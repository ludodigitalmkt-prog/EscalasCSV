    const manifest = { name: "Escalas SV", short_name: "Escalas SV", start_url: ".", display: "standalone", background_color: "#0f172a", theme_color: "#0ea5e9", icons: [{ src: svgIcon, sizes: "512x512", type: "image/svg+xml" }] };
    const blob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
    document.addEventListener("DOMContentLoaded", () => {

</script>

/* Estilos da Matriz Vertical (A Visão Ampla Perfeita) */
.matriz-wrap { display: flex; overflow-x: auto; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; position: relative; max-height: 75vh; overflow-y: auto; }
.dark .matriz-wrap { background: #0f172a; border-color: #334155; }
.matriz-col-horas { position: sticky; left: 0; width: 60px; min-width: 60px; background: #f8fafc; z-index: 40; border-right: 2px solid #e2e8f0; }
.dark .matriz-col-horas { background: #1e293b; border-color: #334155; }
.matriz-header-hora { height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; background: #f8fafc; z-index: 50; }
.dark .matriz-header-hora { border-color: #334155; background: #1e293b; }
.matriz-celula-hora { height: 60px; display: flex; align-items: flex-start; justify-content: center; padding-top: 4px; font-size: 10px; font-weight: 900; color: #94a3b8; border-bottom: 1px solid #f1f5f9; }
.dark .matriz-celula-hora { border-color: #334155; color: #64748b; }
.matriz-col-dados { min-width: 140px; flex: 1; border-right: 1px solid #f1f5f9; position: relative; background: repeating-linear-gradient(180deg, transparent, transparent 59px, #f1f5f9 59px, #f1f5f9 60px); }
.dark .matriz-col-dados { border-color: #334155; background: repeating-linear-gradient(180deg, transparent, transparent 59px, #1e293b 59px, #1e293b 60px); }
.matriz-header-dados { height: 50px; padding: 4px 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; background: #fff; z-index: 30; }
.dark .matriz-header-dados { border-color: #334155; background: #0f172a; }
.matriz-bloco { position: absolute; left: 4px; right: 4px; border-radius: 8px; padding: 6px; color: white; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.2s; z-index: 10; border: 1px solid rgba(255,255,255,0.2); }
.matriz-bloco:hover { transform: scale(1.02); z-index: 25; filter: brightness(1.1); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
.matriz-linha-agora { position: absolute; left: 0; right: 0; height: 2px; background-color: #ef4444; z-index: 20; pointer-events: none; box-shadow: 0 0 5px rgba(239,68,68,0.5); }
.matriz-linha-agora::before { content: ''; position: absolute; left: 0; top: -4px; width: 10px; height: 10px; border-radius: 50%; background-color: #ef4444; }

<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, Component, useMemo } = React;

const firebaseConfig = { apiKey:"AIzaSyAtywH5sc1OEs0xa-c7IDOpGA9764ZhU6c", authDomain:"escalas-sao-vicente.firebaseapp.com", projectId:"escalas-sao-vicente", storageBucket:"escalas-sao-vicente.firebasestorage.app", messagingSenderId:"256697542067", appId:"1:256697542067:web:b8087390bb57d74def97c6" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(); const auth = firebase.auth();

db.enablePersistence({synchronizeTabs:true}).catch(e => console.log("Cache error: ", e));

const api = {
    fetch: async (c) => { try { const s = await db.collection(c).get(); return s.docs.map(d => ({ ID: d.id, ...d.data() })); } catch(e){return [];} },
    saveRecord: async (c, d) => { try { let o={...d}; let id=o.ID; delete o.ID; if(id) await db.collection(c).doc(id).set(o,{merge:true}); else await db.collection(c).add(o); return true; } catch(e){return false;} },
    deleteRecord: async (c, id) => { try { await db.collection(c).doc(id).delete(); return true; } catch(e){return false;} }
};
const safeStr = (v) => v==null?'':String(v);

const fmtImg = (u) => { 
    let s=safeStr(u).trim(); if(!s) return ''; 
    const match = s.match(/(?:file\/d\/|id=|v\/|u\/\d+\/p\/)([a-zA-Z0-9_-]{25,})/);
    if(match) return `https://drive.google.com/uc?export=view&id=${match[1]}`; 
    return s; 
};

const getStrDt = (d) => { if(!d) return ''; return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear(); };
const ordenarPorNome = (lista) => [...lista].sort((a, b) => safeStr(a.Nome).localeCompare(safeStr(b.Nome)));

const checkIsMe = (nomeProfissional, userEmail) => {
    if(!nomeProfissional || !userEmail) return false;
    const norm = (s) => safeStr(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const parts = norm(userEmail).split('@')[0].split(/[.\-_]/);
    const nProf = norm(nomeProfissional);
    return parts.some(p => p.length > 2 && nProf.includes(p));
};

const isEscalaValida = (esc, postosCfg) => {
    const sala = safeStr(esc.Sala).trim().toUpperCase();
    const salasOficiais = ['A DEFINIR', 'FOLGA', 'FÉRIAS', 'ATESTADO', 'TRABALHO EXTERNO', 'OUTROS'];
    if (salasOficiais.includes(sala)) return true;
    const postosList = postosCfg || [];
    return postosList.some(p => safeStr(p.nome).trim().toUpperCase() === sala);
};

const getCorDaSala = (salaNome, cfg) => {
    const psts = cfg?.postos || []; const sets = cfg?.setores || [];
    const p = psts.find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(salaNome).trim().toUpperCase());
    if(!p) return '#94a3b8'; 
    const s = sets.find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(p.setor).trim().toUpperCase());
    return s?.cor || '#0ea5e9';
};

const parseHorario = (hStr) => {
    if(!hStr || hStr === 'A DEFINIR') return null;
    let parts = hStr.split(':'); if(parts.length < 2) return null;
    return parseInt(parts[0]) + (parseInt(parts[1])/60);
};

const BadgeConvenio = ({ codUnimed, configLogo }) => {
    if(!codUnimed) return null;
    if(configLogo) return <img src={fmtImg(configLogo)} className="h-4 w-auto inline-block ml-2 rounded-sm bg-white" title={`Código Unimed: ${codUnimed}`} alt="Convênio" />;
    return <span className="ml-2 bg-green-500 text-white text-[8px] px-1.5 py-0.5 rounded font-black">CONVÊNIO</span>;
};

class ErrorBoundary extends Component {
    constructor(props){super(props);this.state={hasError:false,e:''};} static getDerivedStateFromError(e){return{hasError:true};} componentDidCatch(e){this.setState({e:String(e)});}
    render(){ if(this.state.hasError) return <div className="p-10 text-center text-red-500 font-bold">Erro detectado. Recarregue a página.</div>; return this.props.children; }
}

const TopHeader = ({ user, isDark, toggleDark }) => {
    const [t, setT] = useState(new Date()); useEffect(()=>{const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i);},[]);
    const h = t.getHours(); let p = h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
    return (
        <div className="clean-card p-6 mb-6 flex justify-between items-center">
            <div className="flex items-center gap-4"><div className="w-12 h-12 rounded-xl flex items-center justify-center text-3xl bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400"><i className="ph-fill ph-hospital"></i></div><div><h2 className="text-2xl font-black">{t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</h2><p className="text-[10px] font-bold uppercase opacity-60 mt-1">{p}, {user?.nome?.split(' ')[0]}</p></div></div>
            <div className="flex items-center gap-4">
                <div className="hidden md:block text-right"><p className="text-[10px] uppercase font-bold opacity-50">Portal Médico</p><p className="font-black text-sm">Escalas SV</p></div>
                <button onClick={toggleDark} className="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex justify-center items-center text-xl hover:scale-110 transition">{isDark?<i className="ph-fill ph-sun text-yellow-400"></i>:<i className="ph-fill ph-moon text-slate-600"></i>}</button>
                <button onClick={()=>auth.signOut()} className="md:hidden w-10 h-10 rounded-full bg-red-50 dark:bg-red-900/30 flex justify-center items-center text-xl hover:scale-110 transition text-red-500"><i className="ph-bold ph-sign-out"></i></button>
            </div>
        </div>
    );
};

// ================== ABA 1: AJUSTES (FORMULÁRIO COMPLETO RESTAURADO) ==================
const AjustesView = ({ cfg, onSave, onRefresh }) => {
    const [u, setU] = useState([]); const [s, setS] = useState([]); const [p, setP] = useState([]);
    const [h, setH] = useState([]); const [a, setA] = useState([]); 
    const [logoConv, setLogoConv] = useState('');
    const [loading, setL] = useState(false); const [mod, setMod] = useState(null); 

    useEffect(() => {
        const formatData = (arr) => (arr||[]).map(x => typeof x === 'string' ? {nome: x.toUpperCase()} : x);
        setU(formatData(cfg?.unidades)); setS(formatData(cfg?.setores)); setP(formatData(cfg?.postos));
        setH(cfg?.habilidades||[]); setA(cfg?.ausencias||[]); setLogoConv(cfg?.logoConvenio||'');
    }, [cfg]);

    const salvar = async () => { setL(true); await onSave('CONFIGURACOES',{ID:'parametros',unidades:u,setores:s,postos:p,habilidades:h,ausencias:a,logoConvenio:logoConv}); onRefresh(); setL(false); alert("Configurações Salvas!"); };

    const openAdd = (t) => setMod({ t, act: 'add', v1: '', v2: '', v3: '#0ea5e9' });
    const openEdit = (t, idx) => {
        if(t==='u') setMod({ t, act: 'edit', idx, v1: u[idx].nome, v2: '' });
        if(t==='s') setMod({ t, act: 'edit', idx, v1: s[idx].nome, v2: s[idx].unidade||'', v3: s[idx].cor||'#0ea5e9' });
        if(t==='p') setMod({ t, act: 'edit', idx, v1: p[idx].nome, v2: p[idx].setor||'' });
        if(t==='h') setMod({ t, act: 'edit', idx, v1: h[idx], v2: '' });
        if(t==='a') setMod({ t, act: 'edit', idx, v1: a[idx], v2: '' });
    };

    const confirmMod = (e) => {
        e.preventDefault();
        const { t, act, idx, v1, v2, v3 } = mod;
        let n1 = v1.trim().toUpperCase(); let n2 = v2.trim().toUpperCase();
        if(t==='p' || t==='h' || t==='a') n1 = v1.trim(); 
        
        if(act === 'add') {
            if(t==='u') setU([...u, {id:Date.now(), nome:n1}]); if(t==='s') setS([...s, {id:Date.now(), nome:n1, unidade:n2, cor:v3}]); if(t==='p') setP([...p, {id:Date.now(), nome:n1, setor:n2}]);
            if(t==='h') setH([...h, n1]); if(t==='a') setA([...a, n1]);
        } else {
            if(t==='u'){ let arr=[...u]; arr[idx].nome=n1; setU(arr); } if(t==='s'){ let arr=[...s]; arr[idx].nome=n1; arr[idx].unidade=n2; arr[idx].cor=v3; setS(arr); }
            if(t==='p'){ let arr=[...p]; arr[idx].nome=n1; arr[idx].setor=n2; setP(arr); } if(t==='h'){ let arr=[...h]; arr[idx]=n1; setH(arr); }
            if(t==='a'){ let arr=[...a]; arr[idx]=n1; setA(arr); }
        }
        setMod(null);
    };

    const del = (tipo, idx) => {
        if(!confirm("Excluir permanentemente?")) return;
        if(tipo==='u') setU(u.filter((_,i)=>i!==idx)); if(tipo==='s') setS(s.filter((_,i)=>i!==idx)); if(tipo==='p') setP(p.filter((_,i)=>i!==idx));
        if(tipo==='h') setH(h.filter((_,i)=>i!==idx)); if(tipo==='a') setA(a.filter((_,i)=>i!==idx));
    };

    const ListRender = ({title, arr, tipo, desc}) => (
        <div className="clean-card p-5">
            <div className="flex justify-between items-center mb-2"><h3 className="font-black text-sm">{title}</h3><button onClick={()=>openAdd(tipo)} className="bg-primary text-white w-6 h-6 rounded font-black hover:scale-110 transition">+</button></div>
            <p className="text-[9px] opacity-50 mb-3">{desc}</p>
            <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
                {arr.map((item, i) => (
                    <div key={i} className="flex justify-between items-center bg-slate-50 dark:bg-slate-800 p-2 rounded text-xs border border-slate-100 dark:border-slate-700">
                        <div className="truncate pr-2 flex items-center gap-2">
                            {item.cor && <div className="w-3 h-3 rounded-full shrink-0 shadow-sm" style={{backgroundColor: item.cor}}></div>}
                            <div><p className="font-bold text-slate-800 dark:text-white">{item.nome || item}</p>{item.unidade && <p className="text-[8px] opacity-60">Em: {item.unidade}</p>}{item.setor && <p className="text-[8px] opacity-60">Setor: {item.setor}</p>}</div>
                        </div>
                        <div className="flex gap-1 shrink-0"><button onClick={()=>openEdit(tipo, i)} className="text-yellow-600 bg-yellow-100 dark:bg-yellow-900/30 p-1 rounded hover:bg-yellow-200 transition"><i className="ph-bold ph-pencil"></i></button><button onClick={()=>del(tipo, i)} className="text-red-600 bg-red-100 dark:bg-red-900/30 p-1 rounded hover:bg-red-200 transition"><i className="ph-bold ph-trash"></i></button></div>
                    </div>
                ))}
            </div>
        </div>
    );

    return (
        <div className="animate-fade-in space-y-6 max-w-6xl mx-auto">
            <div className="flex justify-between items-center"><h2 className="text-2xl font-black">Ajustes & Parâmetros</h2><button onClick={salvar} disabled={loading} className="bg-primary text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 transition">{loading?'Salvando...':'Salvar Servidor'}</button></div>
            
            <div className="clean-card p-4 flex flex-col md:flex-row justify-between items-center bg-blue-50/50 dark:bg-slate-800/50 gap-4">
                <div><h4 className="font-bold text-sm">Identidade Visual Convênio (UNIMED)</h4><p className="text-[10px] opacity-60">Cole a URL da logo para exibir no card dos médicos</p></div>
                <input type="text" value={logoConv} onChange={e=>setLogoConv(e.target.value)} placeholder="URL da imagem (Drive, Imgur, etc)" className="p-3 rounded-xl border border-slate-200 dark:border-slate-700 w-full md:w-96 text-sm font-bold bg-white dark:bg-slate-900 outline-none" />
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <ListRender title="1. Unidades/Prédios" arr={u} tipo="u" desc="Estruturas físicas (Ex: Matriz)." />
                <ListRender title="2. Setores" arr={s} tipo="s" desc="Áreas com cores próprias na Matriz." />
                <ListRender title="3. Postos/Salas" arr={p} tipo="p" desc="Locais exatos (Precisa de Setor)." />
                <ListRender title="Motivos de Afastamento" arr={a} tipo="a" desc="Férias, Licenças." />
                <ListRender title="Competências" arr={h} tipo="h" desc="Habilidades da equipe." />
            </div>

            {mod && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in" onClick={()=>setMod(null)}>
                    <div className="clean-card w-full max-w-md p-6" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-xl font-black mb-4">{mod.act==='add'?'Adicionar':'Editar'} Registro</h3>
                        <form onSubmit={confirmMod} className="space-y-4">
                            <div><label className="text-[10px] font-black uppercase opacity-60">Nome / Descrição</label><input type="text" value={mod.v1} onChange={e=>setMod({...mod, v1:e.target.value})} className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 outline-none bg-slate-50 dark:bg-slate-900 font-bold text-sm text-slate-800 dark:text-white" required autoFocus/></div>
                            {mod.t === 's' && (
                                <>
                                    <div><label className="text-[10px] font-black uppercase opacity-60">Vincular a qual Unidade?</label><select value={mod.v2} onChange={e=>setMod({...mod, v2:e.target.value})} className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 outline-none bg-slate-50 dark:bg-slate-900 font-bold text-sm text-slate-800 dark:text-white" required><option value="">Selecione a Unidade...</option>{u.map((x,i)=><option key={i} value={x.nome}>{x.nome}</option>)}</select></div>
                                    <div><label className="text-[10px] font-black uppercase opacity-60">Cor do Setor na Matriz</label><input type="color" value={mod.v3} onChange={e=>setMod({...mod, v3:e.target.value})} className="w-full h-12 rounded-xl border border-slate-200 dark:border-slate-700 cursor-pointer p-1" required/></div>
                                </>
                            )}
                            {mod.t === 'p' && <div><label className="text-[10px] font-black uppercase opacity-60">Vincular a qual Setor?</label><select value={mod.v2} onChange={e=>setMod({...mod, v2:e.target.value})} className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 outline-none bg-slate-50 dark:bg-slate-900 font-bold text-sm text-slate-800 dark:text-white" required><option value="">Selecione o Setor...</option>{s.map((x,i)=><option key={i} value={x.nome}>{x.nome}</option>)}</select></div>}
                            <div className="flex justify-end gap-2 pt-4 border-t border-slate-100 dark:border-slate-700 mt-2"><button type="button" onClick={()=>setMod(null)} className="px-4 py-2 opacity-60 font-bold hover:opacity-100">Cancelar</button><button type="submit" className="bg-primary text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 transition">Confirmar</button></div>
                        </form>
                    </div>
                </div>
            )}
        </div>
    );
};

// ================== ABA 2: EQUIPE (FORMULÁRIO COMPLETO RESTAURADO) ==================
const EquipeView = ({ data, cfg, onSave, onDelete, onRefresh }) => {
    const [viewMode, setViewMode] = useState('MENU'); 
    const [modal, setModal] = useState(false); const [fd, setFd] = useState({}); const [busca, setBusca] = useState('');
    const u = cfg?.unidades||[]; const s = cfg?.setores||[]; const h = cfg?.habilidades||[]; const a = cfg?.ausencias||[];

    const openModal = (i=null) => { 
        setFd(i ? {...i} : { 
            Nome:'', Cargo:'', 
            Tipo: viewMode !== 'MENU' ? viewMode : 'Colaborador',
            UnidadeBase:'', Setor:'', Habilidades:[], Cor:'#0ea5e9', CRM:'', CodUnimed:'', URA:'', CBO:'', OutroDoc:'', Segmento:'', isGestor: false, StatusGeral:'Ativo',
            TipoContrato: '', ObservacoesGerais: '' 
        }); 
        setModal(true); 
    };
    
    const toggleHab = (hab) => { let arr = fd.Habilidades||[]; setFd({...fd, Habilidades: arr.includes(hab)?arr.filter(x=>x!==hab):[...arr, hab]}); };
    const save = async (e) => { e.preventDefault(); await onSave('PROFISSIONAIS', fd); setModal(false); onRefresh(); };

    const filtrados = ordenarPorNome(data)
        .filter(p => viewMode === 'MENU' ? true : p.Tipo === viewMode)
        .filter(p => safeStr(p.Nome).toLowerCase().includes(busca.toLowerCase()));

    return (
        <div className="animate-fade-in space-y-6 max-w-7xl mx-auto">
            {viewMode === 'MENU' && (
                <div>
                    <h2 className="text-2xl font-black mb-6">Gestão de Pessoas</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div onClick={()=>setViewMode('Colaborador')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-primary hover:shadow-lg transition-all">
                            <div className="w-20 h-20 bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-users-three"></i></div>
                            <h3 className="font-black text-xl uppercase tracking-widest text-center">Colaboradores</h3>
                            <p className="text-xs font-bold opacity-60 mt-2 text-center">Recepcionistas, Administrativo, Apoio</p>
                        </div>
                        <div onClick={()=>setViewMode('Médico')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-red-500 hover:shadow-lg transition-all">
                            <div className="w-20 h-20 bg-red-50 text-red-600 dark:bg-red-900/20 dark:text-red-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-stethoscope"></i></div>
                            <h3 className="font-black text-xl uppercase tracking-widest text-center">Corpo Clínico</h3>
                            <p className="text-xs font-bold opacity-60 mt-2 text-center">Médicos, Plantonistas, Especialistas</p>
                        </div>
                    </div>
                </div>
            )}

            {viewMode !== 'MENU' && (
                <div className="animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 border-b border-slate-200 dark:border-slate-700 pb-4">
                        <div className="flex items-center gap-4">
                            <button onClick={()=>{setViewMode('MENU'); setBusca('');}} className="w-10 h-10 clean-card flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800"><i className="ph-bold ph-arrow-left"></i></button>
                            <div>
                                <p className="text-[10px] font-bold uppercase opacity-50 tracking-widest">Visualizando Equipe</p>
                                <h2 className="text-2xl font-black">{viewMode === 'Médico' ? 'Corpo Clínico (Médicos)' : 'Colaboradores'}</h2>
                            </div>
                        </div>
                        <div className="flex gap-2 w-full md:w-auto">
                            <input type="text" placeholder="Buscar por nome..." value={busca} onChange={e=>setBusca(e.target.value)} className="p-2.5 rounded-xl border dark:border-slate-700 outline-none text-sm bg-transparent text-slate-800 dark:text-white flex-1 md:w-64 font-bold" />
                            <button onClick={()=>openModal()} className="bg-primary text-white px-5 rounded-xl font-bold hover:bg-blue-600 transition shadow-sm"><i className="ph-bold ph-plus"></i> Novo</button>
                        </div>
                    </div>

                    {filtrados.length === 0 ? (
                        <div className="p-10 text-center border-2 border-dashed rounded-2xl opacity-50 font-bold">Nenhuma pessoa encontrada nesta categoria.</div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                            {filtrados.map((p, i) => (
                                <div key={i} onClick={()=>openModal(p)} className="clean-card p-5 flex flex-col items-center text-center relative cursor-pointer group hover:border-primary">
                                    {p.StatusGeral && p.StatusGeral !== 'Ativo' && <span className="absolute top-2 left-2 bg-red-100 text-red-600 text-[8px] font-black px-2 py-1 rounded">{p.StatusGeral}</span>}
                                    {p.FotoURL ? <img src={fmtImg(p.FotoURL)} className="w-14 h-14 rounded-full object-cover shadow mb-2" /> : <div className="w-14 h-14 rounded-full flex items-center justify-center text-xl font-black text-white shadow mb-2" style={{backgroundColor:p.Cor||'#0ea5e9'}}>{safeStr(p.Nome)[0]}</div>}
                                    
                                    <h3 className="font-black text-sm truncate w-full leading-tight text-slate-800 dark:text-white flex justify-center items-center gap-1">
                                        {p.Nome} 
                                        <BadgeConvenio codUnimed={p.CodUnimed} configLogo={cfg?.logoConvenio} />
                                    </h3>
                                    
                                    <p className="text-[9px] font-bold opacity-60 uppercase mt-0.5">{p.Tipo === 'Médico' ? `CRM: ${p.CRM||'N/A'}` : p.Cargo}</p>
                                    <p className="text-[8px] font-black bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded mt-1 truncate max-w-full text-slate-700 dark:text-slate-300">{p.UnidadeBase||'S/ Unid'} • {p.Setor||'S/ Setor'}</p>
                                    {p.isGestor && <span className="mt-2 text-[8px] font-bold text-blue-600 bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded">Autorizado Supervisão</span>}
                                    <button onClick={(e)=>{e.stopPropagation();if(confirm('Excluir?')){onDelete('PROFISSIONAIS',p.ID);onRefresh();}}} className="absolute top-2 right-2 text-red-500 opacity-0 group-hover:opacity-100 bg-red-50 dark:bg-red-900/30 p-1 rounded transition"><i className="ph-fill ph-trash"></i></button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            )}

            {modal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={()=>setModal(false)}>
                    <div className="clean-card w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]" onClick={e=>e.stopPropagation()}>
                        <div className="p-4 border-b dark:border-slate-700 flex justify-between bg-slate-50 dark:bg-slate-800"><h3 className="font-black text-slate-800 dark:text-white">Ficha Cadastral</h3><button onClick={()=>setModal(false)}><i className="ph-bold ph-x"></i></button></div>
                        <form onSubmit={save} className="p-5 overflow-y-auto space-y-4 text-sm text-slate-800 dark:text-white">
                            <div className="flex gap-4 mb-2 p-3 bg-blue-50 dark:bg-slate-800 rounded-xl border border-blue-100 dark:border-slate-700">
                                <label className="flex items-center gap-2 font-bold cursor-pointer"><input type="radio" checked={fd.Tipo==='Colaborador'} onChange={()=>setFd({...fd, Tipo:'Colaborador'})} /> Equipe Base</label>
                                <label className="flex items-center gap-2 font-bold cursor-pointer text-blue-600 dark:text-blue-400"><input type="radio" checked={fd.Tipo==='Médico'} onChange={()=>setFd({...fd, Tipo:'Médico'})} /> Corpo Clínico (Médico)</label>
                            </div>
                            <div className="bg-slate-100 dark:bg-slate-800 p-3 rounded-xl border border-slate-200 dark:border-slate-700 flex items-center gap-3">
                                <input type="checkbox" id="isGestor" checked={fd.isGestor||false} onChange={e=>setFd({...fd, isGestor: e.target.checked})} className="w-4 h-4" />
                                <label htmlFor="isGestor" className="font-bold text-sm cursor-pointer">Identificar como Líder/Supervisor (Permite Assumir Casa de Vidro)</label>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="col-span-2 md:col-span-1"><label className="text-[10px] font-black uppercase opacity-60">Nome</label><input type="text" value={fd.Nome} onChange={e=>setFd({...fd,Nome:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-transparent" required/></div>
                                <div className="col-span-2 md:col-span-1"><label className="text-[10px] font-black uppercase opacity-60">Foto URL (Links do Drive ou Imagens)</label><input type="text" value={fd.FotoURL||''} onChange={e=>setFd({...fd,FotoURL:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-transparent" placeholder="Cole aqui o link público da foto"/></div>
                                <div><label className="text-[10px] font-black uppercase opacity-60">Unidade de Atendimento</label><select value={fd.UnidadeBase||''} onChange={e=>setFd({...fd,UnidadeBase:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-slate-50 dark:bg-slate-800"><option value="">Selecione...</option>{u.map((x,i)=><option key={i} value={x.nome||x}>{x.nome||x}</option>)}</select></div>
                                <div><label className="text-[10px] font-black uppercase opacity-60">Setor Base</label><select value={fd.Setor||''} onChange={e=>setFd({...fd,Setor:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-slate-50 dark:bg-slate-800"><option value="">Selecione...</option>{s.map((x,i)=><option key={i} value={x.nome||x}>{x.nome||x}</option>)}</select></div>

                                {fd.Tipo==='Médico' ? (
                                    <div className="col-span-2 border border-slate-200 dark:border-slate-700 rounded-xl p-4 mt-2 space-y-4 bg-slate-50 dark:bg-slate-900">
                                        <h4 className="text-xs font-black uppercase text-blue-600 dark:text-blue-400 border-b border-slate-100 dark:border-slate-700 pb-2">Informações Médicas</h4>
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                            <div><label className="text-[9px] font-black uppercase opacity-60">CRM</label><input type="text" value={fd.CRM||''} onChange={e=>setFd({...fd,CRM:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-white dark:bg-slate-800" required/></div>
                                            <div><label className="text-[9px] font-black uppercase opacity-60">Cód Unimed</label><input type="text" value={fd.CodUnimed||''} onChange={e=>setFd({...fd,CodUnimed:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-white dark:bg-slate-800" placeholder="Exibe a logo se preenchido"/></div>
                                            <div><label className="text-[9px] font-black uppercase opacity-60">URA</label><input type="text" value={fd.URA||''} onChange={e=>setFd({...fd,URA:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-white dark:bg-slate-800"/></div>
                                            <div><label className="text-[9px] font-black uppercase opacity-60">CBO</label><input type="text" value={fd.CBO||''} onChange={e=>setFd({...fd,CBO:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-white dark:bg-slate-800"/></div>
                                            <div><label className="text-[9px] font-black uppercase opacity-60">Outro Doc/Registro</label><input type="text" value={fd.OutroDoc||''} onChange={e=>setFd({...fd,OutroDoc:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-white dark:bg-slate-800"/></div>
                                            <div><label className="text-[9px] font-black uppercase opacity-60">Especialidade / Cargo</label><input type="text" value={fd.Cargo||''} onChange={e=>setFd({...fd,Cargo:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-white dark:bg-slate-800" required/></div>
                                            <div className="col-span-2 md:col-span-3"><label className="text-[9px] font-black uppercase opacity-60">Segmento / Observações Clínicas</label><textarea value={fd.Segmento||''} onChange={e=>setFd({...fd,Segmento:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-white dark:bg-slate-800" rows="2"></textarea></div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Cargo</label><input type="text" value={fd.Cargo||''} onChange={e=>setFd({...fd,Cargo:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-transparent" required/></div>
                                )}
                                
                                <div className="col-span-2 md:col-span-1"><label className="text-[10px] font-black uppercase opacity-60">Tipo de Contrato</label><input type="text" placeholder="Ex: CLT, PJ, RPA..." value={fd.TipoContrato||''} onChange={e=>setFd({...fd,TipoContrato:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-transparent" /></div>
                                <div><label className="text-[10px] font-black uppercase opacity-60">Afastamentos / Folga Longa</label><select value={fd.StatusGeral||'Ativo'} onChange={e=>setFd({...fd,StatusGeral:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-slate-50 dark:bg-slate-800 text-red-500 font-bold"><option value="Ativo" className="text-green-500">🟢 ATIVO</option>{a.map((x,i)=><option key={i} value={x}>🔴 {x}</option>)}</select></div>
                                <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Observações Gerais</label><textarea value={fd.ObservacoesGerais||''} onChange={e=>setFd({...fd,ObservacoesGerais:e.target.value})} className="w-full p-2 border dark:border-slate-700 rounded bg-transparent" rows="2" placeholder="Anotações sobre horários, preferências, restrições..."></textarea></div>
                                
                                <div><label className="text-[10px] font-black uppercase opacity-60">Cor Pessoal (Fallback da Matriz)</label><input type="color" value={fd.Cor} onChange={e=>setFd({...fd,Cor:e.target.value})} className="w-full h-9 cursor-pointer border dark:border-slate-700 rounded p-0.5" /></div>
                            </div>
                            <div><label className="text-[10px] font-black uppercase opacity-60 block mb-1">Competências</label>
                                <div className="flex flex-wrap gap-1">{h.map((x,i)=><button type="button" key={i} onClick={()=>toggleHab(x)} className={`px-2 py-1 text-[10px] rounded border ${fd.Habilidades?.includes(x)?'bg-primary text-white border-primary':'bg-transparent dark:border-slate-700'}`}>{x}</button>)}</div>
                            </div>
                            <div className="pt-4 flex justify-end gap-2 border-t border-slate-200 dark:border-slate-700"><button type="button" onClick={()=>setModal(false)} className="px-4 py-2 opacity-60 font-bold hover:opacity-100">Cancelar</button><button type="submit" className="bg-primary text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 transition">Salvar Ficha</button></div>
                        </form>
                    </div>
                </div>
            )}
        </div>
    );
};
    // ================== ABA 3: CALENDÁRIO / BUILDER ==================
const CalendarioView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
    const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
    const [mode, setMode] = useState('TIMELINE'); 
    
    const [builderTipo, setBuilderTipo] = useState('Colaborador'); 
    const [tipoLancamento, setTipoLancamento] = useState('PLANTAO');
    const [motivoAus, setMotivoAus] = useState('Folga');

    const psts = cfg?.postos||[]; const unds = cfg?.unidades||[]; 
    const [selProf, setSelProf] = useState(''); const [selUnd, setSelUnd] = useState(''); const [selSala, setSelSala] = useState('');
    const [hIn, setHIn] = useState(''); const [hOut, setHOut] = useState(''); const [obs, setObs] = useState('');
    const [dates, setDates] = useState([]); 

    const [bMes, setBMes] = useState(new Date());

    const [calProf, setCalProf] = useState(isAd ? '' : user.nome);
    const [mesAtual, setMesAtual] = useState(new Date());
    const [diaAtivo, setDiaAtivo] = useState(null); 
    
    const [filtroCat, setFiltroCat] = useState('');
    const [buscaNome, setBuscaNome] = useState('');
    const [showAuto, setShowAuto] = useState(false);
    const [editData, setEditData] = useState(null);

    useEffect(() => { if(calProf) setBuscaNome(calProf); }, []);
    
    const toggleD = (dFmt) => { if(dates.includes(dFmt)) setDates(dates.filter(x=>x!==dFmt)); else setDates([...dates, dFmt]); };
    
    const gerar = async () => {
        if(!selProf || dates.length===0) return alert("Preencha Profissional e as Datas no calendário!");
        const prof = profs.find(x=>x.ID===selProf || x.Nome===selProf);
        
        let statusFinal = 'NO POSTO';
        let salaFinal = selSala || 'A DEFINIR';
        let horarioFinal = (hIn && hOut) ? `${hIn} às ${hOut}` : 'A DEFINIR';
        let obsFinal = obs;

        if (tipoLancamento === 'AUSENCIA') {
            statusFinal = motivoAus === 'Folga' ? 'FOLGA' : 'AUSENTE';
            salaFinal = motivoAus.toUpperCase();
            horarioFinal = '--:--';
            obsFinal = obs ? `${motivoAus} - ${obs}` : motivoAus;
        }

        for(let d of dates){ 
            await onSave('ESCALAS', { 
                Data: d, 
                Unidade: tipoLancamento === 'AUSENCIA' ? '' : selUnd, 
                Sala: salaFinal, 
                Nome_Profissional: prof.Nome, 
                Cargo: prof.Cargo, 
                Horario: horarioFinal, 
                Status: statusFinal, 
                Cor: prof.Cor, 
                Habilidades: prof.Habilidades||[], 
                ObsDia: obsFinal 
            }); 
        }
        alert("Escalas Geradas com Sucesso!"); setDates([]); setMode('TIMELINE'); onRefresh();
    };

    const buildGrid = (dataRef) => {
        const ano = dataRef.getFullYear(); const mes = dataRef.getMonth();
        const diasNoMes = new Date(ano, mes + 1, 0).getDate();
        const priDia = new Date(ano, mes, 1).getDay();
        const vazios = Array.from({length: priDia});
        const dias = Array.from({length: diasNoMes}, (_, i) => { const d = new Date(ano, mes, i + 1); return { d, dStr: getStrDt(d) }; });
        return {vazios, dias};
    };

    const gridTL = buildGrid(mesAtual);
    const gridB = buildGrid(bMes);

    const profsOrdenadosParaBusca = ordenarPorNome(profs);
    const profsOrdenadosParaBuilder = ordenarPorNome(profs.filter(x => (x.StatusGeral==='Ativo'||!x.StatusGeral) && x.Tipo === builderTipo));
    
    const profSelecionado = profs.find(p => p.Nome === calProf);

    return (
        <div className="animate-fade-in max-w-5xl mx-auto space-y-6 pb-10">
            {isAd && (
                <div className="flex gap-2 mb-4 border-b border-slate-200 dark:border-slate-700 pb-4">
                    <button onClick={()=>setMode('TIMELINE')} className={`px-4 py-2 rounded-xl font-bold text-sm ${mode==='TIMELINE'?'bg-primary text-white shadow-md':'bg-slate-200 text-slate-600 dark:bg-slate-800 dark:text-slate-400'}`}><i className="ph-bold ph-calendar"></i> Ver Calendário</button>
                    <button onClick={()=>setMode('BUILDER')} className={`px-4 py-2 rounded-xl font-bold text-sm ${mode==='BUILDER'?'bg-accent text-white shadow-md':'bg-slate-200 text-slate-600 dark:bg-slate-800 dark:text-slate-400'}`}><i className="ph-bold ph-magic-wand"></i> Criar Escalas</button>
                </div>
            )}

            {mode === 'BUILDER' ? (
                <div className="clean-card p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="space-y-4">
                        <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl mb-2">
                            <button onClick={()=>{setBuilderTipo('Colaborador'); setSelProf('');}} className={`flex-1 py-2 text-[10px] sm:text-xs font-black uppercase rounded-lg transition ${builderTipo==='Colaborador'?'bg-white dark:bg-slate-700 shadow text-blue-600 dark:text-blue-400':'opacity-60 hover:opacity-100'}`}>Equipe Base</button>
                            <button onClick={()=>{setBuilderTipo('Médico'); setSelProf('');}} className={`flex-1 py-2 text-[10px] sm:text-xs font-black uppercase rounded-lg transition ${builderTipo==='Médico'?'bg-white dark:bg-slate-700 shadow text-red-600 dark:text-red-400':'opacity-60 hover:opacity-100'}`}>Médicos</button>
                        </div>

                        <div><label className="text-xs font-bold opacity-60">1. Selecione o(a) {builderTipo}</label><select value={selProf} onChange={e=>setSelProf(e.target.value)} className="w-full p-3 border dark:border-slate-700 rounded-xl mt-1 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-white font-bold outline-none"><option value="">Abre a lista (A-Z)...</option>{profsOrdenadosParaBuilder.map(x=><option key={x.ID} value={x.ID}>{x.Nome}</option>)}</select></div>
                        
                        <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl my-4">
                            <button onClick={()=>setTipoLancamento('PLANTAO')} className={`flex-1 py-2 text-[10px] sm:text-xs font-black uppercase rounded-lg transition ${tipoLancamento==='PLANTAO'?'bg-white dark:bg-slate-700 shadow text-primary':'opacity-60 hover:opacity-100'}`}>Plantão Normal</button>
                            <button onClick={()=>setTipoLancamento('AUSENCIA')} className={`flex-1 py-2 text-[10px] sm:text-xs font-black uppercase rounded-lg transition ${tipoLancamento==='AUSENCIA'?'bg-white dark:bg-slate-700 shadow text-red-500 dark:text-red-400':'opacity-60 hover:opacity-100'}`}>Folga / Ausência</button>
                        </div>

                        {tipoLancamento === 'PLANTAO' ? (
                            <div className="space-y-4 animate-fade-in">
                                <div><label className="text-xs font-bold opacity-60">Unidade (Opcional)</label><select value={selUnd} onChange={e=>setSelUnd(e.target.value)} className="w-full p-3 border dark:border-slate-700 rounded-xl mt-1 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-white outline-none"><option value="">A DEFINIR DEPOIS...</option>{unds.map((x,i)=><option key={i} value={x.nome}>{x.nome}</option>)}</select></div>
                                <div><label className="text-xs font-bold opacity-60">Posto / Sala (Opcional)</label><select value={selSala} onChange={e=>setSelSala(e.target.value)} className="w-full p-3 border dark:border-slate-700 rounded-xl mt-1 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-white outline-none"><option value="">A DEFINIR DEPOIS...</option>{psts.map((x,i)=><option key={i} value={x.nome||x}>{x.nome||x} {x.setor?`(${x.setor})`:''}</option>)}</select></div>
                                <div className="flex gap-2">
                                    <div className="flex-1"><label className="text-xs font-bold opacity-60">Entra</label><input type="time" value={hIn} onChange={e=>setHIn(e.target.value)} className="w-full p-3 border dark:border-slate-700 rounded-xl mt-1 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-white font-bold outline-none" /></div>
                                    <div className="flex-1"><label className="text-xs font-bold opacity-60">Sai</label><input type="time" value={hOut} onChange={e=>setHOut(e.target.value)} className="w-full p-3 border dark:border-slate-700 rounded-xl mt-1 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-white font-bold outline-none" /></div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-fade-in">
                                <div><label className="text-xs font-bold opacity-60">Selecione o Motivo</label><select value={motivoAus} onChange={e=>setMotivoAus(e.target.value)} className="w-full p-3 border border-red-200 dark:border-red-900/30 rounded-xl mt-1 bg-red-50 dark:bg-red-900/10 text-red-600 dark:text-red-400 font-bold outline-none"><option value="Folga">Folga Agendada</option><option value="Férias">Férias</option><option value="Atestado">Atestado Médico</option><option value="Trabalho Externo">Trabalho Externo</option><option value="Outros">Outros motivos</option></select></div>
                            </div>
                        )}

                        <div><label className="text-xs font-bold opacity-60">Anotação / Obs (Opcional)</label><input type="text" value={obs} onChange={e=>setObs(e.target.value)} className="w-full p-3 border dark:border-slate-700 rounded-xl mt-1 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-white outline-none" placeholder="Detalhes adicionais..." /></div>
                    </div>
                    
                    <div className="border-l border-slate-200 dark:border-slate-700 pl-0 md:pl-6 space-y-4 flex flex-col">
                        <label className="text-xs font-bold opacity-60">Selecione as Datas no Calendário</label>
                        <div className="flex items-center justify-between mb-2">
                            <button onClick={()=>setBMes(new Date(bMes.getFullYear(), bMes.getMonth()-1, 1))} className="w-8 h-8 rounded bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition"><i className="ph-bold ph-caret-left"></i></button>
                            <span className="font-bold text-sm uppercase">{bMes.toLocaleString('pt-BR',{month:'long',year:'numeric'})}</span>
                            <button onClick={()=>setBMes(new Date(bMes.getFullYear(), bMes.getMonth()+1, 1))} className="w-8 h-8 rounded bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition"><i className="ph-bold ph-caret-right"></i></button>
                        </div>
                        <div className="grid grid-cols-7 gap-1 text-center text-[9px] font-black opacity-50 uppercase"><div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div></div>
                        <div className="grid grid-cols-7 gap-1">
                            {gridB.vazios.map((_, i) => <div key={`v-${i}`} className="p-2"></div>)}
                            {gridB.dias.map((d, i) => {
                                const isSel = dates.includes(d.dStr);
                                return <button key={i} onClick={(e)=>{e.preventDefault(); toggleD(d.dStr);}} className={`p-2 rounded-lg text-xs font-bold transition hover:scale-105 ${isSel? (tipoLancamento==='AUSENCIA'?'bg-red-500 text-white shadow-md':'bg-primary text-white shadow-md') : 'bg-slate-50 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700'}`}>{d.d.getDate()}</button>
                            })}
                        </div>
                        <div className="mt-2 text-[10px] font-bold opacity-60">{dates.length} dias selecionados.</div>
                        <button onClick={gerar} className={`w-full py-4 rounded-xl font-black shadow-lg hover:scale-[1.02] transition mt-auto text-white ${tipoLancamento==='AUSENCIA'?'bg-red-500':'bg-accent'}`}>Salvar {tipoLancamento==='AUSENCIA'?'Folgas':'Escalas'} no Servidor</button>
                    </div>
                </div>
            ) : (
                <div className="space-y-6">
                    <div className="clean-card p-5 flex flex-col lg:flex-row justify-between md:items-center gap-4 relative">
                        <div className="flex items-center gap-4"><button onClick={()=>{setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()-1, 1)); setDiaAtivo(null);}} className="w-8 h-8 bg-slate-100 dark:bg-slate-800 rounded-full flex justify-center items-center hover:bg-slate-200 transition"><i className="ph-bold ph-caret-left"></i></button><h2 className="text-lg font-black uppercase tracking-widest w-40 text-center">{mesAtual.toLocaleString('pt-BR', {month:'long', year:'numeric'})}</h2><button onClick={()=>{setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()+1, 1)); setDiaAtivo(null);}} className="w-8 h-8 bg-slate-100 dark:bg-slate-800 rounded-full flex justify-center items-center hover:bg-slate-200 transition"><i className="ph-bold ph-caret-right"></i></button></div>
                        
                        <div className="flex flex-col md:flex-row w-full md:w-auto gap-2">
                            <select value={filtroCat} onChange={e=>setFiltroCat(e.target.value)} className="p-2.5 rounded-lg border dark:border-slate-700 outline-none bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-white font-bold text-sm">
                                <option value="">Todas Categorias</option>
                                <option value="Médico">Médicos</option>
                                <option value="Colaborador">Colaboradores</option>
                                <option value="Gestor">Supervisores/Líderes</option>
                            </select>
                            
                            <div className="relative flex-1 md:w-72">
                                <input type="text" placeholder="Buscar profissional..." value={buscaNome} onChange={e=>{setBuscaNome(e.target.value); setShowAuto(true); setCalProf(''); setDiaAtivo(null);}} onFocus={()=>setShowAuto(true)} className="p-2.5 rounded-lg border dark:border-slate-700 outline-none bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-white font-bold text-sm w-full" />
                                
                                {showAuto && buscaNome && (
                                    <div className="absolute top-full left-0 right-0 mt-1 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-xl z-50 max-h-60 overflow-y-auto">
                                        {profsOrdenadosParaBusca.filter(p => {
                                            let match = true;
                                            if(filtroCat==='Médico') match = p.Tipo === 'Médico';
                                            else if(filtroCat==='Colaborador') match = p.Tipo === 'Colaborador';
                                            else if(filtroCat==='Gestor') match = p.isGestor === true;
                                            return match && safeStr(p.Nome).toLowerCase().includes(buscaNome.toLowerCase());
                                        }).map(p => (
                                            <div key={p.ID} onClick={()=>{setBuscaNome(p.Nome); setCalProf(p.Nome); setShowAuto(false); setDiaAtivo(null);}} className="p-3 cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-700 border-b border-slate-100 dark:border-slate-700 last:border-0">
                                                <p className="font-bold text-sm">{p.Nome}</p>
                                                <p className="text-[10px] opacity-60 uppercase">{p.Tipo} {p.isGestor?'• Gestor/Supervisor':''}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {!calProf ? <div className="p-10 text-center clean-card opacity-50 font-bold border-dashed">Selecione um profissional para carregar o calendário.</div> :
                    <div className="space-y-6">
                        
                        {profSelecionado && (
                            <div className="clean-card p-6 flex flex-col md:flex-row items-center md:items-start gap-6 bg-gradient-to-r from-blue-50 to-white dark:from-slate-800 dark:to-slate-900 border-l-4 border-l-primary">
                                {profSelecionado.FotoURL ? (
                                    <img src={fmtImg(profSelecionado.FotoURL)} className="w-24 h-24 rounded-full object-cover shadow-lg border-4 border-white dark:border-slate-800 shrink-0" />
                                ) : (
                                    <div className="w-24 h-24 rounded-full bg-primary text-white flex items-center justify-center text-4xl font-black shadow-lg border-4 border-white dark:border-slate-800 shrink-0" style={{backgroundColor:profSelecionado.Cor||'#0ea5e9'}}>
                                        {profSelecionado.Nome[0]}
                                    </div>
                                )}
                                <div className="text-center md:text-left mt-2 md:mt-0">
                                    <h2 className="text-2xl font-black text-slate-800 dark:text-white flex items-center justify-center md:justify-start gap-2">
                                        {profSelecionado.Nome}
                                        <BadgeConvenio codUnimed={profSelecionado.CodUnimed} configLogo={cfg?.logoConvenio} />
                                    </h2>
                                    <p className="text-sm font-bold text-primary uppercase mt-1">{profSelecionado.Cargo}</p>
                                    <p className="text-xs font-bold opacity-60 mt-1 uppercase tracking-widest"><i className="ph-fill ph-map-pin"></i> Lotação: {profSelecionado.UnidadeBase || 'S/ Unid'} • {profSelecionado.Setor || 'S/ Setor'}</p>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="clean-card p-6 lg:col-span-2">
                                <div className="grid grid-cols-7 gap-2 mb-2 text-center text-[10px] font-black opacity-50 uppercase">
                                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                                </div>
                                <div className="grid grid-cols-7 gap-2">
                                    {gridTL.vazios.map((_, i) => <div key={`v-${i}`} className="p-2 opacity-10"></div>)}
                                    {gridTL.dias.map((d, i) => {
                                        const temEscala = escalas.some(e => e.Nome_Profissional === calProf && e.Data === d.dStr && isEscalaValida(e, cfg?.postos));
                                        const profColor = profs.find(p=>p.Nome===calProf)?.Cor || '#0ea5e9';
                                        const isToday = d.dStr === getStrDt(new Date());
                                        const isSel = diaAtivo === d.dStr;

                                        return (
                                            <div key={i} onClick={()=> temEscala && setDiaAtivo(d.dStr)} className={`relative flex flex-col items-center justify-center p-3 rounded-xl border transition-all ${temEscala?'cursor-pointer hover:border-primary shadow-sm':''} ${isSel?'ring-2 ring-primary bg-blue-50 dark:bg-slate-800':isToday?'bg-slate-100 dark:bg-slate-700':'bg-transparent border-slate-100 dark:border-slate-800'}`}>
                                                <span className={`text-sm font-bold ${temEscala?'text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>{d.d.getDate()}</span>
                                                {temEscala && <span className="absolute bottom-2 w-1.5 h-1.5 rounded-full" style={{backgroundColor:profColor}}></span>}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            <div className="clean-card p-6 bg-slate-50 dark:bg-slate-800">
                                {diaAtivo ? (() => {
                                    const escDia = escalas.filter(e => e.Nome_Profissional === calProf && e.Data === diaAtivo && isEscalaValida(e, cfg?.postos));
                                    return (
                                        <div>
                                            <h3 className="font-black text-lg mb-4 text-primary border-b border-slate-200 dark:border-slate-700 pb-2"><i className="ph-fill ph-calendar-check"></i> {diaAtivo}</h3>
                                            <div className="space-y-4">
                                                {escDia.map((esc, j) => {
                                                    const isFolga = esc.Status === 'FOLGA';
                                                    const isAus = esc.Status === 'AUSENTE';
                                                    
                                                    return (
                                                    <div key={j} className={`p-4 rounded-xl shadow-sm border relative overflow-hidden ${isFolga?'bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-700 opacity-80':isAus?'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-900/30':'bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-700'}`}>
                                                        <div className="absolute left-0 top-0 bottom-0 w-1.5" style={{backgroundColor: isFolga ? '#94a3b8' : isAus ? '#ef4444' : getCorDaSala(esc.Sala, cfg)}}></div>
                                                        
                                                        {(!isFolga && !isAus && esc.Unidade) && <p className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-1 pl-1">{esc.Unidade}</p>}
                                                        
                                                        <h4 className={`font-black text-base pl-1 ${isFolga||isAus?'text-slate-600 dark:text-slate-400':''}`}>{esc.Sala} {esc.EmApoio?'(Apoio)':''}</h4>
                                                        
                                                        {(!isFolga && !isAus) && <p className={`text-sm font-bold mt-1 pl-1 ${esc.Horario==='A DEFINIR'?'text-red-500':'opacity-80'}`}><i className="ph-fill ph-clock"></i> {esc.Horario}</p>}
                                                        {esc.Auxiliar && <p className="text-[10px] font-black text-purple-600 bg-purple-100 px-2 py-0.5 rounded inline-block mt-1 ml-1"><i className="ph-fill ph-user-plus"></i> Auxiliar: {esc.Auxiliar}</p>}
                                                        {esc.MedicoApoio && <p className="text-[10px] font-black text-indigo-600 bg-indigo-100 px-2 py-0.5 rounded inline-block mt-1 ml-1"><i className="ph-fill ph-stethoscope"></i> Apoio: {esc.MedicoApoio}</p>}
                                                        
                                                        {esc.ObsDia && <p className={`text-xs mt-3 p-2 rounded ml-1 ${isFolga||isAus?'bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-300':'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-800 dark:text-yellow-400'}`}><i className="ph-bold ph-info"></i> {esc.ObsDia}</p>}
                                                        
                                                        {isAd && (
                                                            <div className="absolute top-2 right-2 flex gap-2">
                                                                <button onClick={() => setEditData({...esc})} className="text-yellow-500 hover:scale-110"><i className="ph-fill ph-pencil"></i></button>
                                                                <button onClick={async()=>{if(confirm('Excluir turno permanentemente?')){await api.deleteRecord('ESCALAS', esc.ID); onRefresh(); setDiaAtivo(null)}}} className="text-red-500 hover:scale-110"><i className="ph-fill ph-trash"></i></button>
                                                            </div>
                                                        )}
                                                    </div>
                                                )})}
                                            </div>
                                        </div>
                                    )
                                })() : (
                                    <div className="h-full flex flex-col items-center justify-center text-center opacity-50 min-h-[200px]">
                                        <i className="ph-fill ph-cursor-click text-4xl mb-2"></i>
                                        <p className="text-xs font-bold">Clique no calendário para ver os detalhes.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>}
                </div>
            )}

            {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
        </div>
    );
};


// ================== ABA 6: TRABALHANDO HOJE ==================
const TrabalhandoHojeView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
    const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
    const [viewMode, setViewMode] = useState('MENU');
    const [infoProfModal, setInfoProfModal] = useState(null);
    const [editData, setEditData] = useState(null);
    
    const dStr = getStrDt(new Date()); 
    // Só quem está ativo na escala de hoje e não está de folga
    const escHjRaw = escalas.filter(e => e.Data === dStr && isEscalaValida(e, cfg?.postos) && e.Status !== 'FOLGA');

    const profsHjColab = [];
    const profsHjMedico = [];

    escHjRaw.forEach(esc => {
        const pInfo = profs.find(p => p.Nome === esc.Nome_Profissional) || {Nome: esc.Nome_Profissional, Cargo: esc.Cargo, Cor: esc.Cor};
        const pCompleto = {...pInfo, escalaHj: esc};
        if (pInfo.Tipo === 'Médico') profsHjMedico.push(pCompleto);
        else profsHjColab.push(pCompleto);
    });

    const setStatus = async (esc, st) => { await api.saveRecord('ESCALAS', {...esc, Status:st}); onRefresh(); };

    return (
        <div className="animate-fade-in space-y-6 max-w-7xl mx-auto pb-10">
            {viewMode === 'MENU' && (
                <div>
                    <h2 className="text-2xl font-black mb-6">Trabalhando Hoje (Lista Diária)</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div onClick={()=>setViewMode('Colaborador')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-primary hover:shadow-lg transition-all">
                            <div className="w-20 h-20 bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-users-three"></i></div>
                            <h3 className="font-black text-xl uppercase tracking-widest text-center">Colaboradores no Plantão</h3>
                            <p className="text-sm font-black text-primary mt-2">{profsHjColab.length} Ativos</p>
                        </div>
                        <div onClick={()=>setViewMode('Médico')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-red-500 hover:shadow-lg transition-all">
                            <div className="w-20 h-20 bg-red-50 text-red-600 dark:bg-red-900/20 dark:text-red-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-stethoscope"></i></div>
                            <h3 className="font-black text-xl uppercase tracking-widest text-center">Médicos no Plantão</h3>
                            <p className="text-sm font-black text-red-500 mt-2">{profsHjMedico.length} Ativos</p>
                        </div>
                    </div>
                </div>
            )}

            {viewMode !== 'MENU' && (
                <div className="animate-fade-in space-y-6">
                    <div className="flex items-center gap-4 border-b border-slate-200 dark:border-slate-700 pb-4">
                        <button onClick={()=>setViewMode('MENU')} className="w-10 h-10 clean-card flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800"><i className="ph-bold ph-arrow-left"></i></button>
                        <div>
                            <p className="text-[10px] font-bold uppercase opacity-50 tracking-widest">Resumo do Dia</p>
                            <h2 className="text-2xl font-black">{viewMode === 'Médico' ? 'Corpo Clínico Ativo' : 'Colaboradores Ativos'}</h2>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                        {(viewMode === 'Colaborador' ? profsHjColab : profsHjMedico).map((p, i) => {
                            const esc = p.escalaHj;
                            const isInt = esc.Status === 'LANCHE'; const isAus = esc.Status === 'AUSENTE';
                            const isMe = checkIsMe(esc.Nome_Profissional, user.email);

                            return (
                                <div key={i} className={`clean-card p-4 flex flex-col items-center text-center relative shadow-sm border-t-4 ${isInt?'border-t-orange-500 bg-orange-50 dark:bg-orange-900/10':isAus?'border-t-red-500 bg-red-50 dark:bg-red-900/10':'border-t-primary'}`}>
                                    {p.FotoURL ? <img src={fmtImg(p.FotoURL)} onClick={()=>setInfoProfModal(p)} className="w-14 h-14 rounded-full object-cover shadow mb-2 cursor-pointer hover:scale-105 transition" /> : <div onClick={()=>setInfoProfModal(p)} className="w-14 h-14 rounded-full flex items-center justify-center text-xl font-black text-white shadow mb-2 cursor-pointer hover:scale-105 transition" style={{backgroundColor:p.Cor||'#0ea5e9'}}>{safeStr(p.Nome)[0]}</div>}
                                    
                                    <h3 className="font-black text-xs truncate w-full leading-tight text-slate-800 dark:text-white flex justify-center items-center gap-1 cursor-pointer" onClick={()=>setInfoProfModal(p)}>
                                        {p.Nome}
                                        <BadgeConvenio codUnimed={p.CodUnimed} configLogo={cfg?.logoConvenio} />
                                    </h3>
                                    
                                    <div className="w-full bg-white dark:bg-slate-800 p-2 rounded-lg mt-2 border border-slate-100 dark:border-slate-700 text-left">
                                        <p className="text-[10px] font-black uppercase truncate text-primary">{esc.Sala}</p>
                                        <p className="text-[8px] font-bold opacity-60 mt-0.5"><i className="ph-fill ph-clock"></i> {esc.Horario}</p>
                                        {esc.MedicoApoio && <p className="text-[8px] font-bold text-indigo-600 bg-indigo-50 mt-1 px-1 rounded truncate">Apoio: {esc.MedicoApoio}</p>}
                                        {esc.Auxiliar && <p className="text-[8px] font-bold text-purple-600 bg-purple-50 mt-1 px-1 rounded truncate">Auxiliar: {esc.Auxiliar}</p>}
                                    </div>

                                    <div className="flex w-full justify-between items-center mt-3 pt-3 border-t border-slate-100 dark:border-slate-700">
                                        <span className={`text-[8px] font-black px-2 py-1 rounded ${isAus?'bg-red-100 text-red-600':isInt?'bg-orange-100 text-orange-600':'bg-green-100 text-green-600'}`}>{esc.Status === 'NO POSTO' ? 'ATIVO' : esc.Status}</span>
                                        <div className="flex gap-1">
                                            {(!isInt && !isAus) ? (
                                                <>
                                                    {(isAd || isMe) && <button onClick={()=>setStatus(esc, 'LANCHE')} className="w-6 h-6 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-orange-100 text-slate-500 transition"><i className="ph-fill ph-coffee"></i></button>}
                                                    {isAd && <button onClick={()=>setEditData(esc)} className="w-6 h-6 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-blue-100 text-slate-500 transition"><i className="ph-fill ph-sliders"></i></button>}
                                                </>
                                            ) : (
                                                <>
                                                    {(isAd || (isMe && isInt)) && <button onClick={()=>setStatus(esc, 'NO POSTO')} className="px-2 py-1 bg-slate-800 text-white rounded text-[8px] font-black hover:bg-slate-700 transition"><i className="ph-bold ph-arrow-u-down-left"></i> VOLTAR</button>}
                                                    {isAus && isAd && <button onClick={()=>setEditData(esc)} className="px-2 py-1 bg-primary text-white rounded text-[8px] font-black ml-1 hover:bg-blue-600 transition"><i className="ph-bold ph-sliders"></i> OPÇÕES</button>}
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                    {(viewMode === 'Colaborador' ? profsHjColab : profsHjMedico).length === 0 && <div className="p-10 text-center border-2 border-dashed rounded-2xl opacity-50 font-bold">Ninguém escalado ativo nesta categoria hoje.</div>}
                </div>
            )}
            {infoProfModal && <CrachaVirtual profInfo={infoProfModal} cfg={cfg} onClose={()=>setInfoProfModal(null)} />}
            {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
        </div>
    )
};


// ================== ABA 5: MATRIZ DE PLANTÃO (GANTT VERTICAL DE ALTA PERFORMANCE) ==================
const GanttModernoView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
    const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
    const [viewMode, setViewMode] = useState('MENU');
    const [dataBase, setDataBase] = useState(new Date());
    const [rangeDias, setRangeDias] = useState(1); 
    const [editData, setEditData] = useState(null);
    const [agora, setAgora] = useState(new Date());

    useEffect(() => {
        const timer = setInterval(() => setAgora(new Date()), 60000); 
        return () => clearInterval(timer);
    }, []);

    // Horários fixos da matriz: 06:00 até 23:00
    const H_INICIO = 6;
    const H_FIM = 23;
    const HORAS_REGUA = Array.from({length: (H_FIM - H_INICIO + 1)}, (_, i) => H_INICIO + i);
    const PIXELS_POR_HORA = 60; // 1 hora = 60px de altura na tela

    const diasRender = Array.from({length: rangeDias}, (_, i) => {
        let d = new Date(dataBase); d.setDate(d.getDate() + i); return d;
    });

    const TimeGrid = ({ dateObj }) => {
        const dStr = getStrDt(dateObj);
        const isToday = getStrDt(agora) === dStr;
        
        // Filtra escalas válidas daquele dia
        const escalasDia = escalas.filter(e => e.Data === dStr && isEscalaValida(e, cfg?.postos));

        let linhaAgora = null;
        if (isToday) {
            const hDecimal = agora.getHours() + (agora.getMinutes() / 60);
            if (hDecimal >= H_INICIO && hDecimal <= H_FIM + 1) {
                linhaAgora = (hDecimal - H_INICIO) * PIXELS_POR_HORA;
            }
        }

        // --- MATRIZ MÉDICOS (Agrupada por Unidade, Colunas = Salas) ---
        if (viewMode === 'Médico') {
            const escMedicos = escalasDia.filter(e => {
                const pInfo = profs.find(p=>p.Nome === e.Nome_Profissional);
                return (pInfo && pInfo.Tipo === 'Médico') || e.Cargo?.toLowerCase().includes('médico');
            });
            const unidadesAtivas = Array.from(new Set(escMedicos.map(e=>e.Unidade))).filter(Boolean).sort();

            if(unidadesAtivas.length === 0) return <div className="mb-6"><h3 className="text-md font-black text-primary">{dStr}</h3><p className="opacity-50 text-xs">Sem médicos escalados.</p></div>

            return (
                <div className="mb-10 animate-fade-in">
                    <h3 className="text-xl font-black mb-4 flex items-center gap-2 border-b pb-2"><i className="ph-fill ph-calendar-blank text-primary"></i> {dateObj.toLocaleDateString('pt-BR', {weekday: 'long', day: '2-digit', month: 'long'}).toUpperCase()}</h3>
                    
                    {unidadesAtivas.map(und => {
                        const escUnd = escMedicos.filter(e=>e.Unidade === und);
                        const salasUsadas = Array.from(new Set(escUnd.map(e=>e.Sala))).sort();
                        
                        return (
                            <div key={und} className="mb-8">
                                <h4 className="text-sm font-black text-slate-600 dark:text-slate-400 mb-2 uppercase tracking-widest pl-2 border-l-4 border-slate-300">{und}</h4>
                                <div className="matriz-wrap shadow-md">
                                    <div className="matriz-col-horas">
                                        <div className="matriz-header-hora">H</div>
                                        {HORAS_REGUA.map(h => <div key={h} className="matriz-celula-hora">{String(h).padStart(2,'0')}:00</div>)}
                                    </div>
                                    
                                    {salasUsadas.map(salaNome => {
                                        const blocos = escUnd.filter(e=>e.Sala === salaNome);
                                        const pCfg = cfg?.postos?.find(p=>p.nome === salaNome);
                                        return (
                                            <div key={salaNome} className="matriz-col-dados">
                                                <div className="matriz-header-dados">
                                                    <span className="font-black text-xs truncate w-full">{salaNome}</span>
                                                    <span className="text-[8px] opacity-50 truncate font-normal w-full">{pCfg?.setor || 'Geral'}</span>
                                                </div>
                                                <div className="relative" style={{height: `${(H_FIM - H_INICIO + 1) * PIXELS_POR_HORA}px`}}>
                                                    {linhaAgora !== null && <div className="matriz-linha-agora" style={{top: `${linhaAgora}px`}}></div>}
                                                    {blocos.map((b, bIdx) => {
                                                        const isFolga = b.Status === 'FOLGA' || b.Status === 'AUSENTE';
                                                        let top = 0; let height = PIXELS_POR_HORA;
                                                        if (isFolga || b.Horario === 'A DEFINIR') { top = 4; height = 40; } 
                                                        else {
                                                            const vIn = parseHorario(b.Horario.split(' às ')[0]?.trim());
                                                            let vOut = parseHorario(b.Horario.split(' às ')[1]?.trim());
                                                            if(vIn !== null && vOut !== null) {
                                                                if(vOut <= vIn) vOut += 24; 
                                                                top = (vIn - H_INICIO) * PIXELS_POR_HORA; height = (vOut - vIn) * PIXELS_POR_HORA;
                                                                if(top < 0) { height += top; top = 0; } 
                                                            }
                                                        }
                                                        let bgColor = isFolga ? '#94a3b8' : getCorDaSala(b.Sala, cfg);
                                                        const pInfo = profs.find(p => p.Nome === b.Nome_Profissional) || {};

                                                        return (
                                                            <div key={bIdx} onClick={()=> isAd && setEditData({...b})} className="matriz-bloco" style={{top:`${top}px`, height:`${height-2}px`, backgroundColor: bgColor}}>
                                                                <span className="truncate w-full font-black text-[11px] flex items-center gap-1">
                                                                    {b.Nome_Profissional} {pInfo.CodUnimed && <div className="w-1.5 h-1.5 bg-white rounded-full shrink-0 shadow"></div>}
                                                                </span>
                                                                {!isFolga && b.Horario !== 'A DEFINIR' && <span className="text-[9px] font-medium opacity-90">{b.Horario}</span>}
                                                                {b.Auxiliar && <span className="text-[8px] bg-black/20 px-1 rounded mt-1 truncate w-max">Aux: {b.Auxiliar}</span>}
                                                                {(isFolga || b.Horario==='A DEFINIR') && <span className="text-[9px] font-black text-red-100 mt-auto">{b.Status==='FOLGA'?'FOLGA':'A DEFINIR'}</span>}
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )
                    })}
                </div>
            )
        }

        // --- MATRIZ COLABORADOR (Colunas = Nomes, Blocos = Salas) ---
        const escColab = escalasDia.filter(e => {
            const pInfo = profs.find(p=>p.Nome === e.Nome_Profissional);
            return pInfo ? pInfo.Tipo === 'Colaborador' : !e.Cargo?.toLowerCase().includes('médico');
        });
        const nomesColab = Array.from(new Set(escColab.map(e=>e.Nome_Profissional))).sort();

        if(nomesColab.length === 0) return null; 

        return (
            <div className="mb-10 animate-fade-in">
                <h3 className="text-xl font-black mb-4 flex items-center gap-2 border-b pb-2"><i className="ph-fill ph-calendar-blank text-primary"></i> {dateObj.toLocaleDateString('pt-BR', {weekday: 'long', day: '2-digit', month: 'long'}).toUpperCase()}</h3>
                
                <div className="matriz-wrap shadow-md">
                    <div className="matriz-col-horas">
