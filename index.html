<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E40AF">
    <title>Escalas Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        window.addEventListener('error', function(event) {
            document.body.innerHTML = '<div style="background:#fee2e2;color:#991b1b;padding:40px;font-family:sans-serif;height:100vh;text-align:center;"><h1 style="font-size:2rem;font-weight:900;margin-bottom:10px;">Sistema Protegido</h1><p>Erro encontrado. <b>Tire um print:</b></p><div style="background:white;padding:20px;border-radius:10px;text-align:left;max-width:600px;margin:20px auto;border:2px solid #f87171;"><strong>ERRO:</strong> ' + event.message + '<br/><br/><strong>LINHA:</strong> ' + event.lineno + '</div><button onclick="window.location.reload()" style="padding:15px 30px;background:#991b1b;color:white;border-radius:10px;font-weight:bold;cursor:pointer;border:none;">Tentar Novamente</button></div>';
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Habilita o modo escuro manual
            theme: { 
                extend: { 
                    colors: { primary: '#0ea5e9', secondary: '#1E40AF', accent: '#10b981' },
                    animation: { 
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'pop-in': 'popIn 0.2s forwards'
                    },
                    keyframes: { 
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        popIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
                    }
                } 
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* DESIGN CLEAN E FLAT (Sem brilhos, sem vidro) */
        .clean-card {
            background-color: #ffffff;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.2s ease;
        }
        .dark .clean-card {
            background-color: #1e293b;
            border-color: #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            color: #f8fafc;
        }
        .clean-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08); 
        }
        .dark .clean-card:hover { 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); 
        }
        
        .timeline-line::before { content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; z-index: 0; }
        .dark .timeline-line::before { background: #334155; }
    </style>

    <script>
        const VERSAO_ATUAL = "26.0.0"; 
        if (localStorage.getItem('escalas_versao') !== VERSAO_ATUAL) {
            localStorage.clear(); sessionStorage.clear();
            localStorage.setItem('escalas_versao', VERSAO_ATUAL);
            window.location.reload();
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, Component } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAtywH5sc1OEs0xa-c7IDOpGA9764ZhU6c",
            authDomain: "escalas-sao-vicente.firebaseapp.com",
            projectId: "escalas-sao-vicente",
            storageBucket: "escalas-sao-vicente.firebasestorage.app",
            messagingSenderId: "256697542067",
            appId: "1:256697542067:web:b8087390bb57d74def97c6"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const api = {
            fetch: async (colName) => { 
                if(!db) return []; 
                try { 
                    const snap = await db.collection(colName).get(); 
                    return snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); 
                } catch (e) { return []; } 
            },
            saveRecord: async (colName, data) => { 
                try { 
                    let docData = { ...data }; let id = docData.ID; delete docData.ID; 
                    if (id) { await db.collection(colName).doc(id).set(docData, { merge: true }); } 
                    else { await db.collection(colName).add(docData); }
                    return { success: true }; 
                } catch (e) { return { success: false }; } 
            },
            deleteRecord: async (colName, id) => { 
                try { await db.collection(colName).doc(id).delete(); return { success: true }; } 
                catch (e) { return { success: false }; } 
            }
        };

        const safeString = (val) => val === null || val === undefined ? '' : String(val);
        const formatImageUrl = (url) => { 
            const str = safeString(url).trim(); 
            if (!str) return ''; 
            if (str.includes('drive.google.com')) { 
                const m = str.match(/\/d\/([a-zA-Z0-9_-]+)/) || str.match(/id=([a-zA-Z0-9_-]+)/); 
                if (m && m[1]) return `https://drive.google.com/uc?export=view&id=${m[1]}`; 
            } 
            return str; 
        };

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, errStr: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error) { this.setState({ errStr: String(error) }); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-10 text-center flex flex-col items-center justify-center min-h-screen bg-slate-50 dark:bg-slate-900 relative z-50">
                            <i className="ph-fill ph-warning-circle text-6xl text-red-500 mb-4"></i>
                            <h2 className="text-2xl font-black mb-2">Erro de Interface</h2>
                            <p className="text-[10px] text-red-500 bg-red-50 dark:bg-red-900/20 p-4 font-mono mb-4 border border-red-200 dark:border-red-800 max-w-xl mx-auto rounded-xl">{this.state.errStr}</p>
                            <button onClick={()=>window.location.reload()} className="bg-primary text-white px-8 py-3 rounded-xl font-bold shadow-md">Recarregar</button>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        // ==========================================
        // CABEÇALHO COM BOTÃO DE DARK MODE
        // ==========================================
        const TopHeader = ({ user, isDark, toggleDark }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
            const h = time.getHours();
            let period = 'Bom dia'; 
            if (h >= 12 && h < 18) period = 'Boa tarde'; 
            else if (h >= 18 || h < 6) period = 'Boa noite'; 
            
            const userName = user && user.nome ? user.nome.split(' ')[0] : 'Equipe';

            return (
                <div className="clean-card p-6 mb-8 flex justify-between items-center">
                    <div className="flex items-center gap-4">
                        <div className="w-12 h-12 rounded-xl flex items-center justify-center text-3xl bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400">
                            <i className="ph-fill ph-calendar-check"></i>
                        </div>
                        <div>
                            <h2 className="text-2xl font-black leading-none">{time.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</h2>
                            <p className="text-[11px] font-bold uppercase tracking-widest opacity-60 mt-1">{period}, {userName}</p>
                        </div>
                    </div>
                    <div className="flex items-center gap-4">
                        <div className="hidden md:block text-right mr-2">
                            <p className="text-[10px] uppercase tracking-widest opacity-50 font-bold">Portal Médico</p>
                            <p className="text-sm font-black">Escalas SV</p>
                        </div>
                        <button onClick={toggleDark} className="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-yellow-400 flex items-center justify-center hover:scale-110 transition text-lg" title="Mudar Tema">
                            {isDark ? <i className="ph-fill ph-sun"></i> : <i className="ph-fill ph-moon"></i>}
                        </button>
                    </div>
                </div>
            );
        };

        const ConfiguracoesView = ({ sysConfig, onSaveConfig, onRefresh }) => {
            const [setores, setSetores] = useState(sysConfig.setores || []);
            const [habs, setHabs] = useState(sysConfig.habilidades || []);
            const [postos, setPostos] = useState(sysConfig.postos || []); 
            const [newSetor, setNewSetor] = useState(''); const [newHab, setNewHab] = useState('');
            const [newPostoNome, setNewPostoNome] = useState(''); const [newPostoSetor, setNewPostoSetor] = useState('');
            const [loading, setLoading] = useState(false);

            const salvar = async () => {
                setLoading(true);
                await onSaveConfig('CONFIGURACOES', { ID: 'parametros', setores, habilidades: habs, postos });
                onRefresh(); setLoading(false); alert("Configurações salvas!");
            };

            const addItem = (tipo) => {
                if (tipo === 'setor' && newSetor) { setSetores([...setores, newSetor.trim().toUpperCase()]); setNewSetor(''); }
                if (tipo === 'hab' && newHab) { setHabs([...habs, newHab.trim()]); setNewHab(''); }
                if (tipo === 'posto' && newPostoNome && newPostoSetor) { setPostos([...postos, { nome: newPostoNome.trim(), setor: newPostoSetor }]); setNewPostoNome(''); }
            };
            const removeItem = (tipo, index) => {
                if (tipo === 'setor') setSetores(setores.filter((_, i) => i !== index));
                if (tipo === 'hab') setHabs(habs.filter((_, i) => i !== index));
                if (tipo === 'posto') setPostos(postos.filter((_, i) => i !== index));
            };

            return (
                <div className="animate-fade-in space-y-6 max-w-7xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                        <div className="text-center md:text-left"><h2 className="text-3xl font-black">Ajustes da Clínica</h2></div>
                        <button onClick={salvar} disabled={loading} className="w-full md:w-auto bg-primary text-white font-bold px-8 py-3 rounded-xl shadow hover:scale-105 transition">{loading ? 'Salvando...' : 'Salvar Servidor'}</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="clean-card p-6">
                            <h3 className="font-black mb-4 flex items-center gap-2"><i className="ph-fill ph-buildings text-primary text-xl"></i> Departamentos</h3>
                            <div className="flex gap-2 mb-4"><input type="text" value={newSetor} onChange={e=>setNewSetor(e.target.value)} placeholder="Ex: ENFERMAGEM" className="flex-1 p-3 rounded-lg text-sm font-bold border border-slate-200 dark:border-slate-700 outline-none bg-slate-50 dark:bg-slate-900" /><button onClick={()=>addItem('setor')} className="bg-primary text-white px-4 rounded-lg font-black"><i className="ph-bold ph-plus"></i></button></div>
                            <div className="space-y-2 max-h-60 overflow-y-auto custom-scrollbar pr-2">{setores.map((s, i) => (<div key={i} className="flex justify-between items-center bg-slate-50 dark:bg-slate-900/50 p-3 rounded-lg text-xs font-black border border-slate-100 dark:border-slate-700"><span>{s}</span><button onClick={()=>removeItem('setor', i)} className="text-red-500"><i className="ph-bold ph-trash"></i></button></div>))}</div>
                        </div>
                        <div className="clean-card p-6">
                            <h3 className="font-black mb-4 flex items-center gap-2"><i className="ph-fill ph-door text-secondary text-xl"></i> Mapas de Salas</h3>
                            <div className="space-y-2 mb-4"><input type="text" value={newPostoNome} onChange={e=>setNewPostoNome(e.target.value)} placeholder="Ex: Consultório 01" className="w-full p-3 rounded-lg text-sm font-bold border border-slate-200 dark:border-slate-700 outline-none bg-slate-50 dark:bg-slate-900" /><div className="flex gap-2"><select value={newPostoSetor} onChange={e=>setNewPostoSetor(e.target.value)} className="flex-1 p-3 rounded-lg text-xs font-bold border border-slate-200 dark:border-slate-700 outline-none bg-slate-50 dark:bg-slate-900"><option value="">Setor...</option>{setores.map((s,i)=><option key={i} value={s}>{s}</option>)}</select><button onClick={()=>addItem('posto')} className="bg-secondary text-white px-4 rounded-lg font-black"><i className="ph-bold ph-plus"></i></button></div></div>
                            <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar pr-2">{postos.map((p, i) => (<div key={i} className="flex justify-between items-center bg-slate-50 dark:bg-slate-900/50 p-3 rounded-lg text-xs border border-slate-100 dark:border-slate-700"><div><p className="font-black">{p.nome}</p><p className="text-[9px] opacity-60 uppercase">{p.setor}</p></div><button onClick={()=>removeItem('posto', i)} className="text-red-500"><i className="ph-bold ph-trash"></i></button></div>))}</div>
                        </div>
                        <div className="clean-card p-6">
                            <h3 className="font-black mb-4 flex items-center gap-2"><i className="ph-fill ph-magic-wand text-accent text-xl"></i> Competências</h3>
                            <div className="flex gap-2 mb-4"><input type="text" value={newHab} onChange={e=>setNewHab(e.target.value)} placeholder="Ex: Coleta" className="flex-1 p-3 rounded-lg text-sm font-bold border border-slate-200 dark:border-slate-700 outline-none bg-slate-50 dark:bg-slate-900" /><button onClick={()=>addItem('hab')} className="bg-accent text-white px-4 rounded-lg font-black"><i className="ph-bold ph-plus"></i></button></div>
                            <div className="flex flex-wrap gap-2 max-h-60 overflow-y-auto custom-scrollbar pr-2">{habs.map((h, i) => (<div key={i} className="bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 px-3 py-1.5 rounded-full text-[10px] font-black flex items-center gap-2">{h} <button onClick={()=>removeItem('hab', i)} className="text-red-500"><i className="ph-bold ph-x"></i></button></div>))}</div>
                        </div>
                    </div>
                </div>
            );
        };

        const EquipeView = ({ data, sysConfig, onSave, onDelete, onRefresh }) => {
            const [isModalOpen, setIsModalOpen] = useState(false); const [formData, setFormData] = useState({}); const [search, setSearch] = useState('');
            const openModal = (item = null) => { if (item) setFormData({...item}); else setFormData({ ID: '', Nome: '', Cargo: '', Setor: '', Habilidades: [], TempoIntervalo: '15', Cor: '#0ea5e9', DiasTrabalho: {}, FotoURL: '' }); setIsModalOpen(true); };
            const toggleHab = (hab) => { const arr = formData.Habilidades || []; if(arr.includes(hab)) setFormData({...formData, Habilidades: arr.filter(h=>h!==hab)}); else setFormData({...formData, Habilidades: [...arr, hab]}); };
            const handleSave = async (e) => { e.preventDefault(); await onSave('PROFISSIONAIS', formData); setIsModalOpen(false); onRefresh(); };
            const filtrados = data.filter(p => safeString(p.Nome).toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="animate-fade-in space-y-6 max-w-7xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                        <div><h2 className="text-3xl font-black">Time São Vicente</h2></div>
                        <div className="flex gap-2 w-full md:w-auto"><input type="text" placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)} className="pl-4 pr-4 py-2.5 rounded-xl font-bold outline-none w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm" /><button onClick={()=>openModal()} className="bg-primary text-white px-6 rounded-xl font-bold shadow hover:bg-blue-600 transition">Novo</button></div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        {filtrados.map((prof, i) => (
                            <div key={i} onClick={()=>openModal(prof)} className="clean-card p-6 flex flex-col items-center text-center relative group cursor-pointer overflow-hidden">
                                <div className="absolute top-0 inset-x-0 h-12 opacity-20" style={{backgroundColor: prof.Cor || '#0ea5e9'}}></div>
                                {prof.FotoURL ? <img src={formatImageUrl(prof.FotoURL)} className="w-16 h-16 rounded-full object-cover shadow-sm z-10 mb-3 border-2 border-white dark:border-slate-700" /> : <div className="w-16 h-16 rounded-full flex items-center justify-center text-2xl font-black text-white shadow-sm z-10 mb-3 border-2 border-white dark:border-slate-700" style={{backgroundColor: prof.Cor || '#0ea5e9'}}>{safeString(prof.Nome).charAt(0).toUpperCase()}</div>}
                                <h3 className="font-black text-base leading-tight z-10 truncate w-full px-2">{safeString(prof.Nome)}</h3>
                                <p className="text-[10px] font-bold mt-1 uppercase tracking-widest opacity-60 z-10 truncate">{safeString(prof.Cargo)}</p>
                                <span className="text-[8px] font-black uppercase bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded mt-2 border border-slate-200 dark:border-slate-600">{prof.Setor || 'Sem Setor'}</span>
                                <div className="mt-4 flex flex-wrap justify-center gap-1 opacity-80">
                                    {(prof.Habilidades||[]).slice(0,2).map((h,j)=><span key={j} className="text-[8px] font-bold bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-1.5 py-0.5 rounded">{h}</span>)}
                                </div>
                                <div className="absolute top-3 right-3 opacity-100 lg:opacity-0 group-hover:opacity-100 flex gap-2 z-20"><button onClick={async(e)=>{e.stopPropagation(); if(confirm('Excluir?')){await onDelete('PROFISSIONAIS', prof.ID); onRefresh();}}} className="w-8 h-8 bg-red-50 text-red-500 dark:bg-red-900/30 dark:text-red-400 rounded-full flex items-center justify-center hover:scale-110 transition"><i className="ph-bold ph-trash"></i></button></div>
                            </div>
                        ))}
                    </div>
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-fade-in" onClick={()=>setIsModalOpen(false)}>
                            <div className="clean-card w-full max-w-3xl p-0 overflow-hidden flex flex-col max-h-[90vh]" onClick={e=>e.stopPropagation()}>
                                <div className="p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50"><h3 className="text-xl font-black">Cadastro de Profissional</h3><button onClick={()=>setIsModalOpen(false)} className="w-8 h-8 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 flex items-center justify-center transition"><i className="ph-bold ph-x"></i></button></div>
                                <form onSubmit={handleSave} className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6 bg-white dark:bg-slate-800">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="md:col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Nome Completo</label><input type="text" value={safeString(formData.Nome)} onChange={e=>setFormData({...formData, Nome: e.target.value})} className="w-full p-3 mt-1 rounded-xl font-bold outline-none border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:border-primary dark:focus:border-primary" required /></div>
                                        <div className="md:col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Foto (Link Web/Drive)</label><input type="text" value={safeString(formData.FotoURL)} onChange={e=>setFormData({...formData, FotoURL: e.target.value})} className="w-full p-3 mt-1 rounded-xl font-bold outline-none border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:border-primary dark:focus:border-primary" /></div>
                                        <div><label className="text-[10px] font-black uppercase opacity-60">Cargo</label><input type="text" value={safeString(formData.Cargo)} onChange={e=>setFormData({...formData, Cargo: e.target.value})} className="w-full p-3 mt-1 rounded-xl font-bold outline-none border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:border-primary dark:focus:border-primary" required /></div>
                                        <div><label className="text-[10px] font-black uppercase opacity-60">Setor</label><select value={safeString(formData.Setor)} onChange={e=>setFormData({...formData, Setor: e.target.value})} className="w-full p-3 mt-1 rounded-xl font-bold outline-none border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:border-primary dark:focus:border-primary"><option value="">Selecione...</option>{(sysConfig.setores||[]).map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                                        <div><label className="text-[10px] font-black uppercase opacity-60">Cor Destacada</label><input type="color" value={safeString(formData.Cor || '#0ea5e9')} onChange={e=>setFormData({...formData, Cor: e.target.value})} className="w-full h-12 p-1 mt-1 rounded-xl cursor-pointer border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900" /></div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase tracking-widest opacity-60 block mb-2">Habilidades Funcionais</label>
                                        <div className="flex flex-wrap gap-2">{(sysConfig.habilidades||[]).map(h => { const ativo = (formData.Habilidades||[]).includes(h); return <button type="button" key={h} onClick={()=>toggleHab(h)} className={`px-4 py-2 rounded-lg text-[10px] font-bold border transition ${ativo ? 'bg-primary border-primary text-white' : 'bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300'}`}>{h}</button>; })}</div>
                                    </div>
                                    <div className="pt-4 flex justify-end gap-3"><button type="button" onClick={()=>setIsModalOpen(false)} className="px-6 py-3 font-bold text-slate-500 hover:text-slate-800 dark:hover:text-white">Cancelar</button><button type="submit" className="bg-primary text-white px-8 py-3 rounded-xl font-bold shadow hover:bg-blue-600 transition">Salvar Ficha</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const PainelHojeView = ({ profissionais, escalas, config, user, onSave, onRefresh }) => {
            const isAdmin = user.nivel === 'Admin' || user.nivel === 'Supervisor';
            const [now, setNow] = useState(Date.now()); const [modalAction, setModalAction] = useState(null); 
            const [isAssumindo, setIsAssumindo] = useState(false);
            useEffect(() => { const timer = setInterval(() => setNow(Date.now()), 10000); return () => clearInterval(timer); }, []);

            const supervisorAtual = config?.supervisorAtual || 'Nenhum Assumiu';
            const postosSistema = config?.postos || []; 
            const setoresAtivos = Array.from(new Set(postosSistema.map(p => p.setor).filter(Boolean)));
            const todayStr = new Date().toLocaleDateString('pt-BR');
            const escalasHoje = escalas.filter(e => safeString(e.Data) === todayStr);

            const assumirPlantao = async (nome) => {
                await api.saveRecord('CONFIGURACOES', { ID: 'plantao', supervisorAtual: nome });
                setIsAssumindo(false); onRefresh();
            };

            const handleStatusSimples = async (escala, novoStatus) => {
                let update = { ...escala, Status: novoStatus };
                if (novoStatus === 'INTERVALO') {
                    const prof = profissionais.find(p => p.Nome === escala.Nome_Profissional);
                    update.IntervaloInicio = Date.now(); update.IntervaloMinutos = prof ? parseInt(prof.TempoIntervalo) || 15 : 15;
                } else { update.IntervaloInicio = null; }
                await api.saveRecord('ESCALAS', update); onRefresh();
            };

            const handleAcaoModal = async (e) => {
                e.preventDefault();
                if (modalAction.tipo === 'alocar') {
                    const prof = profissionais.find(p => p.ID === e.target.profissional.value);
                    if(!prof) return;
                    await api.saveRecord('ESCALAS', { ID: '', Data: todayStr, Sala: modalAction.sala, Nome_Profissional: prof.Nome, Cargo: prof.Cargo, Horario: e.target.horario.value, Status: 'NO POSTO', Cor: prof.Cor });
                } else if (modalAction.tipo === 'ausencia') {
                    await api.saveRecord('ESCALAS', { ...modalAction.escala, Status: 'AUSENTE', MotivoAusencia: e.target.motivo.value, ObsDia: `Ausente: ${e.target.motivo.value}` });
                }
                setModalAction(null); onRefresh();
            };

            return (
                <div className="animate-fade-in space-y-10 max-w-[1600px] mx-auto">
                    <div className="clean-card p-6 rounded-[1.5rem] border-l-4 border-l-primary flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded-xl flex items-center justify-center text-3xl"><i className="ph-fill ph-shield-check"></i></div>
                            <div><p className="text-[10px] uppercase tracking-widest font-bold opacity-60">Supervisão Geral</p><h3 className="font-black text-xl leading-none">No Comando: <span className="text-primary">{supervisorAtual}</span></h3></div>
                        </div>
                        {isAdmin && (
                            isAssumindo ? (
                                <div className="flex gap-2 w-full md:w-auto animate-fade-in">
                                    <select id="superSelect" className="p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-bold outline-none text-sm">
                                        <option value="">Quem está assumindo?</option><option value={user.nome}>{user.nome} (Eu)</option>{profissionais.map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
                                    </select>
                                    <button onClick={()=>{const v = document.getElementById('superSelect').value; if(v) assumirPlantao(v);}} className="bg-primary text-white px-4 rounded-xl font-bold hover:bg-blue-600">OK</button>
                                </div>
                            ) : (
                                <button onClick={()=>setIsAssumindo(true)} className="w-full md:w-auto bg-slate-800 dark:bg-slate-700 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-700 transition">Trocar Supervisor</button>
                            )
                        )}
                    </div>

                    {setoresAtivos.length === 0 && <div className="p-10 text-center clean-card opacity-60 font-bold max-w-lg mx-auto border-dashed">Vá em "Ajustes" e cadastre seus Setores e Postos.</div>}

                    {setoresAtivos.map(setor => {
                        const postosDoSetor = postosSistema.filter(p => p.setor === setor);
                        return (
                            <div key={setor} className="space-y-4">
                                <h3 className="text-lg font-black flex items-center gap-2 border-b border-slate-200 dark:border-slate-700 pb-2 text-slate-700 dark:text-slate-300"><i className="ph-fill ph-buildings opacity-50"></i> {setor}</h3>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                                    {postosDoSetor.map((postoObj, i) => {
                                        const sala = postoObj.nome;
                                        const ocupantes = escalasHoje.filter(e => e.Sala === sala);
                                        const isLivre = ocupantes.length === 0;

                                        return (
                                            <div key={i} className={`clean-card flex flex-col p-1 min-h-[140px] relative ${isLivre ? 'opacity-80 border-dashed bg-slate-50/50 dark:bg-slate-900/50' : 'border-solid'}`}>
                                                <div className="p-3 bg-slate-50 dark:bg-slate-800 rounded-t-xl font-black text-[11px] uppercase tracking-widest flex justify-between items-center border-b border-slate-100 dark:border-slate-700 text-slate-600 dark:text-slate-300">
                                                    <span className="truncate">{sala}</span>
                                                    {isAdmin && <button onClick={()=>setModalAction({tipo: 'alocar', sala})} className="text-primary hover:scale-110 transition"><i className="ph-bold ph-plus-circle text-lg"></i></button>}
                                                </div>
                                                <div className="flex-1 p-2 space-y-2">
                                                    {isLivre ? <div className="flex flex-col items-center justify-center h-full text-slate-400 py-4"><i className="ph-fill ph-check-circle text-xl mb-1 opacity-50"></i><span className="text-[9px] font-black uppercase opacity-70">Posto Livre</span></div> : 
                                                    ocupantes.map((occ, j) => {
                                                        const isIntervalo = occ.Status === 'INTERVALO';
                                                        const isAusente = occ.Status === 'AUSENTE';
                                                        let cardBg = 'bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700';
                                                        if (isIntervalo) cardBg = 'bg-orange-50 border-orange-200 dark:bg-orange-900/20 dark:border-orange-800';
                                                        if (isAusente) cardBg = 'bg-red-50 border-red-200 dark:bg-red-900/20 dark:border-red-800 opacity-80';

                                                        return (
                                                            <div key={j} className={`p-2.5 rounded-xl relative transition group ${cardBg} shadow-sm`}>
                                                                {isIntervalo && <div className="absolute -top-2 -right-2 w-5 h-5 bg-orange-500 text-white rounded-full flex items-center justify-center text-[10px] animate-bounce">☕</div>}
                                                                <div className="flex items-center gap-2 mb-2"><div className="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black text-white shrink-0" style={{backgroundColor: occ.Cor || '#0ea5e9'}}>{occ.Nome_Profissional.charAt(0)}</div><div className="truncate flex-1"><p className={`text-[10px] font-black truncate leading-tight ${isAusente?'line-through text-red-500':''}`}>{occ.Nome_Profissional}</p><p className="text-[8px] font-bold opacity-60 truncate mt-0.5">{occ.Cargo}</p></div></div>
                                                                <div className="flex justify-between items-center border-t border-slate-100 dark:border-slate-700 pt-2">
                                                                    <span className={`text-[8px] font-black px-1.5 py-0.5 rounded ${isAusente?'text-red-600 bg-red-100':'text-green-600 bg-green-100 dark:bg-green-900/30'}`}>{isAusente?'Ausente':'Ativo'}</span>
                                                                    {isAdmin && !isAusente && (
                                                                        <div className="flex gap-1">
                                                                            {!isIntervalo && <button onClick={()=>handleStatusSimples(occ, 'INTERVALO')} className="w-5 h-5 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded hover:bg-orange-100 hover:text-orange-600 transition"><i className="ph-bold ph-coffee text-[10px]"></i></button>}
                                                                            {isIntervalo && <button onClick={()=>handleStatusSimples(occ, 'NO POSTO')} className="w-5 h-5 bg-blue-100 text-blue-600 rounded hover:bg-blue-200 transition"><i className="ph-bold ph-arrow-u-down-left text-[10px]"></i></button>}
                                                                            <button onClick={()=>setModalAction({tipo:'ausencia', escala: occ})} className="w-5 h-5 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded hover:bg-red-100 hover:text-red-600 transition"><i className="ph-bold ph-warning text-[10px]"></i></button>
                                                                            <button onClick={async()=>{if(confirm('Remover?')){await api.deleteRecord('ESCALAS', occ.ID); onRefresh();}}} className="w-5 h-5 bg-slate-100 dark:bg-slate-700 text-slate-400 rounded hover:text-red-500 transition"><i className="ph-bold ph-x"></i></button>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )
                    })}

                    {modalAction && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-fade-in" onClick={()=>setModalAction(null)}>
                            <div className="clean-card w-full max-w-md p-6" onClick={e=>e.stopPropagation()}>
                                {modalAction.tipo === 'alocar' && (
                                    <form onSubmit={handleAcaoModal} className="space-y-4">
                                        <h3 className="text-lg font-black mb-4">Alocar em: {modalAction.sala}</h3>
                                        <select name="profissional" className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 font-bold outline-none text-sm" required><option value="">Escolha o profissional...</option>{profissionais.map(p => <option key={p.ID} value={p.ID}>{p.Nome} ({p.Cargo})</option>)}</select>
                                        <input type="text" name="horario" placeholder="Horário (Ex: 08:00 às 18:00)" defaultValue="08:00 às 18:00" className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 font-bold outline-none text-sm" required />
                                        <button type="submit" className="w-full py-3 bg-primary text-white font-bold rounded-xl">Confirmar</button>
                                    </form>
                                )}
                                {modalAction.tipo === 'ausencia' && (
                                    <form onSubmit={handleAcaoModal} className="space-y-4">
                                        <h3 className="text-lg font-black mb-2 text-red-500">Marcar Ausência</h3>
                                        <p className="text-xs font-bold opacity-70 mb-4">{modalAction.escala.Nome_Profissional}</p>
                                        <select name="motivo" className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 font-bold outline-none text-sm" required><option value="Faltou">Faltou</option><option value="Atestado">Atestado Médico</option><option value="Trabalho Externo">Trabalho Externo</option></select>
                                        <button type="submit" className="w-full py-3 bg-red-500 text-white font-bold rounded-xl">Confirmar</button>
                                    </form>
                                )}
                                <button type="button" onClick={()=>setModalAction(null)} className="w-full py-2 mt-2 text-sm font-bold opacity-50 hover:opacity-100 text-center block">Cancelar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CalendarioView = ({ profissionais, escalas, user }) => {
            const isAdmin = user.nivel === 'Admin' || user.nivel === 'Supervisor';
            const [selectedProf, setSelectedProf] = useState(isAdmin ? '' : user.nome);
            const [mesAtual, setMesAtual] = useState(new Date());

            const diasNoMes = new Date(mesAtual.getFullYear(), mesAtual.getMonth() + 1, 0).getDate();
            const dias = Array.from({length: diasNoMes}, (_, i) => {
                const data = new Date(mesAtual.getFullYear(), mesAtual.getMonth(), i + 1);
                return { data, diaSemana: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'][data.getDay()], dataStr: data.toLocaleDateString('pt-BR') };
            });

            return (
                <div className="animate-fade-in max-w-4xl mx-auto space-y-6 pb-10">
                    <div className="clean-card p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4"><button onClick={()=>setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()-1, 1))} className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-full flex justify-center items-center hover:bg-slate-200 transition"><i className="ph-bold ph-caret-left"></i></button><h2 className="text-lg font-black uppercase tracking-widest w-40 text-center">{mesAtual.toLocaleString('pt-BR', {month:'long', year:'numeric'})}</h2><button onClick={()=>setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()+1, 1))} className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-full flex justify-center items-center hover:bg-slate-200 transition"><i className="ph-bold ph-caret-right"></i></button></div>
                        {isAdmin ? <select value={selectedProf} onChange={e=>setSelectedProf(e.target.value)} className="p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 font-bold text-sm w-full md:w-64 outline-none"><option value="">Selecionar Profissional...</option>{profissionais.map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}</select> : <div className="px-4 py-2 bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300 rounded-xl font-black text-sm border border-blue-100 dark:border-blue-800">Escala: {user.nome}</div>}
                    </div>

                    {!selectedProf ? <div className="p-10 text-center clean-card opacity-60 font-bold border-dashed">Selecione um profissional para gerar a escala.</div> : 
                    <div className="clean-card p-8 relative overflow-hidden">
                        <h3 className="font-black opacity-50 uppercase tracking-widest text-xs mb-8 border-b border-slate-100 dark:border-slate-800 pb-4">Relatório do Mês</h3>
                        <div className="relative">
                            <div className="timeline-line"></div>
                            <div className="space-y-6">
                                {dias.map((d, i) => {
                                    const escalasDoDia = escalas.filter(e => e.Nome_Profissional === selectedProf && e.Data === d.dataStr);
                                    if (escalasDoDia.length === 0) return null;
                                    const isToday = d.dataStr === new Date().toLocaleDateString('pt-BR');

                                    return (
                                        <div key={i} className="flex relative z-10 animate-fade-in group">
                                            <div className="w-16 shrink-0 flex flex-col items-center pt-2"><div className={`w-8 h-8 rounded-full flex items-center justify-center font-black text-xs shadow-sm z-10 ${isToday ? 'bg-primary text-white ring-4 ring-blue-100 dark:ring-blue-900/50' : 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400 border border-slate-200 dark:border-slate-700'}`}>{d.data.getDate()}</div><span className={`text-[9px] font-black uppercase mt-1 ${isToday?'text-primary':'opacity-50'}`}>{d.diaSemana}</span></div>
                                            <div className="flex-1 pl-4">
                                                <div className={`p-4 rounded-2xl border transition-all ${isToday ? 'bg-blue-50 border-blue-200 dark:bg-blue-900/20 dark:border-blue-800' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 shadow-sm'}`}>
                                                    {escalasDoDia.map((esc, j) => (
                                                        <div key={j} className="flex items-center justify-between">
                                                            <div>
                                                                <div className="flex items-center gap-2 mb-0.5"><span className="w-1.5 h-1.5 rounded-full bg-accent"></span><h4 className="font-black text-sm text-slate-700 dark:text-slate-200">{esc.Sala}</h4></div>
                                                                <p className="text-xs font-bold opacity-60 ml-3.5"><i className="ph-fill ph-clock"></i> {esc.Horario}</p>
                                                            </div>
                                                            <span className="text-[9px] font-bold bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded text-slate-500">Realizado</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('HOJE');
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [dataCentral, setDataCentral] = useState({ PROFISSIONAIS: [], ESCALAS: [], CONFIGURACOES: {} });
            
            // DARK MODE MANUAL 
            const [isDark, setIsDark] = useState(() => localStorage.getItem('theme') === 'dark');
            
            useEffect(() => {
                if (isDark) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [isDark]);

            const fetchBanco = async () => {
                try {
                    const profs = await api.fetch('PROFISSIONAIS');
                    const esc = await api.fetch('ESCALAS');
                    const cnf = await api.fetch('CONFIGURACOES');
                    const sysConfig = cnf.find(c => c.ID === 'parametros') || {};
                    const plantaoConfig = cnf.find(c => c.ID === 'plantao') || {};
                    setDataCentral({ PROFISSIONAIS: profs || [], ESCALAS: esc || [], CONFIGURACOES: {...sysConfig, ...plantaoConfig} });
                } catch(e) { console.error("Erro", e); }
            };

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        let role = 'Colaborador';
                        const eStr = u.email.toLowerCase();
                        if (eStr.includes('admin') || eStr.includes('gestao')) role = 'Admin';
                        else if (eStr.includes('supervis')) role = 'Supervisor';
                        setUser({ email: u.email, nome: u.email.split('@')[0], nivel: role });
                        await fetchBanco();
                    } else { setUser(null); }
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true);
                try { await auth.signInWithEmailAndPassword(e.target.email.value, e.target.password.value); } 
                catch(err) { alert('Erro no login! Verifique os dados.'); setLoading(false); }
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900"><div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-900">
                        <div className="w-full max-w-md clean-card p-8 md:p-10 animate-fade-in shadow-xl">
                            <div className="w-16 h-16 bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded-2xl flex justify-center items-center mx-auto mb-6"><i className="ph-fill ph-calendar-check text-4xl"></i></div>
                            <h1 className="text-3xl font-black text-center mb-1">Escalas SV</h1>
                            <p className="text-center text-sm font-bold mb-8 opacity-50 uppercase tracking-widest">Portal de Acesso</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input name="email" type="email" placeholder="E-mail" className="w-full p-4 rounded-xl outline-none font-bold bg-slate-50 border border-slate-200 dark:bg-slate-800 dark:border-slate-700 focus:border-primary transition" required />
                                <input name="password" type="password" placeholder="Senha" className="w-full p-4 rounded-xl outline-none font-bold bg-slate-50 border border-slate-200 dark:bg-slate-800 dark:border-slate-700 focus:border-primary transition" required />
                                <button type="submit" className="w-full bg-primary text-white font-black py-4 rounded-xl shadow-md hover:bg-blue-600 transition text-lg mt-2">Entrar</button>
                            </form>
                        </div>
                        {/* Botão flutuante de dark mode na tela de login */}
                        <button onClick={()=>setIsDark(!isDark)} className="absolute top-6 right-6 w-10 h-10 rounded-full bg-white dark:bg-slate-800 shadow-md text-slate-500 flex items-center justify-center"><i className={isDark ? "ph-fill ph-sun text-yellow-500" : "ph-fill ph-moon"}></i></button>
                    </div>
                );
            }

            const isAdmin = user.nivel === 'Admin' || user.nivel === 'Supervisor';

            return (
                <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0">
                    <aside className={`hidden md:flex flex-col h-screen fixed z-30 transition-all duration-300 ease-in-out border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 ${isSidebarCollapsed ? 'w-20' : 'w-64'}`}>
                        <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between h-20">
                            <div className="flex items-center gap-3 overflow-hidden">
                                <div className="w-10 h-10 bg-primary text-white rounded-lg flex items-center justify-center shadow-sm shrink-0"><i className="ph-fill ph-heartbeat text-xl"></i></div>
                                {!isSidebarCollapsed && <div><h2 className="font-black text-lg leading-none">Escalas</h2><p className="text-[9px] uppercase tracking-widest opacity-50 font-bold">São Vicente</p></div>}
                            </div>
                        </div>
                        <nav className="flex-1 px-3 py-6 space-y-2 overflow-x-hidden">
                            <button onClick={()=>setActiveTab('HOJE')} className={`w-full flex items-center gap-3 px-3 py-3.5 rounded-xl font-bold text-sm transition ${activeTab === 'HOJE' ? 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`} title="Plantão"><i className="ph-fill ph-kanban text-lg shrink-0"></i> {!isSidebarCollapsed && <span>Plantão</span>}</button>
                            <button onClick={()=>setActiveTab('CALENDARIO')} className={`w-full flex items-center gap-3 px-3 py-3.5 rounded-xl font-bold text-sm transition ${activeTab === 'CALENDARIO' ? 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`} title="Escala"><i className="ph-fill ph-calendar-blank text-lg shrink-0"></i> {!isSidebarCollapsed && <span>Escala</span>}</button>
                            {isAdmin && <button onClick={()=>setActiveTab('EQUIPE')} className={`w-full flex items-center gap-3 px-3 py-3.5 rounded-xl font-bold text-sm transition ${activeTab === 'EQUIPE' ? 'bg-slate-800 text-white dark:bg-slate-700' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`} title="Equipe"><i className="ph-fill ph-users text-lg shrink-0"></i> {!isSidebarCollapsed && <span>Equipe</span>}</button>}
                            {isAdmin && <button onClick={()=>setActiveTab('CONFIG')} className={`w-full flex items-center gap-3 px-3 py-3.5 rounded-xl font-bold text-sm transition ${activeTab === 'CONFIG' ? 'bg-slate-100 text-slate-800 dark:bg-slate-800 dark:text-white' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`} title="Ajustes"><i className="ph-fill ph-gear text-lg shrink-0"></i> {!isSidebarCollapsed && <span>Ajustes</span>}</button>}
                        </nav>
                        <div className="p-4 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
                            <button onClick={()=>auth.signOut()} className="text-red-500 font-bold flex items-center gap-2 hover:bg-red-50 dark:hover:bg-red-900/20 p-2 rounded-lg transition" title="Sair"><i className="ph-bold ph-sign-out text-lg"></i> {!isSidebarCollapsed && <span className="text-xs">Sair</span>}</button>
                            <button onClick={()=>setIsSidebarCollapsed(!isSidebarCollapsed)} className="w-8 h-8 rounded-lg bg-slate-50 dark:bg-slate-800 flex justify-center items-center text-slate-400 hover:text-slate-800 dark:hover:text-white transition shrink-0"><i className={`ph-bold ${isSidebarCollapsed ? 'ph-caret-right' : 'ph-caret-left'}`}></i></button>
                        </div>
                    </aside>

                    <nav className="md:hidden fixed bottom-0 inset-x-0 border-t border-slate-200 dark:border-slate-800 z-50 flex justify-around p-2 pb-safe bg-white dark:bg-slate-900 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
                        <button onClick={()=>setActiveTab('HOJE')} className={`flex flex-col items-center gap-1 p-2 rounded-xl w-16 ${activeTab === 'HOJE' ? 'text-primary' : 'text-slate-400'}`}><i className={`${activeTab === 'HOJE' ? 'ph-fill' : 'ph'} ph-kanban text-2xl`}></i><span className="text-[9px] font-black uppercase">Hoje</span></button>
                        <button onClick={()=>setActiveTab('CALENDARIO')} className={`flex flex-col items-center gap-1 p-2 rounded-xl w-16 ${activeTab === 'CALENDARIO' ? 'text-primary' : 'text-slate-400'}`}><i className={`${activeTab === 'CALENDARIO' ? 'ph-fill' : 'ph'} ph-calendar-blank text-2xl`}></i><span className="text-[9px] font-black uppercase">Escala</span></button>
                        {isAdmin && <button onClick={()=>setActiveTab('EQUIPE')} className={`flex flex-col items-center gap-1 p-2 rounded-xl w-16 ${activeTab === 'EQUIPE' ? 'text-slate-800 dark:text-white' : 'text-slate-400'}`}><i className={`${activeTab === 'EQUIPE' ? 'ph-fill' : 'ph'} ph-users text-2xl`}></i><span className="text-[9px] font-black uppercase">Equipe</span></button>}
                        {isAdmin && <button onClick={()=>setActiveTab('CONFIG')} className={`flex flex-col items-center gap-1 p-2 rounded-xl w-16 ${activeTab === 'CONFIG' ? 'text-slate-800 dark:text-white' : 'text-slate-400'}`}><i className={`${activeTab === 'CONFIG' ? 'ph-fill' : 'ph'} ph-gear text-2xl`}></i><span className="text-[9px] font-black uppercase">Ajustes</span></button>}
                    </nav>

                    <main className={`flex-1 transition-all duration-300 p-4 md:p-8 w-full overflow-x-hidden ${isSidebarCollapsed ? 'md:ml-20' : 'md:ml-64'}`}>
                        {(activeTab === 'HOJE' || activeTab === 'CALENDARIO') && <div className="max-w-[1600px] mx-auto"><TopHeader user={user} isDark={isDark} toggleDark={()=>setIsDark(!isDark)} /></div>}

                        {activeTab === 'HOJE' && <PainelHojeView profissionais={dataCentral.PROFISSIONAIS} escalas={dataCentral.ESCALAS} config={dataCentral.CONFIGURACOES} user={user} onSave={api.saveRecord} onRefresh={fetchBanco} />}
                        {activeTab === 'EQUIPE' && isAdmin && <EquipeView data={dataCentral.PROFISSIONAIS} sysConfig={dataCentral.CONFIGURACOES} onSave={api.saveRecord} onDelete={api.deleteRecord} onRefresh={fetchBanco} />}
                        {activeTab === 'CONFIG' && isAdmin && <ConfiguracoesView sysConfig={dataCentral.CONFIGURACOES} onSaveConfig={api.saveRecord} onRefresh={fetchBanco} />}
                        {activeTab === 'CALENDARIO' && <CalendarioView profissionais={dataCentral.PROFISSIONAIS} escalas={dataCentral.ESCALAS} user={user} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
