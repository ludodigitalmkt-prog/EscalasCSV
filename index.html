<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E40AF">
    <title>Escalas SV Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        window.addEventListener('error', function(event) {
            document.body.innerHTML = '<div style="background:#fee2e2;color:#991b1b;padding:40px;font-family:sans-serif;height:100vh;text-align:center;"><h1 style="font-size:2rem;font-weight:900;margin-bottom:10px;">Sistema Protegido</h1><p>Erro encontrado. <b>Tire um print:</b></p><div style="background:white;padding:20px;border-radius:10px;text-align:left;max-width:600px;margin:20px auto;border:2px solid #f87171;"><strong>ERRO:</strong> ' + event.message + '<br/><br/><strong>LINHA:</strong> ' + event.lineno + '</div><button onclick="window.location.reload()" style="padding:15px 30px;background:#991b1b;color:white;border-radius:10px;font-weight:bold;cursor:pointer;border:none;">Tentar Novamente</button></div>';
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { primary: '#1E40AF', secondary: '#8b5cf6', accent: '#10b981' },
                    animation: { 
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'pop-in': 'popIn 0.3s forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    },
                    keyframes: { 
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        popIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
                    }
                } 
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* CLAYMORPHISM & GLASSMORPHISM PREMIUM */
        .clay-card {
            background: rgba(255, 255, 255, 0.65); border-radius: 1.5rem; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.05), -10px -10px 20px rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.6); transition: all 0.3s ease;
        }
        .dark .clay-card {
            background: rgba(30, 41, 59, 0.65); box-shadow: 10px 10px 20px rgba(0,0,0,0.4), -10px -10px 20px rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); color: #f8fafc;
        }
        .clay-card:hover { transform: translateY(-4px); box-shadow: 15px 15px 25px rgba(0,0,0,0.08), -15px -15px 25px rgba(255,255,255,0.9); }
        .dark .clay-card:hover { box-shadow: 15px 15px 25px rgba(0,0,0,0.5); }
        
        /* A NEBULOSA MÁGICA ANIMADA */
        .nebula-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; background-color: var(--bg-base); transition: background-color 2s ease; }
        .nebula-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.7; animation: floatBlob 25s infinite alternate ease-in-out; will-change: transform; }
        .blob1 { top: -10%; left: -10%; width: 55vw; height: 55vw; background: var(--color1); animation-delay: 0s; }
        .blob2 { bottom: -20%; right: -10%; width: 65vw; height: 65vw; background: var(--color2); animation-delay: -5s; }
        .blob3 { top: 30%; left: 30%; width: 45vw; height: 45vw; background: var(--color3); animation-delay: -10s; }
        
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(8%, 12%) scale(1.15); }
            66% { transform: translate(-12%, 8%) scale(0.85); }
            100% { transform: translate(0, -12%) scale(1); }
        }

        /* VARIÁVEIS DE TEMA E CORES DA NEBULOSA */
        .theme-morning { --bg-base: #e0f2fe; --color1: #bae6fd; --color2: #fdf4ff; --color3: #e0e7ff; color: #0f172a; }
        .theme-afternoon { --bg-base: #ffedd5; --color1: #fed7aa; --color2: #fbcfe8; --color3: #fde047; color: #0f172a; }
        .theme-night { --bg-base: #020617; --color1: #312e81; --color2: #4c1d95; --color3: #1e1b4b; color: #f8fafc; }
        
        .stars { position: fixed; inset: 0; background-image: radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)), radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)); background-size: 200px 200px; opacity: 0.4; animation: pulse-slow 4s infinite alternate; pointer-events: none; z-index: 0; }
        .timeline-line::before { content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; background: rgba(0,0,0,0.1); z-index: 0; }
        .dark .timeline-line::before { background: rgba(255,255,255,0.1); }
    </style>

    <script>
        const VERSAO_ATUAL = "25.0.0"; 
        if (localStorage.getItem('escalas_versao') !== VERSAO_ATUAL) {
            localStorage.clear(); sessionStorage.clear();
            localStorage.setItem('escalas_versao', VERSAO_ATUAL);
            window.location.reload();
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, Component } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAtywH5sc1OEs0xa-c7IDOpGA9764ZhU6c",
            authDomain: "escalas-sao-vicente.firebaseapp.com",
            projectId: "escalas-sao-vicente",
            storageBucket: "escalas-sao-vicente.firebasestorage.app",
            messagingSenderId: "256697542067",
            appId: "1:256697542067:web:b8087390bb57d74def97c6"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const api = {
            fetch: async (colName) => { 
                if(!db) return []; 
                try { 
                    const snap = await db.collection(colName).get(); 
                    return snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); 
                } catch (e) { return []; } 
            },
            saveRecord: async (colName, data) => { 
                try { 
                    let docData = { ...data }; let id = docData.ID; delete docData.ID; 
                    if (id) { await db.collection(colName).doc(id).set(docData, { merge: true }); } 
                    else { await db.collection(colName).add(docData); }
                    return { success: true }; 
                } catch (e) { return { success: false }; } 
            },
            deleteRecord: async (colName, id) => { 
                try { await db.collection(colName).doc(id).delete(); return { success: true }; } 
                catch (e) { return { success: false }; } 
            }
        };

        const safeString = (val) => val === null || val === undefined ? '' : String(val);
        const formatImageUrl = (url) => { 
            const str = safeString(url).trim(); 
            if (!str) return ''; 
            if (str.includes('drive.google.com')) { 
                const m = str.match(/\/d\/([a-zA-Z0-9_-]+)/) || str.match(/id=([a-zA-Z0-9_-]+)/); 
                if (m && m[1]) return `https://drive.google.com/uc?export=view&id=${m[1]}`; 
            } 
            return str; 
        };

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, errStr: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error) { this.setState({ errStr: String(error) }); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-10 text-center flex flex-col items-center justify-center min-h-screen bg-slate-50 relative z-50">
                            <i className="ph-fill ph-warning-circle text-6xl text-red-500 mb-4"></i>
                            <h2 className="text-2xl font-black mb-2 text-slate-800">Erro de Interface</h2>
                            <p className="text-[10px] text-red-500 bg-red-50 p-4 font-mono mb-4 border border-red-200 max-w-xl mx-auto">{this.state.errStr}</p>
                            <button onClick={()=>window.location.reload()} className="bg-primary text-white px-8 py-3 rounded-xl font-bold shadow-lg">Recarregar</button>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        const TopHeader = ({ user, themeClass }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
            const h = time.getHours();
            let period = 'Bom dia'; let icon = 'ph-sun text-yellow-500'; 
            let msgs = ["A saúde em primeiro lugar.", "Faça a diferença hoje!"];
            if (h >= 12 && h < 18) { period = 'Boa tarde'; icon = 'ph-cloud-sun text-orange-500'; msgs = ["Mantenha o foco!", "O cuidado continua."]; } 
            else if (h >= 18 || h < 6) { period = 'Boa noite'; icon = 'ph-moon-stars text-blue-300'; msgs = ["A noite também salva vidas.", "Bom descanso."]; }
            const userName = user && user.nome ? user.nome.split(' ')[0] : 'Equipe';

            return (
                <div className="clay-card p-6 md:p-8 mb-8 flex justify-between items-center relative z-10">
                    <div className="flex items-center gap-4">
                        <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-4xl shadow-inner bg-black/5 dark:bg-white/10"><i className={`ph-fill ${icon} animate-pulse-slow`}></i></div>
                        <div>
                            <h2 className="text-2xl md:text-3xl font-black leading-none">{time.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</h2>
                            <p className="text-[10px] font-bold uppercase tracking-widest opacity-70 mt-1">{period}, {userName}</p>
                        </div>
                    </div>
                    <div className="hidden md:block text-right">
                        <p className="text-sm font-bold opacity-90">{msgs[time.getDate() % msgs.length]}</p>
                        <p className="text-[10px] uppercase tracking-widest opacity-50">Portal de Escalas SV</p>
                    </div>
                </div>
            );
        };

        const ConfiguracoesView = ({ sysConfig, onSaveConfig, onRefresh }) => {
            const [setores, setSetores] = useState(sysConfig.setores || []);
            const [habs, setHabs] = useState(sysConfig.habilidades || []);
            const [postos, setPostos] = useState(sysConfig.postos || []); 
            const [newSetor, setNewSetor] = useState(''); const [newHab, setNewHab] = useState('');
            const [newPostoNome, setNewPostoNome] = useState(''); const [newPostoSetor, setNewPostoSetor] = useState('');
            const [loading, setLoading] = useState(false);

            const salvar = async () => {
                setLoading(true);
                await onSaveConfig('CONFIGURACOES', { ID: 'parametros', setores, habilidades: habs, postos });
                onRefresh(); setLoading(false); alert("Configurações atualizadas!");
            };

            const addItem = (tipo) => {
                if (tipo === 'setor' && newSetor) { setSetores([...setores, newSetor.trim().toUpperCase()]); setNewSetor(''); }
                if (tipo === 'hab' && newHab) { setHabs([...habs, newHab.trim()]); setNewHab(''); }
                if (tipo === 'posto' && newPostoNome && newPostoSetor) { setPostos([...postos, { nome: newPostoNome.trim(), setor: newPostoSetor }]); setNewPostoNome(''); }
            };
            const removeItem = (tipo, index) => {
                if (tipo === 'setor') setSetores(setores.filter((_, i) => i !== index));
                if (tipo === 'hab') setHabs(habs.filter((_, i) => i !== index));
                if (tipo === 'posto') setPostos(postos.filter((_, i) => i !== index));
            };

            return (
                <div className="animate-fade-in space-y-6 max-w-7xl mx-auto relative z-10">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                        <div className="text-center md:text-left"><h2 className="text-3xl font-black">Ajustes da Clínica</h2></div>
                        <button onClick={salvar} disabled={loading} className="w-full md:w-auto bg-primary text-white font-black px-8 py-3.5 rounded-xl shadow-lg hover:scale-105 transition">{loading ? 'Salvando...' : 'Salvar Servidor'}</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="clay-card p-6">
                            <h3 className="font-black mb-4 flex items-center gap-2"><i className="ph-fill ph-buildings text-primary text-xl"></i> Departamentos</h3>
                            <div className="flex gap-2 mb-4"><input type="text" value={newSetor} onChange={e=>setNewSetor(e.target.value)} placeholder="Ex: ENFERMAGEM" className="flex-1 p-3 rounded-lg text-sm font-bold border border-black/10 dark:border-white/10 outline-none bg-black/5 dark:bg-white/5" /><button onClick={()=>addItem('setor')} className="bg-primary text-white px-4 rounded-lg font-black"><i className="ph-bold ph-plus"></i></button></div>
                            <div className="space-y-2 max-h-60 overflow-y-auto custom-scrollbar pr-2">{setores.map((s, i) => (<div key={i} className="flex justify-between items-center bg-white/50 dark:bg-black/20 p-3 rounded-lg text-xs font-black border border-black/5 dark:border-white/5"><span>{s}</span><button onClick={()=>removeItem('setor', i)} className="text-red-500"><i className="ph-bold ph-trash"></i></button></div>))}</div>
                        </div>
                        <div className="clay-card p-6">
                            <h3 className="font-black mb-4 flex items-center gap-2"><i className="ph-fill ph-door text-secondary text-xl"></i> Mapas de Salas</h3>
                            <div className="space-y-2 mb-4"><input type="text" value={newPostoNome} onChange={e=>setNewPostoNome(e.target.value)} placeholder="Ex: Consultório 01" className="w-full p-3 rounded-lg text-sm font-bold border border-black/10 dark:border-white/10 outline-none bg-black/5 dark:bg-white/5" /><div className="flex gap-2"><select value={newPostoSetor} onChange={e=>setNewPostoSetor(e.target.value)} className="flex-1 p-3 rounded-lg text-xs font-bold border border-black/10 dark:border-white/10 outline-none bg-black/5 dark:bg-white/5"><option value="">Setor...</option>{setores.map((s,i)=><option key={i} value={s}>{s}</option>)}</select><button onClick={()=>addItem('posto')} className="bg-secondary text-white px-4 rounded-lg font-black"><i className="ph-bold ph-plus"></i></button></div></div>
                            <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar pr-2">{postos.map((p, i) => (<div key={i} className="flex justify-between items-center bg-white/50 dark:bg-black/20 p-3 rounded-lg text-xs border border-black/5 dark:border-white/5"><div><p className="font-black">{p.nome}</p><p className="text-[9px] opacity-60 uppercase">{p.setor}</p></div><button onClick={()=>removeItem('posto', i)} className="text-red-500"><i className="ph-bold ph-trash"></i></button></div>))}</div>
                        </div>
                        <div className="clay-card p-6">
                            <h3 className="font-black mb-4 flex items-center gap-2"><i className="ph-fill ph-magic-wand text-accent text-xl"></i> Competências</h3>
                            <div className="flex gap-2 mb-4"><input type="text" value={newHab} onChange={e=>setNewHab(e.target.value)} placeholder="Ex: Coleta" className="flex-1 p-3 rounded-lg text-sm font-bold border border-black/10 dark:border-white/10 outline-none bg-black/5 dark:bg-white/5" /><button onClick={()=>addItem('hab')} className="bg-accent text-white px-4 rounded-lg font-black"><i className="ph-bold ph-plus"></i></button></div>
                            <div className="flex flex-wrap gap-2 max-h-60 overflow-y-auto custom-scrollbar pr-2">{habs.map((h, i) => (<div key={i} className="bg-white/50 dark:bg-black/20 border border-black/5 dark:border-white/5 px-3 py-1.5 rounded-full text-[10px] font-black flex items-center gap-2">{h} <button onClick={()=>removeItem('hab', i)} className="text-red-500"><i className="ph-bold ph-x"></i></button></div>))}</div>
                        </div>
                    </div>
                </div>
            );
        };

        const EquipeView = ({ data, sysConfig, onSave, onDelete, onRefresh }) => {
            const [isModalOpen, setIsModalOpen] = useState(false); const [formData, setFormData] = useState({}); const [search, setSearch] = useState('');
            const openModal = (item = null) => { if (item) setFormData({...item}); else setFormData({ ID: '', Nome: '', Cargo: '', Setor: '', Habilidades: [], TempoIntervalo: '15', Cor: '#0ea5e9', DiasTrabalho: {}, FotoURL: '' }); setIsModalOpen(true); };
            const toggleHab = (hab) => { const arr = formData.Habilidades || []; if(arr.includes(hab)) setFormData({...formData, Habilidades: arr.filter(h=>h!==hab)}); else setFormData({...formData, Habilidades: [...arr, hab]}); };
            const handleSave = async (e) => { e.preventDefault(); await onSave('PROFISSIONAIS', formData); setIsModalOpen(false); onRefresh(); };
            const filtrados = data.filter(p => safeString(p.Nome).toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="animate-fade-in space-y-6 relative z-10 max-w-7xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                        <div><h2 className="text-3xl font-black">Time São Vicente</h2></div>
                        <div className="flex gap-2 w-full md:w-auto"><input type="text" placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)} className="pl-6 pr-4 py-3 rounded-xl font-bold outline-none w-full bg-white/50 dark:bg-black/20 border border-black/10 dark:border-white/10" /><button onClick={()=>openModal()} className="bg-primary text-white px-6 rounded-xl font-black shadow-lg hover:scale-105 transition">Novo</button></div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        {filtrados.map((prof, i) => (
                            <div key={i} onClick={()=>openModal(prof)} className="clay-card p-6 flex flex-col items-center text-center relative group overflow-hidden cursor-pointer">
                                <div className="absolute top-0 inset-x-0 h-16 opacity-30" style={{backgroundColor: prof.Cor || '#0ea5e9'}}></div>
                                {prof.FotoURL ? <img src={formatImageUrl(prof.FotoURL)} className="w-16 h-16 rounded-2xl object-cover shadow-md z-10 mb-3 border-2 border-white/50" /> : <div className="w-16 h-16 rounded-2xl flex items-center justify-center text-2xl font-black text-white shadow-md z-10 mb-3 border-2 border-white/50" style={{backgroundColor: prof.Cor || '#0ea5e9'}}>{safeString(prof.Nome).charAt(0).toUpperCase()}</div>}
                                <h3 className="font-black text-lg leading-tight z-10 truncate w-full px-2">{safeString(prof.Nome)}</h3>
                                <p className="text-[10px] font-black mt-1 uppercase tracking-widest opacity-60 z-10 truncate">{safeString(prof.Cargo)}</p>
                                <span className="text-[8px] font-black uppercase bg-black/5 dark:bg-white/10 px-2 py-1 rounded mt-2 border border-black/10 dark:border-white/10">{prof.Setor || 'Sem Setor'}</span>
                                <div className="absolute top-4 right-4 opacity-100 lg:opacity-0 group-hover:opacity-100 flex gap-2 z-20"><button onClick={async(e)=>{e.stopPropagation(); if(confirm('Excluir?')){await onDelete('PROFISSIONAIS', prof.ID); onRefresh();}}} className="w-8 h-8 bg-red-100 dark:bg-red-900/50 shadow-md rounded-full text-red-500 flex items-center justify-center hover:scale-110"><i className="ph-bold ph-trash"></i></button></div>
                            </div>
                        ))}
                    </div>
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-fade-in" onClick={()=>setIsModalOpen(false)}>
                            <div className="clay-card w-full max-w-4xl p-0 overflow-hidden flex flex-col max-h-[90vh]" onClick={e=>e.stopPropagation()}>
                                <div className="p-6 border-b border-black/10 dark:border-white/10 flex justify-between items-center bg-black/5 dark:bg-white/5"><h3 className="text-xl font-black">Cadastro</h3><button onClick={()=>setIsModalOpen(false)} className="w-8 h-8 rounded-full hover:bg-red-500 hover:text-white flex items-center justify-center transition"><i className="ph-bold ph-x"></i></button></div>
                                <form onSubmit={handleSave} className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="md:col-span-2"><label className="text-[10px] font-black uppercase opacity-50">Nome Completo</label><input type="text" value={safeString(formData.Nome)} onChange={e=>setFormData({...formData, Nome: e.target.value})} className="w-full p-3 mt-1 rounded-xl font-bold outline-none border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 focus:border-primary" required /></div>
                                        <div className="md:col-span-2"><label className="text-[10px] font-black uppercase opacity-50">Foto (Link)</label><input type="text" value={safeString(formData.FotoURL)} onChange={e=>setFormData({...formData, FotoURL: e.target.value})} className="w-full p-3 mt-1 rounded-xl font-bold outline-none border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 focus:border-primary" /></div>
                                        <div><label className="text-[10px] font-black uppercase opacity-50">Cargo</label><input type="text" value={safeString(formData.Cargo)} onChange={e=>setFormData({...formData, Cargo: e.target.value})} className="w-full p-3 mt-1 rounded-xl font-bold outline-none border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 focus:border-primary" required /></div>
                                        <div><label className="text-[10px] font-black uppercase opacity-50">Setor</label><select value={safeString(formData.Setor)} onChange={e=>setFormData({...formData, Setor: e.target.value})} className="w-full p-3 mt-1 rounded-xl font-bold outline-none border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 focus:border-primary"><option value="">Selecione...</option>{(sysConfig.setores||[]).map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                                        <div><label className="text-[10px] font-black uppercase opacity-50">Cor</label><input type="color" value={safeString(formData.Cor || '#0ea5e9')} onChange={e=>setFormData({...formData, Cor: e.target.value})} className="w-full h-12 p-1 mt-1 rounded-xl cursor-pointer border border-black/10 dark:border-white/10" /></div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase tracking-widest opacity-50 block mb-2">Habilidades</label>
                                        <div className="flex flex-wrap gap-2">{(sysConfig.habilidades||[]).map(h => { const ativo = (formData.Habilidades||[]).includes(h); return <button type="button" key={h} onClick={()=>toggleHab(h)} className={`px-4 py-2 rounded-lg text-[10px] font-bold border transition ${ativo ? 'bg-primary border-primary text-white' : 'bg-black/5 dark:bg-white/5 border-transparent opacity-60'}`}>{h}</button>; })}</div>
                                    </div>
                                    <div className="pt-4 flex justify-end gap-3"><button type="button" onClick={()=>setIsModalOpen(false)} className="px-6 py-3 font-bold opacity-70">Cancelar</button><button type="submit" className="bg-primary text-white px-8 py-3 rounded-xl font-black shadow-lg hover:scale-105 transition">Salvar Ficha</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const PainelHojeView = ({ profissionais, escalas, config, user, onSave, onRefresh }) => {
            const isAdmin = user.nivel === 'Admin' || user.nivel === 'Supervisor';
            const [now, setNow] = useState(Date.now()); const [modalAction, setModalAction] = useState(null); 
            useEffect(() => { const timer = setInterval(() => setNow(Date.now()), 10000); return () => clearInterval(timer); }, []);

            const supervisorAtual = config?.supervisorAtual || 'Nenhum Assumiu';
            const postosSistema = config?.postos || []; 
            const setoresAtivos = Array.from(new Set(postosSistema.map(p => p.setor).filter(Boolean)));
            const todayStr = new Date().toLocaleDateString('pt-BR');
            const escalasHoje = escalas.filter(e => safeString(e.Data) === todayStr);

            const handleAcaoModal = async (e) => {
                e.preventDefault();
                if (modalAction.tipo === 'alocar') {
                    const prof = profissionais.find(p => p.ID === e.target.profissional.value);
                    if(!prof) return;
                    await api.saveRecord('ESCALAS', { ID: '', Data: todayStr, Sala: modalAction.sala, Nome_Profissional: prof.Nome, Cargo: prof.Cargo, Horario: e.target.horario.value, Status: 'NO POSTO', Cor: prof.Cor });
                }
                setModalAction(null); onRefresh();
            };

            return (
                <div className="animate-fade-in space-y-10 relative z-10 max-w-[1600px] mx-auto">
                    <div className="clay-card p-6 rounded-[2rem] border-l-4 border-l-primary flex flex-col md:flex-row justify-between items-center gap-4 shadow-lg">
                        <div className="flex items-center gap-4"><div className="w-16 h-16 bg-primary/20 text-primary rounded-2xl flex items-center justify-center text-3xl"><i className="ph-fill ph-office-chair"></i></div><div><p className="text-[10px] uppercase tracking-widest font-bold opacity-70">Casa de Vidro</p><h3 className="font-black text-2xl leading-none">No Comando: <span className="text-primary">{supervisorAtual}</span></h3></div></div>
                        {isAdmin && <button onClick={async()=>{await api.saveRecord('CONFIGURACOES', { ID: 'plantao', supervisorAtual: user.nome }); onRefresh();}} className="bg-slate-800 dark:bg-white text-white dark:text-slate-900 px-8 py-3.5 rounded-xl font-black shadow-md hover:scale-105 transition">Assumir Plantão</button>}
                    </div>

                    {setoresAtivos.length === 0 && <div className="p-10 text-center clay-card opacity-70 font-bold max-w-lg mx-auto">Cadastre Setores e Postos em Ajustes.</div>}

                    {setoresAtivos.map(setor => {
                        const postosDoSetor = postosSistema.filter(p => p.setor === setor);
                        return (
                            <div key={setor} className="space-y-4">
                                <h3 className="text-xl font-black flex items-center gap-2 border-b border-black/10 dark:border-white/10 pb-2"><i className="ph-fill ph-buildings text-primary"></i> Setor: {setor}</h3>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                                    {postosDoSetor.map((postoObj, i) => {
                                        const sala = postoObj.nome;
                                        const ocupantes = escalasHoje.filter(e => e.Sala === sala);
                                        const isLivre = ocupantes.length === 0;
                                        const cardTheme = ['border-blue-400 bg-blue-100/50 dark:bg-blue-900/30', 'border-accent bg-accent/20 dark:bg-accent/30', 'border-purple-400 bg-purple-100/50 dark:bg-purple-900/30', 'border-amber-400 bg-amber-100/50 dark:bg-amber-900/30'][i % 4];

                                        return (
                                            <div key={i} className={`clay-card border-2 flex flex-col p-1 min-h-[150px] relative ${cardTheme} ${isLivre ? 'opacity-70 border-dashed' : 'border-solid'}`}>
                                                <div className="p-3 bg-black/5 dark:bg-white/5 rounded-t-xl font-black text-[11px] uppercase tracking-widest flex justify-between items-center"><span className="truncate">{sala}</span>{isAdmin && <button onClick={()=>setModalAction({tipo: 'alocar', sala})} className="hover:scale-125 transition opacity-50 hover:opacity-100"><i className="ph-bold ph-plus-circle text-lg"></i></button>}</div>
                                                <div className="flex-1 p-2 space-y-2">
                                                    {isLivre ? <div className="flex flex-col items-center justify-center h-full text-accent py-4"><i className="ph-fill ph-check-circle text-2xl mb-1"></i><span className="text-[9px] font-black uppercase">Posto Livre</span></div> : 
                                                    ocupantes.map((occ, j) => (
                                                        <div key={j} className="p-2 rounded-xl relative transition group bg-white/50 dark:bg-black/20 border border-black/5 dark:border-white/5 backdrop-blur-md">
                                                            <div className="flex items-center gap-2 mb-2"><div className="w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black text-white" style={{backgroundColor: occ.Cor || '#000'}}>{occ.Nome_Profissional.charAt(0)}</div><div className="truncate flex-1"><p className="text-[11px] font-black truncate">{occ.Nome_Profissional}</p><p className="text-[8px] font-bold opacity-60 truncate">{occ.Cargo}</p></div></div>
                                                            <div className="flex justify-between items-center border-t border-black/10 dark:border-white/10 pt-2"><span className="text-[8px] font-black text-green-600 bg-green-100 dark:bg-green-900/50 px-1.5 py-0.5 rounded">Operando</span>{isAdmin && <button onClick={async()=>{await api.deleteRecord('ESCALAS', occ.ID); onRefresh();}} className="text-[8px] text-red-500 font-black">Remover</button>}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )
                    })}

                    {modalAction && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-fade-in" onClick={()=>setModalAction(null)}>
                            <div className="clay-card w-full max-w-md p-8 animate-pop-in" onClick={e=>e.stopPropagation()}>
                                <form onSubmit={handleAcaoModal} className="space-y-4">
                                    <h3 className="text-xl font-black mb-4"><i className="ph-fill ph-plus-circle text-primary"></i> Alocar na {modalAction.sala}</h3>
                                    <select name="profissional" className="w-full p-4 rounded-xl border border-black/10 bg-black/5 dark:bg-white/5 font-bold outline-none" required><option value="">Escolha o profissional livre...</option>{profissionais.filter(p => !escalasHoje.some(e => e.Nome_Profissional === p.Nome)).map(p => <option key={p.ID} value={p.ID}>{p.Nome} ({p.Cargo})</option>)}</select>
                                    <input type="text" name="horario" placeholder="Horário (Ex: 08:00 às 18:00)" defaultValue="08:00 às 18:00" className="w-full p-4 rounded-xl border border-black/10 bg-black/5 dark:bg-white/5 font-bold outline-none" required />
                                    <button type="submit" className="w-full py-4 bg-primary text-white font-black rounded-xl">Confirmar Alocação</button>
                                </form>
                                <button type="button" onClick={()=>setModalAction(null)} className="w-full py-3 mt-4 text-sm font-bold opacity-50 hover:opacity-100">Cancelar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CalendarioView = ({ profissionais, escalas, user }) => {
            const isAdmin = user.nivel === 'Admin' || user.nivel === 'Supervisor';
            const [selectedProf, setSelectedProf] = useState(isAdmin ? '' : user.nome);
            const [mesAtual, setMesAtual] = useState(new Date());

            const diasNoMes = new Date(mesAtual.getFullYear(), mesAtual.getMonth() + 1, 0).getDate();
            const dias = Array.from({length: diasNoMes}, (_, i) => {
                const data = new Date(mesAtual.getFullYear(), mesAtual.getMonth(), i + 1);
                return { data, diaSemana: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'][data.getDay()], dataStr: data.toLocaleDateString('pt-BR') };
            });

            return (
                <div className="animate-fade-in max-w-4xl mx-auto space-y-6 relative z-10 pb-10">
                    <div className="clay-card p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4"><button onClick={()=>setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()-1, 1))} className="w-10 h-10 bg-black/5 dark:bg-white/10 rounded-full flex justify-center items-center hover:scale-110 transition"><i className="ph-bold ph-caret-left"></i></button><h2 className="text-xl font-black uppercase tracking-widest w-40 text-center">{mesAtual.toLocaleString('pt-BR', {month:'long', year:'numeric'})}</h2><button onClick={()=>setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()+1, 1))} className="w-10 h-10 bg-black/5 dark:bg-white/10 rounded-full flex justify-center items-center hover:scale-110 transition"><i className="ph-bold ph-caret-right"></i></button></div>
                        {isAdmin ? <select value={selectedProf} onChange={e=>setSelectedProf(e.target.value)} className="p-3 rounded-xl border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 font-bold text-sm w-full md:w-64 outline-none"><option value="">Selecionar Profissional...</option>{profissionais.map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}</select> : <div className="px-4 py-2 bg-primary/10 text-primary rounded-xl font-black text-sm">Escala de: {user.nome}</div>}
                    </div>

                    {!selectedProf ? <div className="p-10 text-center clay-card opacity-60 font-bold">Selecione um profissional para gerar a linha do tempo.</div> : 
                    <div className="clay-card p-8 relative overflow-hidden">
                        <h3 className="font-black opacity-50 uppercase tracking-widest text-xs mb-8 border-b border-black/10 dark:border-white/10 pb-4">Histórico Mensal</h3>
                        <div className="relative">
                            <div className="timeline-line"></div>
                            <div className="space-y-8">
                                {dias.map((d, i) => {
                                    const escalasDoDia = escalas.filter(e => e.Nome_Profissional === selectedProf && e.Data === d.dataStr);
                                    if (escalasDoDia.length === 0) return null;
                                    const isToday = d.dataStr === new Date().toLocaleDateString('pt-BR');

                                    return (
                                        <div key={i} className="flex relative z-10 animate-fade-in group">
                                            <div className="w-16 shrink-0 flex flex-col items-center pt-2"><div className={`w-8 h-8 rounded-full flex items-center justify-center font-black text-xs shadow-md z-10 transition-transform group-hover:scale-110 ${isToday ? 'bg-primary text-white ring-4 ring-blue-200' : 'bg-black/10 dark:bg-white/10'}`}>{d.data.getDate()}</div><span className={`text-[9px] font-black uppercase mt-1 ${isToday?'text-primary':'opacity-50'}`}>{d.diaSemana}</span></div>
                                            <div className="flex-1 pl-4">
                                                <div className={`p-5 rounded-[1.5rem] border transition-all ${isToday ? 'bg-blue-50 border-blue-200 dark:bg-blue-900/20 shadow-md' : 'bg-black/5 dark:bg-white/5 border-transparent hover:border-black/10'}`}>
                                                    {escalasDoDia.map((esc, j) => (
                                                        <div key={j} className="mb-3 last:mb-0">
                                                            <div className="flex items-center gap-2 mb-1"><span className="w-2 h-2 rounded-full bg-accent"></span><h4 className="font-black text-sm">{esc.Sala}</h4></div>
                                                            <p className="text-xs font-bold opacity-60 ml-4"><i className="ph-fill ph-clock"></i> {esc.Horario}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('HOJE');
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [dataCentral, setDataCentral] = useState({ PROFISSIONAIS: [], ESCALAS: [], CONFIGURACOES: {} });

            const [themeClass, setThemeClass] = useState('theme-morning');
            useEffect(() => {
                const updateTheme = () => {
                    const h = new Date().getHours();
                    if (h >= 6 && h < 12) setThemeClass('theme-morning');
                    else if (h >= 12 && h < 18) setThemeClass('theme-afternoon');
                    else setThemeClass('theme-night');
                };
                updateTheme();
                const i = setInterval(updateTheme, 60000); 
                return () => clearInterval(i);
            }, []);

            useEffect(() => { document.body.className = `${themeClass} min-h-screen relative overflow-x-hidden`; }, [themeClass]);

            const fetchBanco = async () => {
                try {
                    const profs = await api.fetch('PROFISSIONAIS');
                    const esc = await api.fetch('ESCALAS');
                    const cnf = await api.fetch('CONFIGURACOES');
                    const sysConfig = cnf.find(c => c.ID === 'parametros') || {};
                    const plantaoConfig = cnf.find(c => c.ID === 'plantao') || {};
                    setDataCentral({ PROFISSIONAIS: profs || [], ESCALAS: esc || [], CONFIGURACOES: {...sysConfig, ...plantaoConfig} });
                } catch(e) { console.error("Erro banco", e); }
            };

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        let role = 'Colaborador';
                        const eStr = u.email.toLowerCase();
                        if (eStr.includes('admin') || eStr.includes('gestao') || eStr.includes('diretor')) role = 'Admin';
                        else if (eStr.includes('supervis')) role = 'Supervisor';
                        setUser({ email: u.email, nome: u.email.split('@')[0], nivel: role });
                        await fetchBanco();
                    } else { setUser(null); }
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true);
                try { await auth.signInWithEmailAndPassword(e.target.email.value, e.target.password.value); } 
                catch(err) { alert('Erro de login!'); setLoading(false); }
            };

            if (loading) return <div className={`min-h-screen flex items-center justify-center ${themeClass}`}><div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin relative z-50"></div></div>;

            if (!user) {
                return (
                    <div className={`min-h-screen flex items-center justify-center p-4 relative ${themeClass}`}>
                        <div className="nebula-bg"><div className="nebula-blob blob1"></div><div className="nebula-blob blob2"></div><div className="nebula-blob blob3"></div></div>
                        {themeClass.includes('night') && <div className="stars"></div>}
                        
                        <div className={`w-full max-w-md clay-card p-8 md:p-10 animate-fade-in relative z-10`}>
                            <div className="w-20 h-20 bg-primary/10 text-primary rounded-3xl flex justify-center items-center mx-auto mb-6 shadow-inner"><i className="ph-fill ph-calendar-check text-5xl"></i></div>
                            <h1 className="text-3xl font-black text-center mb-2">Escalas SV Pro</h1>
                            <p className="text-center font-bold mb-8 opacity-60">Gestão Inteligente de Plantões</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="relative"><i className="ph-fill ph-user absolute left-5 top-4.5 opacity-50 text-lg"></i><input name="email" type="email" placeholder="E-mail" className="w-full pl-12 pr-4 py-4 rounded-2xl outline-none font-bold bg-black/5 dark:bg-white/10 border border-transparent focus:border-primary" required /></div>
                                <div className="relative"><i className="ph-fill ph-lock-key absolute left-5 top-4.5 opacity-50 text-lg"></i><input name="password" type="password" placeholder="Senha" className="w-full pl-12 pr-4 py-4 rounded-2xl outline-none font-bold bg-black/5 dark:bg-white/10 border border-transparent focus:border-primary" required /></div>
                                <button type="submit" className="w-full bg-primary text-white font-black py-4 rounded-2xl shadow-lg hover:-translate-y-1 transition text-lg mt-4">Acessar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            const isAdmin = user.nivel === 'Admin' || user.nivel === 'Supervisor';
            const isDark = themeClass.includes('night');

            return (
                <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0 relative">
                    <div className="nebula-bg"><div className="nebula-blob blob1"></div><div className="nebula-blob blob2"></div><div className="nebula-blob blob3"></div></div>
                    {isDark && <div className="stars"></div>}
                    
                    <aside className={`hidden md:flex flex-col h-screen fixed z-30 transition-all duration-300 ease-in-out ${isSidebarCollapsed ? 'w-24' : 'w-72'} ${isDark ? 'bg-slate-900/60 border-r border-white/5 backdrop-blur-2xl' : 'bg-white/60 border-r border-black/5 backdrop-blur-2xl'}`}>
                        <div className="p-6 border-b border-inherit flex items-center justify-between">
                            <div className="flex items-center gap-4 overflow-hidden"><div className="w-12 h-12 bg-primary text-white rounded-xl flex items-center justify-center shadow-md shrink-0"><i className="ph-fill ph-heartbeat text-2xl animate-pulse"></i></div>{!isSidebarCollapsed && <div><h2 className="font-black text-xl leading-none whitespace-nowrap">Escalas SV</h2><p className="text-[10px] uppercase tracking-widest opacity-60 font-bold">Portal Médico</p></div>}</div>
                            <button onClick={()=>setIsSidebarCollapsed(!isSidebarCollapsed)} className="w-8 h-8 bg-black/5 dark:bg-white/10 rounded-full flex items-center justify-center hover:bg-primary hover:text-white transition shrink-0"><i className={`ph-bold ${isSidebarCollapsed ? 'ph-caret-right' : 'ph-caret-left'}`}></i></button>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2 overflow-x-hidden">
                            <button onClick={()=>setActiveTab('HOJE')} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-black text-sm transition ${activeTab === 'HOJE' ? 'bg-primary text-white shadow-lg' : 'opacity-60 hover:opacity-100 hover:bg-black/5'}`} title="Mapa do Plantão"><i className="ph-fill ph-kanban text-xl shrink-0"></i> {!isSidebarCollapsed && <span className="truncate">Mapa do Plantão</span>}</button>
                            <button onClick={()=>setActiveTab('CALENDARIO')} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-black text-sm transition ${activeTab === 'CALENDARIO' ? 'bg-primary text-white shadow-lg' : 'opacity-60 hover:opacity-100 hover:bg-black/5'}`} title="Minha Escala"><i className="ph-fill ph-calendar-blank text-xl shrink-0"></i> {!isSidebarCollapsed && <span className="truncate">Minha Escala</span>}</button>
                            {isAdmin && <button onClick={()=>setActiveTab('EQUIPE')} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-black text-sm transition ${activeTab === 'EQUIPE' ? (isDark?'bg-white text-slate-900':'bg-slate-800 text-white shadow-lg') : 'opacity-60 hover:opacity-100 hover:bg-black/5'}`} title="Gestão de Equipe"><i className="ph-fill ph-users text-xl shrink-0"></i> {!isSidebarCollapsed && <span className="truncate">Gestão de Equipe</span>}</button>}
                            {isAdmin && <button onClick={()=>setActiveTab('CONFIG')} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-black text-sm transition ${activeTab === 'CONFIG' ? 'bg-accent text-white shadow-lg' : 'opacity-60 hover:opacity-100 hover:bg-black/5'}`} title="Ajustes da Clínica"><i className="ph-fill ph-gear text-xl shrink-0"></i> {!isSidebarCollapsed && <span className="truncate">Ajustes da Clínica</span>}</button>}
                        </nav>
                        <button onClick={()=>auth.signOut()} className="p-6 text-red-500 font-bold flex items-center gap-3 hover:bg-red-500/10 transition border-t border-inherit overflow-hidden"><i className="ph-bold ph-sign-out text-xl shrink-0"></i> {!isSidebarCollapsed && <span>Sair do App</span>}</button>
                    </aside>

                    <nav className={`md:hidden fixed bottom-0 inset-x-0 border-t z-50 flex justify-around p-3 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.1)] backdrop-blur-xl ${isDark?'bg-slate-900/80 border-white/5':'bg-white/80 border-black/5'}`}>
                        <button onClick={()=>setActiveTab('HOJE')} className={`flex flex-col items-center gap-1 p-2 rounded-xl transition w-16 ${activeTab === 'HOJE' ? 'text-primary' : 'opacity-40'}`}><i className={`${activeTab === 'HOJE' ? 'ph-fill' : 'ph'} ph-kanban text-2xl`}></i><span className="text-[9px] font-black uppercase tracking-wider">Hoje</span></button>
                        <button onClick={()=>setActiveTab('CALENDARIO')} className={`flex flex-col items-center gap-1 p-2 rounded-xl transition w-16 ${activeTab === 'CALENDARIO' ? 'text-primary' : 'opacity-40'}`}><i className={`${activeTab === 'CALENDARIO' ? 'ph-fill' : 'ph'} ph-calendar-blank text-2xl`}></i><span className="text-[9px] font-black uppercase tracking-wider">Escala</span></button>
                        {isAdmin && <button onClick={()=>setActiveTab('EQUIPE')} className={`flex flex-col items-center gap-1 p-2 rounded-xl transition w-16 ${activeTab === 'EQUIPE' ? (isDark?'text-white':'text-slate-800') : 'opacity-40'}`}><i className={`${activeTab === 'EQUIPE' ? 'ph-fill' : 'ph'} ph-users text-2xl`}></i><span className="text-[9px] font-black uppercase tracking-wider">Equipe</span></button>}
                        {isAdmin && <button onClick={()=>setActiveTab('CONFIG')} className={`flex flex-col items-center gap-1 p-2 rounded-xl transition w-16 ${activeTab === 'CONFIG' ? 'text-accent' : 'opacity-40'}`}><i className={`${activeTab === 'CONFIG' ? 'ph-fill' : 'ph'} ph-gear text-2xl`}></i><span className="text-[9px] font-black uppercase tracking-wider">Ajustes</span></button>}
                    </nav>

                    <main className={`flex-1 transition-all duration-300 p-4 md:p-10 relative z-10 w-full overflow-x-hidden ${isSidebarCollapsed ? 'md:ml-24' : 'md:ml-72'}`}>
                        <div className="md:hidden flex justify-between items-center mb-6 p-4 rounded-2xl shadow-sm border border-inherit clay-card">
                            <div className="flex items-center gap-3"><div className="w-10 h-10 bg-primary text-white rounded-lg flex items-center justify-center shadow-md"><i className="ph-fill ph-calendar-check text-xl"></i></div><div><h1 className="font-black leading-none">Escalas SV</h1><p className="text-[10px] uppercase font-bold opacity-50">Olá, {user.nome.split(' ')[0]}</p></div></div>
                        </div>

                        {(activeTab === 'HOJE' || activeTab === 'CALENDARIO') && <div className="max-w-[1600px] mx-auto"><TopHeader user={user} themeClass={themeClass} /></div>}

                        {activeTab === 'HOJE' && <PainelHojeView profissionais={dataCentral.PROFISSIONAIS} escalas={dataCentral.ESCALAS} config={dataCentral.CONFIGURACOES} user={user} onSave={api.saveRecord} onRefresh={fetchBanco} themeClass={themeClass} />}
                        {activeTab === 'EQUIPE' && isAdmin && <EquipeView data={dataCentral.PROFISSIONAIS} sysConfig={dataCentral.CONFIGURACOES} onSave={api.saveRecord} onDelete={api.deleteRecord} onRefresh={fetchBanco} themeClass={themeClass} />}
                        {activeTab === 'CONFIG' && isAdmin && <ConfiguracoesView sysConfig={dataCentral.CONFIGURACOES} onSaveConfig={api.saveRecord} onRefresh={fetchBanco} themeClass={themeClass} />}
                        {activeTab === 'CALENDARIO' && <CalendarioView profissionais={dataCentral.PROFISSIONAIS} escalas={dataCentral.ESCALAS} user={user} themeClass={themeClass} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
