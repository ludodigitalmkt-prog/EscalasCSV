<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, Component, useMemo } = React;

const firebaseConfig = { 
  apiKey: "AIzaSyAtywH5sc1OEs0xa-c7IDOpGA9764ZhU6c", 
  authDomain: "escalas-sao-vicente.firebaseapp.com", 
  projectId: "escalas-sao-vicente", 
  storageBucket: "escalas-sao-vicente.firebasestorage.app", 
  messagingSenderId: "256697542067", 
  appId: "1:256697542067:web:b8087390bb57d74def97c6" 
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(); const auth = firebase.auth();
db.enablePersistence({synchronizeTabs:true}).catch(e => console.log("Cache:", e));

const api = {
  fetch: async (c) => { try { const s = await db.collection(c).get(); return s.docs.map(d => ({ ID: d.id, ...d.data() })); } catch(e){ return []; } },
  saveRecord: async (c, d) => { try { let o={...d}; let id=o.ID; delete o.ID; if(id) await db.collection(c).doc(id).set(o,{merge:true}); else await db.collection(c).add(o); return true; } catch(e){ return false; } },
  deleteRecord: async (c, id) => { try { await db.collection(c).doc(id).delete(); return true; } catch(e){ return false; } }
};

// ================== FUNÇÕES MATEMÁTICAS GLOBAIS SEGURAS ==================
const safeStr = (v) => v == null ? '' : String(v);
const fmtImg = (u) => { let s = safeStr(u).trim(); if(!s) return ''; const m = s.match(/(?:file\/d\/|id=|v\/|u\/\d+\/p\/)([a-zA-Z0-9_-]{25,})/); return m ? `https://drive.google.com/uc?export=view&id=${m[1]}` : s; };
const getStrDt = (d) => d ? String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() : '';
const ordenarPorNome = (lista) => [...lista].sort((a, b) => safeStr(a.Nome).localeCompare(safeStr(b.Nome)));
const checkIsMe = (nome, email) => { if(!nome || !email) return false; const p = safeStr(email).toLowerCase().split('@')[0].split(/[.\-_]/); const n = safeStr(nome).toLowerCase(); return p.some(x => x.length > 2 && n.includes(x)); };

// Aniversários
const checkNiver = (niverStr) => {
  if (!niverStr) return { isHoje: false, isSemana: false };
  const hj = new Date(); const hjD = hj.getDate(); const hjM = hj.getMonth() + 1;
  const pts = niverStr.split('/'); if(pts.length < 2) return { isHoje: false, isSemana: false };
  const nD = parseInt(pts[0]); const nM = parseInt(pts[1]);
  const isHoje = (nD === hjD && nM === hjM);
  const dtN = new Date(hj.getFullYear(), nM - 1, nD);
  const diffDays = Math.ceil((dtN - hj) / (1000 * 60 * 60 * 24));
  const isSemana = (!isHoje && diffDays > 0 && diffDays <= 7);
  return { isHoje, isSemana, strData: `${String(nD).padStart(2,'0')}/${String(nM).padStart(2,'0')}` };
};

const isEscalaValida = (esc, postosCfg) => {
  const sala = safeStr(esc.Sala).trim().toUpperCase();
  if (['A DEFINIR', 'FOLGA', 'FÉRIAS', 'ATESTADO', 'TRABALHO EXTERNO', 'OUTROS'].includes(sala)) return true;
  return (postosCfg || []).some(p => safeStr(p.nome).trim().toUpperCase() === sala);
};

const getCorDaSala = (salaNome, cfg) => {
  const p = (cfg?.postos || []).find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(salaNome).trim().toUpperCase());
  if(!p) return '#94a3b8'; 
  const s = (cfg?.setores || []).find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(p.setor).trim().toUpperCase());
  return s?.cor || '#0ea5e9';
};

// MOTOR DE TEMPO BLINDADO (Nunca mais dará 'not defined')
const safeGetHours = (hStr) => {
  if (!hStr || typeof hStr !== 'string' || hStr.toUpperCase().includes('DEFINIR')) return { in: null, out: null };
  let pts = hStr.toLowerCase().replace('as', 'às').split('às');
  if (pts.length < 2) pts = hStr.split('-');
  if (pts.length < 2) return { in: null, out: null };
  
  let hIn = parseInt(pts[0].trim().split(':')[0] || 0) + (parseInt(pts[0].trim().split(':')[1] || 0) / 60);
  let hOut = parseInt(pts[1].trim().split(':')[0] || 0) + (parseInt(pts[1].trim().split(':')[1] || 0) / 60);
  
  if (isNaN(hIn) || isNaN(hOut)) return { in: null, out: null };
  if (hOut <= hIn) hOut += 24; 
  return { in: hIn, out: hOut };
};

const parseHorario = (hStr) => safeGetHours(hStr).in;

const parseHorarioParaGantt = (hStr, hInicio) => {
  const t = safeGetHours(hStr);
  if (t.in === null) return null;
  let val = t.in;
  if (val < hInicio) val += 24;
  return val;
};

const checkConflito = (blocoA, blocoB) => {
  if(blocoA.Status === 'FOLGA' || blocoB.Status === 'FOLGA') return false;
  if(blocoA.Horario === 'A DEFINIR' || blocoB.Horario === 'A DEFINIR') return false;
  const a = safeGetHours(blocoA.Horario);
  const b = safeGetHours(blocoB.Horario);
  if (a.in === null || b.in === null) return false;
  return (a.in < b.out && a.out > b.in); 
};

// DEGRADÊ DINÂMICO
const gerarGradienteDoDia = (blocosDoDia, cfg) => {
  if(!blocosDoDia || blocosDoDia.length === 0) return 'transparent';
  if(blocosDoDia.length === 1) return getCorDaSala(blocosDoDia[0].Sala, cfg);
  const blocosOrd = [...blocosDoDia].sort((a, b) => {
    const vA = safeGetHours(a.Horario).in || 0;
    const vB = safeGetHours(b.Horario).in || 0;
    return vA - vB;
  });
  const cores = blocosOrd.map(b => getCorDaSala(b.Sala, cfg));
  return `linear-gradient(to right, ${cores.join(', ')})`;
};

// ================== COMPONENTES MENORES ==================
const BadgeConvenio = ({ cod, logo }) => {
  if(!cod) return null;
  if(logo) return <img src={fmtImg(logo)} className="h-4 w-auto inline-block ml-1 rounded-sm bg-white" title={`Unimed: ${cod}`} />;
  return <span className="ml-1 bg-green-500 text-white text-[8px] px-1 rounded font-black">CONV.</span>;
};

class ErrorBoundary extends Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError() { return { hasError: true }; }
  render() { 
    if (this.state.hasError) return <div className="p-10 text-center text-red-500 font-bold">Ocorreu um erro visual. <button onClick={()=>location.reload()} className="underline ml-2 font-black">Recarregar App</button></div>; 
    return this.props.children; 
  }
}

const TopHeader = ({ user, isDark, toggleDark }) => {
  const [t, setT] = useState(new Date());
  useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);
  return (
    <div className="clean-card p-6 mb-6 flex justify-between items-center">
      <div className="flex items-center gap-4">
        <div className="w-12 h-12 rounded-xl flex items-center justify-center text-3xl bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400"><i className="ph-fill ph-hospital"></i></div>
        <div><h2 className="text-2xl font-black">{t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</h2><p className="text-[10px] font-bold uppercase opacity-60 mt-1">Olá, {user?.nome?.split(' ')[0]}</p></div>
      </div>
      <div className="flex items-center gap-4">
        <button onClick={toggleDark} className="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex justify-center items-center text-xl hover:scale-110 transition"><i className={isDark ? "ph-fill ph-sun text-yellow-400" : "ph-fill ph-moon"}></i></button>
        <button onClick={() => auth.signOut()} className="md:hidden w-10 h-10 rounded-full bg-red-50 dark:bg-red-900/30 flex justify-center items-center text-xl text-red-500 hover:scale-110 transition"><i className="ph-bold ph-sign-out"></i></button>
      </div>
    </div>
  );
};

// ================== SUPER MODAL (GERENCIAR ESCALA) ==================
const SuperActionModal = ({ escala, profs, cfg, onClose, onSave, onRefresh, isAd }) => {
  const [fd, setFd] = useState({...escala});
  const isMedico = fd.Cargo?.toLowerCase().includes('médico') || profs.find(p=>p.Nome===fd.Nome_Profissional)?.Tipo === 'Médico';
  const profsOrdenados = ordenarPorNome(profs);
  const colabsL = profsOrdenados.filter(p => p.Tipo === 'Colaborador' && p.StatusGeral === 'Ativo');
  const medsA = profsOrdenados.filter(p => p.Tipo === 'Médico' && p.StatusGeral === 'Ativo');

  const handleSave = async (e) => {
    e.preventDefault();
    if (fd.Nome_Profissional === "VAZIO") {
      if (confirm("Deseja excluir este plantão?")) { await api.deleteRecord('ESCALAS', fd.ID); onRefresh(); onClose(); }
      return;
    }
    const pInfo = profs.find(p => p.Nome === fd.Nome_Profissional);
    if(pInfo) { fd.Cor = pInfo.Cor; fd.Cargo = pInfo.Cargo; }
    await onSave('ESCALAS', fd); onRefresh(); onClose();
  };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
      <div className="clean-card w-full max-w-md p-6 max-h-[90vh] overflow-y-auto shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="flex justify-between items-center mb-4 border-b dark:border-slate-700 pb-2">
          <h3 className="text-xl font-black text-primary flex items-center gap-2"><i className="ph-fill ph-sliders"></i> Gerenciar Escala</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-red-500"><i className="ph-bold ph-x text-xl"></i></button>
        </div>
        <form onSubmit={handleSave} className="space-y-4">
          <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700"><p className="text-[10px] font-black uppercase opacity-60">Data Ref.</p><p className="font-bold">{fd.Data}</p></div>
          
          {isAd && (
            <div>
              <label className="text-[10px] font-black uppercase opacity-60 text-blue-600 dark:text-blue-400">Transferir / Substituir Profissional</label>
              <select value={fd.Nome_Profissional} onChange={e=>setFd({...fd, Nome_Profissional: e.target.value})} className="w-full p-3 border rounded-xl bg-blue-50 dark:bg-slate-900 text-blue-700 dark:text-blue-400 font-bold dark:border-slate-700 outline-none mt-1">
                <option value={fd.Nome_Profissional}>Manter: {fd.Nome_Profissional}</option>
                <option value="VAZIO">🗑️ DEIXAR POSTO VAZIO (Excluir)</option>
                <option disabled>──────────</option>
                {profsOrdenados.filter(p => p.Nome !== fd.Nome_Profissional).map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
              </select>
            </div>
          )}

          <div className="grid grid-cols-2 gap-3">
            <div className="col-span-2">
              <label className="text-[10px] font-black uppercase opacity-60">Unidade de Atendimento</label>
              <select value={fd.Unidade||''} onChange={e=>setFd({...fd, Unidade:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none mt-1">
                <option value="">Selecione a Unidade...</option>
                {(cfg?.unidades||[]).map((u,i) => <option key={i} value={u.nome}>{u.nome}</option>)}
              </select>
            </div>
            
            <div className="col-span-2">
              <label className="text-[10px] font-black uppercase opacity-60">Sala / Setor / Posto</label>
              <select value={fd.Sala} onChange={e=>setFd({...fd, Sala:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none mt-1">
                <option value="A DEFINIR">A DEFINIR...</option>
                <option value="FOLGA">FOLGA / FÉRIAS</option>
                <option disabled>──────────</option>
                {(cfg?.postos||[]).map((x,i)=><option key={i} value={x.nome||x}>{x.nome||x}</option>)}
              </select>
            </div>

            <div className="col-span-2">
              <label className="text-[10px] font-black uppercase opacity-60">Status do Plantão</label>
              <select value={fd.Status} onChange={e=>setFd({...fd, Status:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none mt-1">
                <option value="NO POSTO">🟢 Turno Normal (Ativo)</option><option value="LANCHE">☕ Lanche / Pausa</option><option value="FOLGA">⚪ Folga Agendada</option><option value="AUSENTE">🔴 Ausente / Falta</option>
              </select>
            </div>

            <div className="col-span-2">
              <label className="text-[10px] font-black uppercase opacity-60">Horário (Ex: 08:00 às 18:00)</label>
              <input type="text" value={fd.Horario} onChange={e=>setFd({...fd, Horario:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none mt-1"/>
            </div>
          </div>

          {isMedico ? (
            <div className="bg-purple-50 dark:bg-purple-900/10 p-3 rounded-xl border border-purple-200 dark:border-purple-900/30">
              <label className="text-[10px] font-black text-purple-600 dark:text-purple-400 flex items-center gap-1 mb-1"><i className="ph-fill ph-user-plus"></i> Auxiliar de Sala (Staff)</label>
              <select value={fd.Auxiliar||''} onChange={e=>setFd({...fd, Auxiliar:e.target.value})} className="w-full p-2 border rounded dark:bg-slate-800 dark:border-slate-700 text-sm font-bold outline-none">
                <option value="">Sem auxiliar</option>
                {colabsL.map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
              </select>
            </div>
          ) : (
            <div className="bg-indigo-50 dark:bg-indigo-900/10 p-3 rounded-xl border border-indigo-200 dark:border-indigo-900/30">
              <label className="text-[10px] font-black text-indigo-600 dark:text-indigo-400 flex items-center gap-1 mb-1"><i className="ph-fill ph-stethoscope"></i> Prestando Apoio a Médico</label>
              <select value={fd.MedicoApoio||''} onChange={e=>setFd({...fd, MedicoApoio:e.target.value})} className="w-full p-2 border rounded dark:bg-slate-800 dark:border-slate-700 text-sm font-bold outline-none">
                <option value="">Atendimento Geral</option>
                {medsA.map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
              </select>
            </div>
          )}

          <div>
            <label className="text-[10px] font-black uppercase opacity-60">Anotações / Obs do Dia</label>
            <input type="text" value={fd.ObsDia||''} onChange={e=>setFd({...fd, ObsDia:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 outline-none mt-1" placeholder="Ex: Atestado, trocar de sala as 14h..."/>
          </div>
          
          <div className="flex justify-end gap-2 pt-4 border-t dark:border-slate-700">

// ================== ABA 1: AJUSTES (CONFIGURAÇÕES GERAIS) ==================
const AjustesView = ({ cfg, onSave, onRefresh }) => {
  const [u, setU] = useState([]); const [s, setS] = useState([]); const [p, setP] = useState([]); 
  const [h, setH] = useState([]); const [a, setA] = useState([]); 
  const [logoConv, setLogoConv] = useState(''); const [loading, setL] = useState(false); const [mod, setMod] = useState(null); 

  useEffect(() => { 
    const fmt = arr => (arr||[]).map(x => typeof x==='string' ? {nome: x.toUpperCase()} : x);
    setU(fmt(cfg?.unidades)); setS(fmt(cfg?.setores)); setP(fmt(cfg?.postos)); 
    setH(cfg?.habilidades||[]); setA(cfg?.ausencias||[]); setLogoConv(cfg?.logoConvenio||''); 
  }, [cfg]);

  const salvar = async () => { 
    setL(true); 
    await onSave('CONFIGURACOES',{ID:'parametros',unidades:u,setores:s,postos:p,habilidades:h,ausencias:a,logoConvenio:logoConv}); 
    onRefresh(); setL(false); alert("Salvo com sucesso no Banco de Dados!"); 
  };

  const confirmMod = (e) => { 
    e.preventDefault(); const { t, act, idx, v1, v2, v3 } = mod; 
    let n1 = v1.trim().toUpperCase(); let n2 = v2.trim().toUpperCase(); 
    if(t==='p'||t==='h'||t==='a') n1 = v1.trim(); 
    
    if(act === 'add') { 
      if(t==='u') setU([...u, {nome:n1}]); if(t==='s') setS([...s, {nome:n1, unidade:n2, cor:v3}]); if(t==='p') setP([...p, {nome:n1, setor:n2}]); 
      if(t==='h') setH([...h, n1]); if(t==='a') setA([...a, n1]); 
    } else { 
      if(t==='u'){ let arr=[...u]; arr[idx].nome=n1; setU(arr); } 
      if(t==='s'){ let arr=[...s]; arr[idx].nome=n1; arr[idx].unidade=n2; arr[idx].cor=v3; setS(arr); } 
      if(t==='p'){ let arr=[...p]; arr[idx].nome=n1; arr[idx].setor=n2; setP(arr); } 
      if(t==='h'){ let arr=[...h]; arr[idx]=n1; setH(arr); } 
      if(t==='a'){ let arr=[...a]; arr[idx]=n1; setA(arr); } 
    } 
    setMod(null); 
  };

  const del = (t, i) => { 
    if(!confirm("Excluir item permanentemente?")) return; 
    if(t==='u') setU(u.filter((_,x)=>x!==i)); if(t==='s') setS(s.filter((_,x)=>x!==i)); if(t==='p') setP(p.filter((_,x)=>x!==i)); 
    if(t==='h') setH(h.filter((_,x)=>x!==i)); if(t==='a') setA(a.filter((_,x)=>x!==i)); 
  };

  const Lst = ({title, arr, tipo}) => (
    <div className="clean-card p-5">
      <div className="flex justify-between items-center mb-2">
        <h3 className="font-black text-sm">{title}</h3>
        <button onClick={()=>setMod({t:tipo, act:'add', v1:'', v2:'', v3:'#0ea5e9'})} className="bg-primary text-white w-6 h-6 rounded font-black hover:scale-110 transition">+</button>
      </div>
      <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
        {arr.map((item, i) => (
          <div key={i} className="flex justify-between items-center bg-slate-50 dark:bg-slate-800 p-2 rounded text-xs border dark:border-slate-700">
            <div className="flex items-center gap-2 overflow-hidden">
              {item.cor && <div className="w-3 h-3 rounded-full shadow-sm shrink-0" style={{background:item.cor}}></div>}
              <div className="truncate">
                <p className="font-bold truncate">{item.nome||item}</p>
                {item.unidade && <p className="text-[8px] opacity-60 truncate">Em: {item.unidade}</p>}
                {item.setor && <p className="text-[8px] opacity-60 truncate">Setor: {item.setor}</p>}
              </div>
            </div>
            <div className="flex gap-1 shrink-0 ml-2">
              <button onClick={()=>setMod({t:tipo, act:'edit', idx:i, v1:item.nome||item, v2:item.unidade||item.setor||'', v3:item.cor||'#0ea5e9'})} className="text-yellow-600 bg-yellow-100 p-1.5 rounded hover:bg-yellow-200 transition"><i className="ph-bold ph-pencil"></i></button>
              <button onClick={()=>del(tipo, i)} className="text-red-600 bg-red-100 p-1.5 rounded hover:bg-red-200 transition"><i className="ph-bold ph-trash"></i></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="animate-fade-in space-y-6 max-w-6xl mx-auto pb-10">
      <div className="flex justify-between items-center">
        <h2 className="text-2xl font-black">Ajustes & Configurações</h2>
        <button onClick={salvar} disabled={loading} className="bg-primary text-white px-6 py-2 rounded-xl font-bold shadow hover:bg-blue-600 transition">Salvar Servidor</button>
      </div>
      <div className="clean-card p-4 flex flex-col md:flex-row justify-between md:items-center bg-blue-50/50 dark:bg-slate-800/50 gap-4">
        <div><h4 className="font-bold text-sm">Logo Convênio (Ex: UNIMED)</h4><p className="text-[10px] opacity-60">Cole a URL pública da imagem</p></div>
        <input type="text" value={logoConv} onChange={e=>setLogoConv(e.target.value)} placeholder="Link Drive / Imgur" className="p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 w-full md:w-96 text-sm outline-none" />
      </div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <Lst title="1. Unidades/Prédios" arr={u} tipo="u"/>
        <Lst title="2. Setores (Cores da Matriz)" arr={s} tipo="s"/>
        <Lst title="3. Salas/Postos" arr={p} tipo="p"/>
        <Lst title="Afastamentos e Licenças" arr={a} tipo="a"/>
        <Lst title="Competências" arr={h} tipo="h"/>
      </div>
      {mod && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 animate-fade-in" onClick={()=>setMod(null)}>
          <div className="clean-card w-full max-w-md p-6" onClick={e=>e.stopPropagation()}>
            <h3 className="text-xl font-black mb-4">Adicionar/Editar</h3>
            <form onSubmit={confirmMod} className="space-y-4">
              <input type="text" value={mod.v1} onChange={e=>setMod({...mod, v1:e.target.value})} className="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" placeholder="Nome" required autoFocus/>
              
              {mod.t === 's' && (
                <>
                  <select value={mod.v2} onChange={e=>setMod({...mod, v2:e.target.value})} className="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" required>
                    <option value="">Vincular a qual Unidade?</option>
                    {u.map((x,i) => <option key={i} value={x.nome}>{x.nome}</option>)}
                  </select>
                  <div>
                    <label className="text-[10px] font-black uppercase opacity-60">Cor na Matriz Gantt</label>
                    <input type="color" value={mod.v3} onChange={e=>setMod({...mod, v3:e.target.value})} className="w-full h-12 p-1 border rounded-xl dark:border-slate-700 cursor-pointer"/>
                  </div>
                </>
              )}
              
              {mod.t === 'p' && (
                <select value={mod.v2} onChange={e=>setMod({...mod, v2:e.target.value})} className="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" required>
                  <option value="">Vincular a qual Setor?</option>
                  {s.map((x,i) => <option key={i} value={x.nome}>{x.nome}</option>)}
                </select>
              )}
              
              <div className="flex justify-end gap-2 pt-4 border-t dark:border-slate-700">
                <button type="button" onClick={()=>setMod(null)} className="px-4 opacity-60 font-bold">Cancelar</button>
                <button type="submit" className="bg-primary text-white p-3 px-6 rounded-xl font-bold">Confirmar</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
};

                    <div><label className="text-[9px] font-black uppercase opacity-60">Especialidade</label><input type="text" value={fd.Cargo||''} onChange={e=>setFd({...fd, Cargo:e.target.value})} className="w-full p-2 border rounded dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" required/></div>
                    <div><label className="text-[9px] font-black uppercase opacity-60">URA</label><input type="text" value={fd.URA||''} onChange={e=>setFd({...fd, URA:e.target.value})} className="w-full p-2 border rounded dark:border-slate-700 dark:bg-slate-900 outline-none"/></div>
                    <div><label className="text-[9px] font-black uppercase opacity-60">CBO</label><input type="text" value={fd.CBO||''} onChange={e=>setFd({...fd, CBO:e.target.value})} className="w-full p-2 border rounded dark:border-slate-700 dark:bg-slate-900 outline-none"/></div>
                    <div><label className="text-[9px] font-black uppercase opacity-60">Outro Doc</label><input type="text" value={fd.OutroDoc||''} onChange={e=>setFd({...fd, OutroDoc:e.target.value})} className="w-full p-2 border rounded dark:border-slate-700 dark:bg-slate-900 outline-none"/></div>
                    <div className="col-span-2 md:col-span-3"><label className="text-[9px] font-black uppercase opacity-60">Observação Clínica</label><textarea value={fd.Segmento||''} onChange={e=>setFd({...fd, Segmento:e.target.value})} className="w-full p-2 border rounded dark:border-slate-700 dark:bg-slate-900 outline-none" rows="2"></textarea></div>
                  </div>
                ) : (
                  <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Cargo</label><input type="text" value={fd.Cargo||''} onChange={e=>setFd({...fd, Cargo:e.target.value})} className="w-full p-2 border rounded-lg dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" required/></div>
                )}
                
                <div className="col-span-2 md:col-span-1"><label className="text-[10px] font-black uppercase opacity-60">Tipo Contrato (PJ, CLT...)</label><input type="text" value={fd.TipoContrato||''} onChange={e=>setFd({...fd, TipoContrato:e.target.value})} className="w-full p-2 border rounded-lg dark:border-slate-700 dark:bg-slate-900 outline-none"/></div>
                <div><label className="text-[10px] font-black uppercase opacity-60">Status Geral</label><select value={fd.StatusGeral||'Ativo'} onChange={e=>setFd({...fd, StatusGeral:e.target.value})} className="w-full p-2 border rounded-lg font-bold text-red-500 dark:border-slate-700 dark:bg-slate-900 outline-none"><option value="Ativo" className="text-green-500">🟢 ATIVO</option>{(cfg?.ausencias||[]).map((x,i)=><option key={i} value={x}>🔴 {x}</option>)}</select></div>
                
                <div><label className="text-[10px] font-black uppercase opacity-60">Cor Pessoal (Matriz/Calendário)</label><input type="color" value={fd.Cor} onChange={e=>setFd({...fd, Cor:e.target.value})} className="w-full h-10 border rounded p-1 cursor-pointer dark:border-slate-700"/></div>
                <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Observações Gerais</label><textarea value={fd.ObservacoesGerais||''} onChange={e=>setFd({...fd, ObservacoesGerais:e.target.value})} className="w-full p-2 border rounded-lg dark:border-slate-700 dark:bg-slate-900 outline-none" placeholder="Anotações para a gestão..." rows="2"></textarea></div>
                
                <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60 mb-1 block">Competências</label><div className="flex flex-wrap gap-1">{(cfg?.habilidades||[]).map((x,i)=><button type="button" key={i} onClick={()=>toggleHab(x)} className={`px-3 py-1.5 text-[10px] font-bold rounded-lg border transition ${fd.Habilidades?.includes(x)?'bg-primary text-white border-primary shadow':'bg-slate-50 dark:bg-slate-800 dark:border-slate-700'}`}>{x}</button>)}</div></div>
              </div>
              <div className="flex justify-end gap-2 pt-4 border-t dark:border-slate-700 mt-4">
                <button type="button" onClick={()=>setModal(false)} className="px-4 py-2 opacity-60 font-bold">Cancelar</button>
                <button type="submit" className="bg-primary text-white px-6 py-2 rounded-xl font-bold shadow hover:bg-blue-600 transition">Salvar Ficha</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
};
  // ================== ABA 3: CALENDÁRIO / CRIAR ESCALAS ==================
const CalendarioView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
  const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
  const [mode, setMode] = useState('TIMELINE'); 
  const [builderTipo, setBuilderTipo] = useState('Colaborador'); 
  const [tipoLancamento, setTipoLancamento] = useState('PLANTAO'); 
  const [motivoAus, setMotivoAus] = useState('Folga');
  const [selProf, setSelProf] = useState(''); 
  const [selUnd, setSelUnd] = useState(''); 
  const [selSala, setSelSala] = useState('');
  const [hIn, setHIn] = useState(''); 
  const [hOut, setHOut] = useState(''); 
  const [obs, setObs] = useState('');
  const [dates, setDates] = useState([]); 
  const [bMes, setBMes] = useState(new Date());
  
  const [calProf, setCalProf] = useState(isAd ? '' : user.nome); 
  const [mesAtual, setMesAtual] = useState(new Date()); 
  const [diaAtivo, setDiaAtivo] = useState(null); 
  const [buscaNome, setBuscaNome] = useState(''); 
  const [showAuto, setShowAuto] = useState(false); 
  const [editData, setEditData] = useState(null);

  useEffect(() => { 
    if(calProf) setBuscaNome(calProf); 
  }, [calProf]);
  
  const toggleD = (dFmt) => { 
    if(dates.includes(dFmt)) setDates(dates.filter(x => x !== dFmt)); 
    else setDates([...dates, dFmt]); 
  };
  
  const gerar = async () => {
    if(!selProf || dates.length === 0) return alert("Preencha o Profissional e selecione as Datas no calendário!");
    const prof = profs.find(x => x.ID === selProf || x.Nome === selProf);
    
    let st = 'NO POSTO'; 
    let s = selSala || 'A DEFINIR'; 
    let h = (hIn && hOut) ? `${hIn} às ${hOut}` : 'A DEFINIR'; 
    let o = obs;
    
    if(tipoLancamento === 'AUSENCIA') { 
      st = motivoAus === 'Folga' ? 'FOLGA' : 'AUSENTE'; 
      s = motivoAus.toUpperCase(); 
      h = '--:--'; 
      o = obs ? `${motivoAus} - ${obs}` : motivoAus; 
    }
    
    for(let d of dates) { 
      await onSave('ESCALAS', { 
        Data: d, 
        Unidade: tipoLancamento === 'AUSENCIA' ? '' : selUnd, 
        Sala: s, 
        Nome_Profissional: prof.Nome, 
        Cargo: prof.Cargo, 
        Horario: h, 
        Status: st, 
        Cor: prof.Cor, 
        ObsDia: o 
      }); 
    }
    alert("Escalas geradas com sucesso!"); 
    setDates([]); 
    setMode('TIMELINE'); 
    onRefresh();
  };

  const bGrid = (dRef) => {
    const a = dRef.getFullYear(); 
    const m = dRef.getMonth();
    return {
      v: Array.from({length: new Date(a, m, 1).getDay()}),
      d: Array.from({length: new Date(a, m+1, 0).getDate()}, (_, i) => ({ 
        d: new Date(a, m, i+1), 
        s: getStrDt(new Date(a, m, i+1)) 
      }))
    };
  };

  const pOrd = ordenarPorNome(profs);
  const pBuilder = pOrd.filter(x => (x.StatusGeral === 'Ativo' || !x.StatusGeral) && x.Tipo === builderTipo);
  const pSel = profs.find(p => p.Nome === calProf);

  return (
    <div className="animate-fade-in max-w-5xl mx-auto space-y-6 pb-10">
      {isAd && (
        <div className="flex gap-2 border-b dark:border-slate-700 pb-4">
          <button onClick={()=>setMode('TIMELINE')} className={`px-4 py-2 rounded-xl font-bold text-sm transition ${mode==='TIMELINE'?'bg-primary text-white shadow':'bg-slate-100 dark:bg-slate-800'}`}>
            <i className="ph-bold ph-calendar"></i> Calendário
          </button>
          <button onClick={()=>setMode('BUILDER')} className={`px-4 py-2 rounded-xl font-bold text-sm transition ${mode==='BUILDER'?'bg-accent text-white shadow':'bg-slate-100 dark:bg-slate-800'}`}>
            <i className="ph-bold ph-magic-wand"></i> Criador Multi-Datas
          </button>
        </div>
      )}
      
      {mode === 'BUILDER' ? (
        <div className="clean-card p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
          <div className="space-y-4">
            <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
              <button onClick={()=>{setBuilderTipo('Colaborador'); setSelProf('');}} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${builderTipo==='Colaborador'?'bg-white dark:bg-slate-700 shadow text-blue-600 dark:text-blue-400':'opacity-60'}`}>Equipe Base</button>
              <button onClick={()=>{setBuilderTipo('Médico'); setSelProf('');}} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${builderTipo==='Médico'?'bg-white dark:bg-slate-700 shadow text-red-600 dark:text-red-400':'opacity-60'}`}>Médicos</button>
            </div>
            <div>
              <label className="text-[10px] font-black uppercase opacity-60">Selecione o Profissional</label>
              <select value={selProf} onChange={e=>setSelProf(e.target.value)} className="w-full p-3 border rounded-xl font-bold dark:border-slate-700 dark:bg-slate-900 outline-none mt-1">
                <option value="">Abre a lista (A-Z)...</option>
                {pBuilder.map(x => <option key={x.ID} value={x.ID}>{x.Nome}</option>)}
              </select>
            </div>
            <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl my-4">
              <button onClick={()=>setTipoLancamento('PLANTAO')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${tipoLancamento==='PLANTAO'?'bg-white dark:bg-slate-700 shadow text-primary':'opacity-60'}`}>Plantão Normal</button>
              <button onClick={()=>setTipoLancamento('AUSENCIA')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${tipoLancamento==='AUSENCIA'?'bg-white dark:bg-slate-700 shadow text-red-500':'opacity-60'}`}>Folga / Ausência</button>
            </div>
            
            {tipoLancamento === 'PLANTAO' ? (
              <div className="space-y-4 animate-fade-in">
                <select value={selUnd} onChange={e=>setSelUnd(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 outline-none">
                  <option value="">Unidade (A DEFINIR DEPOIS)...</option>
                  {(cfg?.unidades||[]).map((x,i) => <option key={i} value={x.nome}>{x.nome}</option>)}
                </select>
                <select value={selSala} onChange={e=>setSelSala(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 outline-none">
                  <option value="">Sala/Posto (A DEFINIR DEPOIS)...</option>
                  {(cfg?.postos||[]).map((x,i) => <option key={i} value={x.nome||x}>{x.nome||x}</option>)}
                </select>
                <div className="flex gap-2">
                  <div className="flex-1">
                    <label className="text-[10px] font-black uppercase opacity-60 ml-1">Entra (Opcional)</label>
                    <input type="time" value={hIn} onChange={e=>setHIn(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" />
                  </div>
                  <div className="flex-1">
                    <label className="text-[10px] font-black uppercase opacity-60 ml-1">Sai (Opcional)</label>
                    <input type="time" value={hOut} onChange={e=>setHOut(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" />
                  </div>
                </div>
              </div>
            ) : (
              <div className="animate-fade-in space-y-4">
                <label className="text-[10px] font-black uppercase opacity-60">Motivo</label>
                <select value={motivoAus} onChange={e=>setMotivoAus(e.target.value)} className="w-full p-3 border border-red-200 rounded-xl bg-red-50 text-red-600 font-bold dark:border-red-900/30 dark:bg-red-900/10 dark:text-red-400 outline-none">
                  <option value="Folga">Folga Agendada</option>
                  <option value="Férias">Férias</option>
                  <option value="Atestado">Atestado Médico</option>
                  <option value="Trabalho Externo">Trabalho Externo</option>
                  <option value="Outros">Outros</option>
                </select>
              </div>
            )}
            <div>
              <label className="text-[10px] font-black uppercase opacity-60">Anotação Adicional</label>
              <input type="text" value={obs} onChange={e=>setObs(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 outline-none" placeholder="Ex: Cobre plantão da Maria..." />
            </div>
          </div>
          
          <div className="border-l border-slate-200 dark:border-slate-700 md:pl-8 space-y-4 flex flex-col">
            <label className="text-[10px] font-black uppercase opacity-60 text-center">Selecione os dias no calendário</label>
            <div className="flex justify-between items-center">
              <button onClick={()=>setBMes(new Date(bMes.getFullYear(), bMes.getMonth()-1, 1))} className="p-2 bg-slate-100 dark:bg-slate-800 rounded hover:bg-slate-200 transition"><i className="ph-bold ph-caret-left"></i></button>
              <span className="font-black text-sm uppercase tracking-widest">{bMes.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</span>
              <button onClick={()=>setBMes(new Date(bMes.getFullYear(), bMes.getMonth()+1, 1))} className="p-2 bg-slate-100 dark:bg-slate-800 rounded hover:bg-slate-200 transition"><i className="ph-bold ph-caret-right"></i></button>
            </div>
            <div className="grid grid-cols-7 gap-1 text-center text-[10px] font-black opacity-50 uppercase">
              <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
            </div>
            <div className="grid grid-cols-7 gap-1">
              {bGrid(bMes).v.map((_, i) => <div key={'v'+i}></div>)}
              {bGrid(bMes).d.map((d, i) => {
                const isSel = dates.includes(d.s);
                return (
                  <button key={i} onClick={(e)=>{e.preventDefault(); toggleD(d.s);}} className={`p-2.5 rounded-lg text-xs font-bold transition hover:scale-105 ${isSel ? (tipoLancamento==='AUSENCIA'?'bg-red-500 text-white shadow-md':'bg-primary text-white shadow-md') : 'bg-slate-50 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700'}`}>
                    {d.d.getDate()}
                  </button>
                )
              })}
            </div>
            <div className="text-[9px] font-bold opacity-50">{dates.length} dias selecionados</div>
            <button onClick={gerar} className={`w-full py-4 rounded-xl font-black mt-auto text-white shadow-lg transition hover:scale-[1.02] ${tipoLancamento==='AUSENCIA'?'bg-red-500':'bg-accent'}`}>
              Salvar Escalas no Servidor
            </button>
          </div>
        </div>
      ) : (
        <div className="space-y-6 animate-fade-in">
          <div className="clean-card p-5 flex flex-col lg:flex-row justify-between gap-4 items-center relative">
            <div className="flex items-center gap-4">
              <button onClick={()=>{setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()-1, 1)); setDiaAtivo(null);}} className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center hover:bg-slate-200 transition"><i className="ph-bold ph-caret-left"></i></button>
              <h2 className="text-lg font-black uppercase tracking-widest w-40 text-center">{mesAtual.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</h2>
              <button onClick={()=>{setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()+1, 1)); setDiaAtivo(null);}} className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center hover:bg-slate-200 transition"><i className="ph-bold ph-caret-right"></i></button>
            </div>
            <div className="relative w-full lg:w-96">
              <i className="ph-bold ph-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
              <input type="text" placeholder="Buscar profissional (Radar)..." value={buscaNome} onChange={e=>{setBuscaNome(e.target.value); setShowAuto(true); setCalProf(''); setDiaAtivo(null);}} onFocus={()=>setShowAuto(true)} className="w-full p-3 pl-10 rounded-xl border dark:border-slate-700 font-bold dark:bg-slate-900 outline-none shadow-sm focus:border-primary transition" />
              
              {showAuto && buscaNome && (
                <div className="absolute top-full mt-2 w-full bg-white dark:bg-slate-800 border dark:border-slate-700 shadow-2xl rounded-xl z-50 max-h-64 overflow-y-auto overflow-x-hidden">
                  {pOrd.filter(p => safeStr(p.Nome).toLowerCase().includes(buscaNome.toLowerCase())).map(p => (
                    <div key={p.ID} onClick={()=>{setBuscaNome(p.Nome); setCalProf(p.Nome); setShowAuto(false);}} className="p-3 border-b dark:border-slate-700 cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-700 transition flex items-center gap-3">
                      {p.FotoURL ? <img src={fmtImg(p.FotoURL)} className="w-8 h-8 rounded-full object-cover"/> : <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-[10px] font-black" style={{backgroundColor:p.Cor||'#0ea5e9'}}>{p.Nome[0]}</div>}
                      <div>
                        <p className="font-bold text-sm">{p.Nome}</p>
                        <p className="text-[10px] opacity-60 uppercase">{p.Cargo}</p>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
          
          {!calProf ? (
            <div className="p-16 text-center opacity-50 font-bold border-dashed border-2 rounded-2xl dark:border-slate-700">
              <i className="ph-fill ph-calendar-plus text-6xl mb-4 text-slate-300 dark:text-slate-600"></i>
              <p className="text-lg">Selecione um profissional no radar acima para carregar a agenda.</p>
            </div>
          ) : (
            <div className="space-y-6 animate-fade-in">
              {pSel && (
                <div className="clean-card p-6 flex items-center gap-6 bg-gradient-to-r from-blue-50 to-white dark:from-slate-800 dark:to-slate-900 border-l-4 border-primary shadow-sm">
                  {pSel.FotoURL ? (
                    <img src={fmtImg(pSel.FotoURL)} className="w-20 h-20 md:w-24 md:h-24 rounded-full object-cover shadow-lg border-4 border-white dark:border-slate-700 shrink-0"/>
                  ) : (
                    <div className="w-20 h-20 md:w-24 md:h-24 rounded-full bg-primary text-white flex items-center justify-center text-4xl font-black shadow-lg border-4 border-white dark:border-slate-700 shrink-0" style={{backgroundColor:pSel.Cor||'#0ea5e9'}}>
                      {pSel.Nome[0]}
                    </div>
                  )}
                  <div>
                    <h2 className="text-2xl font-black text-slate-800 dark:text-white flex items-center gap-2 leading-tight">
                      {pSel.Nome} <BadgeConvenio cod={pSel.CodUnimed} logo={cfg?.logoConvenio}/>
                    </h2>
                    <p className="text-sm font-bold text-primary uppercase mt-1">{pSel.Cargo}</p>
                    <p className="text-[10px] font-black opacity-50 mt-1 uppercase tracking-widest bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded inline-block"><i className="ph-fill ph-map-pin"></i> Lotação Base: {pSel.UnidadeBase||'Geral'} • {pSel.Setor||'-'}</p>
                  </div>
                </div>
              )}
              
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="clean-card p-6 lg:col-span-2">
                  <div className="grid grid-cols-7 gap-2 mb-2 text-center text-[10px] font-black opacity-50 uppercase">
                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                  </div>
                  <div className="grid grid-cols-7 gap-2">
                    {bGrid(mesAtual).v.map((_, i) => <div key={'v'+i}></div>)}
                    {bGrid(mesAtual).d.map((d, i) => {
                      const isValid = escalas.some(e => e.Nome_Profissional === calProf && e.Data === d.s && isEscalaValida(e, cfg?.postos));
                      const isTj = d.s === getStrDt(new Date());
                      const isS = diaAtivo === d.s;
                      
                      return (
                        <div key={i} onClick={()=> isValid && setDiaAtivo(d.s)} className={`relative flex flex-col items-center justify-center p-3 rounded-xl border transition-all ${isValid?'cursor-pointer hover:border-primary shadow-sm':''} ${isS?'ring-2 ring-primary bg-blue-50 dark:bg-slate-800':isTj?'bg-slate-100 dark:bg-slate-700 border-slate-300 dark:border-slate-600':'bg-transparent dark:border-slate-800'}`}>

                              <div className="absolute left-0 top-0 bottom-0 w-1.5" style={{backgroundColor: iF?'#94a3b8':iA?'#ef4444':getCorDaSala(esc.Sala, cfg)}}></div>
                              
                              {(!iF && !iA && esc.Unidade) && <p className="text-[9px] font-black uppercase tracking-widest opacity-50 pl-1 mb-0.5">{esc.Unidade}</p>}
                              <h4 className={`font-black text-base pl-1 leading-tight ${iF||iA?'text-slate-600 dark:text-slate-400':''}`}>{esc.Sala} {esc.EmApoio?'(Apoio)':''}</h4>
                              
                              {(!iF && !iA) && <p className={`text-sm font-bold mt-1 pl-1 ${esc.Horario==='A DEFINIR'?'text-red-500':'opacity-80'}`}><i className="ph-fill ph-clock"></i> {esc.Horario}</p>}
                              {esc.Auxiliar && <p className="text-[9px] font-black text-purple-600 bg-purple-50 dark:bg-purple-900/30 px-2 py-0.5 rounded inline-block mt-1.5 ml-1"><i className="ph-fill ph-user-plus"></i> Auxiliar: {esc.Auxiliar}</p>}
                              {esc.MedicoApoio && <p className="text-[9px] font-black text-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 px-2 py-0.5 rounded inline-block mt-1.5 ml-1"><i className="ph-fill ph-stethoscope"></i> Apoio a: {esc.MedicoApoio}</p>}
                              
                              {esc.ObsDia && <p className={`text-[10px] mt-3 p-2 rounded ml-1 font-bold flex items-center gap-1 ${iF||iA?'bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300':'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-800 dark:text-yellow-500'}`}><i className="ph-bold ph-info text-sm"></i> {esc.ObsDia}</p>}
                              
                              {isAd && (
                                <div className="absolute top-2 right-2 flex gap-2">
                                  <button onClick={() => setEditData({...esc})} className="text-yellow-500 hover:scale-110 transition bg-yellow-50 dark:bg-slate-800 p-1.5 rounded"><i className="ph-fill ph-pencil-simple"></i></button>
                                  <button onClick={async()=>{if(confirm('Excluir turno permanentemente?')){await api.deleteRecord('ESCALAS', esc.ID); onRefresh(); setDiaAtivo(null)}}} className="text-red-500 hover:scale-110 transition bg-red-50 dark:bg-slate-800 p-1.5 rounded"><i className="ph-fill ph-trash"></i></button>
                                </div>
                              )}
                            </div>
                          )
                        })}
                      </div>
                    </div>
                  ) : (
                    <div className="h-full flex flex-col items-center justify-center opacity-30 min-h-[200px]">
                      <i className="ph-fill ph-cursor-click text-5xl mb-2"></i>
                      <p className="text-xs font-black uppercase tracking-widest">Selecione uma Data</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      )}
      {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
    </div>
  );
};

// ================== ABA 6: TRABALHANDO HOJE (LISTA DIÁRIA) ==================

              <div className="w-20 h-20 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-full flex justify-center items-center text-4xl mb-4 group-hover:scale-110 transition"><i className="ph-fill ph-users-three"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest text-center">Colaboradores no Plantão</h3>
              <p className="text-sm font-black text-primary mt-2">{pC.length} Ativos Hoje</p>
            </div>
            <div onClick={()=>setViewMode('Médico')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-red-500 hover:shadow-lg transition">
              <div className="w-20 h-20 bg-red-50 dark:bg-red-900/20 text-red-500 dark:text-red-400 rounded-full flex justify-center items-center text-4xl mb-4 group-hover:scale-110 transition"><i className="ph-fill ph-stethoscope"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest text-center">Médicos no Plantão</h3>
              <p className="text-sm font-black text-red-500 mt-2">{pM.length} Ativos Hoje</p>

          </div>

      ) : (
        <div className="animate-fade-in space-y-6">
          <div className="flex items-center gap-4 border-b dark:border-slate-700 pb-4">

            <div>
              <p className="text-[10px] font-bold uppercase opacity-50 tracking-widest">Resumo Diário do {getStrDt(new Date())}</p>
              <h2 className="text-2xl font-black">{viewMode === 'Médico' ? 'Corpo Clínico Ativo' : 'Colaboradores Ativos'}</h2>
            </div>
          </div>

          {(viewMode === 'Colaborador' ? pC : pM).length === 0 ? (
            <div className="p-16 text-center border-2 border-dashed dark:border-slate-700 rounded-2xl opacity-50">
              <i className="ph-fill ph-ghost text-6xl mb-4"></i>
              <p className="font-black text-lg">Ninguém ativo nesta categoria hoje.</p>
            </div>
          ) : (
            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
              {(viewMode === 'Colaborador' ? pC : pM).map((p, i) => {
                const e = p.esc;
                const iI = e.Status === 'LANCHE'; const iA = e.Status === 'AUSENTE';
                const iM = checkIsMe(e.Nome_Profissional, user.email);
                const niver = checkNiver(p.DataNascimento);

                return (
                  <div key={i} className={`clean-card p-4 flex flex-col items-center text-center relative shadow-sm border-t-4 transition hover:shadow-md ${niver.isHoje?'border-t-pink-500 bg-pink-50 dark:bg-pink-900/10':iI?'border-t-orange-500 bg-orange-50 dark:bg-orange-900/10':iA?'border-t-red-500 bg-red-50 dark:bg-red-900/10':'border-t-primary'}`}>
                    {p.FotoURL ? (
                      <img src={fmtImg(p.FotoURL)} onClick={()=>setInfoProfModal(p)} className={`w-14 h-14 rounded-full object-cover shadow mb-2 cursor-pointer hover:scale-105 transition ${niver.isHoje?'animate-bounce border-2 border-pink-400':''}`} />
                    ) : (
                      <div onClick={()=>setInfoProfModal(p)} className={`w-14 h-14 rounded-full flex items-center justify-center text-xl font-black text-white shadow mb-2 cursor-pointer hover:scale-105 transition ${niver.isHoje?'animate-bounce border-2 border-pink-400':''}`} style={{backgroundColor:p.Cor||'#0ea5e9'}}>{safeStr(p.Nome)[0]}</div>
                    )}
                    
                    <h3 className="font-black text-xs w-full flex justify-center items-center gap-1 cursor-pointer hover:text-primary" onClick={()=>setInfoProfModal(p)}>
                      <span className="truncate">{p.Nome}</span>
                      {niver.isHoje ? <span title="Aniversariante do Dia!">🎂</span> : (niver.isSemana && <span title="Aniversário em breve">🎈</span>)}
