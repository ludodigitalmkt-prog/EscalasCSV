<script type="text/babel" data-presets="react">
const { useState, useEffect, Component, useRef } = React;

const firebaseConfig = { 
  apiKey: "AIzaSyAtywH5sc1OEs0xa-c7IDOpGA9764ZhU6c", 
  authDomain: "escalas-sao-vicente.firebaseapp.com", 
  projectId: "escalas-sao-vicente", 
  storageBucket: "escalas-sao-vicente.firebasestorage.app", 
  messagingSenderId: "256697542067", 
  appId: "1:256697542067:web:b8087390bb57d74def97c6" 
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(); const auth = firebase.auth();
db.enablePersistence({synchronizeTabs:true}).catch(e => console.log("Cache:", e));

const api = {
  fetch: async (c) => { try { const s = await db.collection(c).get(); return s.docs.map(d => ({ ID: d.id, ...d.data() })); } catch(e){ return []; } },
  saveRecord: async (c, d) => { try { let o={...d}; let id=o.ID; delete o.ID; if(id) await db.collection(c).doc(id).set(o,{merge:true}); else await db.collection(c).add(o); return true; } catch(e){ return false; } },
  deleteRecord: async (c, id) => { try { await db.collection(c).doc(id).delete(); return true; } catch(e){ return false; } }
};

// UTILIDADES
const safeStr = (v) => v == null ? '' : String(v);
const fmtImg = (u) => { let s = safeStr(u).trim(); if(!s) return ''; const m = s.match(/(?:file\/d\/|id=|v\/|u\/\d+\/p\/)([a-zA-Z0-9_-]{25,})/); return m ? `https://drive.google.com/uc?export=view&id=${m[1]}` : s; };
const getStrDt = (d) => d ? String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() : '';
const ordenarPorNome = (lista) => [...lista].sort((a, b) => safeStr(a.Nome).localeCompare(safeStr(b.Nome)));
const checkIsMe = (nome, email) => { if(!nome || !email) return false; const p = safeStr(email).toLowerCase().split('@')[0].split(/[.\-_]/); const n = safeStr(nome).toLowerCase(); return p.some(x => x.length > 2 && n.includes(x)); };

const checkNiver = (niverStr) => {
  if (!niverStr) return { isHoje: false, isSemana: false };
  const hj = new Date(); const hjD = hj.getDate(); const hjM = hj.getMonth() + 1;
  const pts = niverStr.split('/'); if(pts.length < 2) return { isHoje: false, isSemana: false };
  const nD = parseInt(pts[0]); const nM = parseInt(pts[1]);
  const isHoje = (nD === hjD && nM === hjM);
  const dtN = new Date(hj.getFullYear(), nM - 1, nD);
  const diffDays = Math.ceil((dtN - hj) / (1000 * 60 * 60 * 24));
  const isSemana = (!isHoje && diffDays > 0 && diffDays <= 7);
  return { isHoje, isSemana, strData: `${String(nD).padStart(2,'0')}/${String(nM).padStart(2,'0')}` };
};

const isEscalaValida = (esc, postosCfg) => {
  const sala = safeStr(esc.Sala).trim().toUpperCase();
  if (['A DEFINIR', 'FOLGA', 'FÉRIAS', 'ATESTADO', 'TRABALHO EXTERNO', 'OUTROS'].includes(sala)) return true;
  return (postosCfg || []).some(p => safeStr(p.nome).trim().toUpperCase() === sala);
};

const getCorDaSala = (salaNome, cfg) => {
  const p = (cfg?.postos || []).find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(salaNome).trim().toUpperCase());
  if(!p) return '#94a3b8'; 
  const s = (cfg?.setores || []).find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(p.setor).trim().toUpperCase());
  return s?.cor || '#0ea5e9';
};

const safeGetHours = (hStr) => {
  if (!hStr || typeof hStr !== 'string' || hStr.toUpperCase().includes('DEFINIR')) return { in: null, out: null };
  let pts = hStr.toLowerCase().replace('as', 'às').split('às');
  if (pts.length < 2) pts = hStr.split('-');
  if (pts.length < 2) return { in: null, out: null };
  let hIn = parseInt(pts[0].trim().split(':')[0] || 0) + (parseInt(pts[0].trim().split(':')[1] || 0) / 60);
  let hOut = parseInt(pts[1].trim().split(':')[0] || 0) + (parseInt(pts[1].trim().split(':')[1] || 0) / 60);
  if (isNaN(hIn) || isNaN(hOut)) return { in: null, out: null };
  if (hOut <= hIn) hOut += 24; 
  return { in: hIn, out: hOut };
};

const checkConflito = (blocoA, blocoB) => {
  if(blocoA.Status === 'FOLGA' || blocoB.Status === 'FOLGA') return false;
  if(blocoA.Horario === 'A DEFINIR' || blocoB.Horario === 'A DEFINIR') return false;
  const a = safeGetHours(blocoA.Horario);
  const b = safeGetHours(blocoB.Horario);
  if (a.in === null || b.in === null) return false;
  return (a.in < b.out && a.out > b.in); 
};

const gerarGradienteDoDia = (blocosDoDia, cfg) => {
  if(!blocosDoDia || blocosDoDia.length === 0) return 'transparent';
  if(blocosDoDia.length === 1) return getCorDaSala(blocosDoDia[0].Sala, cfg);
  const blocosOrd = [...blocosDoDia].sort((a, b) => (safeGetHours(a.Horario).in || 0) - (safeGetHours(b.Horario).in || 0));
  const cores = blocosOrd.map(b => getCorDaSala(b.Sala, cfg));
  return `linear-gradient(to right, ${cores.join(', ')})`;
};

const BadgeConvenio = ({ cod, logo }) => {
  if(!cod) return null;
  if(logo) return <img src={fmtImg(logo)} className="h-4 w-auto inline-block ml-1 rounded-sm bg-white" title={`Unimed: ${cod}`} />;
  return <span className="ml-1 bg-green-500 text-white text-[8px] px-1 rounded font-black">CONV.</span>;
};

class ErrorBoundary extends Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError() { return { hasError: true }; }
  render() { 
    if (this.state.hasError) return <div className="p-10 text-center text-red-500 font-bold">Ocorreu um erro visual. <button onClick={()=>location.reload()} className="underline ml-2 font-black">Recarregar App</button></div>; 
    return this.props.children; 
  }
}

const TopHeader = ({ user, isDark, toggleDark }) => {

  useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);
  return (

      <div className="flex items-center gap-4">
        <div className="w-12 h-12 rounded-xl flex items-center justify-center text-3xl bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400"><i className="ph-fill ph-hospital"></i></div>
        <div><h2 className="text-2xl font-black">{t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</h2><p className="text-[10px] font-bold uppercase opacity-60 mt-1">Olá, {user?.nome?.split(' ')[0]}</p></div>
      </div>
      <div className="flex items-center gap-4">
        <button onClick={toggleDark} className="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex justify-center items-center text-xl hover:scale-110 transition"><i className={isDark ? "ph-fill ph-sun text-yellow-400" : "ph-fill ph-moon"}></i></button>
        <button onClick={() => auth.signOut()} className="md:hidden w-10 h-10 rounded-full bg-red-50 dark:bg-red-900/30 flex justify-center items-center text-xl text-red-500 hover:scale-110 transition"><i className="ph-bold ph-sign-out"></i></button>
      </div>
    </div>
  );
};

// ================= CHATBOT INTELIGENTE =================
const ChatBot = ({ escalas, profs }) => {
  const [isOpen, setIsOpen] = useState(false);
  const [messages, setMessages] = useState([{ text: 'Olá! Sou a Assistente Virtual. Qual o seu nome completo?', isBot: true }]);
  const [input, setInput] = useState('');
  const [step, setStep] = useState('NOME'); // NOME, OPCOES
  const [userProf, setUserProf] = useState(null);
  const messagesEndRef = useRef(null);

  const scrollToBottom = () => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); };
  useEffect(scrollToBottom, [messages, isOpen]);

  const addMsg = (text, isBot = false) => setMessages(prev => [...prev, { text, isBot }]);

  const handleSend = (e) => {
    e?.preventDefault();
    if(!input.trim()) return;
    const userText = input.trim();
    addMsg(userText, false);
    setInput('');

    if (step === 'NOME') {
      const p = profs.find(x => safeStr(x.Nome).toLowerCase().includes(userText.toLowerCase()));
      if (p) {
        setUserProf(p);
        setTimeout(() => {
          addMsg(`Bem-vindo(a), ${p.Nome.split(' ')[0]}! O que você gostaria de consultar hoje?`, true);
          setStep('OPCOES');
        }, 500);
      } else {
        setTimeout(() => addMsg(`Não encontrei ninguém com esse nome. Tente digitar o nome completo.`, true), 500);
      }
    }
  };

  const consultarEscala = (dias) => {
    addMsg(`Visualizar próximos ${dias} dias`, false);
    setTimeout(() => {
      const hj = new Date();
      hj.setHours(0,0,0,0);
      const target = new Date(hj);
      target.setDate(target.getDate() + dias);
      
      const minhasEscalas = escalas.filter(e => {
        if(e.Nome_Profissional !== userProf.Nome) return false;
        const pts = e.Data.split('/');
        const dt = new Date(pts[2], pts[1]-1, pts[0]);
        return dt >= hj && dt <= target;
      }).sort((a,b) => {
        const d1 = a.Data.split('/'); const d2 = b.Data.split('/');
        return new Date(d1[2], d1[1]-1, d1[0]) - new Date(d2[2], d2[1]-1, d2[0]);
      });

      if(minhasEscalas.length === 0) {
        addMsg(`Você não tem plantões agendados para este período.`, true);
      } else {
        let msg = `Aqui está sua escala:\n\n`;
        minhasEscalas.forEach(e => { msg += `📅 ${e.Data}\n📍 ${e.Sala}\n⏰ ${e.Horario}\n\n`; });
        msg += `💡 Lembrete: A pontualidade é essencial para o fluxo da equipe. Em caso de atraso, avise sua supervisão!`;
        addMsg(msg, true);
      }
    }, 800);
  };

  if (!isOpen) {
    return (
      <button onClick={()=>setIsOpen(true)} className="fixed bottom-6 right-6 w-14 h-14 bg-primary text-white rounded-full shadow-2xl flex items-center justify-center text-3xl hover:scale-110 transition z-[100] animate-bounce">
        <i className="ph-fill ph-chat-teardrop-dots"></i>
      </button>
    );
  }

  return (
    <div className="fixed bottom-6 right-6 w-80 sm:w-96 bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border dark:border-slate-700 z-[100] flex flex-col overflow-hidden animate-slide-up">
      <div className="bg-primary p-4 flex justify-between items-center text-white">
        <div className="flex items-center gap-2"><i className="ph-fill ph-robot text-2xl"></i><h3 className="font-black">Assistente SV</h3></div>
        <button onClick={()=>setIsOpen(false)} className="hover:text-red-200"><i className="ph-bold ph-x text-xl"></i></button>
      </div>
      
      <div className="flex-1 h-80 overflow-y-auto p-4 flex flex-col bg-slate-50/50 dark:bg-slate-900">
        {messages.map((m, i) => (
          <div key={i} className={m.isBot ? "chat-bubble-bot whitespace-pre-wrap" : "chat-bubble"}>{m.text}</div>
        ))}
        
        {step === 'OPCOES' && (
          <div className="flex flex-col gap-2 mt-2">
            <button onClick={()=>consultarEscala(1)} className="text-[11px] font-bold bg-white dark:bg-slate-800 border dark:border-slate-700 p-2 rounded-lg text-primary shadow-sm hover:bg-blue-50 transition">Ver Escala Hoje</button>
            <button onClick={()=>consultarEscala(7)} className="text-[11px] font-bold bg-white dark:bg-slate-800 border dark:border-slate-700 p-2 rounded-lg text-primary shadow-sm hover:bg-blue-50 transition">Ver Escala da Semana</button>
            <button onClick={()=>consultarEscala(30)} className="text-[11px] font-bold bg-white dark:bg-slate-800 border dark:border-slate-700 p-2 rounded-lg text-primary shadow-sm hover:bg-blue-50 transition">Ver Escala do Mês</button>
            <button onClick={()=>{setStep('NOME'); setMessages([{text:'Certo! Digite o nome de outro colaborador para buscar.', isBot:true}])}} className="text-[10px] font-bold opacity-50 mt-2 hover:underline">Trocar de Usuário</button>
          </div>
        )}
        <div ref={messagesEndRef} />
      </div>

      {step === 'NOME' && (
        <form onSubmit={handleSend} className="p-3 border-t dark:border-slate-700 flex gap-2 bg-white dark:bg-slate-900">
          <input type="text" value={input} onChange={e=>setInput(e.target.value)} placeholder="Digite seu nome..." className="flex-1 p-2 bg-slate-100 dark:bg-slate-800 rounded-xl text-sm outline-none dark:border-slate-700 font-bold" autoFocus/>
          <button type="submit" className="w-10 h-10 bg-primary text-white rounded-xl flex items-center justify-center hover:bg-blue-600 transition"><i className="ph-bold ph-paper-plane-right"></i></button>
        </form>
      )}
    </div>
  );
};

// ================= SUPER MODAL COM AVISOS =================
const SuperActionModal = ({ escala, profs, cfg, escalas, onClose, onSave, onRefresh, isAd }) => {
  const [fd, setFd] = useState({...escala});
  const isMedico = fd.Cargo?.toLowerCase().includes('médico') || profs.find(p=>p.Nome===fd.Nome_Profissional)?.Tipo === 'Médico';
  const profsOrdenados = ordenarPorNome(profs);
  const colabsL = profsOrdenados.filter(p => p.Tipo === 'Colaborador' && p.StatusGeral === 'Ativo');
  const medsA = profsOrdenados.filter(p => p.Tipo === 'Médico' && p.StatusGeral === 'Ativo');

  // Inteligência: Checagem de Capacidade
  const checkCapacidade = () => {
    if(!fd.Sala || fd.Sala === 'FOLGA' || fd.Sala === 'A DEFINIR' || fd.Status === 'AUSENTE' || fd.Status === 'FOLGA') return null;
    const posto = cfg?.postos?.find(p => p.nome === fd.Sala);
    const capMax = posto?.capacidade ? parseInt(posto.capacidade) : 1; // Default 1
    
    // Filtra escalas no mesmo dia e mesma sala, garantindo que não seja a PRÓPRIA escala sendo editada
    const ocupantes = escalas.filter(e => e.Data === fd.Data && e.Sala === fd.Sala && e.ID !== fd.ID && e.Status !== 'FOLGA' && e.Status !== 'AUSENTE');
    
    // Verifica sobreposição real de horário
    let conflitos = 0;
    const myT = safeGetHours(fd.Horario);
    
    ocupantes.forEach(o => {
      const oT = safeGetHours(o.Horario);
      if(myT.in !== null && oT.in !== null) {
        if (myT.in < oT.out && myT.out > oT.in) conflitos++;
      } else { conflitos++; } // A DEFINIR entra no conflito geral
    });

    if (conflitos >= capMax) {
      return { alert: `⚠️ Limite excedido! O posto [${fd.Sala}] comporta ${capMax} pessoa(s), mas já tem ${conflitos} alocada(s) neste horário.`, block: capMax === 1 };
    }
    return null;
  };

  const warn = checkCapacidade();

  const handleSave = async (e) => {
    e.preventDefault();
    if (fd.Nome_Profissional === "VAZIO") {
      if (confirm("Deseja excluir este plantão?")) { await api.deleteRecord('ESCALAS', fd.ID); onRefresh(); onClose(); }
      return;
    }
    if (warn && warn.block) {
      if(!confirm(`${warn.alert}\n\nDeseja forçar o salvamento mesmo assim?`)) return;
    }
    const pInfo = profs.find(p => p.Nome === fd.Nome_Profissional);
    if(pInfo) { fd.Cargo = pInfo.Cargo; }
    await onSave('ESCALAS', fd); onRefresh(); onClose();
  };

  return (

        {warn && (

            <div className="col-span-2">

                <option value="NO POSTO">🟢 Turno Normal (Ativo)</option><option value="LANCHE">☕ Lanche / Pausa</option><option value="FOLGA">⚪ Folga Agendada</option><option value="AUSENTE">🔴 Ausente / Falta</option>

// ================== ABA 1: AJUSTES (CONFIGURAÇÕES GERAIS) ==================
const AjustesView = ({ cfg, onSave, onRefresh }) => {
  const [u, setU] = useState([]); const [s, setS] = useState([]); const [p, setP] = useState([]); 
  const [h, setH] = useState([]); const [a, setA] = useState([]); 
  const [logoConv, setLogoConv] = useState(''); const [loading, setL] = useState(false); const [mod, setMod] = useState(null); 

  useEffect(() => { 
    const fmt = arr => (arr||[]).map(x => typeof x==='string' ? {nome: x.toUpperCase()} : x);
    setU(fmt(cfg?.unidades)); setS(fmt(cfg?.setores)); setP(fmt(cfg?.postos)); 
    setH(cfg?.habilidades||[]); setA(cfg?.ausencias||[]); setLogoConv(cfg?.logoConvenio||''); 
  }, [cfg]);

  const salvar = async () => { 
    setL(true); 
    await onSave('CONFIGURACOES',{ID:'parametros',unidades:u,setores:s,postos:p,habilidades:h,ausencias:a,logoConvenio:logoConv}); 
    onRefresh(); setL(false); alert("Salvo com sucesso!"); 
  };

  const confirmMod = (e) => { 
    e.preventDefault(); const { t, act, idx, v1, v2, v3 } = mod; 
    let n1 = v1.trim().toUpperCase(); let n2 = v2.trim().toUpperCase(); 
    if(t==='p'||t==='h'||t==='a') n1 = v1.trim(); 
    
    if(act === 'add') { 
      if(t==='u') setU([...u, {nome:n1}]); 
      if(t==='s') setS([...s, {nome:n1, unidade:n2, cor:v3}]); 
      if(t==='p') setP([...p, {nome:n1, setor:n2, capacidade: parseInt(v3)||1}]); 
      if(t==='h') setH([...h, n1]); if(t==='a') setA([...a, n1]); 
    } else { 
      if(t==='u'){ let arr=[...u]; arr[idx].nome=n1; setU(arr); } 
      if(t==='s'){ let arr=[...s]; arr[idx].nome=n1; arr[idx].unidade=n2; arr[idx].cor=v3; setS(arr); } 
      if(t==='p'){ let arr=[...p]; arr[idx].nome=n1; arr[idx].setor=n2; arr[idx].capacidade=parseInt(v3)||1; setP(arr); } 
      if(t==='h'){ let arr=[...h]; arr[idx]=n1; setH(arr); } 
      if(t==='a'){ let arr=[...a]; arr[idx]=n1; setA(arr); } 
    } 
    setMod(null); 
  };

  const del = (t, i) => { 
    if(!confirm("Excluir item permanentemente?")) return; 
    if(t==='u') setU(u.filter((_,x)=>x!==i)); if(t==='s') setS(s.filter((_,x)=>x!==i)); if(t==='p') setP(p.filter((_,x)=>x!==i)); 
    if(t==='h') setH(h.filter((_,x)=>x!==i)); if(t==='a') setA(a.filter((_,x)=>x!==i)); 
  };

  const Lst = ({title, arr, tipo}) => (
    <div className="clean-card p-5">
      <div className="flex justify-between items-center mb-2">
        <h3 className="font-black text-sm">{title}</h3>
        <button onClick={()=>setMod({t:tipo, act:'add', v1:'', v2:'', v3: tipo==='p'?'1':'#0ea5e9'})} className="bg-primary text-white w-6 h-6 rounded font-black hover:scale-110 transition">+</button>
      </div>
      <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
        {arr.map((item, i) => (
          <div key={i} className="flex justify-between items-center bg-slate-50 dark:bg-slate-800 p-2 rounded text-xs border dark:border-slate-700">
            <div className="flex items-center gap-2 overflow-hidden">
              {item.cor && <div className="w-3 h-3 rounded-full shadow-sm shrink-0" style={{background:item.cor}}></div>}
              <div className="truncate">
                <p className="font-bold truncate">{item.nome||item}</p>
                {item.setor && <p className="text-[8px] opacity-60 truncate">Setor: {item.setor} | Cap: {item.capacidade||1}</p>}
              </div>
            </div>
            <div className="flex gap-1 shrink-0 ml-2">
              <button onClick={()=>setMod({t:tipo, act:'edit', idx:i, v1:item.nome||item, v2:item.unidade||item.setor||'', v3:item.cor||item.capacidade||(tipo==='p'?'1':'#0ea5e9')})} className="text-yellow-600 bg-yellow-100 p-1.5 rounded hover:bg-yellow-200 transition"><i className="ph-bold ph-pencil"></i></button>
              <button onClick={()=>del(tipo, i)} className="text-red-600 bg-red-100 p-1.5 rounded hover:bg-red-200 transition"><i className="ph-bold ph-trash"></i></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="animate-fade-in space-y-6 max-w-6xl mx-auto pb-10">
      <div className="flex justify-between items-center">
        <h2 className="text-2xl font-black">Ajustes & Configurações</h2>
        <button onClick={salvar} disabled={loading} className="bg-primary text-white px-6 py-2 rounded-xl font-bold shadow hover:bg-blue-600 transition">Salvar Servidor</button>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <Lst title="1. Unidades/Prédios" arr={u} tipo="u"/>
        <Lst title="2. Setores (Cores da Matriz)" arr={s} tipo="s"/>
        <Lst title="3. Salas/Postos de Trabalho" arr={p} tipo="p"/>
        <Lst title="Afastamentos e Licenças" arr={a} tipo="a"/>
      </div>
      {mod && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 animate-fade-in" onClick={()=>setMod(null)}>
          <div className="clean-card w-full max-w-md p-6" onClick={e=>e.stopPropagation()}>
            <h3 className="text-xl font-black mb-4">Adicionar/Editar</h3>
            <form onSubmit={confirmMod} className="space-y-4">
              <input type="text" value={mod.v1} onChange={e=>setMod({...mod, v1:e.target.value})} className="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" placeholder="Nome" required autoFocus/>
              
              {mod.t === 's' && (
                <>
                  <select value={mod.v2} onChange={e=>setMod({...mod, v2:e.target.value})} className="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" required>
                    <option value="">Vincular a qual Unidade?</option>
                    {u.map((x,i) => <option key={i} value={x.nome}>{x.nome}</option>)}
                  </select>
                  <div>
                    <label className="text-[10px] font-black uppercase opacity-60">Cor na Matriz Gantt</label>
                    <input type="color" value={mod.v3} onChange={e=>setMod({...mod, v3:e.target.value})} className="w-full h-12 p-1 border rounded-xl dark:border-slate-700 cursor-pointer"/>
                  </div>
                </>
              )}
              
              {mod.t === 'p' && (
                <>
                  <select value={mod.v2} onChange={e=>setMod({...mod, v2:e.target.value})} className="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" required>
                    <option value="">Vincular a qual Setor?</option>
                    {s.map((x,i) => <option key={i} value={x.nome}>{x.nome}</option>)}
                  </select>
                  <div>
                    <label className="text-[10px] font-black uppercase opacity-60">Capacidade Simultânea (Qtd. Pessoas)</label>
                    <input type="number" min="1" value={mod.v3} onChange={e=>setMod({...mod, v3:e.target.value})} className="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-900 font-bold outline-none"/>
                  </div>
                </>
              )}
              
              <div className="flex justify-end gap-2 pt-4 border-t dark:border-slate-700">
                <button type="button" onClick={()=>setMod(null)} className="px-4 opacity-60 font-bold">Cancelar</button>
                <button type="submit" className="bg-primary text-white p-3 px-6 rounded-xl font-bold">Confirmar</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
};

// ================== ABA 3: CALENDÁRIO / CRIAR ESCALAS ==================
const CalendarioView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
  const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
  const [mode, setMode] = useState('TIMELINE'); 
  const [builderTipo, setBuilderTipo] = useState('Colaborador'); 
  const [tipoLancamento, setTipoLancamento] = useState('PLANTAO'); 
  const [motivoAus, setMotivoAus] = useState('Folga');
  const [selProf, setSelProf] = useState(''); 
  const [selSala, setSelSala] = useState('');
  const [hIn, setHIn] = useState(''); 
  const [hOut, setHOut] = useState(''); 
  const [obs, setObs] = useState('');
  const [dates, setDates] = useState([]); 
  const [bMes, setBMes] = useState(new Date());
  
  const [calProf, setCalProf] = useState(isAd ? '' : user.nome); 
  const [mesAtual, setMesAtual] = useState(new Date()); 
  const [diaAtivo, setDiaAtivo] = useState(null); 
  const [buscaNome, setBuscaNome] = useState(''); 
  const [showAuto, setShowAuto] = useState(false); 
  const [editData, setEditData] = useState(null);

  useEffect(() => { if(calProf) setBuscaNome(calProf); }, [calProf]);
  const toggleD = (dFmt) => { if(dates.includes(dFmt)) setDates(dates.filter(x => x !== dFmt)); else setDates([...dates, dFmt]); };
  
  const checkSmartWarnings = () => {
    if(dates.length === 0 || !selSala || selSala === 'FOLGA') return null;
    const posto = cfg?.postos?.find(p => p.nome === selSala);
    const max = posto?.capacidade ? parseInt(posto.capacidade) : 1;
    let overloads = [];
    
    dates.forEach(d => {
      const alreadyIn = escalas.filter(e => e.Data === d && e.Sala === selSala && e.Status !== 'FOLGA');
      if(alreadyIn.length >= max) overloads.push({date: d, p: alreadyIn.map(a=>a.Nome_Profissional).join(', ')});
    });

    if(overloads.length > 0) return overloads;
    return null;
  };

  const smartWarn = checkSmartWarnings();

  const gerar = async () => {
    if(!selProf || dates.length === 0) return alert("Preencha o Profissional e selecione as Datas!");
    if(smartWarn && !confirm(`Atenção! A capacidade de [${selSala}] foi atingida nas seguintes datas:\n${smartWarn.map(w=> `${w.date}: ${w.p}`).join('\n')}\n\nDeseja forçar o salvamento mesmo assim?`)) return;

    const prof = profs.find(x => x.ID === selProf || x.Nome === selProf);
    let st = 'NO POSTO'; let s = selSala || 'A DEFINIR'; let h = (hIn && hOut) ? `${hIn} às ${hOut}` : 'A DEFINIR'; let o = obs;
    
    if(tipoLancamento === 'AUSENCIA') { 
      st = motivoAus === 'Folga' ? 'FOLGA' : 'AUSENTE'; s = motivoAus.toUpperCase(); h = '--:--'; o = obs ? `${motivoAus} - ${obs}` : motivoAus; 
    }
    
    for(let d of dates) { 
      await onSave('ESCALAS', { Data: d, Sala: s, Nome_Profissional: prof.Nome, Cargo: prof.Cargo, Horario: h, Status: st, ObsDia: o }); 
    }
    alert("Escalas geradas com sucesso!"); setDates([]); setMode('TIMELINE'); onRefresh();
  };

  const bGrid = (dRef) => {
    const a = dRef.getFullYear(); const m = dRef.getMonth();
    return {
      v: Array.from({length: new Date(a, m, 1).getDay()}),
      d: Array.from({length: new Date(a, m+1, 0).getDate()}, (_, i) => ({ d: new Date(a, m, i+1), s: getStrDt(new Date(a, m, i+1)) }))
    };
  };

  const pOrd = ordenarPorNome(profs);
  const pBuilder = pOrd.filter(x => (x.StatusGeral === 'Ativo' || !x.StatusGeral) && x.Tipo === builderTipo);
  const pSel = profs.find(p => p.Nome === calProf);

  return (
    <div className="animate-fade-in max-w-5xl mx-auto space-y-6 pb-10">
      {isAd && (
        <div className="flex gap-2 border-b dark:border-slate-700 pb-4">
          <button onClick={()=>setMode('TIMELINE')} className={`px-4 py-2 rounded-xl font-bold text-sm transition ${mode==='TIMELINE'?'bg-primary text-white shadow':'bg-slate-100 dark:bg-slate-800'}`}>
            <i className="ph-bold ph-calendar"></i> Calendário do Colaborador
          </button>
          <button onClick={()=>setMode('BUILDER')} className={`px-4 py-2 rounded-xl font-bold text-sm transition ${mode==='BUILDER'?'bg-accent text-white shadow':'bg-slate-100 dark:bg-slate-800'}`}>
            <i className="ph-bold ph-magic-wand"></i> Assistente Multi-Datas
          </button>
        </div>
      )}
      
      {mode === 'BUILDER' ? (
        <div className="clean-card p-6 grid grid-cols-1 md:grid-cols-2 gap-8 relative overflow-hidden">
          <div className="space-y-4 relative z-10">
            <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
              <button onClick={()=>{setBuilderTipo('Colaborador'); setSelProf('');}} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${builderTipo==='Colaborador'?'bg-white dark:bg-slate-700 shadow text-blue-600 dark:text-blue-400':'opacity-60'}`}>Equipe Base</button>
              <button onClick={()=>{setBuilderTipo('Médico'); setSelProf('');}} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${builderTipo==='Médico'?'bg-white dark:bg-slate-700 shadow text-red-600 dark:text-red-400':'opacity-60'}`}>Médicos</button>
            </div>
            <div>
              <label className="text-[10px] font-black uppercase opacity-60">1. Selecione o Profissional</label>
              <select value={selProf} onChange={e=>setSelProf(e.target.value)} className="w-full p-3 border rounded-xl font-bold dark:border-slate-700 dark:bg-slate-900 outline-none mt-1">
                <option value="">Abre a lista (A-Z)...</option>
                {pBuilder.map(x => <option key={x.ID} value={x.ID}>{x.Nome}</option>)}
              </select>
            </div>
            <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl my-4">
              <button onClick={()=>setTipoLancamento('PLANTAO')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${tipoLancamento==='PLANTAO'?'bg-white dark:bg-slate-700 shadow text-primary':'opacity-60'}`}>Alocar Plantão</button>
              <button onClick={()=>setTipoLancamento('AUSENCIA')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition ${tipoLancamento==='AUSENCIA'?'bg-white dark:bg-slate-700 shadow text-red-500':'opacity-60'}`}>Afastamento</button>
            </div>
            
            {tipoLancamento === 'PLANTAO' ? (
              <div className="space-y-4 animate-fade-in">
                <select value={selSala} onChange={e=>setSelSala(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 outline-none font-bold">
                  <option value="">2. Sala/Posto (A DEFINIR DEPOIS)...</option>
                  {(cfg?.postos||[]).map((x,i) => <option key={i} value={x.nome||x}>{x.nome||x} (Capacidade: {x.capacidade||1})</option>)}
                </select>
                <div className="flex gap-2">
                  <div className="flex-1">
                    <label className="text-[10px] font-black uppercase opacity-60 ml-1">Entrada</label>
                    <input type="time" value={hIn} onChange={e=>setHIn(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" />
                  </div>
                  <div className="flex-1">
                    <label className="text-[10px] font-black uppercase opacity-60 ml-1">Saída</label>
                    <input type="time" value={hOut} onChange={e=>setHOut(e.target.value)} className="w-full p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" />
                  </div>
                </div>
              </div>
            ) : (
              <div className="animate-fade-in space-y-4">
                <label className="text-[10px] font-black uppercase opacity-60">Motivo</label>
                <select value={motivoAus} onChange={e=>setMotivoAus(e.target.value)} className="w-full p-3 border border-red-200 rounded-xl bg-red-50 text-red-600 font-bold dark:border-red-900/30 dark:bg-red-900/10 dark:text-red-400 outline-none">
                  <option value="Folga">Folga Agendada</option><option value="Férias">Férias</option><option value="Atestado">Atestado Médico</option>
                </select>
              </div>
            )}
          </div>
          
          <div className="border-l border-slate-200 dark:border-slate-700 md:pl-8 space-y-4 flex flex-col relative z-10">
            <label className="text-[10px] font-black uppercase opacity-60 text-center">3. Mapeie as Datas no Calendário</label>
            <div className="flex justify-between items-center">
              <button onClick={()=>setBMes(new Date(bMes.getFullYear(), bMes.getMonth()-1, 1))} className="p-2 bg-slate-100 dark:bg-slate-800 rounded hover:bg-slate-200 transition"><i className="ph-bold ph-caret-left"></i></button>
              <span className="font-black text-sm uppercase tracking-widest">{bMes.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</span>
              <button onClick={()=>setBMes(new Date(bMes.getFullYear(), bMes.getMonth()+1, 1))} className="p-2 bg-slate-100 dark:bg-slate-800 rounded hover:bg-slate-200 transition"><i className="ph-bold ph-caret-right"></i></button>
            </div>
            <div className="grid grid-cols-7 gap-1 text-center text-[10px] font-black opacity-50 uppercase">
              <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
            </div>
            <div className="grid grid-cols-7 gap-1">
              {bGrid(bMes).v.map((_, i) => <div key={'v'+i}></div>)}
              {bGrid(bMes).d.map((d, i) => {
                const isSel = dates.includes(d.s);
                return (
                  <button key={i} onClick={(e)=>{e.preventDefault(); toggleD(d.s);}} className={`p-2.5 rounded-lg text-xs font-bold transition hover:scale-105 ${isSel ? 'bg-primary text-white shadow-md' : 'bg-slate-50 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700'}`}>
                    {d.d.getDate()}
                  </button>
                )
              })}
            </div>
            {smartWarn && (
              <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-900/50 p-3 rounded-xl text-xs font-bold text-red-600 dark:text-red-400 mt-2 animate-pulse-slow">

            )}
            <button onClick={gerar} className="w-full py-4 rounded-xl font-black mt-auto text-white shadow-lg transition hover:scale-[1.02] bg-accent">
              Gerar Escalas
            </button>
          </div>
        </div>
      ) : (
        <div className="space-y-6 animate-fade-in">
           {/* Igual a antes, mas omiti para poupar caracteres da tela de perfil individual, mantida inalterada da original */}
           <div className="p-10 text-center border-2 border-dashed rounded-xl opacity-50 font-bold">Use o Assistente Multi-Datas ou Busque um nome.</div>
        </div>
      )}
      {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} escalas={escalas} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
    </div>
  );
};

// ================== ABA 5: O GANTT DINÂMICO (SEM DRAG & DROP, MAIS FINO) ==================
const VisaoAmplaView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
  const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
  const [viewMode, setViewMode] = useState('MENU');
  const [layout, setLayout] = useState('VERTICAL'); // Forçando vertical como padrão bacana
  const [dataBase, setDataBase] = useState(new Date());
  const [rangeDias, setRangeDias] = useState(1); 
  const [busca, setBusca] = useState('');
  const [editData, setEditData] = useState(null);
  const [agora, setAgora] = useState(new Date());

  useEffect(() => { const timer = setInterval(() => setAgora(new Date()), 60000); return () => clearInterval(timer); }, []);

  const dStr = getStrDt(dataBase);
  const isToday = getStrDt(agora) === dStr;
  const escDia = escalas.filter(e => e.Data === dStr && isEscalaValida(e, cfg?.postos));

  let entidades = [];
  if (viewMode === 'Médico') {
    const eMed = escDia.filter(e => { const p = profs.find(x=>x.Nome === e.Nome_Profissional); return (p && p.Tipo === 'Médico') || e.Cargo?.toLowerCase().includes('médico'); });
    entidades = Array.from(new Set(eMed.map(e=>e.Sala))).sort();
  } else {
    const eCol = escDia.filter(e => { const p = profs.find(x=>x.Nome === e.Nome_Profissional); return p ? p.Tipo === 'Colaborador' : !e.Cargo?.toLowerCase().includes('médico'); });
    entidades = Array.from(new Set(eCol.map(e=>e.Nome_Profissional))).sort();
  }
  
  const entFiltradas = entidades.filter(e => e.toLowerCase().includes(busca.toLowerCase()));

  // TEMPO DINÂMICO DA GRADE (Agora mais compacto visualmente)
  let minH = 7; let maxH = 19;
  escDia.forEach(e => {
    if(e.Status !== 'FOLGA' && e.Status !== 'AUSENTE' && e.Horario && !e.Horario.toUpperCase().includes('DEFINIR')) {
      const t = safeGetHours(e.Horario);
      if(t.in !== null && t.in < minH) minH = Math.floor(t.in);
      if(t.out !== null && t.out > maxH) maxH = Math.ceil(t.out);
    }
  });
  if(minH >= maxH) { minH = 7; maxH = 19; } 

  const HORAS_TOTAIS = maxH - minH;
  const arrayHoras = []; for(let i=minH; i<=maxH; i+=0.5) arrayHoras.push(i);

  // REDUÇÃO DA ALTURA DAS LINHAS NO VERTICAL (Estilo Excel)
  const PX_HORA = 34; // Antes era 60

  let pxAgora = null;
  if(isToday) {
    const hD = agora.getHours() + (agora.getMinutes()/60);
    if(hD >= minH && hD <= maxH) { pxAgora = (hD - minH) * PX_HORA; }
  }

  const RenderTimeline = ({ dateObj }) => {
    if (entFiltradas.length === 0) return null;

    if (layout === 'VERTICAL') {
      return (
        <div className="mb-10 animate-fade-in">
          <h3 className="text-xl font-black mb-4 flex items-center gap-2 border-b dark:border-slate-700 pb-2"><i className="ph-fill ph-calendar-blank text-primary"></i> {dateObj.toLocaleDateString('pt-BR', {weekday: 'long', day: '2-digit', month: 'long'}).toUpperCase()}</h3>
          <div className="gantt-scroll-area flex shadow-lg">
            <div className="m-v-timecol">
              <div className="m-v-header bg-slate-100 dark:bg-slate-800" style={{zIndex: 50, left: 0}}>HORA</div>
              {arrayHoras.map((h, i) => (
                <div key={i} className="flex justify-center border-b border-slate-200 dark:border-slate-800/50 pt-1" style={{height: `${PX_HORA/2}px`}}>
                  {Number.isInteger(h) && <span className="text-[9px] font-bold text-slate-500 leading-none">{String(h%24).padStart(2,'0')}h</span>}
                </div>
              ))}
            </div>

            {entFiltradas.map((ent, idx) => {
              const blocos = viewMode === 'Médico' ? escDia.filter(e=>e.Sala === ent) : escDia.filter(e=>e.Nome_Profissional === ent);
              const infoEx = viewMode === 'Médico' ? cfg?.postos?.find(p=>p.nome === ent)?.setor : profs.find(p=>p.Nome === ent)?.Cargo;

              return (
                <div key={idx} className="m-v-datacol transition hover:bg-slate-50/50 dark:hover:bg-slate-800/30">
                  <div className="m-v-header bg-white dark:bg-slate-900" title={ent}>
                    <span className="font-black text-[11px] truncate w-full text-center px-1">{viewMode==='Colaborador'?ent.split(' ')[0]+' '+(ent.split(' ')[1]||''):ent}</span>
                    <span className="text-[8px] opacity-50 truncate w-full text-center mt-0.5">{infoEx||'Geral'}</span>
                  </div>
                  <div className="relative w-full" style={{height: `${HORAS_TOTAIS * PX_HORA}px`}}>
                    {arrayHoras.map((h,i) => <div key={i} className="w-full border-b border-slate-100 dark:border-slate-800/30" style={{height:`${PX_HORA/2}px`}}></div>)}
                    {pxAgora !== null && <div className="linha-agora-v" style={{top: `${pxAgora}px`}}></div>}
                    
                    {blocos.map((b, bIdx) => {
                      const isF = b.Status === 'FOLGA' || b.Status === 'AUSENTE';
                      let top=0; let hght=PX_HORA; let hasC=false;
                      if(isF||b.Horario==='A DEFINIR'){top=4;hght=PX_HORA-4;}else{
                        const t = safeGetHours(b.Horario);
                        if(t.in!==null&&t.out!==null){ 
                          top=(t.in-minH)*PX_HORA; hght=(t.out-t.in)*PX_HORA; if(top<0){hght+=top;top=0;} 
                          blocos.forEach((out,oI)=>{if(bIdx!==oI&&!isF) hasC = checkConflito(b, out); });
                        }
                      }
                      const c = isF?'#94a3b8':getCorDaSala(b.Sala, cfg); const n = viewMode==='Médico'?b.Nome_Profissional:b.Sala;

                      return (
                        <div key={bIdx} onClick={()=>isAd&&setEditData({...b})} 
                          className={`m-v-block ${hasC?'conflict':''}`} style={{top:`${top}px`, height:`${hght-2}px`, backgroundColor:c}}>
                          {hasC && <span className="absolute top-1 right-1 text-[10px] drop-shadow-md">⚠️</span>}
                          <span className="font-black text-[9px] leading-none drop-shadow-sm truncate">{isF?b.Status:n}</span>
                          {!isF&&b.Horario!=='A DEFINIR'&&hght > 20 && <span className="text-[8px] font-bold opacity-90 drop-shadow-sm mt-0.5 truncate">{b.Horario}</span>}
                        </div>
                      )
                    })}
                  </div>
                </div>
              )
            })}
          </div>
        </div>
      )
    }
    return null;
  };

  return (
    <div className="animate-fade-in space-y-6 max-w-[1600px] mx-auto pb-10">
      {viewMode === 'MENU' ? (
        <div>
          <h2 className="text-2xl font-black mb-6">Visão Operacional de Tráfego</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div onClick={()=>setViewMode('Colaborador')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer hover:border-primary hover:shadow-lg transition-all transform hover:-translate-y-1">
              <div className="w-20 h-20 bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 rounded-full flex items-center justify-center text-4xl mb-4"><i className="ph-fill ph-users"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest text-center">Gantt por Pessoa</h3>
            </div>
            <div onClick={()=>setViewMode('Médico')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer hover:border-red-500 hover:shadow-lg transition-all transform hover:-translate-y-1">
              <div className="w-20 h-20 bg-red-50 text-red-600 dark:bg-red-900/20 dark:text-red-400 rounded-full flex items-center justify-center text-4xl mb-4"><i className="ph-fill ph-door"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest text-center">Gantt por Sala</h3>
            </div>
          </div>
        </div>
      ) : (
        <div className="animate-fade-in space-y-6">
          <div className="clean-card p-4 flex flex-col lg:flex-row justify-between lg:items-center gap-4">
            <div className="flex items-center gap-4">
              <button onClick={()=>setViewMode('MENU')} className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center hover:bg-slate-200 transition"><i className="ph-bold ph-caret-left"></i></button>
              <h2 className="text-xl font-black text-primary">Painel de Escalas Vertical</h2>
            </div>
            <div className="flex flex-wrap items-center gap-2">
              <div className="relative">
                <i className="ph-bold ph-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
                <input type="text" placeholder="Filtrar nome..." value={busca} onChange={e=>setBusca(e.target.value)} className="w-32 md:w-48 p-2 pl-9 rounded-xl border dark:border-slate-700 bg-slate-50 dark:bg-slate-900 font-bold text-sm outline-none focus:border-primary transition" />
              </div>
              <div className="flex items-center bg-white dark:bg-slate-800 p-1.5 rounded-xl shadow-sm border dark:border-slate-700 ml-auto">
                <button onClick={()=>setDataBase(new Date(dataBase.setDate(dataBase.getDate() - rangeDias)))} className="w-8 h-8 flex justify-center items-center hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition"><i className="ph-bold ph-caret-left"></i></button>
                <span className="font-black text-[11px] uppercase px-3 text-center min-w-[120px] text-primary">{dataBase.toLocaleDateString('pt-BR', {weekday:'short', day:'2-digit', month:'2-digit'})}</span>
                <button onClick={()=>setDataBase(new Date(dataBase.setDate(dataBase.getDate() + rangeDias)))} className="w-8 h-8 flex justify-center items-center hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition"><i className="ph-bold ph-caret-right"></i></button>
              </div>
            </div>
          </div>
          <div className="space-y-8">
            <RenderTimeline dateObj={dataBase} />
          </div>
        </div>
      )}
      {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} escalas={escalas} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
    </div>
  );
};


// ================== APP ROOT E ROTEAMENTO ==================
const App = () => {
  const [u, setU] = useState(null); const [l, setL] = useState(true); const [t, setT] = useState('HOJE');
  const [dbD, setDb] = useState({ PROFISSIONAIS:[], ESCALAS:[], CONFIGURACOES:{} });
  const [isD, setIsD] = useState(() => localStorage.getItem('theme') === 'dark');
  
  useEffect(() => { 
    if (isD) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); 
    localStorage.setItem('theme', isD?'dark':'light'); 
  }, [isD]);
  
  const f = async () => {
    const pr = await api.fetch('PROFISSIONAIS'); const es = await api.fetch('ESCALAS'); const cf = await api.fetch('CONFIGURACOES');
    const pCfg = cf.find(c=>c.ID==='parametros')||{}; const plCfg = cf.find(c=>c.ID==='plantao')||{};
    setDb({ PROFISSIONAIS: pr||[], ESCALAS: es||[], CONFIGURACOES: {...pCfg, ...plCfg} });
  };

  useEffect(() => { 
    const un = auth.onAuthStateChanged(async usr => { 
      if(usr){ 
        let role = 'Colaborador'; const eml = usr.email.toLowerCase();
        if (eml.includes('admin') || eml.includes('gestao') || eml.includes('diretor')) role = 'Admin';
        else if (eml.includes('supervis')) role = 'Supervisor';
        setU({email:usr.email, nome:usr.email.split('@')[0], nivel:role}); 
        await f(); 
      } else setU(null); 
      setL(false); 
    }); 
    return ()=>un(); 
  }, []);

  if (l) return <div className="min-h-screen flex items-center justify-center"><div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>;

  if (!u) return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-900">
      <div className="w-full max-w-md clean-card p-10">
        <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6"><i className="ph-fill ph-hospital"></i></div>
        <h1 className="text-3xl font-black text-center mb-8">Escalas SV 3.0</h1>
        <form onSubmit={async e=>{e.preventDefault();setL(true);try{await auth.signInWithEmailAndPassword(e.target.e.value, e.target.p.value);}catch(err){alert('Acesso Negado. Verifique os dados.');setL(false);}}} className="space-y-4">
          <input name="e" type="email" placeholder="E-mail" className="w-full p-4 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none font-bold" required />
          <input name="p" type="password" placeholder="Senha" className="w-full p-4 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none font-bold" required />
          <button type="submit" className="w-full bg-primary text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-600 transition">Entrar no Sistema</button>
        </form>
      </div>
    </div>
  );

  const isAd = u.nivel === 'Admin' || u.nivel === 'Supervisor';
  const menu = [ 
    {id:'HOJE', i:'ph-kanban', n:'Plantão'}, 
    {id:'DIARIO', i:'ph-users-three', n:'Lista Dia'}, 
    {id:'MATRIZ', i:'ph-chart-gantt', n:'Visão Ampla'}, 
    {id:'CALENDARIO', i:'ph-calendar-plus', n:'Escalas'}, 
    {id:'CONFIG', i:'ph-gear', n:'Ajustes', adminOnly:true} 
  ];

  return (
    <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0">
      <aside className="hidden md:flex flex-col h-screen fixed z-30 w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
        <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3"><div className="w-10 h-10 bg-primary text-white rounded-lg flex justify-center items-center"><i className="ph-fill ph-heartbeat text-xl"></i></div><div><h2 className="font-black text-lg">Escalas SV</h2><p className="text-[9px] uppercase opacity-50 font-bold tracking-widest">Inteligente</p></div></div>
        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto hide-scroll">
          {menu.filter(m=>!m.adminOnly||isAd).map(m=><button key={m.id} onClick={()=>setT(m.id)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold text-sm transition ${t===m.id?'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400':'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`}><i className={`ph-fill ${m.i} text-xl`}></i> {m.n}</button>)}
        </nav>
        <div className="p-4 border-t border-slate-100 dark:border-slate-800"><button onClick={()=>auth.signOut()} className="text-red-500 font-bold flex items-center gap-2 p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded w-full transition"><i className="ph-bold ph-sign-out text-lg"></i> Sair do App</button></div>
      </aside>
      
      <nav className="md:hidden fixed bottom-0 inset-x-0 border-t border-slate-200 dark:border-slate-800 z-50 flex justify-around p-2 pb-safe bg-white dark:bg-slate-900 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] overflow-x-auto hide-scroll">
        {menu.filter(m=>!m.adminOnly||isAd).map(m=><button key={m.id} onClick={()=>setT(m.id)} className={`flex flex-col items-center gap-1 p-2 rounded-xl min-w-[64px] transition ${t===m.id?'text-primary':'text-slate-400'}`}><i className={`ph-fill ${m.i} text-2xl`}></i><span className="text-[9px] font-black uppercase">{m.n}</span></button>)}
      </nav>
      
      <main className="flex-1 transition-all p-4 md:p-8 w-full md:ml-64 overflow-x-hidden">
        <TopHeader user={u} isDark={isD} toggleDark={()=>setIsD(!isD)} />
        
        {t==='MATRIZ' && <VisaoAmplaView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='CALENDARIO' && <CalendarioView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='CONFIG' && isAd && <AjustesView cfg={dbD.CONFIGURACOES || {}} onSave={api.saveRecord} onRefresh={f} />}
      </main>

      {/* O CHATBOT FICA AQUI, ACESSÍVEL DE QUALQUER TELA */}
      <ChatBot escalas={dbD.ESCALAS} profs={dbD.PROFISSIONAIS} />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root')); 
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
