    const manifest = { name: "Escalas SV", short_name: "Escalas SV", start_url: ".", display: "standalone", background_color: "#0f172a", theme_color: "#0ea5e9", icons: [{ src: svgIcon, sizes: "512x512", type: "image/svg+xml" }] };
    const blob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
    document.addEventListener("DOMContentLoaded", () => {

<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, Component, useMemo } = React;

const firebaseConfig = { apiKey:"AIzaSyAtywH5sc1OEs0xa-c7IDOpGA9764ZhU6c", authDomain:"escalas-sao-vicente.firebaseapp.com", projectId:"escalas-sao-vicente", storageBucket:"escalas-sao-vicente.firebasestorage.app", messagingSenderId:"256697542067", appId:"1:256697542067:web:b8087390bb57d74def97c6" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(); const auth = firebase.auth();

db.enablePersistence({synchronizeTabs:true}).catch(e => console.log(e));

const api = {
    fetch: async (c) => { try { const s = await db.collection(c).get(); return s.docs.map(d => ({ ID: d.id, ...d.data() })); } catch(e){return [];} },
    saveRecord: async (c, d) => { try { let o={...d}; let id=o.ID; delete o.ID; if(id) await db.collection(c).doc(id).set(o,{merge:true}); else await db.collection(c).add(o); return true; } catch(e){return false;} },
    deleteRecord: async (c, id) => { try { await db.collection(c).doc(id).delete(); return true; } catch(e){return false;} }
};
const safeStr = (v) => v==null?'':String(v);

const fmtImg = (u) => { 
    let s=safeStr(u).trim(); if(!s) return ''; 
    const match = s.match(/(?:file\/d\/|id=|v\/|u\/\d+\/p\/)([a-zA-Z0-9_-]{25,})/);
    if(match) return `https://drive.google.com/uc?export=view&id=${match[1]}`; 
    return s; 
};

const getStrDt = (d) => { if(!d) return ''; return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear(); };
const ordenarPorNome = (lista) => [...lista].sort((a, b) => safeStr(a.Nome).localeCompare(safeStr(b.Nome)));

const isEscalaValida = (esc, postosCfg) => {
    const sala = safeStr(esc.Sala).trim().toUpperCase();
    const salasOficiais = ['A DEFINIR', 'FOLGA', 'FÉRIAS', 'ATESTADO', 'TRABALHO EXTERNO', 'OUTROS'];
    if (salasOficiais.includes(sala)) return true;
    const postosList = postosCfg || [];
    return postosList.some(p => safeStr(p.nome).trim().toUpperCase() === sala);
};

const getCorDaSala = (salaNome, cfg) => {
    const psts = cfg?.postos || []; const sets = cfg?.setores || [];
    const p = psts.find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(salaNome).trim().toUpperCase());
    if(!p) return '#94a3b8'; 
    const s = sets.find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(p.setor).trim().toUpperCase());
    return s?.cor || '#0ea5e9';
}

const parseHorario = (hStr) => {
    if(!hStr || hStr === 'A DEFINIR') return null;
    let parts = hStr.split(':'); if(parts.length < 2) return null;
    return parseInt(parts[0]) + (parseInt(parts[1])/60);
};

const checkIsMe = (nomeProfissional, userEmail) => {
    if(!nomeProfissional || !userEmail) return false;
    const norm = (s) => safeStr(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const parts = norm(userEmail).split('@')[0].split(/[.\-_]/);
    const nProf = norm(nomeProfissional);
    return parts.some(p => p.length > 2 && nProf.includes(p));
};

const BadgeConvenio = ({ codUnimed, configLogo }) => {
    if(!codUnimed) return null;
    if(configLogo) return <img src={fmtImg(configLogo)} className="h-4 w-auto inline-block ml-2 rounded-sm bg-white" title={`Código Unimed: ${codUnimed}`} alt="Convênio" />;
    return <span className="ml-2 bg-green-500 text-white text-[8px] px-1.5 py-0.5 rounded font-black">CONVÊNIO</span>;
}

class ErrorBoundary extends Component {
    constructor(props){super(props);this.state={hasError:false,e:''};} static getDerivedStateFromError(e){return{hasError:true};} componentDidCatch(e){this.setState({e:String(e)});}
    render(){ if(this.state.hasError) return <div className="p-10 text-center text-red-500 font-bold">Erro detectado. Recarregue a página.</div>; return this.props.children; }
}

const TopHeader = ({ user, isDark, toggleDark }) => {
    const [t, setT] = useState(new Date()); useEffect(()=>{const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i);},[]);
    const h = t.getHours(); let p = h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
    return (
        <div className="clean-card p-6 mb-6 flex justify-between items-center">
            <div className="flex items-center gap-4"><div className="w-12 h-12 rounded-xl flex items-center justify-center text-3xl bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400"><i className="ph-fill ph-hospital"></i></div><div><h2 className="text-2xl font-black">{t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</h2><p className="text-[10px] font-bold uppercase opacity-60 mt-1">{p}, {user?.nome?.split(' ')[0]}</p></div></div>
            <div className="flex items-center gap-4">
                <div className="hidden md:block text-right"><p className="text-[10px] uppercase font-bold opacity-50">Portal Médico</p><p className="font-black text-sm">Escalas SV</p></div>
                <button onClick={toggleDark} className="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex justify-center items-center text-xl hover:scale-110 transition">{isDark?<i className="ph-fill ph-sun text-yellow-400"></i>:<i className="ph-fill ph-moon text-slate-600"></i>}</button>
                <button onClick={()=>auth.signOut()} className="md:hidden w-10 h-10 rounded-full bg-red-50 dark:bg-red-900/30 flex justify-center items-center text-xl hover:scale-110 transition text-red-500"><i className="ph-bold ph-sign-out"></i></button>
            </div>
        </div>
    );
};

// ================== SUPER MODAL E CRACHÁ ==================
const SuperActionModal = ({ escala, profs, cfg, onClose, onSave, onRefresh, isAd }) => {
    const [fd, setFd] = useState({...escala});
    const isMedico = fd.Cargo?.toLowerCase().includes('médico') || profs.find(p=>p.Nome===fd.Nome_Profissional)?.Tipo === 'Médico';
    const profsOrdenados = ordenarPorNome(profs);
    const colaboradoresLivres = profsOrdenados.filter(p => p.Tipo === 'Colaborador' && p.StatusGeral === 'Ativo');
    const medicosAtivos = profsOrdenados.filter(p => p.Tipo === 'Médico' && p.StatusGeral === 'Ativo');

    const handleSave = async (e) => {
        e.preventDefault();
        if (fd.Nome_Profissional === "VAZIO") {
            if(confirm("Deseja realmente excluir este plantão?")) { await api.deleteRecord('ESCALAS', fd.ID); onRefresh(); onClose(); }
            return;
        }
        const pInfo = profs.find(p => p.Nome === fd.Nome_Profissional);
        if(pInfo) { fd.Cor = pInfo.Cor; fd.Cargo = pInfo.Cargo; }
        await onSave('ESCALAS', fd); onRefresh(); onClose();
    };

    return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
            <div className="clean-card w-full max-w-md p-6 max-h-[90vh] overflow-y-auto shadow-2xl" onClick={e=>e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4 border-b border-slate-200 dark:border-slate-700 pb-2">
                    <h3 className="text-xl font-black text-primary flex items-center gap-2"><i className="ph-fill ph-sliders"></i> Gerenciar Escala</h3>
                    <button onClick={onClose} className="text-slate-400 hover:text-red-500"><i className="ph-bold ph-x text-xl"></i></button>
                </div>
                <form onSubmit={handleSave} className="space-y-4">
                    <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700"><p className="text-[10px] font-black uppercase opacity-60">Data</p><p className="font-bold">{fd.Data}</p></div>
                    {isAd && (
                        <div><label className="text-[10px] font-black uppercase opacity-60 text-blue-600">Transferir / Substituir</label>
                            <select value={fd.Nome_Profissional} onChange={e=>setFd({...fd, Nome_Profissional: e.target.value})} className="w-full p-3 border border-blue-200 dark:border-blue-900/30 rounded-xl bg-blue-50 dark:bg-blue-900/10 font-bold text-blue-700 dark:text-blue-400 outline-none mt-1">
                                <option value={fd.Nome_Profissional}>Manter: {fd.Nome_Profissional}</option><option value="VAZIO">🗑️ DEIXAR POSTO VAZIO (Excluir)</option><option disabled>──────────</option>{profsOrdenados.filter(p => p.Nome !== fd.Nome_Profissional).map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
                            </select>
                        </div>
                    )}
                    <div><label className="text-[10px] font-black uppercase opacity-60">Status</label><select value={fd.Status} onChange={e=>setFd({...fd, Status:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none mt-1"><option value="NO POSTO">🟢 Turno Normal (Ativo)</option><option value="LANCHE">☕ Lanche / Pausa</option><option value="FOLGA">⚪ Folga Agendada</option><option value="AUSENTE">🔴 Ausente / Falta</option></select></div>
                    <div className="grid grid-cols-2 gap-3">
                        <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Sala / Posto</label><select value={fd.Sala} onChange={e=>setFd({...fd, Sala:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none mt-1"><option value="A DEFINIR">A DEFINIR...</option><option value="FOLGA">FOLGA / FÉRIAS</option><option disabled>──────────</option>{cfg?.postos?.map((x,i)=><option key={i} value={x.nome||x}>{x.nome||x}</option>)}</select></div>
                        <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Horário (Ex: 08:00 às 18:00)</label><input type="text" value={fd.Horario} onChange={e=>setFd({...fd, Horario:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none mt-1"/></div>
                    </div>
                    {isMedico ? (
                        <div className="border border-purple-200 dark:border-purple-900/30 rounded-xl p-3 bg-purple-50 dark:bg-purple-900/10"><label className="text-[10px] font-black uppercase text-purple-600 dark:text-purple-400 flex items-center gap-1 mb-1"><i className="ph-fill ph-user-plus"></i> Auxiliar de Sala</label><select value={fd.Auxiliar||''} onChange={e=>setFd({...fd, Auxiliar:e.target.value})} className="w-full p-2 border border-purple-200 dark:border-purple-900/30 rounded bg-white dark:bg-slate-800 font-bold outline-none text-sm"><option value="">Sem auxiliar</option>{colaboradoresLivres.map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}</select></div>
                    ) : (
                        <div className="border border-indigo-200 dark:border-indigo-900/30 rounded-xl p-3 bg-indigo-50 dark:bg-indigo-900/10"><label className="text-[10px] font-black uppercase text-indigo-600 dark:text-indigo-400 flex items-center gap-1 mb-1"><i className="ph-fill ph-stethoscope"></i> Prestando Apoio Ao Médico:</label><select value={fd.MedicoApoio||''} onChange={e=>setFd({...fd, MedicoApoio:e.target.value})} className="w-full p-2 border border-indigo-200 dark:border-indigo-900/30 rounded bg-white dark:bg-slate-800 font-bold outline-none text-sm"><option value="">Atendimento Geral</option>{medicosAtivos.map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}</select></div>
                    )}
                    <div><label className="text-[10px] font-black uppercase opacity-60">Anotações / Obs</label><input type="text" value={fd.ObsDia||''} onChange={e=>setFd({...fd, ObsDia:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 outline-none mt-1"/></div>
                    <div className="flex justify-end gap-2 pt-4 border-t border-slate-200 dark:border-slate-700"><button type="button" onClick={onClose} className="px-4 py-3 font-bold opacity-60">Cancelar</button><button type="submit" className="bg-primary text-white px-8 py-3 rounded-xl font-black hover:bg-blue-600 transition">Salvar</button></div>
                </form>
            </div>
        </div>
    );
};

const CrachaVirtual = ({ profInfo, cfg, onClose }) => {
    return (
        <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
            <div className="clean-card w-full max-w-sm p-0 overflow-hidden shadow-2xl relative" onClick={e=>e.stopPropagation()}>
                <div className="h-24 bg-gradient-to-r from-primary to-blue-400 relative"><button onClick={onClose} className="absolute top-4 right-4 text-white"><i className="ph-bold ph-x text-xl"></i></button></div>
                <div className="px-6 pb-6 pt-0 relative flex flex-col items-center text-center">
                    <div className="w-24 h-24 rounded-full border-4 border-white shadow-lg -mt-12 bg-slate-100 flex items-center justify-center overflow-hidden mb-3" style={{backgroundColor:profInfo.FotoURL?'':(profInfo.Cor||'#0ea5e9')}}>
                        {profInfo.FotoURL ? <img src={fmtImg(profInfo.FotoURL)} className="w-full h-full object-cover" /> : <span className="text-4xl font-black text-white">{profInfo.Nome?.[0]}</span>}
                    </div>
                    <h3 className="text-xl font-black leading-tight flex justify-center items-center gap-2">{profInfo.Nome} <BadgeConvenio codUnimed={profInfo.CodUnimed} configLogo={cfg?.logoConvenio} /></h3>
                    <p className="text-xs font-bold text-primary uppercase mt-1">{profInfo.Cargo}</p>
                    <div className="w-full mt-6 space-y-2 text-left">
                        <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700"><p className="text-[9px] uppercase font-bold opacity-50">Lotação Base</p><p className="text-xs font-black">{profInfo.UnidadeBase || 'Geral'} • {profInfo.Setor || '-'}</p></div>
                        {(profInfo.CRM || profInfo.CodUnimed) && <div className="bg-slate-50 p-3 rounded-xl flex gap-4">{profInfo.CRM && <div><p className="text-[9px] uppercase font-bold opacity-50">CRM</p><p className="text-xs font-black">{profInfo.CRM}</p></div>}{profInfo.CodUnimed && <div><p className="text-[9px] uppercase font-bold opacity-50">Unimed</p><p className="text-xs font-black">{profInfo.CodUnimed}</p></div>}</div>}
                        {profInfo.ObservacoesGerais && <div className="bg-yellow-50 p-3 rounded-xl"><p className="text-[9px] uppercase font-bold text-yellow-600"><i className="ph-fill ph-info"></i> Obs</p><p className="text-xs text-yellow-800">{profInfo.ObservacoesGerais}</p></div>}
                    </div>
                </div>
            </div>
        </div>
    );
};

// ================== ABA 1: AJUSTES ==================
const AjustesView = ({ cfg, onSave, onRefresh }) => {
    const [u, setU] = useState([]); const [s, setS] = useState([]); const [p, setP] = useState([]); const [loading, setL] = useState(false); const [mod, setMod] = useState(null); 
    const [logoConv, setLogoConv] = useState('');
    useEffect(() => { setU(cfg?.unidades||[]); setS(cfg?.setores||[]); setP(cfg?.postos||[]); setLogoConv(cfg?.logoConvenio||''); }, [cfg]);
    const salvar = async () => { setL(true); await onSave('CONFIGURACOES',{ID:'parametros',unidades:u,setores:s,postos:p, logoConvenio:logoConv}); onRefresh(); setL(false); alert("Salvo!"); };
    const confirmMod = (e) => {
        e.preventDefault(); const { t, act, idx, v1, v2, v3 } = mod; let n1 = v1.trim().toUpperCase(); let n2 = v2.trim().toUpperCase();
        if(act === 'add') {
            if(t==='u') setU([...u, {nome:n1}]); if(t==='s') setS([...s, {nome:n1, unidade:n2, cor:v3}]); if(t==='p') setP([...p, {nome:n1, setor:n2}]);
        } else {
            if(t==='u'){ let arr=[...u]; arr[idx].nome=n1; setU(arr); } if(t==='s'){ let arr=[...s]; arr[idx].nome=n1; arr[idx].unidade=n2; arr[idx].cor=v3; setS(arr); } if(t==='p'){ let arr=[...p]; arr[idx].nome=n1; arr[idx].setor=n2; setP(arr); }
        } setMod(null);
    };
    const del = (tipo, idx) => {
        if(!confirm("Excluir?")) return;
        if(tipo==='u') setU(u.filter((_,i)=>i!==idx)); if(tipo==='s') setS(s.filter((_,i)=>i!==idx)); if(tipo==='p') setP(p.filter((_,i)=>i!==idx));
    };
    return (
        <div className="animate-fade-in space-y-6 max-w-6xl mx-auto">
            <div className="flex justify-between items-center"><h2 className="text-2xl font-black">Ajustes</h2><button onClick={salvar} disabled={loading} className="bg-primary text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600">Salvar Servidor</button></div>
            <div className="clean-card p-4 flex justify-between bg-blue-50/50 gap-4">
                <div><h4 className="font-bold text-sm">Logo Convênio (UNIMED)</h4></div>
                <input type="text" value={logoConv} onChange={e=>setLogoConv(e.target.value)} placeholder="URL Imagem" className="p-2 border rounded w-64 text-xs" />
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div className="clean-card p-5"><div className="flex justify-between"><h3 className="font-black text-sm">1. Unidades</h3><button onClick={()=>setMod({t:'u',act:'add',v1:'',v2:'',v3:''})} className="text-primary font-black">+</button></div><div className="mt-2 space-y-2">{u.map((x,i)=><div key={i} className="flex justify-between bg-slate-50 p-2 rounded text-xs"><span className="font-bold">{x.nome}</span><button onClick={()=>del('u',i)} className="text-red-500">X</button></div>)}</div></div>
                <div className="clean-card p-5"><div className="flex justify-between"><h3 className="font-black text-sm">2. Setores (Cores)</h3><button onClick={()=>setMod({t:'s',act:'add',v1:'',v2:'',v3:'#0ea5e9'})} className="text-primary font-black">+</button></div><div className="mt-2 space-y-2">{s.map((x,i)=><div key={i} className="flex justify-between bg-slate-50 p-2 rounded text-xs items-center"><div className="flex gap-2 items-center"><div className="w-3 h-3 rounded-full" style={{background:x.cor}}></div><span className="font-bold">{x.nome}</span></div><button onClick={()=>del('s',i)} className="text-red-500">X</button></div>)}</div></div>
                <div className="clean-card p-5"><div className="flex justify-between"><h3 className="font-black text-sm">3. Salas/Postos</h3><button onClick={()=>setMod({t:'p',act:'add',v1:'',v2:'',v3:''})} className="text-primary font-black">+</button></div><div className="mt-2 space-y-2">{p.map((x,i)=><div key={i} className="flex justify-between bg-slate-50 p-2 rounded text-xs"><span className="font-bold">{x.nome}</span><button onClick={()=>del('p',i)} className="text-red-500">X</button></div>)}</div></div>
            </div>
            {mod && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60" onClick={()=>setMod(null)}><div className="clean-card w-full max-w-md p-6" onClick={e=>e.stopPropagation()}><form onSubmit={confirmMod} className="space-y-4">
                    <input type="text" value={mod.v1} onChange={e=>setMod({...mod, v1:e.target.value})} className="w-full p-3 rounded-xl border dark:bg-slate-900" placeholder="Nome" required autoFocus/>
                    {mod.t==='s' && <><select value={mod.v2} onChange={e=>setMod({...mod, v2:e.target.value})} className="w-full p-3 border rounded-xl" required><option value="">Unidade...</option>{u.map((x,i)=><option key={i} value={x.nome}>{x.nome}</option>)}</select><input type="color" value={mod.v3} onChange={e=>setMod({...mod, v3:e.target.value})} className="w-full h-12 p-1 border rounded-xl"/></>}
                    {mod.t==='p' && <select value={mod.v2} onChange={e=>setMod({...mod, v2:e.target.value})} className="w-full p-3 border rounded-xl" required><option value="">Setor...</option>{s.map((x,i)=><option key={i} value={x.nome}>{x.nome}</option>)}</select>}
                    <button type="submit" className="w-full bg-primary text-white p-3 rounded-xl font-bold">Salvar</button>
                </form></div></div>
            )}
        </div>
    );
};

// ================== ABA 2: EQUIPE ==================
const EquipeView = ({ data, cfg, onSave, onDelete, onRefresh }) => {
    const [viewMode, setViewMode] = useState('MENU'); const [modal, setModal] = useState(false); const [fd, setFd] = useState({}); const [busca, setBusca] = useState('');
    const u = cfg?.unidades||[]; const s = cfg?.setores||[]; 
    const openModal = (i=null) => { setFd(i ? {...i} : { Nome:'', Cargo:'', Tipo: viewMode !== 'MENU' ? viewMode : 'Colaborador', UnidadeBase:'', Setor:'', Cor:'#0ea5e9', CRM:'', CodUnimed:'', isGestor: false, StatusGeral:'Ativo', TipoContrato: '', ObservacoesGerais: '' }); setModal(true); };
    const save = async (e) => { e.preventDefault(); await onSave('PROFISSIONAIS', fd); setModal(false); onRefresh(); };
    const filtrados = ordenarPorNome(data).filter(p => viewMode === 'MENU' ? true : p.Tipo === viewMode).filter(p => safeStr(p.Nome).toLowerCase().includes(busca.toLowerCase()));

    return (
        <div className="animate-fade-in space-y-6 max-w-7xl mx-auto">
            {viewMode === 'MENU' && (
                <div><h2 className="text-2xl font-black mb-6">Equipe</h2><div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div onClick={()=>setViewMode('Colaborador')} className="clean-card p-10 flex flex-col items-center cursor-pointer hover:border-primary"><i className="ph-fill ph-users-three text-4xl mb-4 text-blue-500"></i><h3 className="font-black text-xl uppercase">Colaboradores</h3></div>
                    <div onClick={()=>setViewMode('Médico')} className="clean-card p-10 flex flex-col items-center cursor-pointer hover:border-red-500"><i className="ph-fill ph-stethoscope text-4xl mb-4 text-red-500"></i><h3 className="font-black text-xl uppercase">Corpo Clínico</h3></div>
                </div></div>
            )}
            {viewMode !== 'MENU' && (
                <div>
                    <div className="flex justify-between mb-4 border-b pb-4"><div className="flex gap-4"><button onClick={()=>setViewMode('MENU')} className="w-10 h-10 clean-card flex items-center justify-center"><i className="ph-bold ph-arrow-left"></i></button><h2 className="text-2xl font-black mt-1">{viewMode}s</h2></div><div className="flex gap-2"><input type="text" placeholder="Buscar..." value={busca} onChange={e=>setBusca(e.target.value)} className="p-2 border rounded-xl" /><button onClick={()=>openModal()} className="bg-primary text-white px-4 rounded-xl font-bold">Novo</button></div></div>
                    <div className="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                        {filtrados.map((p, i) => (
                            <div key={i} onClick={()=>openModal(p)} className="clean-card p-4 flex flex-col items-center text-center cursor-pointer relative border-t-4 border-primary hover:shadow-lg">
                                {p.FotoURL ? <img src={fmtImg(p.FotoURL)} className="w-12 h-12 rounded-full object-cover mb-2" /> : <div className="w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center font-black mb-2">{p.Nome[0]}</div>}
                                <h3 className="font-black text-xs truncate w-full flex items-center justify-center">{p.Nome} <BadgeConvenio codUnimed={p.CodUnimed} configLogo={cfg?.logoConvenio} /></h3>
                                <p className="text-[9px] opacity-60 uppercase">{p.Cargo}</p>
                                <button onClick={(e)=>{e.stopPropagation();if(confirm('Excluir?')){onDelete('PROFISSIONAIS',p.ID);onRefresh();}}} className="absolute top-2 right-2 text-red-500"><i className="ph-fill ph-trash"></i></button>
                            </div>
                        ))}
                    </div>
                </div>
            )}
            {modal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60" onClick={()=>setModal(false)}><div className="clean-card w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]" onClick={e=>e.stopPropagation()}><div className="p-4 border-b"><h3 className="font-black">Ficha Cadastral</h3></div><form onSubmit={save} className="p-5 overflow-y-auto space-y-4 text-sm text-slate-800 dark:text-white">
                    <div className="grid grid-cols-2 gap-4">
                        <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Nome</label><input type="text" value={fd.Nome} onChange={e=>setFd({...fd,Nome:e.target.value})} className="w-full p-2 border rounded" required/></div>
                        <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Foto URL (Drive)</label><input type="text" value={fd.FotoURL||''} onChange={e=>setFd({...fd,FotoURL:e.target.value})} className="w-full p-2 border rounded"/></div>
                        <div><label className="text-[10px] font-black uppercase opacity-60">Unidade</label><select value={fd.UnidadeBase||''} onChange={e=>setFd({...fd,UnidadeBase:e.target.value})} className="w-full p-2 border rounded"><option value="">Selecione...</option>{u.map((x,i)=><option key={i} value={x.nome}>{x.nome}</option>)}</select></div>
                        <div><label className="text-[10px] font-black uppercase opacity-60">Setor</label><select value={fd.Setor||''} onChange={e=>setFd({...fd,Setor:e.target.value})} className="w-full p-2 border rounded"><option value="">Selecione...</option>{s.map((x,i)=><option key={i} value={x.nome}>{x.nome}</option>)}</select></div>
                        {fd.Tipo==='Médico' ? ( <><div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Especialidade / Cargo</label><input type="text" value={fd.Cargo||''} onChange={e=>setFd({...fd,Cargo:e.target.value})} className="w-full p-2 border rounded" required/></div><div><label className="text-[10px] font-black uppercase opacity-60">CRM</label><input type="text" value={fd.CRM||''} onChange={e=>setFd({...fd,CRM:e.target.value})} className="w-full p-2 border rounded"/></div><div><label className="text-[10px] font-black uppercase opacity-60">Cód Unimed</label><input type="text" value={fd.CodUnimed||''} onChange={e=>setFd({...fd,CodUnimed:e.target.value})} className="w-full p-2 border rounded"/></div></> ) : ( <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Cargo</label><input type="text" value={fd.Cargo||''} onChange={e=>setFd({...fd,Cargo:e.target.value})} className="w-full p-2 border rounded" required/></div> )}
                        <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Cor Destacada</label><input type="color" value={fd.Cor} onChange={e=>setFd({...fd,Cor:e.target.value})} className="w-full h-8 cursor-pointer border rounded" /></div>
                    </div>
                    <div className="pt-4 flex justify-end gap-2 border-t"><button type="button" onClick={()=>setModal(false)} className="px-4 py-2 opacity-60 font-bold">Cancelar</button><button type="submit" className="bg-primary text-white px-6 py-2 rounded font-bold">Salvar Ficha</button></div>
                </form></div></div>
            )}
        </div>
    );
};

// ================== ABA 3: CALENDÁRIO / BUILDER ==================
const CalendarioView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
    const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
    const [mode, setMode] = useState('TIMELINE'); 
    const [builderTipo, setBuilderTipo] = useState('Colaborador'); 
    const [tipoLancamento, setTipoLancamento] = useState('PLANTAO');
    const [motivoAus, setMotivoAus] = useState('Folga');
    const psts = cfg?.postos||[]; const unds = cfg?.unidades||[]; 
    const [selProf, setSelProf] = useState(''); const [selUnd, setSelUnd] = useState(''); const [selSala, setSelSala] = useState('');
    const [hIn, setHIn] = useState(''); const [hOut, setHOut] = useState(''); const [obs, setObs] = useState('');
    const [dates, setDates] = useState([]); 
    const [bMes, setBMes] = useState(new Date());
    const [calProf, setCalProf] = useState(isAd ? '' : user.nome);
    const [mesAtual, setMesAtual] = useState(new Date());
    const [diaAtivo, setDiaAtivo] = useState(null); 
    const [buscaNome, setBuscaNome] = useState(''); const [showAuto, setShowAuto] = useState(false);
    const [editData, setEditData] = useState(null);

    useEffect(() => { if(calProf) setBuscaNome(calProf); }, []);
    
    const toggleD = (dFmt) => { if(dates.includes(dFmt)) setDates(dates.filter(x=>x!==dFmt)); else setDates([...dates, dFmt]); };
    
    const gerar = async () => {
        if(!selProf || dates.length===0) return alert("Preencha Profissional e Datas!");
        const prof = profs.find(x=>x.ID===selProf || x.Nome===selProf);
        let statusFinal = 'NO POSTO'; let salaFinal = selSala || 'A DEFINIR'; let horarioFinal = (hIn && hOut) ? `${hIn} às ${hOut}` : 'A DEFINIR'; let obsFinal = obs;
        if (tipoLancamento === 'AUSENCIA') { statusFinal = motivoAus === 'Folga' ? 'FOLGA' : 'AUSENTE'; salaFinal = motivoAus.toUpperCase(); horarioFinal = '--:--'; obsFinal = obs ? `${motivoAus} - ${obs}` : motivoAus; }
        for(let d of dates){ await onSave('ESCALAS', { Data: d, Unidade: tipoLancamento==='AUSENCIA'?'':selUnd, Sala: salaFinal, Nome_Profissional: prof.Nome, Cargo: prof.Cargo, Horario: horarioFinal, Status: statusFinal, Cor: prof.Cor, ObsDia: obsFinal }); }
        alert("Escalas Geradas!"); setDates([]); setMode('TIMELINE'); onRefresh();
    };

    const buildGrid = (dataRef) => {
        const ano = dataRef.getFullYear(); const mes = dataRef.getMonth();
        const diasNoMes = new Date(ano, mes + 1, 0).getDate(); const priDia = new Date(ano, mes, 1).getDay();
        const vazios = Array.from({length: priDia}); const dias = Array.from({length: diasNoMes}, (_, i) => { const d = new Date(ano, mes, i + 1); return { d, dStr: getStrDt(d) }; });
        return {vazios, dias};
    };

    const gridTL = buildGrid(mesAtual); const gridB = buildGrid(bMes);
    const profsOrdenadosParaBusca = ordenarPorNome(profs);
    const profsOrdenadosParaBuilder = ordenarPorNome(profs.filter(x => (x.StatusGeral==='Ativo'||!x.StatusGeral) && x.Tipo === builderTipo));
    const profSelecionado = profs.find(p => p.Nome === calProf);

    return (
        <div className="animate-fade-in max-w-5xl mx-auto space-y-6 pb-10">
            {isAd && (
                <div className="flex gap-2 mb-4 border-b pb-4">
                    <button onClick={()=>setMode('TIMELINE')} className={`px-4 py-2 rounded-xl font-bold text-sm ${mode==='TIMELINE'?'bg-primary text-white':'bg-slate-200 text-slate-600'}`}>Ver Calendário</button>
                    <button onClick={()=>setMode('BUILDER')} className={`px-4 py-2 rounded-xl font-bold text-sm ${mode==='BUILDER'?'bg-accent text-white':'bg-slate-200 text-slate-600'}`}>Criar Escalas</button>
                </div>
            )}
            {mode === 'BUILDER' ? (
                <div className="clean-card p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="space-y-4">
                        <div className="flex bg-slate-100 p-1 rounded-xl mb-2"><button onClick={()=>{setBuilderTipo('Colaborador'); setSelProf('');}} className={`flex-1 py-2 text-xs font-black uppercase rounded-lg ${builderTipo==='Colaborador'?'bg-white shadow text-blue-600':'opacity-60'}`}>Equipe Base</button><button onClick={()=>{setBuilderTipo('Médico'); setSelProf('');}} className={`flex-1 py-2 text-xs font-black uppercase rounded-lg ${builderTipo==='Médico'?'bg-white shadow text-red-600':'opacity-60'}`}>Médicos</button></div>
                        <div><select value={selProf} onChange={e=>setSelProf(e.target.value)} className="w-full p-3 border rounded-xl font-bold"><option value="">Profissional (A-Z)...</option>{profsOrdenadosParaBuilder.map(x=><option key={x.ID} value={x.ID}>{x.Nome}</option>)}</select></div>
                        <div className="flex bg-slate-100 p-1 rounded-xl my-4"><button onClick={()=>setTipoLancamento('PLANTAO')} className={`flex-1 py-2 text-xs font-black uppercase rounded-lg ${tipoLancamento==='PLANTAO'?'bg-white shadow text-primary':'opacity-60'}`}>Plantão Normal</button><button onClick={()=>setTipoLancamento('AUSENCIA')} className={`flex-1 py-2 text-xs font-black uppercase rounded-lg ${tipoLancamento==='AUSENCIA'?'bg-white shadow text-red-500':'opacity-60'}`}>Folga/Ausência</button></div>
                        {tipoLancamento === 'PLANTAO' ? (
                            <div className="space-y-4"><select value={selUnd} onChange={e=>setSelUnd(e.target.value)} className="w-full p-3 border rounded-xl"><option value="">Unidade (A DEFINIR)...</option>{unds.map((x,i)=><option key={i} value={x.nome}>{x.nome}</option>)}</select><select value={selSala} onChange={e=>setSelSala(e.target.value)} className="w-full p-3 border rounded-xl"><option value="">Sala (A DEFINIR)...</option>{psts.map((x,i)=><option key={i} value={x.nome}>{x.nome}</option>)}</select><div className="flex gap-2"><input type="time" value={hIn} onChange={e=>setHIn(e.target.value)} className="w-full p-3 border rounded-xl" /><input type="time" value={hOut} onChange={e=>setHOut(e.target.value)} className="w-full p-3 border rounded-xl" /></div></div>
                        ) : (
                            <div className="space-y-4"><select value={motivoAus} onChange={e=>setMotivoAus(e.target.value)} className="w-full p-3 border border-red-200 rounded-xl bg-red-50 text-red-600 font-bold"><option value="Folga">Folga Agendada</option><option value="Férias">Férias</option><option value="Atestado">Atestado Médico</option></select></div>
                        )}
                        <input type="text" value={obs} onChange={e=>setObs(e.target.value)} className="w-full p-3 border rounded-xl" placeholder="Anotações..." />
                    </div>
                    <div className="border-l pl-0 md:pl-6 space-y-4 flex flex-col">
                        <div className="flex justify-between items-center mb-2"><button onClick={()=>setBMes(new Date(bMes.getFullYear(), bMes.getMonth()-1, 1))} className="w-8 h-8 rounded bg-slate-100"><i className="ph-bold ph-caret-left"></i></button><span className="font-bold text-sm uppercase">{bMes.toLocaleString('pt-BR',{month:'long',year:'numeric'})}</span><button onClick={()=>setBMes(new Date(bMes.getFullYear(), bMes.getMonth()+1, 1))} className="w-8 h-8 rounded bg-slate-100"><i className="ph-bold ph-caret-right"></i></button></div>
                        <div className="grid grid-cols-7 gap-1 text-center text-[9px] font-black opacity-50"><div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div></div>
                        <div className="grid grid-cols-7 gap-1">{gridB.vazios.map((_, i) => <div key={`v-${i}`} className="p-2"></div>)}{gridB.dias.map((d, i) => { const isSel = dates.includes(d.dStr); return <button key={i} onClick={(e)=>{e.preventDefault(); toggleD(d.dStr);}} className={`p-2 rounded-lg text-xs font-bold ${isSel? (tipoLancamento==='AUSENCIA'?'bg-red-500 text-white':'bg-primary text-white') : 'bg-slate-50'}`}>{d.d.getDate()}</button> })}</div>
                        <button onClick={gerar} className={`w-full py-4 rounded-xl font-black mt-auto text-white ${tipoLancamento==='AUSENCIA'?'bg-red-500':'bg-accent'}`}>Salvar</button>
                    </div>
                </div>
            ) : (
                <div className="space-y-6">
                    <div className="clean-card p-5 flex flex-col lg:flex-row justify-between gap-4">
                        <div className="flex items-center gap-4"><button onClick={()=>{setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()-1, 1)); setDiaAtivo(null);}} className="w-8 h-8 bg-slate-100 rounded-full flex justify-center items-center"><i className="ph-bold ph-caret-left"></i></button><h2 className="text-lg font-black uppercase w-40 text-center">{mesAtual.toLocaleString('pt-BR', {month:'long', year:'numeric'})}</h2><button onClick={()=>{setMesAtual(new Date(mesAtual.getFullYear(), mesAtual.getMonth()+1, 1)); setDiaAtivo(null);}} className="w-8 h-8 bg-slate-100 rounded-full flex justify-center items-center"><i className="ph-bold ph-caret-right"></i></button></div>
                        <div className="relative flex-1 md:w-72">
                            <input type="text" placeholder="Buscar profissional..." value={buscaNome} onChange={e=>{setBuscaNome(e.target.value); setShowAuto(true); setCalProf(''); setDiaAtivo(null);}} onFocus={()=>setShowAuto(true)} className="p-2.5 rounded-lg border w-full font-bold" />
                            {showAuto && buscaNome && (
                                <div className="absolute top-full left-0 right-0 mt-1 bg-white border rounded-lg shadow-xl z-50 max-h-60 overflow-y-auto">
                                    {profsOrdenadosParaBusca.filter(p => safeStr(p.Nome).toLowerCase().includes(buscaNome.toLowerCase())).map(p => (
                                        <div key={p.ID} onClick={()=>{setBuscaNome(p.Nome); setCalProf(p.Nome); setShowAuto(false); setDiaAtivo(null);}} className="p-3 cursor-pointer hover:bg-blue-50 border-b"><p className="font-bold text-sm">{p.Nome}</p><p className="text-[10px] opacity-60">{p.Tipo}</p></div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                    {!calProf ? <div className="p-10 text-center opacity-50 font-bold border-dashed border-2 rounded-xl">Selecione um profissional.</div> :
                    <div className="space-y-6">
                        {profSelecionado && (
                            <div className="clean-card p-6 flex items-center gap-6 bg-gradient-to-r from-blue-50 to-white border-l-4 border-l-primary">
                                {profSelecionado.FotoURL ? <img src={fmtImg(profSelecionado.FotoURL)} className="w-20 h-20 rounded-full object-cover shadow-lg border-2 border-white" /> : <div className="w-20 h-20 rounded-full bg-primary text-white flex items-center justify-center text-3xl font-black">{profSelecionado.Nome[0]}</div>}
                                <div><h2 className="text-2xl font-black text-slate-800">{profSelecionado.Nome} <BadgeConvenio codUnimed={profSelecionado.CodUnimed} configLogo={cfg?.logoConvenio} /></h2><p className="text-sm font-bold text-primary uppercase">{profSelecionado.Cargo}</p></div>
                            </div>
                        )}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="clean-card p-6 lg:col-span-2">
                                <div className="grid grid-cols-7 gap-2 mb-2 text-center text-[10px] font-black opacity-50"><div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div></div>
                                <div className="grid grid-cols-7 gap-2">
                                    {gridTL.vazios.map((_, i) => <div key={`v-${i}`} className="p-2"></div>)}
                                    {gridTL.dias.map((d, i) => {
                                        const temEscala = escalas.some(e => e.Nome_Profissional === calProf && e.Data === d.dStr && isEscalaValida(e, cfg?.postos));
                                        const isSel = diaAtivo === d.dStr;
                                        return (
                                            <div key={i} onClick={()=> temEscala && setDiaAtivo(d.dStr)} className={`relative flex flex-col items-center justify-center p-3 rounded-xl border ${temEscala?'cursor-pointer shadow-sm':''} ${isSel?'ring-2 ring-primary bg-blue-50':''}`}>
                                                <span className={`text-sm font-bold ${temEscala?'text-slate-800':'text-slate-400'}`}>{d.d.getDate()}</span>
                                                {temEscala && <span className="absolute bottom-2 w-1.5 h-1.5 rounded-full bg-primary"></span>}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                            <div className="clean-card p-6 bg-slate-50">
                                {diaAtivo ? (
                                    <div><h3 className="font-black text-lg mb-4 text-primary border-b pb-2"><i className="ph-fill ph-calendar-check"></i> {diaAtivo}</h3><div className="space-y-4">
                                        {escalas.filter(e => e.Nome_Profissional === calProf && e.Data === diaAtivo && isEscalaValida(e, cfg?.postos)).map((esc, j) => {
                                            const isFolga = esc.Status === 'FOLGA'; const isAus = esc.Status === 'AUSENTE';
                                            return (
                                                <div key={j} className={`p-4 rounded-xl shadow-sm border relative overflow-hidden ${isFolga?'bg-slate-100 opacity-80':isAus?'bg-red-50 border-red-200':'bg-white'}`}>
                                                    <div className="absolute left-0 top-0 bottom-0 w-1.5" style={{backgroundColor: isFolga ? '#94a3b8' : isAus ? '#ef4444' : getCorDaSala(esc.Sala, cfg)}}></div>
                                                    {(!isFolga && !isAus && esc.Unidade) && <p className="text-[10px] font-black uppercase tracking-widest opacity-60 pl-1">{esc.Unidade}</p>}
                                                    <h4 className={`font-black text-base pl-1 ${isFolga||isAus?'text-slate-600':''}`}>{esc.Sala}</h4>
                                                    {(!isFolga && !isAus) && <p className="text-sm font-bold mt-1 pl-1"><i className="ph-fill ph-clock"></i> {esc.Horario}</p>}
                                                    {isAd && <div className="absolute top-2 right-2 flex gap-2"><button onClick={() => setEditData({...esc})} className="text-yellow-500 hover:scale-110"><i className="ph-fill ph-pencil"></i></button></div>}
                                                </div>
                                            )
                                        })}
                                    </div></div>
                                ) : <div className="h-full flex flex-col items-center justify-center opacity-50"><i className="ph-fill ph-cursor-click text-4xl mb-2"></i><p className="text-xs font-bold">Clique no calendário</p></div>}
                            </div>
                        </div>
                    </div>}
                </div>
            )}
            {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
        </div>
    );
};
    // ================== ABA 4: MAPA DE PLANTÃO (REFORMULADO C/ BUSCA E CRACHÁ) ==================
const PainelHojeView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
    const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
    const [now, setNow] = useState(Date.now()); 
    const [actU, setActU] = useState(null);
    const [buscaGlobal, setBuscaGlobal] = useState(''); 
    const [infoProfModal, setInfoProfModal] = useState(null);
    const [editData, setEditData] = useState(null);

    useEffect(() => { const t = setInterval(() => setNow(Date.now()), 10000); return () => clearInterval(t); }, []);

    const dStr = getStrDt(new Date()); 
    // Filtro Caça-Fantasmas aplicado:
    const escHjRaw = escalas.filter(e => e.Data === dStr && isEscalaValida(e, cfg?.postos));
    
    const unids = cfg?.unidades||[]; const setoresSis = cfg?.setores||[]; const postosSis = cfg?.postos||[];

    const setStatus = async (esc, st) => { await api.saveRecord('ESCALAS', {...esc, Status:st}); onRefresh(); };

    const renderPosto = (sala, ocupantes) => {
        ocupantes.sort((a,b)=> (a.Horario||'').localeCompare(b.Horario||''));
        const d=new Date(now); const hStr=`${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        
        let currArr = []; let nxtArr = [];

        for(let o of ocupantes) {
            let pts = (o.Horario||'').split(' às '); let inH = pts[0]?.trim(); let outH = pts[1]?.trim();
            if(!inH || !outH || o.Horario === 'A DEFINIR') { currArr.push(o); continue; } 
            if(hStr >= inH && hStr <= outH) { currArr.push(o); } 
            else if (hStr < inH) { nxtArr.push(o); }
        }

        if(currArr.length === 0 && nxtArr.length === 0) return <div className="flex-1 flex flex-col items-center justify-center text-slate-400 py-6"><i className="ph-bold ph-ghost text-3xl mb-2 opacity-30"></i><span className="text-[9px] font-black uppercase">Turno Encerrado</span></div>;

        return (
            <div className="flex-1 p-2 flex flex-col gap-2">
                {currArr.map((curr, idx) => {
                    const isInt = curr?.Status === 'LANCHE'; const isAus = curr?.Status === 'AUSENTE';
                    const isMe = checkIsMe(curr?.Nome_Profissional, user.email);
                    const pInfo = profs.find(p => p.Nome === curr.Nome_Profissional) || {Nome: curr.Nome_Profissional, Cargo: curr.Cargo, Cor: curr.Cor};

                    return (
                        <div key={'c'+idx} onClick={() => setInfoProfModal(pInfo)} className={`p-2.5 rounded-xl relative border shadow-sm transition-colors cursor-pointer hover:shadow-md ${isInt?'bg-orange-50 border-orange-200 dark:bg-orange-900/20 dark:border-orange-800':isAus?'bg-red-50 border-red-200 dark:bg-red-900/20 dark:border-red-800 opacity-70':'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 hover:border-primary'}`}>
                            <div className="flex items-center gap-2 mb-2">
                                {pInfo.FotoURL ? 
                                    <img src={fmtImg(pInfo.FotoURL)} className="w-8 h-8 rounded-full object-cover shadow-md shrink-0" /> : 
                                    <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-[10px] font-black shrink-0 shadow-md" style={{background:curr.Cor||'#0ea5e9'}}>{curr.Nome_Profissional[0]}</div>
                                }
                                <div className="truncate">
                                    <div className={`text-[11px] font-black truncate text-slate-800 dark:text-white flex items-center gap-1 ${isAus?'line-through text-red-500 dark:text-red-400':''}`}>
                                        <span className="truncate">{curr.Nome_Profissional}</span>
                                        <BadgeConvenio codUnimed={pInfo.CodUnimed} configLogo={cfg?.logoConvenio} />
                                    </div>
                                    <p className={`text-[8px] font-bold opacity-60 truncate mt-0.5 text-slate-600 dark:text-slate-300 ${curr.Horario==='A DEFINIR'?'text-red-500':''}`}>{curr.Cargo} • <i className="ph-fill ph-clock"></i> {curr.Horario}</p>
                                </div>
                            </div>
                            
                            {curr.Auxiliar && <p className="text-[8px] font-black text-purple-600 bg-purple-100 px-1.5 py-0.5 rounded inline-block mb-1"><i className="ph-fill ph-user-plus"></i> Auxiliar: {curr.Auxiliar}</p>}
                            {curr.MedicoApoio && <p className="text-[8px] font-black text-indigo-600 bg-indigo-100 px-1.5 py-0.5 rounded inline-block mb-1"><i className="ph-fill ph-stethoscope"></i> Apoio: {curr.MedicoApoio}</p>}

                            <div className="flex justify-between items-center border-t border-slate-100 dark:border-slate-700 pt-2 mt-1">
                                <span className={`text-[8px] font-black px-2 py-1 rounded ${isAus?'bg-red-100 text-red-600':isInt?'bg-orange-100 text-orange-600':'bg-green-100 text-green-600 dark:bg-green-900/30'}`}>{curr.Status === 'NO POSTO' ? 'ATIVO' : curr.Status}</span>
                                
                                <div className="flex gap-1">
                                    {(!isInt && !isAus) ? (
                                        <>
                                            {(isAd || isMe) && (
                                                <button onClick={(e)=>{e.stopPropagation(); setStatus(curr, 'LANCHE');}} title="Ir para o Lanche/Pausa" className="w-6 h-6 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-orange-100 hover:text-orange-600 transition text-slate-500"><i className="ph-fill ph-coffee"></i></button>
                                            )}
                                            {isAd && (
                                                <button onClick={(e)=>{e.stopPropagation(); setEditData({...curr});}} title="Ações Avançadas" className="w-6 h-6 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-blue-100 hover:text-blue-600 transition text-slate-500"><i className="ph-fill ph-sliders"></i></button>
                                            )}
                                        </>
                                    ) : (
                                        <>
                                            {(isAd || (isMe && isInt)) && (
                                                <button onClick={(e)=>{e.stopPropagation(); setStatus(curr, 'NO POSTO');}} className="px-2 py-1 bg-slate-800 dark:bg-slate-700 text-white rounded text-[8px] font-black hover:bg-slate-600 transition"><i className="ph-bold ph-arrow-u-down-left"></i> VOLTAR</button>
                                            )}
                                            {isAus && isAd && <button onClick={(e)=>{e.stopPropagation(); setEditData({...curr});}} className="px-2 py-1 bg-primary text-white rounded text-[8px] font-black hover:bg-blue-600 transition ml-1"><i className="ph-bold ph-sliders"></i> OPÇÕES</button>}
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    );
                })}

                {nxtArr.map((nxt, idx) => {
                    const pInfoNxt = profs.find(p => p.Nome === nxt.Nome_Profissional) || {Nome: nxt.Nome_Profissional, Cor: nxt.Cor};
                    return (
                        <div key={'n'+idx} onClick={() => setInfoProfModal(pInfoNxt)} className="p-2 rounded-xl border border-slate-200 dark:border-slate-700 fade-next relative overflow-hidden cursor-pointer hover:border-primary transition">
                            <p className="text-[8px] font-black text-primary uppercase tracking-widest mb-1">Próximo: {nxt.Horario.split(' ')[0]}</p>
                            <div className="flex items-center gap-2 opacity-70">
                                {pInfoNxt.FotoURL ? 
                                    <img src={fmtImg(pInfoNxt.FotoURL)} className="w-5 h-5 rounded-full object-cover shrink-0" /> : 
                                    <div className="w-5 h-5 rounded-full flex items-center justify-center text-white text-[8px]" style={{background:nxt.Cor||'#000'}}>{nxt.Nome_Profissional[0]}</div>
                                }
                                <div className="truncate max-w-[100px] flex items-center gap-1">
                                    <p className="text-[9px] font-black text-slate-800 dark:text-white truncate">{nxt.Nome_Profissional}</p>
                                    <BadgeConvenio codUnimed={pInfoNxt.CodUnimed} configLogo={cfg?.logoConvenio} />
                                </div>
                            </div>
                        </div>
                    )
                })}
            </div>
        );
    };

    if(buscaGlobal.trim() !== '') {
        const termo = buscaGlobal.toLowerCase();
        const escalasEncontradas = escHjRaw.filter(e => e.Status !== 'FOLGA' && safeStr(e.Nome_Profissional).toLowerCase().includes(termo));
        const postosParaRenderizar = Array.from(new Set(escalasEncontradas.map(e => e.Sala)));

        return (
            <div className="animate-fade-in space-y-8 max-w-[1600px] mx-auto pb-10">
                <div className="flex flex-col md:flex-row justify-between md:items-center gap-4">
                    <h2 className="text-2xl font-black flex items-center gap-2"><i className="ph-bold ph-radar text-primary"></i> Radar de Pessoas</h2>
                    <div className="relative w-full md:w-96">
                        <i className="ph-bold ph-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
                        <input type="text" placeholder="Digite o nome..." value={buscaGlobal} onChange={e=>setBuscaGlobal(e.target.value)} className="w-full p-4 pl-12 rounded-2xl border-2 border-primary outline-none bg-white dark:bg-slate-900 font-bold shadow-lg" autoFocus/>
                        <button onClick={()=>setBuscaGlobal('')} className="absolute right-4 top-4 text-slate-400 hover:text-red-500"><i className="ph-bold ph-x"></i></button>
                    </div>
                </div>

                {postosParaRenderizar.length === 0 ? (
                    <div className="p-20 text-center opacity-50 border-2 border-dashed rounded-2xl">
                        <i className="ph-bold ph-ghost text-6xl mb-4"></i>
                        <p className="font-bold text-lg">Nenhum plantão ativo hoje para "{buscaGlobal}"</p>
                    </div>
                ) : (
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                        {postosParaRenderizar.map((nomeSala, i) => {
                            const ocup = escHjRaw.filter(e => e.Sala === nomeSala && e.Status !== 'FOLGA');
                            const postoInfo = postosSis.find(p => p.nome === nomeSala) || {setor: 'Geral'};
                            return (
                                <div key={i} className="clean-card flex flex-col p-1 min-h-[140px] border-t-4 border-t-primary shadow-md">
                                    <div className="p-2 bg-blue-50 dark:bg-blue-900/20 rounded-t-xl font-black text-[11px] uppercase tracking-widest text-center border-b border-blue-100 dark:border-blue-900/30 truncate px-2">
                                        {nomeSala} <span className="block text-[8px] opacity-50 font-normal">{postoInfo.setor}</span>
                                    </div>
                                    {renderPosto(nomeSala, ocup)}
                                </div>
                            )
                        })}
                    </div>
                )}
                {infoProfModal && <CrachaVirtual profInfo={infoProfModal} cfg={cfg} onClose={()=>setInfoProfModal(null)} />}
                {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
            </div>
        )
    }

    if(!actU) {
        return (
            <div className="animate-fade-in space-y-8 max-w-7xl mx-auto">
                <div className="relative max-w-2xl mx-auto">
                    <i className="ph-bold ph-magnifying-glass absolute left-4 top-4 text-slate-400 text-xl"></i>
                    <input type="text" placeholder="Onde a pessoa está? Digite o nome aqui..." value={buscaGlobal} onChange={e=>setBuscaGlobal(e.target.value)} className="w-full p-4 pl-12 rounded-2xl border border-slate-200 dark:border-slate-700 outline-none bg-white dark:bg-slate-800 font-bold shadow-sm focus:border-primary transition" />
                </div>

                <h2 className="text-2xl font-black mb-4 flex items-center gap-2"><i className="ph-fill ph-hospital text-primary"></i> Selecione a Unidade</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    {unids.map((u,i) => (
                        <div key={i} onClick={()=>setActU(u.nome)} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-primary transition-all">
                            <div className="w-20 h-20 bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-buildings"></i></div>
                            <h3 className="font-black text-xl uppercase tracking-widest">{u.nome}</h3>
                        </div>
                    ))}
                    {unids.length===0 && <div className="col-span-full p-10 text-center border-2 border-dashed rounded-2xl opacity-50 font-bold">Vá em "Ajustes" e cadastre Prédios e Unidades.</div>}
                </div>
            </div>
        );
    }

    const setoresDaUnidade = setoresSis.filter(s => safeStr(s.unidade).trim().toUpperCase() === safeStr(actU).trim().toUpperCase()).map(s => s.nome);
    
    return (
        <div className="animate-fade-in space-y-8 max-w-[1600px] mx-auto pb-10">
            <div className="flex items-center gap-4 border-b border-slate-200 dark:border-slate-800 pb-4"><button onClick={()=>setActU(null)} className="w-10 h-10 clean-card flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800"><i className="ph-bold ph-arrow-left"></i></button><div><p className="text-[10px] font-bold uppercase opacity-50 tracking-widest">Unidade Ativa</p><h2 className="text-2xl font-black">{actU}</h2></div></div>
            
            {setoresDaUnidade.map(setor => {
                const postosSetor = postosSis.filter(p => safeStr(p.setor).trim().toUpperCase() === safeStr(setor).trim().toUpperCase());
                if(postosSetor.length === 0) return null; 
                
                return (
                    <div key={setor} className="space-y-4">
                        <h3 className="text-lg font-black text-slate-600 dark:text-slate-400 uppercase tracking-widest flex items-center gap-2"><i className="ph-fill ph-squares-four opacity-50"></i> {setor}</h3>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                            {postosSetor.map((pst, i) => {
                                const ocup = escHjRaw.filter(e => e.Sala === pst.nome && e.Status !== 'FOLGA' && e.Status !== 'AUSENTE');
                                return (
                                    <div key={i} className={`clean-card flex flex-col p-1 min-h-[140px] border-t-4 ${ocup.length===0?'opacity-70 border-t-slate-300 dark:border-t-slate-600':'border-t-primary shadow-md'}`}>
                                        <div className="p-2 bg-slate-50 dark:bg-slate-800/50 rounded-t-xl font-black text-[11px] uppercase tracking-widest text-center border-b border-slate-100 dark:border-slate-700 truncate px-2">{pst.nome}</div>
                                        {ocup.length===0 ? <div className="flex-1 flex flex-col items-center justify-center text-slate-400 py-6"><i className="ph-bold ph-ghost text-3xl mb-2 opacity-30"></i><span className="text-[9px] font-black uppercase">Posto Livre</span></div> : renderPosto(pst.nome, ocup)}
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                )
            })}
            
            {infoProfModal && <CrachaVirtual profInfo={infoProfModal} cfg={cfg} onClose={()=>setInfoProfModal(null)} />}
            {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
        </div>
    );
};

// ================== ABA 5: O VERDADEIRO GANTT (VISÃO AMPLA HORIZONTAL) ==================
const GanttModernoView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
    const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
    const [viewMode, setViewMode] = useState('MENU');
    const [dataBase, setDataBase] = useState(new Date());
    const [rangeDias, setRangeDias] = useState(1);
    const [editData, setEditData] = useState(null);
    const [agora, setAgora] = useState(new Date());

    useEffect(() => { const timer = setInterval(() => setAgora(new Date()), 60000); return () => clearInterval(timer); }, []);

    const H_INICIO = 6; const H_FIM = 23; const H_TOTAL = H_FIM - H_INICIO + 1;
    const HORAS_REGUA = Array.from({length: H_TOTAL}, (_, i) => H_INICIO + i);

    const diasRender = Array.from({length: rangeDias}, (_, i) => {
        let d = new Date(dataBase); d.setDate(d.getDate() + i); return d;
    });

    const GanttGrid = ({ dateObj }) => {
        const dStr = getStrDt(dateObj);
        const isToday = getStrDt(agora) === dStr;
        const escalasDia = escalas.filter(e => e.Data === dStr && isEscalaValida(e, cfg?.postos));

        let positionNow = null;
        if (isToday) {
            const hDec = agora.getHours() + (agora.getMinutes() / 60);
            if (hDec >= H_INICIO && hDec <= H_FIM + 1) positionNow = ((hDec - H_INICIO) / H_TOTAL) * 100;
        }

        // VISÃO MÉDICOS (Agrupado por Unidade)
        if (viewMode === 'Médico') {
            const escMedicos = escalasDia.filter(e => {
                const pInfo = profs.find(p=>p.Nome === e.Nome_Profissional);
                return (pInfo && pInfo.Tipo === 'Médico') || e.Cargo?.toLowerCase().includes('médico');
            });
            const unidadesAtivas = Array.from(new Set(escMedicos.map(e=>e.Unidade))).filter(Boolean).sort();

            if(unidadesAtivas.length === 0) return <div className="mb-6"><h3 className="text-md font-black text-primary">{dStr}</h3><p className="opacity-50 text-xs">Sem médicos escalados.</p></div>

            return (
                <div className="mb-10 animate-fade-in">
                    <h3 className="text-xl font-black mb-4 flex items-center gap-2 border-b pb-2"><i className="ph-fill ph-calendar-blank text-primary"></i> {dateObj.toLocaleDateString('pt-BR', {weekday: 'long', day: '2-digit', month: 'long'}).toUpperCase()}</h3>
                    {unidadesAtivas.map(und => {
                        const escUnd = escMedicos.filter(e=>e.Unidade === und);
                        const salasUsadas = Array.from(new Set(escUnd.map(e=>e.Sala))).sort();
                        
                        return (
                            <div key={und} className="mb-8 clean-card overflow-x-auto">
                                <div className="bg-slate-800 text-white p-2 text-xs font-black uppercase tracking-widest pl-4">{und}</div>
                                <div className="matrix-container">
                                    <div className="w-full min-w-[900px]">
                                        <div className="gantt-header-row">
                                            <div className="gantt-label font-black text-[10px] uppercase">Posto / Sala</div>
                                            <div className="gantt-track flex relative">
                                                {HORAS_REGUA.map((h, i) => <div key={i} className="absolute h-full border-l border-slate-200 dark:border-slate-700 text-[9px] font-black opacity-40 pl-1 pt-1" style={{left: `${(i/H_TOTAL)*100}%`}}>{String(h).padStart(2,'0')}h</div>)}
                                                {positionNow !== null && <div className="gantt-now-line" style={{left: `${positionNow}%`}}></div>}
                                            </div>
                                        </div>
                                        {salasUsadas.map(sala => {
                                            const blocos = escUnd.filter(e=>e.Sala === sala);
                                            const pCfg = cfg?.postos?.find(p=>p.nome === sala);
                                            return (
                                                <div key={sala} className="gantt-row-wrapper hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                                                    <div className="gantt-label">
                                                        <span className="font-black text-xs truncate">{sala}</span>
                                                        <span className="text-[9px] opacity-50 truncate">{pCfg?.setor || 'Geral'}</span>
                                                    </div>
                                                    <div className="gantt-track relative">
                                                        {HORAS_REGUA.map((h, i) => <div key={i} className="absolute h-full border-l border-slate-200/50 dark:border-slate-800 z-0" style={{left: `${(i/H_TOTAL)*100}%`}}></div>)}
                                                        {positionNow !== null && <div className="gantt-now-line opacity-30 z-10" style={{left: `${positionNow}%`}}></div>}
                                                        
                                                        {blocos.map((b, idx) => {
                                                            const isFolga = b.Status === 'FOLGA';
                                                            let left=0; let width=100;
                                                            if(isFolga || b.Horario === 'A DEFINIR') { left=0; width=100; }
                                                            else {
                                                                const vIn = parseHorario(b.Horario.split(' às ')[0]); let vOut = parseHorario(b.Horario.split(' às ')[1]);
                                                                if(vIn!==null && vOut!==null){
                                                                    if(vOut<=vIn) vOut+=24;
                                                                    left = ((vIn - H_INICIO)/H_TOTAL)*100; width = ((vOut - vIn)/H_TOTAL)*100;
                                                                    if(left<0){width+=left; left=0;} if(left+width>100) width=100-left;
                                                                }
                                                            }
                                                            const color = isFolga ? '#94a3b8' : getCorDaSala(b.Sala, cfg);
                                                            const pInfo = profs.find(p=>p.Nome===b.Nome_Profissional)||{};
                                                            return (
                                                                <div key={idx} onClick={()=>isAd && setEditData(b)} className="gantt-block" style={{left:`${left}%`, width:`${width}%`, backgroundColor: color}}>
                                                                    {pInfo.FotoURL && <img src={fmtImg(pInfo.FotoURL)} className="w-5 h-5 rounded-full object-cover border border-white/30 shrink-0"/>}
                                                                    <div className="flex flex-col overflow-hidden w-full">
                                                                        <span className="truncate font-black text-[11px] leading-tight">{b.Nome_Profissional}</span>
                                                                        <div className="flex gap-2 opacity-80 text-[8px]">
                                                                            <span>{isFolga?'FOLGA':b.Horario}</span>
                                                                            {b.Auxiliar && <span className="bg-black/20 px-1 rounded truncate">Aux: {b.Auxiliar}</span>}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            )
                                                        })}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>
                        )
                    })}
                </div>
            )
        }

        // VISÃO COLABORADORES (Linhas são as Pessoas)
        const escColab = escalasDia.filter(e => {
            const pInfo = profs.find(p=>p.Nome === e.Nome_Profissional);
            return pInfo ? pInfo.Tipo === 'Colaborador' : !e.Cargo?.toLowerCase().includes('médico');
        });
        const nomesColab = Array.from(new Set(escColab.map(e=>e.Nome_Profissional))).sort();

        if(nomesColab.length === 0) return null;

        return (
            <div className="mb-10 animate-fade-in">
                <h3 className="text-xl font-black mb-4 flex items-center gap-2 border-b pb-2"><i className="ph-fill ph-calendar-blank text-primary"></i> {dateObj.toLocaleDateString('pt-BR', {weekday: 'long', day: '2-digit', month: 'long'}).toUpperCase()}</h3>
                <div className="clean-card overflow-x-auto matrix-container">
                    <div className="w-full min-w-[1000px]">
                        <div className="gantt-header-row">
                            <div className="gantt-label font-black text-[10px] uppercase">Colaborador</div>
                            <div className="gantt-track flex relative">
                                {HORAS_REGUA.map((h, i) => <div key={i} className="absolute h-full border-l border-slate-200 dark:border-slate-700 text-[9px] font-black opacity-40 pl-1 pt-1" style={{left: `${(i/H_TOTAL)*100}%`}}>{String(h).padStart(2,'0')}h</div>)}
                                {positionNow !== null && <div className="gantt-now-line" style={{left: `${positionNow}%`}}></div>}
                            </div>
                        </div>
                        {nomesColab.map(nome => {
                            const blocos = escColab.filter(e=>e.Nome_Profissional === nome);
                            const pInfo = profs.find(p=>p.Nome === nome) || {};
                            return (
                                <div key={nome} className="gantt-row-wrapper hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                                    <div className="gantt-label flex flex-row items-center gap-2">
                                        {pInfo.FotoURL ? <img src={fmtImg(pInfo.FotoURL)} className="w-8 h-8 rounded-full object-cover shrink-0"/> : <div className="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-black shrink-0 text-xs">{nome[0]}</div>}
                                        <div className="overflow-hidden">
                                            <span className="font-black text-[11px] truncate block w-full leading-tight">{nome}</span>
                                            <span className="text-[8px] opacity-50 truncate block w-full">{pInfo.Cargo||'Geral'}</span>
                                        </div>
                                    </div>
                                    <div className="gantt-track relative">
                                        {HORAS_REGUA.map((h, i) => <div key={i} className="absolute h-full border-l border-slate-200/50 dark:border-slate-800 z-0" style={{left: `${(i/H_TOTAL)*100}%`}}></div>)}
                                        {positionNow !== null && <div className="gantt-now-line opacity-30 z-10" style={{left: `${positionNow}%`}}></div>}
                                        
                                        {blocos.map((b, idx) => {
                                            const isFolga = b.Status === 'FOLGA';
                                            let left=0; let width=100;
                                            if(isFolga || b.Horario === 'A DEFINIR') { left=0; width=100; }
                                            else {
                                                const vIn = parseHorario(b.Horario.split(' às ')[0]); let vOut = parseHorario(b.Horario.split(' às ')[1]);
                                                if(vIn!==null && vOut!==null){
                                                    if(vOut<=vIn) vOut+=24;
                                                    left = ((vIn - H_INICIO)/H_TOTAL)*100; width = ((vOut - vIn)/H_TOTAL)*100;
                                                    if(left<0){width+=left; left=0;} if(left+width>100) width=100-left;
                                                }
                                            }
                                            const color = isFolga ? '#94a3b8' : getCorDaSala(b.Sala, cfg);
                                            return (
                                                <div key={idx} onClick={()=>isAd && setEditData(b)} className="gantt-block" style={{left:`${left}%`, width:`${width}%`, backgroundColor: color}}>
                                                    <div className="flex flex-col overflow-hidden w-full justify-center">
                                                        <span className="truncate font-black text-xs leading-tight">{isFolga?'FOLGA / AUSÊNCIA':b.Sala}</span>
                                                        <div className="flex gap-2 opacity-80 text-[8px] mt-0.5">
                                                            <span className="truncate uppercase">{b.Unidade || 'GERAL'}</span>
                                                            {!isFolga && b.Horario !== 'A DEFINIR' && <span>• {b.Horario}</span>}
                                                            {b.MedicoApoio && <span className="bg-black/20 px-1 rounded truncate">Apoio: {b.MedicoApoio}</span>}
                                                        </div>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            </div>
        )
    };

    return (
        <div className="animate-fade-in space-y-6 max-w-[1600px] mx-auto pb-10">
            {viewMode === 'MENU' ? (
                <div><h2 className="text-2xl font-black mb-6">Visão Ampla de Tráfego</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div onClick={()=>setViewMode('Colaborador')} className="clean-card p-10 flex flex-col items-center cursor-pointer hover:border-primary"><i className="ph-fill ph-chart-gantt text-4xl text-primary mb-2"></i><h3 className="font-black text-xl">Mapa da Equipe Base</h3><p className="text-xs font-bold opacity-60 mt-1">Timeline de Colaboradores</p></div>
                    <div onClick={()=>setViewMode('Médico')} className="clean-card p-10 flex flex-col items-center cursor-pointer hover:border-red-500"><i className="ph-fill ph-chart-gantt text-4xl text-red-500 mb-2"></i><h3 className="font-black text-xl">Mapa de Consultórios</h3><p className="text-xs font-bold opacity-60 mt-1">Ocupação das Salas por Unidade</p></div>
                </div></div>
            ) : (
                <div className="space-y-6">
                    <div className="flex flex-col lg:flex-row justify-between lg:items-center gap-4 border-b border-slate-200 dark:border-slate-700 pb-4">
                        <div className="flex items-center gap-4">
                            <button onClick={()=>setViewMode('MENU')} className="w-10 h-10 clean-card flex items-center justify-center hover:bg-slate-100"><i className="ph-bold ph-arrow-left"></i></button>
                            <div><p className="text-[10px] font-bold uppercase opacity-50 tracking-widest">Painel de Controle</p><h2 className="text-2xl font-black">{viewMode === 'Médico' ? 'Ocupação de Salas' : 'Rota da Equipe'}</h2></div>
                        </div>
                        <div className="flex items-center gap-2 bg-white dark:bg-slate-800 p-2 rounded-xl shadow-sm border dark:border-slate-700">
                            <button onClick={()=>setDataBase(new Date(dataBase.setDate(dataBase.getDate()-rangeDias)))} className="w-8 h-8 rounded hover:bg-slate-100 dark:hover:bg-slate-700"><i className="ph-bold ph-caret-left"></i></button>
                            <span className="font-black text-xs uppercase px-2">Início: {dataBase.toLocaleDateString('pt-BR')}</span>
                            <button onClick={()=>setDataBase(new Date(dataBase.setDate(dataBase.getDate()+rangeDias)))} className="w-8 h-8 rounded hover:bg-slate-100 dark:hover:bg-slate-700"><i className="ph-bold ph-caret-right"></i></button>
                            <select value={rangeDias} onChange={e=>setRangeDias(Number(e.target.value))} className="ml-2 p-1.5 rounded bg-slate-100 dark:bg-slate-900 text-xs font-bold outline-none"><option value={1}>1 Dia</option><option value={3}>3 Dias</option><option value={7}>7 Dias</option><option value={15}>15 Dias</option><option value={30}>30 Dias</option></select>
                        </div>
                    </div>
                    <div className="space-y-8">{diasRender.map((d, i) => <GanttGrid key={i} dateObj={d} />)}</div>
                </div>
            )}
            {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
        </div>
    );
};

// ================== APP ROOT ==================
const App = () => {
    const [u, setU] = useState(null); const [l, setL] = useState(true); const [t, setT] = useState('HOJE');
    const [dbD, setDb] = useState({ PROFISSIONAIS:[], ESCALAS:[], CONFIGURACOES:{} });
