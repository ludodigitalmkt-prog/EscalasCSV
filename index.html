<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0ea5e9">
<title>Escalas CSV 2.0</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: { primary: '#0ea5e9', secondary: '#1E40AF', accent: '#10b981' },
        animation: { 'fade-in': 'fadeIn 0.3s ease-out', 'pulse-slow': 'pulse 3s infinite' }
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
  body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
  .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
  .hide-scroll::-webkit-scrollbar { display: none; }
  
  .clean-card { background-color: #ffffff; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: all 0.2s ease; }
  .dark .clean-card { background-color: #1e293b; border-color: #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); color: #f8fafc; }
  
  /* ================== CSS DO GANTT HORIZONTAL E VERTICAL ================== */
  .gantt-scroll-area { max-height: 70vh; overflow-y: auto; overflow-x: auto; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; position: relative; }
  .dark .gantt-scroll-area { background: #0f172a; border-color: #334155; }
  
  /* Horizontal */
  .g-h-row { display: flex; border-bottom: 1px solid #f1f5f9; min-height: 60px; }
  .dark .g-h-row { border-color: #1e293b; }
  .g-h-label { width: 180px; min-width: 180px; position: sticky; left: 0; background: #f8fafc; z-index: 20; border-right: 2px solid #e2e8f0; display: flex; flex-direction: column; justify-content: center; padding: 8px; }
  .dark .g-h-label { background: #1e293b; border-color: #334155; }
  .g-h-track { flex: 1; position: relative; min-width: 900px; background: repeating-linear-gradient(90deg, transparent, transparent calc(100%/18 - 1px), #f1f5f9 calc(100%/18 - 1px), #f1f5f9 calc(100%/18)); }
  .dark .g-h-track { background: repeating-linear-gradient(90deg, transparent, transparent calc(100%/18 - 1px), #1e293b calc(100%/18 - 1px), #1e293b calc(100%/18)); }
  .g-h-header { position: sticky; top: 0; z-index: 30; background: #fff; display: flex; border-bottom: 2px solid #e2e8f0; height: 40px; }
  .dark .g-h-header { background: #0f172a; border-color: #334155; }
  .g-h-block { position: absolute; top: 8px; bottom: 8px; border-radius: 6px; padding: 4px 8px; color: white; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 6px; overflow: hidden; white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.2); z-index: 10; }
  .g-h-block:hover { transform: scaleY(1.1); z-index: 15; filter: brightness(1.1); }
  
  /* Vertical */
  .g-v-timecol { width: 60px; min-width: 60px; position: sticky; left: 0; background: #f8fafc; z-index: 20; border-right: 2px solid #e2e8f0; }
  .dark .g-v-timecol { background: #1e293b; border-color: #334155; }
  .g-v-cell { height: 60px; display: flex; justify-content: center; padding-top: 4px; font-size: 10px; font-weight: 900; color: #94a3b8; border-bottom: 1px solid #f1f5f9; }
  .dark .g-v-cell { border-color: #1e293b; color: #64748b; }
  .g-v-datacol { min-width: 140px; flex: 1; border-right: 1px solid #f1f5f9; position: relative; background: repeating-linear-gradient(180deg, transparent, transparent 59px, #f1f5f9 59px, #f1f5f9 60px); }
  .dark .g-v-datacol { border-color: #334155; background: repeating-linear-gradient(180deg, transparent, transparent 59px, #1e293b 59px, #1e293b 60px); }
  .g-v-header { height: 50px; position: sticky; top: 0; z-index: 30; background: #fff; border-bottom: 2px solid #e2e8f0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 4px; }
  .dark .g-v-header { background: #0f172a; border-color: #334155; }
  .g-v-block { position: absolute; left: 4px; right: 4px; border-radius: 8px; padding: 6px; color: white; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; z-index: 10; border: 1px solid rgba(255,255,255,0.2); line-height: 1.2; }
  .g-v-block:hover { transform: scaleX(1.05); z-index: 15; filter: brightness(1.1); }
  
  .linha-agora-h { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 18; }
  .linha-agora-v { position: absolute; left: 0; right: 0; height: 2px; background: #ef4444; z-index: 18; }
  
  /* MURAL */
  .mural-bg { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
  .dark .mural-bg { background-image: radial-gradient(#334155 1px, transparent 1px); }
  @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
  .card-niver { animation: float 3s ease-in-out infinite; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); border: 2px solid #fbcfe8; }
</style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, Component, useMemo } = React;

const firebaseConfig = { apiKey: "AIzaSyAtywH5sc1OEs0xa-c7IDOpGA9764ZhU6c", authDomain: "escalas-sao-vicente.firebaseapp.com", projectId: "escalas-sao-vicente", storageBucket: "escalas-sao-vicente.firebasestorage.app", messagingSenderId: "256697542067", appId: "1:256697542067:web:b8087390bb57d74def97c6" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(); const auth = firebase.auth();
db.enablePersistence({synchronizeTabs:true}).catch(e => console.log("Cache:", e));

const api = {
  fetch: async (c) => { try { const s = await db.collection(c).get(); return s.docs.map(d => ({ ID: d.id, ...d.data() })); } catch(e){ return []; } },
  saveRecord: async (c, d) => { try { let o={...d}; let id=o.ID; delete o.ID; if(id) await db.collection(c).doc(id).set(o,{merge:true}); else await db.collection(c).add(o); return true; } catch(e){ return false; } },
  deleteRecord: async (c, id) => { try { await db.collection(c).doc(id).delete(); return true; } catch(e){ return false; } }
};

const safeStr = (v) => v == null ? '' : String(v);
const fmtImg = (u) => { let s = safeStr(u).trim(); if(!s) return ''; const m = s.match(/(?:file\/d\/|id=|v\/|u\/\d+\/p\/)([a-zA-Z0-9_-]{25,})/); return m ? `https://drive.google.com/uc?export=view&id=${m[1]}` : s; };
const getStrDt = (d) => d ? String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() : '';
const ordenarPorNome = (lista) => [...lista].sort((a, b) => safeStr(a.Nome).localeCompare(safeStr(b.Nome)));
const checkIsMe = (nome, email) => { if(!nome || !email) return false; const p = safeStr(email).toLowerCase().split('@')[0].split(/[.\-_]/); const n = safeStr(nome).toLowerCase(); return p.some(x => x.length > 2 && n.includes(x)); };

// LOGICA DE ANIVERSARIO
const checkNiver = (niverStr) => {
  if (!niverStr) return { isHoje: false, isSemana: false };
  const hj = new Date(); const hjD = hj.getDate(); const hjM = hj.getMonth() + 1;
  const pts = niverStr.split('/'); if(pts.length < 2) return { isHoje: false, isSemana: false };
  const nD = parseInt(pts[0]); const nM = parseInt(pts[1]);
  const isHoje = (nD === hjD && nM === hjM);
  const dtN = new Date(hj.getFullYear(), nM - 1, nD);
  const diffDays = Math.ceil((dtN - hj) / (1000 * 60 * 60 * 24));
  const isSemana = (!isHoje && diffDays > 0 && diffDays <= 7);
  return { isHoje, isSemana, strData: `${String(nD).padStart(2,'0')}/${String(nM).padStart(2,'0')}` };
};

const isEscalaValida = (esc, postosCfg) => {
  const sala = safeStr(esc.Sala).trim().toUpperCase();
  if (['A DEFINIR', 'FOLGA', 'FÉRIAS', 'ATESTADO', 'TRABALHO EXTERNO', 'OUTROS'].includes(sala)) return true;
  return (postosCfg || []).some(p => safeStr(p.nome).trim().toUpperCase() === sala);
};

const getCorDaSala = (salaNome, cfg) => {
  const p = (cfg?.postos || []).find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(salaNome).trim().toUpperCase());
  if(!p) return '#94a3b8'; 
  const s = (cfg?.setores || []).find(x => safeStr(x.nome).trim().toUpperCase() === safeStr(p.setor).trim().toUpperCase());
  return s?.cor || '#0ea5e9';
};

const parseHorario = (hStr) => {
  if(!hStr || hStr === 'A DEFINIR') return null;
  let pts = hStr.split(':'); if(pts.length < 2) return null;
  return parseInt(pts[0]) + (parseInt(pts[1])/60);
};

const BadgeConvenio = ({ cod, logo }) => {
  if(!cod) return null;
  if(logo) return <img src={fmtImg(logo)} className="h-4 w-auto inline-block ml-1 rounded-sm bg-white" title={`Unimed: ${cod}`} />;
  return <span className="ml-1 bg-green-500 text-white text-[8px] px-1 rounded font-black">CONV.</span>;
};

class ErrorBoundary extends Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError() { return { hasError: true }; }
  render() { 
    if (this.state.hasError) return <div className="p-10 text-center text-red-500 font-bold">Erro visual. <button onClick={()=>location.reload()} className="underline ml-2">Recarregar</button></div>; 
    return this.props.children; 
  }
}

const TopHeader = ({ user, isDark, toggleDark }) => {
  const [t, setT] = useState(new Date());
  useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);
  return (
    <div className="clean-card p-6 mb-6 flex justify-between items-center">
      <div className="flex items-center gap-4">
        <div className="w-12 h-12 rounded-xl flex items-center justify-center text-3xl bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400"><i className="ph-fill ph-hospital"></i></div>
        <div><h2 className="text-2xl font-black">{t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</h2><p className="text-[10px] font-bold uppercase opacity-60 mt-1">Olá, {user?.nome?.split(' ')[0]}</p></div>
      </div>
      <div className="flex items-center gap-4">
        <button onClick={toggleDark} className="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex justify-center items-center text-xl hover:scale-110 transition"><i className={isDark ? "ph-fill ph-sun text-yellow-400" : "ph-fill ph-moon"}></i></button>
        <button onClick={() => auth.signOut()} className="md:hidden w-10 h-10 rounded-full bg-red-50 dark:bg-red-900/30 flex justify-center items-center text-xl text-red-500 hover:scale-110 transition"><i className="ph-bold ph-sign-out"></i></button>
      </div>
    </div>
  );
};

// ================== SUPER MODAL (GERENCIAR ESCALA) ==================
const SuperActionModal = ({ escala, profs, cfg, onClose, onSave, onRefresh, isAd }) => {
  const [fd, setFd] = useState({...escala});
  const isMedico = fd.Cargo?.toLowerCase().includes('médico') || profs.find(p=>p.Nome===fd.Nome_Profissional)?.Tipo === 'Médico';
  const pOrd = ordenarPorNome(profs);
  const colabs = pOrd.filter(p => p.Tipo === 'Colaborador' && p.StatusGeral === 'Ativo');
  const meds = pOrd.filter(p => p.Tipo === 'Médico' && p.StatusGeral === 'Ativo');

  const handleSave = async (e) => {
    e.preventDefault();
    if (fd.Nome_Profissional === "VAZIO") {
      if (confirm("Excluir este plantão?")) { await api.deleteRecord('ESCALAS', fd.ID); onRefresh(); onClose(); }
      return;
    }
    const pInfo = profs.find(p => p.Nome === fd.Nome_Profissional);
    if(pInfo) { fd.Cor = pInfo.Cor; fd.Cargo = pInfo.Cargo; }
    await onSave('ESCALAS', fd); onRefresh(); onClose();
  };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
      <div className="clean-card w-full max-w-md p-6 max-h-[90vh] overflow-y-auto shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="flex justify-between items-center mb-4 border-b dark:border-slate-700 pb-2">
          <h3 className="text-xl font-black text-primary flex items-center gap-2"><i className="ph-fill ph-sliders"></i> Gerenciar Escala</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-red-500"><i className="ph-bold ph-x text-xl"></i></button>
        </div>
        <form onSubmit={handleSave} className="space-y-4">
          <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl"><p className="text-[10px] font-black uppercase opacity-60">Data Ref.</p><p className="font-bold">{fd.Data}</p></div>
          {isAd && (
            <div>
              <label className="text-[10px] font-black uppercase opacity-60 text-blue-600 dark:text-blue-400">Transferir / Substituir</label>
              <select value={fd.Nome_Profissional} onChange={e=>setFd({...fd, Nome_Profissional: e.target.value})} className="w-full p-3 border rounded-xl bg-blue-50 dark:bg-slate-900 text-blue-700 dark:text-blue-400 font-bold dark:border-slate-700 outline-none">
                <option value={fd.Nome_Profissional}>Manter: {fd.Nome_Profissional}</option>
                <option value="VAZIO">🗑️ DEIXAR POSTO VAZIO (Excluir)</option>
                <option disabled>──────────</option>
                {pOrd.filter(p => p.Nome !== fd.Nome_Profissional).map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
              </select>
            </div>
          )}
          <div>
            <label className="text-[10px] font-black uppercase opacity-60">Status</label>
            <select value={fd.Status} onChange={e=>setFd({...fd, Status:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none">
              <option value="NO POSTO">🟢 Turno Normal</option><option value="LANCHE">☕ Lanche / Pausa</option><option value="FOLGA">⚪ Folga Agendada</option><option value="AUSENTE">🔴 Ausente / Falta</option>
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div className="col-span-2">
              <label className="text-[10px] font-black uppercase opacity-60">Sala / Posto</label>
              <select value={fd.Sala} onChange={e=>setFd({...fd, Sala:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none">
                <option value="A DEFINIR">A DEFINIR...</option><option value="FOLGA">FOLGA / FÉRIAS</option><option disabled>──────────</option>
                {(cfg?.postos||[]).map((x,i)=><option key={i} value={x.nome||x}>{x.nome||x}</option>)}
              </select>
            </div>
            <div className="col-span-2">
              <label className="text-[10px] font-black uppercase opacity-60">Horário (Ex: 08:00 às 18:00)</label>
              <input type="text" value={fd.Horario} onChange={e=>setFd({...fd, Horario:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 font-bold outline-none"/>
            </div>
          </div>
          {isMedico ? (
            <div className="bg-purple-50 dark:bg-purple-900/10 p-3 rounded-xl border border-purple-200 dark:border-purple-900/30">
              <label className="text-[10px] font-black text-purple-600 dark:text-purple-400 flex items-center gap-1 mb-1"><i className="ph-fill ph-user-plus"></i> Auxiliar de Sala</label>
              <select value={fd.Auxiliar||''} onChange={e=>setFd({...fd, Auxiliar:e.target.value})} className="w-full p-2 border rounded dark:bg-slate-800 dark:border-slate-700 text-sm font-bold outline-none">
                <option value="">Sem auxiliar</option>
                {colabs.map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
              </select>
            </div>
          ) : (
            <div className="bg-indigo-50 dark:bg-indigo-900/10 p-3 rounded-xl border border-indigo-200 dark:border-indigo-900/30">
              <label className="text-[10px] font-black text-indigo-600 dark:text-indigo-400 flex items-center gap-1 mb-1"><i className="ph-fill ph-stethoscope"></i> Apoio a Médico</label>
              <select value={fd.MedicoApoio||''} onChange={e=>setFd({...fd, MedicoApoio:e.target.value})} className="w-full p-2 border rounded dark:bg-slate-800 dark:border-slate-700 text-sm font-bold outline-none">
                <option value="">Atendimento Geral</option>
                {meds.map(p => <option key={p.ID} value={p.Nome}>{p.Nome}</option>)}
              </select>
            </div>
          )}
          <div>
            <label className="text-[10px] font-black uppercase opacity-60">Anotações / Obs</label>
            <input type="text" value={fd.ObsDia||''} onChange={e=>setFd({...fd, ObsDia:e.target.value})} className="w-full p-3 border dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 outline-none"/>
          </div>
          <div className="flex justify-end gap-2 pt-4 border-t dark:border-slate-700">
            <button type="button" onClick={onClose} className="px-4 py-3 font-bold opacity-60 hover:opacity-100 transition">Cancelar</button>
            <button type="submit" className="bg-primary text-white px-8 py-3 rounded-xl font-black">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  );
};

const CrachaVirtual = ({ profInfo, cfg, onClose }) => {
  const niver = checkNiver(profInfo.DataNascimento);
  return (
    <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-slate-900/60 animate-fade-in" onClick={onClose}>
      <div className="clean-card w-full max-w-sm p-0 overflow-hidden shadow-2xl relative" onClick={e=>e.stopPropagation()}>
        <div className={`h-24 relative ${niver.isHoje ? 'bg-gradient-to-r from-pink-500 to-rose-400' : 'bg-gradient-to-r from-primary to-blue-400'}`}>
          <button onClick={onClose} className="absolute top-4 right-4 text-white hover:scale-110"><i className="ph-bold ph-x text-xl"></i></button>
        </div>
        <div className="px-6 pb-6 pt-0 relative flex flex-col items-center text-center">
          <div className={`w-24 h-24 rounded-full border-4 shadow-lg -mt-12 bg-slate-100 dark:bg-slate-700 flex items-center justify-center overflow-hidden mb-3 relative ${niver.isHoje ? 'border-pink-200' : 'border-white dark:border-slate-800'}`} style={{backgroundColor:profInfo.FotoURL?'':(profInfo.Cor||'#0ea5e9')}}>
            {profInfo.FotoURL ? <img src={fmtImg(profInfo.FotoURL)} className="w-full h-full object-cover" /> : <span className="text-4xl font-black text-white">{profInfo.Nome?.[0]}</span>}
          </div>
          {niver.isHoje && <div className="absolute -mt-14 ml-20 text-3xl animate-bounce">🎂</div>}
          <h3 className="text-xl font-black leading-tight flex items-center justify-center gap-1">
            {profInfo.Nome} <BadgeConvenio cod={profInfo.CodUnimed} logo={cfg?.logoConvenio} />
          </h3>
          <p className="text-xs font-bold text-primary uppercase mt-1">{profInfo.Cargo}</p>

          <div className="w-full mt-6 space-y-2 text-left">
            {(niver.isHoje || niver.isSemana) && (
              <div className="bg-pink-50 dark:bg-pink-900/20 p-3 rounded-xl border border-pink-200 text-center animate-pulse-slow">
                <p className="text-pink-600 dark:text-pink-400 font-black text-sm">{niver.isHoje ? '🎉 É ANIVERSÁRIO HOJE! 🎉' : `🎈 Aniversário dia ${niver.strData}`}</p>
              </div>
            )}
            <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700 flex items-center gap-3">
              <i className="ph-fill ph-map-pin text-slate-400 text-xl"></i>
              <div><p className="text-[9px] uppercase font-bold opacity-50 mb-0.5">Lotação Base</p><p className="text-xs font-black">{profInfo.UnidadeBase||'Geral'} • {profInfo.Setor||'-'}</p></div>
            </div>
            {(profInfo.CRM || profInfo.CodUnimed) && (
              <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700 flex gap-4">
                {profInfo.CRM && <div className="flex-1"><p className="text-[9px] uppercase font-bold opacity-50">CRM</p><p className="text-xs font-black">{profInfo.CRM}</p></div>}
                {profInfo.CodUnimed && <div className="flex-1"><p className="text-[9px] uppercase font-bold opacity-50">Unimed</p><p className="text-xs font-black">{profInfo.CodUnimed}</p></div>}
              </div>
            )}
            {profInfo.TipoContrato && (
              <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700">
                <p className="text-[9px] uppercase font-bold opacity-50">Vínculo</p><p className="text-xs font-black">{profInfo.TipoContrato}</p>
              </div>
            )}
            {profInfo.ObservacoesGerais && (
              <div className="bg-yellow-50 dark:bg-yellow-900/20 p-3 rounded-xl border border-yellow-100 dark:border-yellow-900/30">
                <p className="text-[9px] uppercase font-bold text-yellow-600 mb-0.5"><i className="ph-fill ph-info"></i> Obs</p><p className="text-xs text-yellow-800 dark:text-yellow-400">{profInfo.ObservacoesGerais}</p>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

// ================== ABA 1: AJUSTES ==================
const AjustesView = ({ cfg, onSave, onRefresh }) => {
  const [u, setU] = useState([]); const [s, setS] = useState([]); const [p, setP] = useState([]); 
  const [h, setH] = useState([]); const [a, setA] = useState([]); const [logoConv, setLogoConv] = useState(''); 
  const [loading, setL] = useState(false); const [mod, setMod] = useState(null); 

  useEffect(() => { 
    const fmt = arr => (arr||[]).map(x => typeof x==='string' ? {nome: x.toUpperCase()} : x);
    setU(fmt(cfg?.unidades)); setS(fmt(cfg?.setores)); setP(fmt(cfg?.postos)); 
    setH(cfg?.habilidades||[]); setA(cfg?.ausencias||[]); setLogoConv(cfg?.logoConvenio||''); 
  }, [cfg]);

  const salvar = async () => { 
    setL(true); 
    await onSave('CONFIGURACOES',{ID:'parametros',unidades:u,setores:s,postos:p,habilidades:h,ausencias:a,logoConvenio:logoConv}); 
    onRefresh(); setL(false); alert("Salvo no Banco de Dados!"); 
  };

  const confirmMod = (e) => { 
    e.preventDefault(); const { t, act, idx, v1, v2, v3 } = mod; 
    let n1 = v1.trim().toUpperCase(); let n2 = v2.trim().toUpperCase(); 
    if(t==='p'||t==='h'||t==='a') n1 = v1.trim(); 
    if(act === 'add') { 
      if(t==='u') setU([...u, {nome:n1}]); if(t==='s') setS([...s, {nome:n1, unidade:n2, cor:v3}]); if(t==='p') setP([...p, {nome:n1, setor:n2}]); 
      if(t==='h') setH([...h, n1]); if(t==='a') setA([...a, n1]); 
    } else { 
      if(t==='u'){ let arr=[...u]; arr[idx].nome=n1; setU(arr); } 
      if(t==='s'){ let arr=[...s]; arr[idx].nome=n1; arr[idx].unidade=n2; arr[idx].cor=v3; setS(arr); } 
      if(t==='p'){ let arr=[...p]; arr[idx].nome=n1; arr[idx].setor=n2; setP(arr); } 
      if(t==='h'){ let arr=[...h]; arr[idx]=n1; setH(arr); } 
      if(t==='a'){ let arr=[...a]; arr[idx]=n1; setA(arr); } 
    } 
    setMod(null); 
  };

  const del = (t, i) => { 
    if(!confirm("Excluir item permanentemente?")) return; 
    if(t==='u') setU(u.filter((_,x)=>x!==i)); if(t==='s') setS(s.filter((_,x)=>x!==i)); if(t==='p') setP(p.filter((_,x)=>x!==i)); 
    if(t==='h') setH(h.filter((_,x)=>x!==i)); if(t==='a') setA(a.filter((_,x)=>x!==i)); 
  };

  const Lst = ({title, arr, tipo}) => (
    <div className="clean-card p-5">
      <div className="flex justify-between items-center mb-2">
        <h3 className="font-black text-sm">{title}</h3>
        <button onClick={()=>setMod({t:tipo, act:'add', v1:'', v2:'', v3:'#0ea5e9'})} className="bg-primary text-white w-6 h-6 rounded font-black">+</button>
      </div>
      <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
        {arr.map((item, i) => (
          <div key={i} className="flex justify-between items-center bg-slate-50 dark:bg-slate-800 p-2 rounded text-xs border dark:border-slate-700">
            <div className="flex items-center gap-2 overflow-hidden">
              {item.cor && <div className="w-3 h-3 rounded-full shadow-sm shrink-0" style={{background:item.cor}}></div>}
              <div className="truncate">
                <p className="font-bold truncate">{item.nome||item}</p>
                {item.unidade && <p className="text-[8px] opacity-60 truncate">Em: {item.unidade}</p>}
                {item.setor && <p className="text-[8px] opacity-60 truncate">Setor: {item.setor}</p>}
              </div>
            </div>
            <div className="flex gap-1 shrink-0 ml-2">
              <button onClick={()=>setMod({t:tipo, act:'edit', idx:i, v1:item.nome||item, v2:item.unidade||item.setor||'', v3:item.cor||'#0ea5e9'})} className="text-yellow-600 bg-yellow-100 p-1.5 rounded"><i className="ph-bold ph-pencil"></i></button>
              <button onClick={()=>del(tipo, i)} className="text-red-600 bg-red-100 p-1.5 rounded"><i className="ph-bold ph-trash"></i></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="animate-fade-in space-y-6 max-w-6xl mx-auto pb-10">
      <div className="flex justify-between items-center">
        <h2 className="text-2xl font-black">Ajustes & Configurações</h2>
        <button onClick={salvar} disabled={loading} className="bg-primary text-white px-6 py-2 rounded-xl font-bold shadow hover:bg-blue-600 transition">Salvar Servidor</button>
      </div>
      <div className="clean-card p-4 flex flex-col md:flex-row justify-between md:items-center bg-blue-50/50 dark:bg-slate-800/50 gap-4">
        <div><h4 className="font-bold text-sm">Logo Convênio (Ex: UNIMED)</h4><p className="text-[10px] opacity-60">Cole a URL pública da imagem</p></div>
        <input type="text" value={logoConv} onChange={e=>setLogoConv(e.target.value)} placeholder="Link Drive / Imgur" className="p-3 border rounded-xl dark:border-slate-700 dark:bg-slate-900 w-full md:w-96 text-sm outline-none" />
      </div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <Lst title="1. Unidades/Prédios" arr={u} tipo="u"/>
        <Lst title="2. Setores (Cores da Matriz)" arr={s} tipo="s"/>
        <Lst title="3. Salas/Postos" arr={p} tipo="p"/>
        <Lst title="Afastamentos e Licenças" arr={a} tipo="a"/>
        <Lst title="Competências" arr={h} tipo="h"/>
      </div>
      {mod && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 animate-fade-in" onClick={()=>setMod(null)}>
          <div className="clean-card w-full max-w-md p-6" onClick={e=>e.stopPropagation()}>
            <h3 className="text-xl font-black mb-4">Adicionar/Editar</h3>
            <form onSubmit={confirmMod} className="space-y-4">
              <input type="text" value={mod.v1} onChange={e=>setMod({...mod, v1:e.target.value})} className="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" placeholder="Nome" required autoFocus/>
              {mod.t === 's' && (
                <>
                  <select value={mod.v2} onChange={e=>setMod({...mod, v2:e.target.value})} className="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" required>
                    <option value="">Vincular a qual Unidade?</option>
                    {u.map((x,i) => <option key={i} value={x.nome}>{x.nome}</option>)}
                  </select>
                  <div>
                    <label className="text-[10px] font-black uppercase opacity-60">Cor na Matriz Gantt</label>
                    <input type="color" value={mod.v3} onChange={e=>setMod({...mod, v3:e.target.value})} className="w-full h-12 p-1 border rounded-xl dark:border-slate-700 cursor-pointer"/>
                  </div>
                </>
              )}
              {mod.t === 'p' && (
                <select value={mod.v2} onChange={e=>setMod({...mod, v2:e.target.value})} className="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-900 font-bold outline-none" required>
                  <option value="">Vincular a qual Setor?</option>
                  {s.map((x,i) => <option key={i} value={x.nome}>{x.nome}</option>)}
                </select>
              )}
              <div className="flex justify-end gap-2 pt-4 border-t dark:border-slate-700">
                <button type="button" onClick={()=>setMod(null)} className="px-4 opacity-60 font-bold">Cancelar</button>
                <button type="submit" className="bg-primary text-white p-3 px-6 rounded-xl font-bold">Confirmar</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
};

// ================== ABA 2: EQUIPE ==================

  const [modal, setModal] = useState(false); const [fd, setFd] = useState({}); const [busca, setBusca] = useState('');

                <div><label className="text-[10px] font-black uppercase opacity-60">Status Geral</label><select value={fd.StatusGeral||'Ativo'} onChange={e=>setFd({...fd, StatusGeral:e.target.value})} className="w-full p-2 border rounded-lg font-bold text-red-500 dark:border-slate-700 dark:bg-slate-900 outline-none"><option value="Ativo" className="text-green-500">🟢 ATIVO</option>{(cfg?.ausencias||[]).map((x,i)=><option key={i} value={x}>🔴 {x}</option>)}</select></div>
                
                <div><label className="text-[10px] font-black uppercase opacity-60">Cor Pessoal (Matriz/Calendário)</label><input type="color" value={fd.Cor} onChange={e=>setFd({...fd, Cor:e.target.value})} className="w-full h-10 border rounded p-1 cursor-pointer dark:border-slate-700"/></div>
                <div className="col-span-2"><label className="text-[10px] font-black uppercase opacity-60">Observações Gerais</label><textarea value={fd.ObservacoesGerais||''} onChange={e=>setFd({...fd, ObservacoesGerais:e.target.value})} className="w-full p-2 border rounded-lg dark:border-slate-700 dark:bg-slate-900 outline-none" placeholder="Anotações..." rows="2"></textarea></div>
                
              </div>
              <div className="flex justify-end gap-2 pt-4 border-t dark:border-slate-700 mt-4">
                <button type="button" onClick={()=>setModal(false)} className="px-4 py-2 opacity-60 font-bold">Cancelar</button>
                <button type="submit" className="bg-primary text-white px-6 py-2 rounded-xl font-bold shadow hover:bg-blue-600 transition">Salvar Ficha</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
};

// ================== ABA 7: MURAL FESTIVO (ANIVERSARIANTES) ==================
const MuralAniversarioView = ({ profs, cfg }) => {
  const [viewMode, setViewMode] = useState('HOJE'); // HOJE, MES
  const hj = new Date(); const hjM = hj.getMonth() + 1; const hjD = hj.getDate();

  const todosNiverMes = profs.filter(p => {
    if(!p.DataNascimento) return false;
    const pts = p.DataNascimento.split('/');
    if(pts.length < 2) return false;
    return parseInt(pts[1]) === hjM;
  }).sort((a,b) => parseInt(a.DataNascimento.split('/')[0]) - parseInt(b.DataNascimento.split('/')[0]));

  const niverHoje = todosNiverMes.filter(p => parseInt(p.DataNascimento.split('/')[0]) === hjD);

  const renderCard = (p, isH) => (
    <div key={p.ID} className={`card-niver p-6 rounded-2xl flex flex-col items-center text-center shadow-lg relative overflow-hidden ${isH?'scale-105 border-pink-400':'border-pink-200'}`}>
      <div className="absolute top-0 right-0 p-4 opacity-20 text-6xl">🎈</div>
      <div className="absolute bottom-0 left-0 p-4 opacity-20 text-6xl">🎉</div>
      {p.FotoURL ? <img src={fmtImg(p.FotoURL)} className="w-24 h-24 rounded-full object-cover shadow-md border-4 border-white z-10" /> : <div className="w-24 h-24 rounded-full flex items-center justify-center text-4xl font-black text-white shadow-md border-4 border-white z-10" style={{backgroundColor:p.Cor||'#0ea5e9'}}>{p.Nome[0]}</div>}
      <h3 className="font-black text-xl mt-4 z-10 text-slate-800 dark:text-white leading-tight">{p.Nome}</h3>
      <p className="text-sm font-bold opacity-70 z-10 uppercase mt-1">{p.Cargo}</p>
      <div className="mt-4 bg-pink-100 dark:bg-pink-900/30 px-4 py-2 rounded-full z-10 shadow-sm border border-pink-200 dark:border-pink-800">
        <p className="font-black text-pink-600 dark:text-pink-400">🎂 Dia {p.DataNascimento.slice(0,5)}</p>
      </div>
    </div>
  );

  return (
    <div className="animate-fade-in space-y-6 max-w-6xl mx-auto pb-10">
      <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 shadow-sm">
        <h2 className="text-2xl font-black flex items-center gap-2 text-pink-500"><i className="ph-fill ph-confetti"></i> Mural de Aniversários</h2>
        <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-xl">
          <button onClick={()=>setViewMode('HOJE')} className={`px-6 py-2 text-xs font-black uppercase rounded-lg transition ${viewMode==='HOJE'?'bg-white dark:bg-slate-700 shadow text-pink-500':'opacity-60'}`}>Hoje</button>
          <button onClick={()=>setViewMode('MES')} className={`px-6 py-2 text-xs font-black uppercase rounded-lg transition ${viewMode==='MES'?'bg-white dark:bg-slate-700 shadow text-primary':'opacity-60'}`}>Mês Todo</button>
        </div>
      </div>
      <div className="mural-bg min-h-[60vh] rounded-3xl border-4 border-dashed border-pink-200 dark:border-slate-700 p-8 flex flex-col relative overflow-hidden">
        {viewMode === 'HOJE' ? (
          niverHoje.length > 0 ? (
            <div className="flex-1 flex flex-col items-center justify-center space-y-8 relative z-10">
              <h1 className="text-4xl md:text-6xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 drop-shadow-sm">Feliz Aniversário!</h1>
              <div className="flex flex-wrap justify-center gap-8 mt-8">{niverHoje.map(p => renderCard(p, true))}</div>
            </div>
          ) : (
            <div className="flex-1 flex flex-col items-center justify-center opacity-40">
              <i className="ph-fill ph-calendar-blank text-8xl mb-4"></i>
              <h2 className="text-2xl font-black">Nenhum aniversariante hoje.</h2>
              <p className="font-bold">Veja a aba "Mês Todo" para os próximos.</p>
            </div>
          )
        ) : (
          <div className="relative z-10">
            <h2 className="text-3xl font-black text-center mb-8 text-primary">Aniversariantes do Mês ({hj.toLocaleString('pt-BR',{month:'long'})})</h2>
            {todosNiverMes.length > 0 ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">{todosNiverMes.map(p => renderCard(p, false))}</div>
            ) : (
              <div className="text-center opacity-40 py-20"><i className="ph-fill ph-calendar-blank text-8xl mb-4"></i><h2 className="text-2xl font-black">Nenhum aniversário cadastrado este mês.</h2></div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

// ================== APP ROOT ==================
const App = () => {
  const [u, setU] = useState(null); const [l, setL] = useState(true); const [t, setT] = useState('HOJE');
  const [dbD, setDb] = useState({ PROFISSIONAIS:[], ESCALAS:[], CONFIGURACOES:{} });
  const [isD, setIsD] = useState(() => localStorage.getItem('theme') === 'dark');
  
  useEffect(() => { 
    if (isD) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); 
    localStorage.setItem('theme', isD?'dark':'light'); 
  }, [isD]);
  
  const f = async () => {
    const pr = await api.fetch('PROFISSIONAIS'); const es = await api.fetch('ESCALAS'); const cf = await api.fetch('CONFIGURACOES');
    const pCfg = cf.find(c=>c.ID==='parametros')||{}; const plCfg = cf.find(c=>c.ID==='plantao')||{};
    setDb({ PROFISSIONAIS: pr||[], ESCALAS: es||[], CONFIGURACOES: {...pCfg, ...plCfg} });
  };

  useEffect(() => { 
    const un = auth.onAuthStateChanged(async usr => { 
      if(usr){ 
        let role = 'Colaborador'; const eml = usr.email.toLowerCase();
        if (eml.includes('admin') || eml.includes('gestao') || eml.includes('diretor')) role = 'Admin';
        else if (eml.includes('supervis')) role = 'Supervisor';
        setU({email:usr.email, nome:usr.email.split('@')[0], nivel:role}); 
        await f(); 
      } else setU(null); 
      setL(false); 
    }); 
    return ()=>un(); 
  }, []);

  if (l) return <div className="min-h-screen flex items-center justify-center"><div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>;

  if (!u) return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-900">
      <div className="w-full max-w-md clean-card p-10">
        <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6"><i className="ph-fill ph-hospital"></i></div>
        <h1 className="text-3xl font-black text-center mb-8">Escalas SV</h1>
        <form onSubmit={async e=>{e.preventDefault();setL(true);try{await auth.signInWithEmailAndPassword(e.target.e.value, e.target.p.value);}catch(err){alert('Acesso Negado. Verifique os dados.');setL(false);}}} className="space-y-4">
          <input name="e" type="email" placeholder="E-mail" className="w-full p-4 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none font-bold" required />
          <input name="p" type="password" placeholder="Senha" className="w-full p-4 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none font-bold" required />
          <button type="submit" className="w-full bg-primary text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-600 transition">Entrar no Sistema</button>
        </form>
      </div>
    </div>
  );

  const isAd = u.nivel === 'Admin' || u.nivel === 'Supervisor';
  const menu = [ 
    {id:'HOJE', i:'ph-kanban', n:'Plantão'}, 
    {id:'DIARIO', i:'ph-users-three', n:'Lista Dia'}, 
    {id:'MATRIZ', i:'ph-table', n:'Visão Ampla'}, 
    {id:'CALENDARIO', i:'ph-calendar-plus', n:'Escalas'}, 
    {id:'EQUIPE', i:'ph-address-book', n:'Equipe', adminOnly:true}, 
    {id:'MURAL', i:'ph-confetti', n:'Festivo'},
    {id:'CONFIG', i:'ph-gear', n:'Ajustes', adminOnly:true} 
  ];

  return (
    <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0">
      <aside className="hidden md:flex flex-col h-screen fixed z-30 w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
        <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3"><div className="w-10 h-10 bg-primary text-white rounded-lg flex justify-center items-center"><i className="ph-fill ph-heartbeat text-xl"></i></div><div><h2 className="font-black text-lg">Escalas SV</h2><p className="text-[9px] uppercase opacity-50 font-bold tracking-widest">ERP Hospitalar</p></div></div>
        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto hide-scroll">
          {menu.filter(m=>!m.adminOnly||isAd).map(m=><button key={m.id} onClick={()=>setT(m.id)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold text-sm transition ${t===m.id?(m.id==='MURAL'?'bg-pink-50 text-pink-600 dark:bg-pink-900/30 dark:text-pink-400':'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400'):'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`}><i className={`ph-fill ${m.i} text-xl`}></i> {m.n}</button>)}
        </nav>
        <div className="p-4 border-t border-slate-100 dark:border-slate-800"><button onClick={()=>auth.signOut()} className="text-red-500 font-bold flex items-center gap-2 p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded w-full transition"><i className="ph-bold ph-sign-out text-lg"></i> Sair do App</button></div>
      </aside>
      
      <nav className="md:hidden fixed bottom-0 inset-x-0 border-t border-slate-200 dark:border-slate-800 z-50 flex justify-around p-2 pb-safe bg-white dark:bg-slate-900 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] overflow-x-auto hide-scroll">
        {menu.filter(m=>!m.adminOnly||isAd).map(m=><button key={m.id} onClick={()=>setT(m.id)} className={`flex flex-col items-center gap-1 p-2 rounded-xl min-w-[64px] transition ${t===m.id?(m.id==='MURAL'?'text-pink-500':'text-primary'):'text-slate-400'}`}><i className={`ph-fill ${m.i} text-2xl`}></i><span className="text-[9px] font-black uppercase">{m.n}</span></button>)}
      </nav>
      
      <main className="flex-1 transition-all p-4 md:p-8 w-full md:ml-64 overflow-x-hidden">
        <TopHeader user={u} isDark={isD} toggleDark={()=>setIsD(!isD)} />
        
        {t==='HOJE' && <PainelHojeView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='DIARIO' && <TrabalhandoHojeView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='MATRIZ' && <VisaoAmplaView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='CALENDARIO' && <CalendarioView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='EQUIPE' && isAd && <EquipeView data={dbD.PROFISSIONAIS} cfg={dbD.CONFIGURACOES || {}} onSave={api.saveRecord} onDelete={api.deleteRecord} onRefresh={f} />}
        {t==='CONFIG' && isAd && <AjustesView cfg={dbD.CONFIGURACOES || {}} onSave={api.saveRecord} onRefresh={f} />}
        {t==='MURAL' && <MuralAniversarioView profs={dbD.PROFISSIONAIS} cfg={dbD.CONFIGURACOES || {}} />}
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root')); 
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
