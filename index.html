<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E40AF">
    <title>Escalas SV</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { primary: '#1E40AF', secondary: '#F97316' },
                    animation: { 
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'pop-in': 'popIn 0.2s forwards'
                    },
                    keyframes: { 
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        popIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
                    }
                } 
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass-modal { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); }
        .card-hover { transition: all 0.3s ease; cursor: pointer; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>

    <script>
        const VERSAO_ATUAL = "17.2.0"; 
        if (localStorage.getItem('escalas_versao') !== VERSAO_ATUAL) {
            localStorage.clear(); sessionStorage.clear();
            localStorage.setItem('escalas_versao', VERSAO_ATUAL);
            window.location.reload();
        }
    </script>
</head>
<body class="text-gray-800">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, Component } = React;

        // === COLOQUE SUAS CHAVES AQUI ===
        const firebaseConfig = {
            apiKey: "SUA_NOVA_API_KEY",
            authDomain: "SEU_NOVO_DOMAIN.firebaseapp.com",
            projectId: "SEU_NOVO_PROJECT_ID",
            storageBucket: "SEU_NOVO_BUCKET.firebasestorage.app",
            messagingSenderId: "SEU_NOVO_SENDER_ID",
            appId: "SEU_NOVO_APP_ID"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Limite de Erro (Proteção de Tela Branca)
        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-10 text-center flex flex-col items-center justify-center min-h-screen">
                            <i className="ph-fill ph-warning-circle text-6xl text-red-500 mb-4"></i>
                            <h2 className="text-2xl font-black mb-2">Erro de Visualização</h2>
                            <button onClick={()=>window.location.reload()} className="bg-primary text-white px-8 py-3 rounded-xl font-bold shadow-lg">Recarregar</button>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        // ==========================================
        // MÓDULO: GESTÃO DE EQUIPE
        // ==========================================
        const EquipeView = ({ profissionais, onSave, onDelete, onRefresh }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({});
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState('');

            const listaFiltrada = profissionais.filter(p => 
                p.Nome.toLowerCase().includes(search.toLowerCase()) || 
                p.Cargo.toLowerCase().includes(search.toLowerCase())
            );

            const openModal = (item = null) => {
                if (item) {
                    setFormData(item);
                } else {
                    setFormData({ ID: '', Nome: '', Cargo: 'Médico', Especialidade: '', Cor: '#1E40AF', CargaHoraria: '' });
                }
                setIsModalOpen(true);
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setLoading(true);
                await onSave('PROFISSIONAIS', formData, !!formData.ID);
                setIsModalOpen(false);
                onRefresh();
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (confirm('Deseja excluir este profissional permanentemente?')) {
                    await onDelete('PROFISSIONAIS', id);
                    onRefresh();
                }
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between gap-4 items-center bg-white p-4 md:p-6 rounded-[2rem] shadow-sm border border-slate-200">
                        <div className="relative w-full md:w-96">
                            <i className="ph-bold ph-magnifying-glass absolute left-4 top-3.5 text-slate-400 text-lg"></i>
                            <input type="text" placeholder="Buscar por nome ou cargo..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-primary text-slate-700" />
                        </div>
                        <button onClick={() => openModal()} className="w-full md:w-auto bg-slate-800 text-white px-8 py-3.5 rounded-xl font-black shadow-lg hover:scale-105 transition flex justify-center items-center gap-2">
                            <i className="ph-bold ph-plus text-lg"></i> Novo Profissional
                        </button>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {listaFiltrada.map((prof, i) => (
                            <div key={i} className="bg-white p-6 border border-slate-200 rounded-[2rem] relative group flex flex-col items-center text-center shadow-sm card-hover overflow-hidden">
                                <div className="absolute top-0 inset-x-0 h-20 opacity-20" style={{backgroundColor: prof.Cor}}></div>
                                <div className="relative z-10 flex flex-col items-center text-center mt-2 w-full">
                                    <div className="w-20 h-20 rounded-full flex items-center justify-center text-2xl font-black text-white border-4 border-white shadow-md mb-3" style={{backgroundColor: prof.Cor}}>
                                        {prof.Nome.charAt(0).toUpperCase()}
                                    </div>
                                    <h3 className="font-black text-lg leading-tight text-slate-800">{prof.Nome}</h3>
                                    <p className="text-[10px] font-black mb-4 mt-1 uppercase tracking-widest px-3 py-1 rounded-full" style={{color: prof.Cor, backgroundColor: `${prof.Cor}20`}}>{prof.Cargo}</p>
                                    
                                    <div className="w-full bg-slate-50 rounded-xl p-4 text-left space-y-2 mb-4 border border-slate-100">
                                        <p className="text-[10px] font-bold text-slate-500 flex justify-between uppercase">
                                            <span>Especialidade</span>
                                            <span className="text-slate-800">{prof.Especialidade || 'Geral'}</span>
                                        </p>
                                        <p className="text-[10px] font-bold text-slate-500 flex justify-between uppercase pt-2 border-t border-slate-200">
                                            <span>Disponibilidade</span>
                                            <span className="text-slate-800">{prof.CargaHoraria || 'Livre'}</span>
                                        </p>
                                    </div>
                                </div>

                                <div className="absolute top-4 right-4 flex gap-2 opacity-100 lg:opacity-0 group-hover:opacity-100 transition z-20">
                                    <button onClick={()=>openModal(prof)} className="w-10 h-10 bg-white shadow-md rounded-full text-blue-600 flex items-center justify-center hover:scale-110 transition"><i className="ph-bold ph-pencil-simple text-lg"></i></button>
                                    <button onClick={()=>handleDelete(prof.ID)} className="w-10 h-10 bg-white shadow-md rounded-full text-red-600 flex items-center justify-center hover:scale-110 transition"><i className="ph-bold ph-trash text-lg"></i></button>
                                </div>
                            </div>
                        ))}
                        {listaFiltrada.length === 0 && (
                            <div className="col-span-full p-16 text-center text-slate-400 font-bold border-2 border-dashed border-slate-200 rounded-[2rem] bg-white">
                                Nenhum profissional cadastrado.
                            </div>
                        )}
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-modal animate-fade-in" onClick={()=>setIsModalOpen(false)}>
                            <div className="bg-white rounded-[2rem] w-full max-w-xl shadow-2xl flex flex-col border border-slate-200 animate-pop-in" onClick={e=>e.stopPropagation()}>
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-[2rem]">
                                    <h3 className="text-2xl font-black text-slate-800 flex items-center gap-3">
                                        <div className="w-10 h-10 bg-slate-800 text-white rounded-xl flex items-center justify-center"><i className="ph-fill ph-user-plus"></i></div> 
                                        {formData.ID ? 'Editar' : 'Novo'} Profissional
                                    </h3>
                                    <button onClick={()=>setIsModalOpen(false)} className="w-10 h-10 bg-white text-slate-500 rounded-full shadow-sm hover:bg-red-500 hover:text-white transition flex items-center justify-center"><i className="ph-bold ph-x"></i></button>
                                </div>
                                <form id="form-equipe" onSubmit={handleSave} className="p-8 space-y-5">
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Nome Completo</label>
                                        <input type="text" value={formData.Nome} onChange={e=>setFormData({...formData, Nome: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-primary" required placeholder="Ex: Dr. Bruno Almeida" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Cargo</label>
                                            <select value={formData.Cargo} onChange={e=>setFormData({...formData, Cargo: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-primary">
                                                <option>Médico</option>
                                                <option>Enfermagem</option>
                                                <option>Recepção</option>
                                                <option>Triagem</option>
                                                <option>Técnico</option>
                                                <option>Gestão</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Cor de Identificação</label>
                                            <input type="color" value={formData.Cor} onChange={e=>setFormData({...formData, Cor: e.target.value})} className="w-full h-14 p-1 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Especialidade / Função</label>
                                        <input type="text" value={formData.Especialidade} onChange={e=>setFormData({...formData, Especialidade: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-primary" placeholder="Ex: Clínico Geral" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Dias / Turnos Disponíveis (Opcional)</label>
                                        <input type="text" value={formData.CargaHoraria} onChange={e=>setFormData({...formData, CargaHoraria: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-primary" placeholder="Ex: Segundas e Quartas (Manhã)" />
                                    </div>
                                </form>
                                <div className="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50 rounded-b-[2rem]">
                                    <button type="button" onClick={()=>setIsModalOpen(false)} className="px-6 py-3.5 font-bold text-slate-500 hover:text-slate-800 transition">Cancelar</button>
                                    <button type="submit" form="form-equipe" disabled={loading} className="bg-slate-800 text-white font-black px-8 py-3.5 rounded-xl shadow-lg hover:bg-slate-900 transition flex items-center gap-2">
                                        {loading ? <i className="ph animate-spin ph-spinner text-xl"></i> : <i className="ph-bold ph-floppy-disk text-xl"></i>} Salvar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // APP PRINCIPAL
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('HOJE');
            const [loginError, setLoginError] = useState('');
            const [dataCentral, setDataCentral] = useState({ PROFISSIONAIS: [] });

            // Funções de Banco de Dados
            const fetchBanco = async () => {
                try {
                    const snap = await db.collection('PROFISSIONAIS').get();
                    const profs = snap.docs.map(doc => ({ ID: doc.id, ...doc.data() }));
                    setDataCentral({ PROFISSIONAIS: profs });
                } catch(e) { console.error(e); }
            };

            const saveRecord = async (col, data, isEdit) => {
                let docData = { ...data };
                let id = docData.ID; delete docData.ID;
                if (isEdit && id) await db.collection(col).doc(id).update(docData);
                else await db.collection(col).add(docData);
            };

            const deleteRecord = async (col, id) => {
                await db.collection(col).doc(id).delete();
            };

            // Login e Autenticação
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        let role = 'Colaborador';
                        const eStr = u.email.toLowerCase();
                        if (eStr.includes('admin') || eStr.includes('gestao')) role = 'Admin';
                        else if (eStr.includes('supervis')) role = 'Supervisor';
                        
                        setUser({ email: u.email, nome: u.email.split('@')[0], nivel: role });
                        await fetchBanco(); // Puxa os dados ao logar
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true); setLoginError('');
                try { await auth.signInWithEmailAndPassword(e.target.email.value, e.target.password.value); } 
                catch(err) { setLoginError('Acesso negado. Verifique os dados.'); setLoading(false); }
            };

            if (loading) {
                return <div className="min-h-screen flex items-center justify-center bg-blue-50"><div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>;
            }

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="w-full max-w-md bg-white rounded-[2rem] shadow-xl p-8 md:p-10 animate-fade-in border border-slate-100">
                            <div className="w-20 h-20 bg-blue-50 text-primary rounded-3xl flex justify-center items-center mx-auto mb-6 shadow-inner">
                                <i className="ph-fill ph-calendar-check text-5xl"></i>
                            </div>
                            <h1 className="text-3xl font-black text-center text-slate-800 mb-2">Escalas SV</h1>
                            <p className="text-center text-slate-500 font-bold mb-8">Gestão de Plantões</p>
                            
                            {loginError && <p className="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-bold mb-6 text-center">{loginError}</p>}
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="relative">
                                    <i className="ph-fill ph-user absolute left-5 top-4.5 text-slate-400 text-lg"></i>
                                    <input name="email" type="email" placeholder="E-mail de acesso" className="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-primary font-bold text-slate-700" required />
                                </div>
                                <div className="relative">
                                    <i className="ph-fill ph-lock-key absolute left-5 top-4.5 text-slate-400 text-lg"></i>
                                    <input name="password" type="password" placeholder="Senha" className="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-primary font-bold text-slate-700" required />
                                </div>
                                <button type="submit" className="w-full bg-primary text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-900/20 hover:-translate-y-1 transition text-lg mt-4 flex justify-center items-center gap-2">
                                    Entrar no App <i className="ph-bold ph-arrow-right"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const isAdmin = user.nivel === 'Admin' || user.nivel === 'Supervisor';

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row pb-20 md:pb-0">
                    
                    {/* SIDEBAR PARA PC */}
                    <aside className="hidden md:flex w-72 bg-white border-r border-slate-200 flex-col h-screen fixed z-30">
                        <div className="p-8 border-b border-slate-100 flex items-center gap-4">
                            <div className="w-12 h-12 bg-primary text-white rounded-xl flex items-center justify-center shadow-md"><i className="ph-fill ph-calendar-check text-2xl"></i></div>
                            <div>
                                <h2 className="font-black text-xl leading-none">Escalas</h2>
                                <p className="text-[10px] uppercase tracking-widest text-primary font-bold">São Vicente</p>
                            </div>
                        </div>
                        <div className="p-6">
                            <p className="text-sm font-black text-slate-800">{user.nome}</p>
                            <span className="text-[10px] font-black uppercase tracking-widest bg-blue-50 text-blue-600 px-2 py-1 rounded mt-1 inline-block">{user.nivel}</span>
                        </div>
                        <nav className="flex-1 px-4 space-y-2">
                            <button onClick={()=>setActiveTab('HOJE')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition ${activeTab === 'HOJE' ? 'bg-primary text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><i className="ph-fill ph-kanban text-xl"></i> Painel de Hoje</button>
                            <button onClick={()=>setActiveTab('CALENDARIO')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition ${activeTab === 'CALENDARIO' ? 'bg-primary text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><i className="ph-fill ph-calendar-blank text-xl"></i> Calendário Geral</button>
                            {isAdmin && <button onClick={()=>setActiveTab('EQUIPE')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition ${activeTab === 'EQUIPE' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><i className="ph-fill ph-users text-xl"></i> Gestão de Equipe</button>}
                        </nav>
                        <button onClick={()=>auth.signOut()} className="p-6 text-red-500 font-bold flex items-center gap-3 hover:bg-red-50 transition border-t border-slate-100"><i className="ph-bold ph-sign-out text-xl"></i> Sair do App</button>
                    </aside>

                    {/* MENU INFERIOR PARA CELULAR */}
                    <nav className="md:hidden fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-50 flex justify-around p-3 pb-safe">
                        <button onClick={()=>setActiveTab('HOJE')} className={`flex flex-col items-center gap-1 p-2 rounded-xl transition w-20 ${activeTab === 'HOJE' ? 'text-primary' : 'text-slate-400'}`}>
                            <i className={`${activeTab === 'HOJE' ? 'ph-fill' : 'ph'} ph-kanban text-2xl`}></i>
                            <span className="text-[9px] font-black uppercase tracking-wider">Hoje</span>
                        </button>
                        <button onClick={()=>setActiveTab('CALENDARIO')} className={`flex flex-col items-center gap-1 p-2 rounded-xl transition w-20 ${activeTab === 'CALENDARIO' ? 'text-primary' : 'text-slate-400'}`}>
                            <i className={`${activeTab === 'CALENDARIO' ? 'ph-fill' : 'ph'} ph-calendar-blank text-2xl`}></i>
                            <span className="text-[9px] font-black uppercase tracking-wider">Mensal</span>
                        </button>
                        {isAdmin && (
                            <button onClick={()=>setActiveTab('EQUIPE')} className={`flex flex-col items-center gap-1 p-2 rounded-xl transition w-20 ${activeTab === 'EQUIPE' ? 'text-slate-800' : 'text-slate-400'}`}>
                                <i className={`${activeTab === 'EQUIPE' ? 'ph-fill' : 'ph'} ph-users text-2xl`}></i>
                                <span className="text-[9px] font-black uppercase tracking-wider">Equipe</span>
                            </button>
                        )}
                        <button onClick={()=>auth.signOut()} className="flex flex-col items-center gap-1 p-2 rounded-xl transition w-20 text-red-400">
                            <i className="ph ph-sign-out text-2xl"></i>
                            <span className="text-[9px] font-black uppercase tracking-wider">Sair</span>
                        </button>
                    </nav>

                    {/* ÁREA CENTRAL */}
                    <main className="flex-1 md:ml-72 p-4 md:p-10 animate-fade-in relative z-10 w-full overflow-x-hidden">
                        <div className="md:hidden flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-primary text-white rounded-lg flex items-center justify-center shadow-md"><i className="ph-fill ph-calendar-check text-xl"></i></div>
                                <div><h1 className="font-black leading-none text-slate-800">Escalas SV</h1><p className="text-[10px] uppercase font-bold text-slate-400">Olá, {user.nome}</p></div>
                            </div>
                        </div>

                        {activeTab === 'HOJE' && (
                            <div>
                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-6 hidden md:block">Plantões de Hoje</h2>
                                <div className="bg-white border border-slate-200 rounded-[2rem] p-10 text-center shadow-sm">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4"><i className="ph-fill ph-wrench text-3xl animate-bounce-slight"></i></div>
                                    <h3 className="font-black text-xl text-slate-800">Módulo em Construção</h3>
                                    <p className="text-slate-500 font-medium mt-2 max-w-sm mx-auto">Em breve os cards dos profissionais aparecerão aqui.</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'CALENDARIO' && (
                            <div>
                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-6 hidden md:block">Calendário Geral</h2>
                                <div className="bg-white border border-slate-200 rounded-[2rem] p-10 text-center shadow-sm">
                                    <p className="text-slate-500 font-medium">Aqui vai entrar o calendário.</p>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'EQUIPE' && isAdmin && (
                            <div>
                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-6 hidden md:block">Gestão de Equipe</h2>
                                <EquipeView profissionais={dataCentral.PROFISSIONAIS} onSave={saveRecord} onDelete={deleteRecord} onRefresh={fetchBanco} />
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
