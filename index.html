                    <div className="w-full bg-white dark:bg-slate-800 p-2 rounded-lg mt-2 border border-slate-100 dark:border-slate-700 text-left">
                      <p className="text-[10px] font-black uppercase truncate text-primary leading-tight">{e.Sala}</p>
                      <p className={`text-[8px] font-bold mt-0.5 ${e.Horario==='A DEFINIR'?'text-red-500':'opacity-60'}`}><i className="ph-fill ph-clock"></i> {e.Horario}</p>
                      {e.MedicoApoio && <p className="text-[8px] font-bold text-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 mt-1 px-1.5 py-0.5 rounded truncate"><i className="ph-fill ph-stethoscope"></i> {e.MedicoApoio}</p>}
                      {e.Auxiliar && <p className="text-[8px] font-bold text-purple-600 bg-purple-50 dark:bg-purple-900/30 mt-1 px-1.5 py-0.5 rounded truncate"><i className="ph-fill ph-user-plus"></i> {e.Auxiliar}</p>}
                    </div>

                    <div className="flex w-full justify-between items-center mt-3 pt-3 border-t border-slate-100 dark:border-slate-700">
                      <span className={`text-[8px] font-black px-2 py-1 rounded ${iA?'bg-red-100 text-red-600':iI?'bg-orange-100 text-orange-600':'bg-green-100 text-green-600 dark:bg-green-900/30'}`}>{e.Status === 'NO POSTO' ? 'ATIVO' : e.Status}</span>
                      <div className="flex gap-1">
                        {(!iI && !iA) ? (
                          <>
                            {(isAd || iM) && <button onClick={()=>setStatus(e, 'LANCHE')} title="Ir pro Lanche" className="w-7 h-7 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-orange-100 hover:text-orange-600 text-slate-500 transition"><i className="ph-fill ph-coffee"></i></button>}
                            {isAd && <button onClick={()=>setEditData(e)} title="Ações" className="w-7 h-7 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-blue-100 hover:text-blue-600 text-slate-500 transition"><i className="ph-fill ph-sliders"></i></button>}
                          </>
                        ) : (
                          <>
                            {(isAd || (iM && iI)) && <button onClick={()=>setStatus(e, 'NO POSTO')} className="px-2 py-1 bg-slate-800 dark:bg-slate-700 text-white rounded text-[8px] font-black hover:bg-slate-600 transition"><i className="ph-bold ph-arrow-u-down-left"></i> VOLTAR</button>}
                            {iA && isAd && <button onClick={()=>setEditData(e)} className="px-2 py-1 bg-primary text-white rounded text-[8px] font-black hover:bg-blue-600 transition ml-1"><i className="ph-bold ph-sliders"></i> OPÇÕES</button>}
                          </>
                        )}
                      </div>
                    </div>
                  </div>
                )
              })}
            </div>
          )}
        </div>
      )}
      {infoProfModal && <CrachaVirtual profInfo={infoProfModal} cfg={cfg} onClose={()=>setInfoProfModal(null)} />}
      {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
    </div>
  )
};

// ================== ABA 4: MAPA DE PLANTÃO (RADAR/UNIDADES) ==================
const PainelHojeView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
  const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
  const [now, setNow] = useState(Date.now()); 
  const [actU, setActU] = useState(null);
  const [buscaGlobal, setBuscaGlobal] = useState(''); 
  const [infoProfModal, setInfoProfModal] = useState(null);
  const [editData, setEditData] = useState(null);

  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 10000); return () => clearInterval(t); }, []);

  const dStr = getStrDt(new Date()); 
  const escHjRaw = escalas.filter(e => e.Data === dStr && isEscalaValida(e, cfg?.postos));
  
  const unids = cfg?.unidades||[]; const setoresSis = cfg?.setores||[]; const postosSis = cfg?.postos||[];
  const setStatus = async (esc, st) => { await api.saveRecord('ESCALAS', {...esc, Status:st}); onRefresh(); };

  const renderPosto = (sala, ocupantes) => {
    ocupantes.sort((a,b)=> (a.Horario||'').localeCompare(b.Horario||''));
    const hD = new Date(now).getHours() + (new Date(now).getMinutes() / 60);
    let currArr = []; let nxtArr = [];

    for(let o of ocupantes) {
      const t = safeGetHours(o.Horario);
      if(t.in === null) { currArr.push(o); continue; } 
      if(hD >= t.in && hD <= t.out) { currArr.push(o); } 
      else if (hD < t.in) { nxtArr.push(o); }
    }

    if(currArr.length === 0 && nxtArr.length === 0) return <div className="flex-1 flex flex-col items-center justify-center text-slate-400 py-6"><i className="ph-bold ph-ghost text-3xl mb-2 opacity-30"></i><span className="text-[9px] font-black uppercase">Turno Encerrado</span></div>;

    return (
      <div className="flex-1 p-2 flex flex-col gap-2">
        {currArr.map((curr, idx) => {
          const isInt = curr?.Status === 'LANCHE'; const isAus = curr?.Status === 'AUSENTE';
          const isMe = checkIsMe(curr?.Nome_Profissional, user.email);
          const pInfo = profs.find(p => p.Nome === curr.Nome_Profissional) || {Nome: curr.Nome_Profissional, Cargo: curr.Cargo, Cor: curr.Cor};
          const niver = checkNiver(pInfo.DataNascimento);

          return (
            <div key={'c'+idx} onClick={() => setInfoProfModal(pInfo)} className={`p-2.5 rounded-xl relative border shadow-sm transition-colors cursor-pointer hover:shadow-md ${niver.isHoje?'border-pink-300 bg-pink-50 dark:bg-pink-900/10':isInt?'bg-orange-50 border-orange-200 dark:bg-orange-900/20 dark:border-orange-800':isAus?'bg-red-50 border-red-200 dark:bg-red-900/20 dark:border-red-800 opacity-70':'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 hover:border-primary'}`}>
              <div className="flex items-center gap-2 mb-2">
                {pInfo.FotoURL ? <img src={fmtImg(pInfo.FotoURL)} className={`w-8 h-8 rounded-full object-cover shrink-0 ${niver.isHoje?'animate-bounce':''}`} /> : <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white text-[10px] font-black shrink-0 ${niver.isHoje?'animate-bounce':''}`} style={{background:curr.Cor||'#0ea5e9'}}>{curr.Nome_Profissional[0]}</div>}
                <div className="truncate">
                  <div className={`text-[11px] font-black truncate text-slate-800 dark:text-white flex items-center gap-1 ${isAus?'line-through text-red-500 dark:text-red-400':''}`}>
                    <span className="truncate">{curr.Nome_Profissional}</span>
                    {niver.isHoje ? <span title="Aniversário Hoje">🎂</span> : (niver.isSemana && <span title="Aniversário esta semana">🎈</span>)}
                    <BadgeConvenio cod={pInfo.CodUnimed} logo={cfg?.logoConvenio} />
                  </div>
                  <p className={`text-[8px] font-bold opacity-60 truncate mt-0.5 text-slate-600 dark:text-slate-300 ${curr.Horario==='A DEFINIR'?'text-red-500':''}`}>{curr.Cargo} • <i className="ph-fill ph-clock"></i> {curr.Horario}</p>
                </div>
              </div>
              
              {curr.Auxiliar && <p className="text-[8px] font-black text-purple-600 bg-purple-100 dark:bg-purple-900/30 px-1.5 py-0.5 rounded inline-block mb-1"><i className="ph-fill ph-user-plus"></i> Auxiliar: {curr.Auxiliar}</p>}
              {curr.MedicoApoio && <p className="text-[8px] font-black text-indigo-600 bg-indigo-100 dark:bg-indigo-900/30 px-1.5 py-0.5 rounded inline-block mb-1"><i className="ph-fill ph-stethoscope"></i> Apoio: {curr.MedicoApoio}</p>}

              <div className="flex justify-between items-center border-t border-slate-100 dark:border-slate-700 pt-2 mt-1">
                <span className={`text-[8px] font-black px-2 py-1 rounded ${isAus?'bg-red-100 text-red-600':isInt?'bg-orange-100 text-orange-600':'bg-green-100 text-green-600 dark:bg-green-900/30'}`}>{curr.Status === 'NO POSTO' ? 'ATIVO' : curr.Status}</span>
                <div className="flex gap-1">
                  {(!isInt && !isAus) ? (
                    <>
                      {(isAd || isMe) && <button onClick={(e)=>{e.stopPropagation(); setStatus(curr, 'LANCHE');}} title="Ir para o Lanche/Pausa" className="w-6 h-6 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-orange-100 hover:text-orange-600 transition text-slate-500"><i className="ph-fill ph-coffee"></i></button>}
                      {isAd && <button onClick={(e)=>{e.stopPropagation(); setEditData({...curr});}} title="Ações Avançadas" className="w-6 h-6 bg-slate-100 dark:bg-slate-700 rounded flex justify-center items-center hover:bg-blue-100 hover:text-blue-600 transition text-slate-500"><i className="ph-fill ph-sliders"></i></button>}
                    </>
                  ) : (
                    <>
                      {(isAd || (isMe && isInt)) && <button onClick={(e)=>{e.stopPropagation(); setStatus(curr, 'NO POSTO');}} className="px-2 py-1 bg-slate-800 dark:bg-slate-700 text-white rounded text-[8px] font-black hover:bg-slate-600 transition"><i className="ph-bold ph-arrow-u-down-left"></i> VOLTAR</button>}
                      {isAus && isAd && <button onClick={(e)=>{e.stopPropagation(); setEditData({...curr});}} className="px-2 py-1 bg-primary text-white rounded text-[8px] font-black hover:bg-blue-600 transition ml-1"><i className="ph-bold ph-sliders"></i> OPÇÕES</button>}
                    </>
                  )}
                </div>
              </div>
            </div>
          );
        })}

        {nxtArr.map((nxt, idx) => {
          const pInfoNxt = profs.find(p => p.Nome === nxt.Nome_Profissional) || {Nome: nxt.Nome_Profissional, Cor: nxt.Cor};
          const niverNxt = checkNiver(pInfoNxt.DataNascimento);
          
          return (
            <div key={'n'+idx} onClick={() => setInfoProfModal(pInfoNxt)} className={`p-2 rounded-xl border border-slate-200 dark:border-slate-700 fade-next relative overflow-hidden cursor-pointer hover:border-primary transition ${niverNxt.isHoje ? 'border-pink-200 bg-pink-50/50' : ''}`}>
              <p className="text-[8px] font-black text-primary uppercase tracking-widest mb-1">Próximo: {nxt.Horario.split(' ')[0]}</p>
              <div className="flex items-center gap-2 opacity-70">
                {pInfoNxt.FotoURL ? <img src={fmtImg(pInfoNxt.FotoURL)} className="w-5 h-5 rounded-full object-cover shrink-0" /> : <div className="w-5 h-5 rounded-full flex items-center justify-center text-white text-[8px]" style={{background:nxt.Cor||'#000'}}>{nxt.Nome_Profissional[0]}</div>}
                <div className="truncate max-w-[100px] flex items-center gap-1">
                  <p className="text-[9px] font-black text-slate-800 dark:text-white truncate">{nxt.Nome_Profissional}</p>
                  {niverNxt.isHoje && <span>🎂</span>}
                </div>
              </div>
            </div>
          )
        })}
      </div>
    );
  };

  if(buscaGlobal.trim() !== '') {
    const termo = buscaGlobal.toLowerCase();
    const escEnc = escHjRaw.filter(e => e.Status !== 'FOLGA' && safeStr(e.Nome_Profissional).toLowerCase().includes(termo));
    const pRend = Array.from(new Set(escEnc.map(e => e.Sala)));

    return (
      <div className="animate-fade-in space-y-8 max-w-[1600px] mx-auto pb-10">
        <div className="flex flex-col md:flex-row justify-between md:items-center gap-4">
          <h2 className="text-2xl font-black flex items-center gap-2"><i className="ph-bold ph-radar text-primary"></i> Radar de Pessoas</h2>
          <div className="relative w-full md:w-96">
            <i className="ph-bold ph-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
            <input type="text" placeholder="Digite o nome..." value={buscaGlobal} onChange={e=>setBuscaGlobal(e.target.value)} className="w-full p-4 pl-12 rounded-2xl border-2 border-primary outline-none bg-white dark:bg-slate-900 font-bold shadow-lg" autoFocus/>
            <button onClick={()=>setBuscaGlobal('')} className="absolute right-4 top-4 text-slate-400 hover:text-red-500"><i className="ph-bold ph-x"></i></button>
          </div>
        </div>

        {pRend.length === 0 ? (
          <div className="p-20 text-center opacity-50 border-2 border-dashed rounded-2xl dark:border-slate-700">
            <i className="ph-bold ph-ghost text-6xl mb-4"></i><p className="font-bold text-lg">Nenhum plantão ativo hoje para "{buscaGlobal}"</p>
          </div>
        ) : (
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            {pRend.map((nomeS, i) => {
              const ocup = escHjRaw.filter(e => e.Sala === nomeS && e.Status !== 'FOLGA');
              const postoInfo = postosSis.find(p => p.nome === nomeS) || {setor: 'Geral'};
              return (
                <div key={i} className="clean-card flex flex-col p-1 min-h-[140px] border-t-4 border-t-primary shadow-md">
                  <div className="p-2 bg-blue-50 dark:bg-blue-900/20 rounded-t-xl font-black text-[11px] uppercase tracking-widest text-center border-b border-blue-100 dark:border-blue-900/30 truncate px-2">
                    {nomeS} <span className="block text-[8px] opacity-50 font-normal">{postoInfo.setor}</span>
                  </div>
                  {renderPosto(nomeS, ocup)}
                </div>
              )
            })}
          </div>
        )}
        {infoProfModal && <CrachaVirtual profInfo={infoProfModal} cfg={cfg} onClose={()=>setInfoProfModal(null)} />}
        {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
      </div>
    )
  }

  if(!actU) {
    return (
      <div className="animate-fade-in space-y-8 max-w-7xl mx-auto">
        <div className="relative max-w-2xl mx-auto">
          <i className="ph-bold ph-magnifying-glass absolute left-4 top-4 text-slate-400 text-xl"></i>
          <input type="text" placeholder="Onde a pessoa está? Digite o nome aqui para usar o Radar..." value={buscaGlobal} onChange={e=>setBuscaGlobal(e.target.value)} className="w-full p-4 pl-12 rounded-2xl border border-slate-200 dark:border-slate-700 outline-none bg-white dark:bg-slate-800 font-bold shadow-sm focus:border-primary transition" />
        </div>
        <h2 className="text-2xl font-black mb-4 flex items-center gap-2"><i className="ph-fill ph-hospital text-primary"></i> Selecione a Unidade</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
          {unids.map((u,i) => (
            <div key={i} onClick={()=>setActU(u.nome)} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-primary transition-all">
              <div className="w-20 h-20 bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-buildings"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest">{u.nome}</h3>
            </div>
          ))}
          {unids.length===0 && <div className="col-span-full p-10 text-center border-2 border-dashed rounded-2xl opacity-50 font-bold dark:border-slate-700">Vá em "Ajustes" e cadastre Prédios e Unidades.</div>}
        </div>
      </div>
    );
  }

  const setD = setoresSis.filter(s => safeStr(s.unidade).trim().toUpperCase() === safeStr(actU).trim().toUpperCase()).map(s => s.nome);
  
  return (
    <div className="animate-fade-in space-y-8 max-w-[1600px] mx-auto pb-10">
      <div className="flex items-center gap-4 border-b border-slate-200 dark:border-slate-800 pb-4"><button onClick={()=>setActU(null)} className="w-10 h-10 clean-card flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800"><i className="ph-bold ph-arrow-left"></i></button><div><p className="text-[10px] font-bold uppercase opacity-50 tracking-widest">Unidade Ativa</p><h2 className="text-2xl font-black">{actU}</h2></div></div>
      
      {setD.map(st => {
        const psts = postosSis.filter(p => safeStr(p.setor).trim().toUpperCase() === safeStr(st).trim().toUpperCase());
        if(psts.length === 0) return null; 
        
        return (
          <div key={st} className="space-y-4">
            <h3 className="text-lg font-black text-slate-600 dark:text-slate-400 uppercase tracking-widest flex items-center gap-2"><i className="ph-fill ph-squares-four opacity-50"></i> {st}</h3>
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
              {psts.map((pst, i) => {
                const ocup = escHjRaw.filter(e => e.Sala === pst.nome && e.Status !== 'FOLGA' && e.Status !== 'AUSENTE');
                return (
                  <div key={i} className={`clean-card flex flex-col p-1 min-h-[140px] border-t-4 ${ocup.length===0?'opacity-70 border-t-slate-300 dark:border-t-slate-600':'border-t-primary shadow-md'}`}>
                    <div className="p-2 bg-slate-50 dark:bg-slate-800/50 rounded-t-xl font-black text-[11px] uppercase tracking-widest text-center border-b border-slate-100 dark:border-slate-700 truncate px-2">{pst.nome}</div>
                    {ocup.length===0 ? <div className="flex-1 flex flex-col items-center justify-center text-slate-400 py-6"><i className="ph-bold ph-ghost text-3xl mb-2 opacity-30"></i><span className="text-[9px] font-black uppercase">Posto Livre</span></div> : renderPosto(pst.nome, ocup)}
                  </div>
                )
              })}
            </div>
          </div>
        )
      })}
      
      {infoProfModal && <CrachaVirtual profInfo={infoProfModal} cfg={cfg} onClose={()=>setInfoProfModal(null)} />}
      {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
    </div>
  );
};

// ================== ABA 5: O GANTT DINÂMICO COM DRAG E DEGRADÊ ==================
const VisaoAmplaView = ({ profs, escalas, cfg, user, onSave, onRefresh }) => {
  const isAd = user.nivel === 'Admin' || user.nivel === 'Supervisor';
  const [viewMode, setViewMode] = useState('MENU');
  const [layout, setLayout] = useState('HORIZONTAL'); 
  const [dataBase, setDataBase] = useState(new Date());
  const [condensed, setCondensed] = useState(false);
  const [rangeDias, setRangeDias] = useState(1); 
  const [busca, setBusca] = useState('');
  const [editData, setEditData] = useState(null);
  const [agora, setAgora] = useState(new Date());
  
  const [dragItem, setDragItem] = useState(null);
  const [dragOverRow, setDragOverRow] = useState(null);

  useEffect(() => { const timer = setInterval(() => setAgora(new Date()), 60000); return () => clearInterval(timer); }, []);

  const dStr = getStrDt(dataBase);
  const isToday = getStrDt(agora) === dStr;
  const escDia = escalas.filter(e => e.Data === dStr && isEscalaValida(e, cfg?.postos));

  let entidades = [];
  if (viewMode === 'Médico') {
    const eMed = escDia.filter(e => { const p = profs.find(x=>x.Nome === e.Nome_Profissional); return (p && p.Tipo === 'Médico') || e.Cargo?.toLowerCase().includes('médico'); });
    entidades = Array.from(new Set(eMed.map(e=>e.Sala))).sort();
  } else {
    const eCol = escDia.filter(e => { const p = profs.find(x=>x.Nome === e.Nome_Profissional); return p ? p.Tipo === 'Colaborador' : !e.Cargo?.toLowerCase().includes('médico'); });
    entidades = Array.from(new Set(eCol.map(e=>e.Nome_Profissional))).sort();
  }
  
  const entFiltradas = entidades.filter(e => e.toLowerCase().includes(busca.toLowerCase()));

  // TEMPO DINÂMICO DA GRADE
  let minH = 7; let maxH = 19;
  escDia.forEach(e => {
    if(e.Status !== 'FOLGA' && e.Status !== 'AUSENTE' && e.Horario && !e.Horario.toUpperCase().includes('DEFINIR')) {
      const t = safeGetHours(e.Horario);
      if(t.in !== null && t.in < minH) minH = Math.floor(t.in);
      if(t.out !== null && t.out > maxH) maxH = Math.ceil(t.out);
    }
  });
  if(minH >= maxH) { minH = 7; maxH = 19; } 

  const HORAS_TOTAIS = maxH - minH;
  const arrayHoras = []; for(let i=minH; i<=maxH; i+=0.5) arrayHoras.push(i);

  let percAgora = null; let pxAgora = null;
  if(isToday) {
    const hD = agora.getHours() + (agora.getMinutes()/60);
    if(hD >= minH && hD <= maxH) { pxAgora = (hD - minH) * 60; percAgora = ((hD - minH) / HORAS_TOTAIS) * 100; }
  }

  const handleDrop = async (destNome) => {
    if(!dragItem || !isAd || dragItem.Data !== dStr) return;
    let up = {...dragItem};
    if(viewMode === 'Médico') {
      if(up.Sala === destNome) return; 
      up.Sala = destNome;
      const pC = cfg?.postos?.find(p=>p.nome===destNome);
      if(pC){ const sC=cfg?.setores?.find(s=>s.nome===pC.setor); if(sC) up.Unidade = sC.unidade; }
    } else {
      if(up.Nome_Profissional === destNome) return;
      up.Nome_Profissional = destNome;
      const pI = profs.find(p=>p.Nome===destNome);
      if(pI){ up.Cargo=pI.Cargo; up.Cor=pI.Cor; }
    }
    await api.saveRecord('ESCALAS', up);
    onRefresh(); setDragItem(null); setDragOverRow(null);
  };

  const diasRender = Array.from({length: rangeDias}, (_, i) => { let d = new Date(dataBase); d.setDate(d.getDate() + i); return d; });

  const RenderTimeline = ({ dateObj }) => {
    const dS = getStrDt(dateObj);
    if (entFiltradas.length === 0) return null;

    if (layout === 'HORIZONTAL') {
      return (
        <div className="mb-10 animate-fade-in">
          <h3 className="text-xl font-black mb-4 flex items-center gap-2 border-b dark:border-slate-700 pb-2"><i className="ph-fill ph-calendar-blank text-primary"></i> {dateObj.toLocaleDateString('pt-BR', {weekday: 'long', day: '2-digit', month: 'long'}).toUpperCase()}</h3>
          <div className="gantt-scroll-area shadow-lg">
            <div className="min-w-[1000px]">
              
              <div className="g-h-header">
                <div className="g-h-label bg-slate-100 dark:bg-slate-800 font-black text-[10px] uppercase items-center text-center !flex-row">{viewMode === 'Médico' ? 'Posto / Sala' : 'Colaborador'}</div>
                <div className="g-h-track bg-slate-50 dark:bg-slate-900">
                  {arrayHoras.map((h, i) => (
                    <div key={i} className="g-grid-line">
                      {Number.isInteger(h) && <span className="text-[9px] font-black text-slate-400 absolute top-1 left-1">{String(h%24).padStart(2,'0')}h</span>}
                      <div className="g-grid-half"></div>
                    </div>
                  ))}
                  {percAgora !== null && <div className="linha-agora-h" style={{left:`${percAgora}%`}}><div className="absolute top-0 -left-1 w-2.5 h-2.5 bg-red-500 rounded-full shadow"></div></div>}
                </div>
              </div>

              {entFiltradas.map((ent, idx) => {
                const blocos = viewMode === 'Médico' ? escDia.filter(e=>e.Sala === ent) : escDia.filter(e=>e.Nome_Profissional === ent);
                const infoEx = viewMode === 'Médico' ? cfg?.postos?.find(p=>p.nome === ent)?.setor : profs.find(p=>p.Nome === ent)?.Cargo;
                const isOver = dragOverRow === `${dStr}-${ent}`;
                const gradBg = gerarGradienteDoDia(blocos, cfg);

                return (
                  <div key={idx} 
                    onDragOver={(e)=>{e.preventDefault(); setDragOverRow(`${dStr}-${ent}`);}} 
                    onDragLeave={()=>setDragOverRow(null)} 
                    onDrop={(e)=>{e.preventDefault(); handleDrop(ent);}} 
                    className={`g-h-row transition duration-200 ${isOver?'drag-over':'hover:bg-slate-50 dark:hover:bg-slate-800/30'}`}
                    style={{minHeight: condensed ? '40px' : '64px'}}>
                    
                    <div className="g-h-label bg-white dark:bg-slate-900 group-hover:bg-slate-50 dark:group-hover:bg-slate-800" title={ent}>
                      <span className="font-black text-[11px] truncate leading-tight w-full">{ent}</span>
                      {!condensed && <span className="text-[8px] font-bold opacity-50 truncate mt-0.5 w-full uppercase">{infoEx||'Geral'}</span>}
                      <div className="w-full h-1.5 rounded-full mt-1.5 opacity-80" style={{background: gradBg}}></div>
                    </div>

                    <div className="g-h-track">
                      {arrayHoras.map((h, i) => <div key={i} className="g-grid-line"><div className="g-grid-half"></div></div>)}
                      {percAgora !== null && <div className="linha-agora-h opacity-30 z-10" style={{left:`${percAgora}%`}}></div>}
                      
                      {blocos.map((b, bIdx) => {
                        const isF = b.Status === 'FOLGA' || b.Status === 'AUSENTE';
                        let left=0; let width=100; let hasC=false;
                        
                        if(isF||b.Horario==='A DEFINIR'){left=1;width=98;}else{
                          const t = safeGetHours(b.Horario);
                          if(t.in!==null&&t.out!==null){ 
                            left=((t.in-minH)/HORAS_TOTAIS)*100; width=((t.out-t.in)/HORAS_TOTAIS)*100; 
                            if(left<0){width+=left;left=0;} if(left+width>100)width=100-left; 
                            blocos.forEach((out,oI)=>{if(bIdx!==oI&&!isF) hasC = checkConflito(b, out);});
                          }
                        }
                        const c = isF?'#94a3b8':getCorDaSala(b.Sala, cfg); const n = viewMode==='Médico'?b.Nome_Profissional:b.Sala;

                        return (
                          <div key={bIdx} draggable={isAd} onDragStart={()=>setDragItem(b)} onClick={()=>isAd&&setEditData({...b})} 
                            className={`g-h-block ${hasC?'conflict':''}`}
                            style={{left:`${left}%`, width:`${width}%`, backgroundColor:c, top: condensed ? '4px' : '8px', bottom: condensed ? '4px' : '8px'}}>
                            {hasC && <span className="absolute -top-1 -right-1 text-sm z-50 drop-shadow-md">⚠️</span>}
                            <div className="flex flex-col w-full h-full justify-center">
                              <span className="font-black text-[10px] leading-tight truncate text-white drop-shadow-sm">{isF?b.Status:n}</span>
                              {!condensed && !isF && b.Horario!=='A DEFINIR' && <span className="text-[8px] text-white/90 font-bold truncate drop-shadow-sm mt-0.5"><i className="ph-fill ph-clock"></i> {b.Horario}</span>}
                            </div>
                          </div>
                        )
                      })}
                    </div>
                  </div>
                )
              })}
            </div>
          </div>
        </div>
      )
    }

    if (layout === 'VERTICAL') {
      return (
        <div className="mb-10 animate-fade-in">
          <h3 className="text-xl font-black mb-4 flex items-center gap-2 border-b dark:border-slate-700 pb-2"><i className="ph-fill ph-calendar-blank text-primary"></i> {dateObj.toLocaleDateString('pt-BR', {weekday: 'long', day: '2-digit', month: 'long'}).toUpperCase()}</h3>
          <div className="gantt-scroll-area flex shadow-lg">
            <div className="m-v-timecol">
              <div className="m-v-header bg-slate-100 dark:bg-slate-800" style={{zIndex: 50, left: 0}}>HORA</div>
              {arrayHoras.map((h, i) => (
                <div key={i} className="flex justify-center border-b border-slate-200 dark:border-slate-800/50 pt-1" style={{height: `${60/2}px`}}>
                  {Number.isInteger(h) && <span className="text-[9px] font-bold text-slate-500">{String(h%24).padStart(2,'0')}h</span>}
                </div>
              ))}
            </div>

            {entFiltradas.map((ent, idx) => {
              const blocos = viewMode === 'Médico' ? escDia.filter(e=>e.Sala === ent) : escDia.filter(e=>e.Nome_Profissional === ent);
              const infoEx = viewMode === 'Médico' ? cfg?.postos?.find(p=>p.nome === ent)?.setor : profs.find(p=>p.Nome === ent)?.Cargo;
              const isOver = dragOverRow === `${dStr}-${ent}`;

              return (
                <div key={idx} onDragOver={(e)=>{e.preventDefault(); setDragOverRow(`${dStr}-${ent}`);}} onDrop={(e)=>{e.preventDefault(); handleDrop(ent);}} className={`m-v-datacol transition ${isOver?'bg-blue-50/30 dark:bg-blue-900/20':''}`}>
                  <div className="m-v-header bg-white dark:bg-slate-900" title={ent}>
                    <span className="font-black text-[11px] truncate w-full text-center px-1">{viewMode==='Colaborador'?ent.split(' ')[0]+' '+(ent.split(' ')[1]||''):ent}</span>
                    <span className="text-[8px] opacity-50 truncate w-full text-center mt-0.5">{infoEx||'Geral'}</span>
                  </div>
                  <div className="relative w-full" style={{height: `${HORAS_TOTAIS * 60}px`}}>
                    {arrayHoras.map((h,i) => <div key={i} className="w-full border-b border-slate-100 dark:border-slate-800/30" style={{height:`${60/2}px`}}></div>)}
                    {pxAgora !== null && <div className="linha-agora-v" style={{top: `${pxAgora}px`}}></div>}
                    
                    {blocos.map((b, bIdx) => {
                      const isF = b.Status === 'FOLGA' || b.Status === 'AUSENTE';
                      let top=0; let hght=60; let hasC=false;
                      if(isF||b.Horario==='A DEFINIR'){top=4;hght=40;}else{
                        const t = safeGetHours(b.Horario);
                        if(t.in!==null&&t.out!==null){ 
                          top=(t.in-minH)*60; hght=(t.out-t.in)*60; if(top<0){hght+=top;top=0;} 
                          blocos.forEach((out,oI)=>{if(bIdx!==oI&&!isF) hasC = checkConflito(b, out); });
                        }
                      }
                      const c = isF?'#94a3b8':getCorDaSala(b.Sala, cfg); const n = viewMode==='Médico'?b.Nome_Profissional:b.Sala;

                      return (
                        <div key={bIdx} draggable={isAd} onDragStart={()=>setDragItem(b)} onClick={()=>isAd&&setEditData({...b})} 
                          className={`m-v-block ${hasC?'conflict':''}`} style={{top:`${top}px`, height:`${hght-2}px`, backgroundColor:c}}>
                          {hasC && <span className="absolute top-1 right-1 text-sm drop-shadow-md">⚠️</span>}
                          <span className="font-black text-[10px] leading-tight drop-shadow-sm">{isF?b.Status:n}</span>
                          {!isF&&b.Horario!=='A DEFINIR'&&<span className="text-[8px] font-bold opacity-90 drop-shadow-sm mt-1">{b.Horario}</span>}
                        </div>
                      )
                    })}
                  </div>
                </div>
              )
            })}
          </div>
        </div>
      )
    }

    return (
      <div className="mb-10 animate-fade-in">
        <h3 className="text-xl font-black mb-4 flex items-center gap-2 border-b dark:border-slate-700 pb-2"><i className="ph-fill ph-calendar-blank text-primary"></i> {dateObj.toLocaleDateString('pt-BR', {weekday: 'long', day: '2-digit', month: 'long'}).toUpperCase()}</h3>
        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
          {entFiltradas.map((ent, idx) => {
            const blocos = viewMode === 'Médico' ? escDia.filter(e=>e.Sala === ent) : escDia.filter(e=>e.Nome_Profissional === ent);
            const infoEx = viewMode === 'Médico' ? cfg?.postos?.find(p=>p.nome === ent)?.setor : profs.find(p=>p.Nome === ent)?.Cargo;
            const isOver = dragOverEnt === ent;
            const cardGrad = gerarGradienteDoDia(blocos, cfg);

            return (
              <div key={idx} onDragOver={(e)=>{e.preventDefault(); setDragOverEnt(ent);}} onDrop={(e)=>{e.preventDefault(); handleDrop(ent);}} className={`clean-card p-3 flex flex-col shadow-sm transition overflow-hidden relative ${isOver?'scale-105 ring-4 ring-blue-400':''}`}>
                <div className="absolute top-0 left-0 bottom-0 w-1.5" style={{background: cardGrad}}></div>
                <div className="border-b dark:border-slate-700 pb-2 mb-2 text-center pl-2"><h4 className="font-black text-xs uppercase truncate">{ent}</h4><p className="text-[9px] opacity-60">{infoEx||'Geral'}</p></div>
                <div className="space-y-2 pl-2">
                  {blocos.map((b, bIdx) => {
                    const isF = b.Status === 'FOLGA' || b.Status === 'AUSENTE';
                    const n = viewMode === 'Médico' ? b.Nome_Profissional : b.Sala;
                    return (
                      <div key={bIdx} draggable={isAd} onDragStart={()=>setDragItem(b)} onClick={()=>isAd&&setEditData({...b})} className="p-2 rounded bg-slate-50 dark:bg-slate-800 text-left border dark:border-slate-700 cursor-grab hover:border-primary transition shadow-sm">
                        <p className="font-black text-[10px] text-primary truncate leading-tight">{isF?b.Status:n}</p>
                        <p className="text-[8px] font-bold opacity-60 mt-1"><i className="ph-fill ph-clock"></i> {b.Horario}</p>
                      </div>
                    )
                  })}
                </div>
              </div>
            )
          })}
        </div>
      </div>
    );
  };

  return (
    <div className="animate-fade-in space-y-6 max-w-[1600px] mx-auto pb-10">
      {viewMode === 'MENU' ? (
        <div>
          <h2 className="text-2xl font-black mb-6">Visão Operacional de Tráfego</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div onClick={()=>setViewMode('Colaborador')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer hover:border-primary hover:shadow-lg transition-all transform hover:-translate-y-1">
              <div className="w-20 h-20 bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 rounded-full flex items-center justify-center text-4xl mb-4"><i className="ph-fill ph-users"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest text-center">Gantt por Pessoa</h3>
              <p className="text-[10px] font-bold opacity-60 mt-2 uppercase tracking-widest">Colunas = Equipe Base</p>
            </div>
            <div onClick={()=>setViewMode('Médico')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer hover:border-red-500 hover:shadow-lg transition-all transform hover:-translate-y-1">
              <div className="w-20 h-20 bg-red-50 text-red-600 dark:bg-red-900/20 dark:text-red-400 rounded-full flex items-center justify-center text-4xl mb-4"><i className="ph-fill ph-door"></i></div>
              <h3 className="font-black text-xl uppercase tracking-widest text-center">Gantt por Sala</h3>
              <p className="text-[10px] font-bold opacity-60 mt-2 uppercase tracking-widest">Colunas = Consultórios</p>
            </div>
          </div>
        </div>
      ) : (
        <div className="animate-fade-in space-y-6">
          <div className="clean-card p-4 flex flex-col lg:flex-row justify-between lg:items-center gap-4">

              <div>

                <h2 className="text-xl font-black text-primary">{viewMode === 'Médico' ? 'Ocupação de Salas' : 'Painel de Pessoas'}</h2>
              </div>
            </div>
            
            <div className="flex flex-wrap items-center gap-2">
              <div className="relative">
                <i className="ph-bold ph-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>

              <div className="flex items-center bg-slate-100 dark:bg-slate-800 p-1 rounded-xl shadow-sm border dark:border-slate-700">
                <button onClick={()=>setLayout('HORIZONTAL')} className={`px-3 py-1.5 text-[10px] font-black uppercase rounded-lg transition ${layout==='HORIZONTAL'?'bg-white dark:bg-slate-700 shadow text-primary':'opacity-60'}`}>Horiz</button>

              <div className="flex items-center bg-white dark:bg-slate-800 p-1.5 rounded-xl shadow-sm border dark:border-slate-700 ml-auto">
                <button onClick={()=>setDataBase(new Date(dataBase.setDate(dataBase.getDate() - rangeDias)))} className="w-8 h-8 flex justify-center items-center hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition"><i className="ph-bold ph-caret-left"></i></button>
                <span className="font-black text-[11px] uppercase px-3 text-center min-w-[120px] text-primary">{dataBase.toLocaleDateString('pt-BR', {weekday:'short', day:'2-digit', month:'2-digit'})}</span>
                <button onClick={()=>setDataBase(new Date(dataBase.setDate(dataBase.getDate() + rangeDias)))} className="w-8 h-8 flex justify-center items-center hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition"><i className="ph-bold ph-caret-right"></i></button>
              </div>
              
              <select value={rangeDias} onChange={e=>setRangeDias(Number(e.target.value))} className="p-2.5 rounded-xl border dark:border-slate-700 outline-none bg-white dark:bg-slate-800 font-bold text-xs shadow-sm cursor-pointer">
                <option value={1}>Exibir 1 Dia</option><option value={3}>Exibir 3 Dias</option><option value={7}>Exibir 7 Dias</option>
              </select>
            </div>
          </div>

          <div className="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-900/50 p-3 rounded-xl text-xs font-bold text-yellow-800 dark:text-yellow-400 flex items-center gap-2"><i className="ph-fill ph-info text-lg"></i> 💡 Dica de Gestão: Arraste os blocos coloridos de uma pessoa/sala para outra para transferir horários na hora!</div>

          <div className="space-y-8">
            {diasRender.map((d, i) => <RenderTimeline key={i} dateObj={d} />)}
          </div>
        </div>
      )}
      {editData && <SuperActionModal escala={editData} profs={profs} cfg={cfg} onClose={()=>setEditData(null)} onSave={onSave} onRefresh={onRefresh} isAd={isAd} />}
    </div>
  );
};

// ================== ABA 7: MURAL FESTIVO (ANIVERSARIANTES) ==================
const MuralAniversarioView = ({ profs, cfg }) => {
  const [viewMode, setViewMode] = useState('HOJE');
  const hj = new Date(); const hjM = hj.getMonth() + 1; const hjD = hj.getDate();

  const todosNiverMes = profs.filter(p => {
    if(!p.DataNascimento) return false;
    const pts = p.DataNascimento.split('/');
    if(pts.length < 2) return false;
    return parseInt(pts[1]) === hjM;
  }).sort((a,b) => parseInt(a.DataNascimento.split('/')[0]) - parseInt(b.DataNascimento.split('/')[0]));

  const niverHoje = todosNiverMes.filter(p => parseInt(p.DataNascimento.split('/')[0]) === hjD);

  const renderCard = (p, isH) => (
    <div key={p.ID} className={`card-niver p-6 rounded-2xl flex flex-col items-center text-center shadow-lg relative overflow-hidden ${isH?'scale-105 border-pink-400':'border-pink-200'}`}>
      <div className="absolute top-0 right-0 p-4 opacity-20 text-6xl">🎈</div>
      <div className="absolute bottom-0 left-0 p-4 opacity-20 text-6xl">🎉</div>
      {p.FotoURL ? <img src={fmtImg(p.FotoURL)} className="w-24 h-24 rounded-full object-cover shadow-md border-4 border-white z-10" /> : <div className="w-24 h-24 rounded-full flex items-center justify-center text-4xl font-black text-white shadow-md border-4 border-white z-10" style={{backgroundColor:p.Cor||'#0ea5e9'}}>{p.Nome[0]}</div>}
      <h3 className="font-black text-xl mt-4 z-10 text-slate-800 dark:text-white leading-tight">{p.Nome}</h3>
      <p className="text-sm font-bold opacity-70 z-10 uppercase mt-1">{p.Cargo}</p>
      <div className="mt-4 bg-pink-100 dark:bg-pink-900/30 px-4 py-2 rounded-full z-10 shadow-sm border border-pink-200 dark:border-pink-800">
        <p className="font-black text-pink-600 dark:text-pink-400">🎂 Dia {p.DataNascimento.slice(0,5)}</p>
      </div>
    </div>
  );

  return (
    <div className="animate-fade-in space-y-6 max-w-6xl mx-auto pb-10">
      <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 shadow-sm">
        <h2 className="text-2xl font-black flex items-center gap-2 text-pink-500"><i className="ph-fill ph-confetti"></i> Mural de Aniversários</h2>
        <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-xl">
          <button onClick={()=>setViewMode('HOJE')} className={`px-6 py-2 text-xs font-black uppercase rounded-lg transition ${viewMode==='HOJE'?'bg-white dark:bg-slate-700 shadow text-pink-500':'opacity-60'}`}>Hoje</button>
          <button onClick={()=>setViewMode('MES')} className={`px-6 py-2 text-xs font-black uppercase rounded-lg transition ${viewMode==='MES'?'bg-white dark:bg-slate-700 shadow text-primary':'opacity-60'}`}>Mês Todo</button>
        </div>
      </div>
      <div className="mural-bg min-h-[60vh] rounded-3xl border-4 border-dashed border-pink-200 dark:border-slate-700 p-8 flex flex-col relative overflow-hidden">
        {viewMode === 'HOJE' ? (
          niverHoje.length > 0 ? (
            <div className="flex-1 flex flex-col items-center justify-center space-y-8 relative z-10">
              <h1 className="text-4xl md:text-6xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 drop-shadow-sm">Feliz Aniversário!</h1>
              <div className="flex flex-wrap justify-center gap-8 mt-8">{niverHoje.map(p => renderCard(p, true))}</div>
            </div>
          ) : (
            <div className="flex-1 flex flex-col items-center justify-center opacity-40">
              <i className="ph-fill ph-calendar-blank text-8xl mb-4"></i>
              <h2 className="text-2xl font-black">Nenhum aniversariante hoje.</h2>
              <p className="font-bold">Veja a aba "Mês Todo" para os próximos.</p>
            </div>
          )
        ) : (
          <div className="relative z-10">
            <h2 className="text-3xl font-black text-center mb-8 text-primary">Aniversariantes do Mês ({hj.toLocaleString('pt-BR',{month:'long'})})</h2>
            {todosNiverMes.length > 0 ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">{todosNiverMes.map(p => renderCard(p, false))}</div>
            ) : (
              <div className="text-center opacity-40 py-20"><i className="ph-fill ph-calendar-blank text-8xl mb-4"></i><h2 className="text-2xl font-black">Nenhum aniversário cadastrado este mês.</h2></div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

// ================== APP ROOT E ROTEAMENTO ==================
const App = () => {
  const [u, setU] = useState(null); const [l, setL] = useState(true); const [t, setT] = useState('HOJE');
  const [dbD, setDb] = useState({ PROFISSIONAIS:[], ESCALAS:[], CONFIGURACOES:{} });
  const [isD, setIsD] = useState(() => localStorage.getItem('theme') === 'dark');
  
  useEffect(() => { 
    if (isD) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); 
    localStorage.setItem('theme', isD?'dark':'light'); 
  }, [isD]);
  
  const f = async () => {
    const pr = await api.fetch('PROFISSIONAIS'); const es = await api.fetch('ESCALAS'); const cf = await api.fetch('CONFIGURACOES');
    const pCfg = cf.find(c=>c.ID==='parametros')||{}; const plCfg = cf.find(c=>c.ID==='plantao')||{};
    setDb({ PROFISSIONAIS: pr||[], ESCALAS: es||[], CONFIGURACOES: {...pCfg, ...plCfg} });
  };

  useEffect(() => { 
    const un = auth.onAuthStateChanged(async usr => { 
      if(usr){ 
        let role = 'Colaborador'; const eml = usr.email.toLowerCase();
        if (eml.includes('admin') || eml.includes('gestao') || eml.includes('diretor')) role = 'Admin';
        else if (eml.includes('supervis')) role = 'Supervisor';
        setU({email:usr.email, nome:usr.email.split('@')[0], nivel:role}); 
        await f(); 
      } else setU(null); 
      setL(false); 
    }); 
    return ()=>un(); 
  }, []);

  if (l) return <div className="min-h-screen flex items-center justify-center"><div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>;

  if (!u) return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-900">
      <div className="w-full max-w-md clean-card p-10">
        <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6"><i className="ph-fill ph-hospital"></i></div>
        <h1 className="text-3xl font-black text-center mb-8">Escalas SV</h1>
        <form onSubmit={async e=>{e.preventDefault();setL(true);try{await auth.signInWithEmailAndPassword(e.target.e.value, e.target.p.value);}catch(err){alert('Acesso Negado. Verifique os dados.');setL(false);}}} className="space-y-4">
          <input name="e" type="email" placeholder="E-mail" className="w-full p-4 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none font-bold" required />
          <input name="p" type="password" placeholder="Senha" className="w-full p-4 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none font-bold" required />
          <button type="submit" className="w-full bg-primary text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-600 transition">Entrar no Sistema</button>
        </form>
      </div>
    </div>
  );

  const isAd = u.nivel === 'Admin' || u.nivel === 'Supervisor';
  const menu = [ 
    {id:'HOJE', i:'ph-kanban', n:'Plantão'}, 
    {id:'DIARIO', i:'ph-users-three', n:'Lista Dia'}, 
    {id:'MATRIZ', i:'ph-chart-gantt', n:'Visão Ampla'}, 
    {id:'CALENDARIO', i:'ph-calendar-plus', n:'Escalas'}, 
    {id:'EQUIPE', i:'ph-address-book', n:'Equipe', adminOnly:true}, 
    {id:'MURAL', i:'ph-confetti', n:'Festivo'},
    {id:'CONFIG', i:'ph-gear', n:'Ajustes', adminOnly:true} 
  ];

  return (
    <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0">
      <aside className="hidden md:flex flex-col h-screen fixed z-30 w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
        <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3"><div className="w-10 h-10 bg-primary text-white rounded-lg flex justify-center items-center"><i className="ph-fill ph-heartbeat text-xl"></i></div><div><h2 className="font-black text-lg">Escalas SV</h2><p className="text-[9px] uppercase opacity-50 font-bold tracking-widest">ERP Hospitalar</p></div></div>
        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto hide-scroll">
          {menu.filter(m=>!m.adminOnly||isAd).map(m=><button key={m.id} onClick={()=>setT(m.id)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold text-sm transition ${t===m.id?(m.id==='MURAL'?'bg-pink-50 text-pink-600 dark:bg-pink-900/30 dark:text-pink-400':'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400'):'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`}><i className={`ph-fill ${m.i} text-xl`}></i> {m.n}</button>)}
        </nav>
        <div className="p-4 border-t border-slate-100 dark:border-slate-800"><button onClick={()=>auth.signOut()} className="text-red-500 font-bold flex items-center gap-2 p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded w-full transition"><i className="ph-bold ph-sign-out text-lg"></i> Sair do App</button></div>
      </aside>
      
      <nav className="md:hidden fixed bottom-0 inset-x-0 border-t border-slate-200 dark:border-slate-800 z-50 flex justify-around p-2 pb-safe bg-white dark:bg-slate-900 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] overflow-x-auto hide-scroll">
        {menu.filter(m=>!m.adminOnly||isAd).map(m=><button key={m.id} onClick={()=>setT(m.id)} className={`flex flex-col items-center gap-1 p-2 rounded-xl min-w-[64px] transition ${t===m.id?(m.id==='MURAL'?'text-pink-500':'text-primary'):'text-slate-400'}`}><i className={`ph-fill ${m.i} text-2xl`}></i><span className="text-[9px] font-black uppercase">{m.n}</span></button>)}
      </nav>
      
      <main className="flex-1 transition-all p-4 md:p-8 w-full md:ml-64 overflow-x-hidden">
        <TopHeader user={u} isDark={isD} toggleDark={()=>setIsD(!isD)} />
        
        {t==='HOJE' && <PainelHojeView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='DIARIO' && <TrabalhandoHojeView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='MATRIZ' && <VisaoAmplaView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='CALENDARIO' && <CalendarioView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
        {t==='EQUIPE' && isAd && <EquipeView data={dbD.PROFISSIONAIS} cfg={dbD.CONFIGURACOES || {}} onSave={api.saveRecord} onDelete={api.deleteRecord} onRefresh={f} />}
        {t==='CONFIG' && isAd && <AjustesView cfg={dbD.CONFIGURACOES || {}} onSave={api.saveRecord} onRefresh={f} />}
        {t==='MURAL' && <MuralAniversarioView profs={dbD.PROFISSIONAIS} cfg={dbD.CONFIGURACOES || {}} />}
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root')); 
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
