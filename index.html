// ================== ABA 5: VISÃO AMPLA (MAPA DE GANTT) ==================
const GanttView = ({ profs, escalas, cfg }) => {
    const [viewMode, setViewMode] = useState('MENU');
    const [diaAtual, setDiaAtual] = useState(new Date());
    const [buscaGantt, setBuscaGantt] = useState('');

    const dStr = getStrDt(diaAtual);
    
    // Função para converter "08:00" em número (ex: 8.5)
    const parseHorario = (hStr) => {
        if(!hStr) return null;
        let parts = hStr.split(':');
        if(parts.length < 2) return null;
        return parseInt(parts[0]) + (parseInt(parts[1])/60);
    }

    // Filtra escalas do dia e do grupo selecionado
    const escalasDiaGrupo = useMemo(() => {
        if (viewMode === 'MENU') return [];
        return escalas.filter(e => {
            if (e.Data !== dStr) return false;
            // Pega o tipo do profissional
            const pInfo = profs.find(p => p.Nome === e.Nome_Profissional);
            const tipo = pInfo ? pInfo.Tipo : (e.Cargo.toLowerCase().includes('médico') ? 'Médico' : 'Colaborador');
            return tipo === viewMode;
        });
    }, [escalas, dStr, viewMode, profs]);

    // Aplica o filtro de busca de nome
    const escalasFiltradas = escalasDiaGrupo.filter(e => safeStr(e.Nome_Profissional).toLowerCase().includes(buscaGantt.toLowerCase()));

    // Descobre o menor e o maior horário do dia para montar a régua
    const limites = useMemo(() => {
        let minH = 24; let maxH = 0;
        escalasDiaGrupo.forEach(e => {
            if (e.Horario && e.Horario !== 'A DEFINIR' && e.Status !== 'FOLGA') {
                const [inH, outH] = e.Horario.split(' às ');
                const valIn = parseHorario(inH?.trim());
                const valOut = parseHorario(outH?.trim());
                if(valIn !== null && valIn < minH) minH = Math.floor(valIn);
                if(valOut !== null && valOut > maxH) maxH = Math.ceil(valOut);
            }
        });
        if(minH === 24) minH = 6; // Default se vazio
        if(maxH === 0) maxH = 20;
        // Evita réguas muito pequenas
        if(maxH - minH < 6) { minH = 8; maxH = 18; }
        
        // Garante que maxH não passe de 24. E se o turno vira a noite (ex sai as 02:00), precisa de ajuste complexo, mas assumimos dia atual por enquanto.
        if (maxH <= minH) maxH = minH + 12;

        return { min: minH, max: maxH, range: maxH - minH };
    }, [escalasDiaGrupo]);

    const horasRegua = Array.from({length: limites.range + 1}, (_, i) => limites.min + i);

    return (
        <div className="animate-fade-in space-y-6 max-w-[1600px] mx-auto pb-10">
            {viewMode === 'MENU' && (
                <div>
                    <h2 className="text-2xl font-black mb-6">Visão Ampla (Gráfico Temporal)</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div onClick={()=>setViewMode('Colaborador')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-primary hover:shadow-lg transition-all">
                            <div className="w-20 h-20 bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-chart-gantt"></i></div>
                            <h3 className="font-black text-xl uppercase tracking-widest text-center">Equipe Base</h3>
                        </div>
                        <div onClick={()=>setViewMode('Médico')} className="clean-card p-10 flex flex-col items-center justify-center cursor-pointer group hover:border-red-500 hover:shadow-lg transition-all">
                            <div className="w-20 h-20 bg-red-50 text-red-600 dark:bg-red-900/20 dark:text-red-400 rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-transform"><i className="ph-fill ph-chart-gantt"></i></div>
                            <h3 className="font-black text-xl uppercase tracking-widest text-center">Corpo Clínico</h3>
                        </div>
                    </div>
                </div>
            )}

            {viewMode !== 'MENU' && (
                <div className="animate-fade-in space-y-4">
                    <div className="flex flex-col md:flex-row justify-between md:items-center gap-4 border-b border-slate-200 dark:border-slate-700 pb-4">
                        <div className="flex items-center gap-4">
                            <button onClick={()=>{setViewMode('MENU'); setBuscaGantt('');}} className="w-10 h-10 clean-card flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800"><i className="ph-bold ph-arrow-left"></i></button>
                            <div>
                                <p className="text-[10px] font-bold uppercase opacity-50 tracking-widest">Painel Gantt</p>
                                <h2 className="text-2xl font-black">{viewMode === 'Médico' ? 'Corpo Clínico' : 'Colaboradores'}</h2>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-4 bg-white dark:bg-slate-800 p-2 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                            <button onClick={()=>setDiaAtual(new Date(diaAtual.setDate(diaAtual.getDate() - 1)))} className="w-8 h-8 flex justify-center items-center hover:bg-slate-100 dark:hover:bg-slate-700 rounded"><i className="ph-bold ph-caret-left"></i></button>
                            <span className="font-black text-sm uppercase tracking-widest min-w-[100px] text-center">{dStr}</span>
                            <button onClick={()=>setDiaAtual(new Date(diaAtual.setDate(diaAtual.getDate() + 1)))} className="w-8 h-8 flex justify-center items-center hover:bg-slate-100 dark:hover:bg-slate-700 rounded"><i className="ph-bold ph-caret-right"></i></button>
                        </div>

                        <div className="relative md:w-64">
                            <input type="text" placeholder="Filtrar por nome..." value={buscaGantt} onChange={e=>setBuscaGantt(e.target.value)} className="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-700 outline-none bg-white dark:bg-slate-800 font-bold" />
                        </div>
                    </div>

                    <div className="clean-card bg-white dark:bg-slate-900 overflow-x-auto">
                        <div className="min-w-[800px] gantt-grid">
                            {/* Cabeçalho */}
                            <div className="gantt-header border-r border-slate-200 dark:border-slate-700">Local / Unidade</div>
                            <div className="gantt-header border-r border-slate-200 dark:border-slate-700">Setor / Posto</div>
                            <div className="gantt-header flex justify-between relative">
                                {horasRegua.map((hr, i) => (
                                    <div key={i} className="absolute text-[9px] opacity-40 font-black" style={{left: `${(i/limites.range)*100}%`, transform: 'translateX(-50%)'}}>{String(hr).padStart(2,'0')}:00</div>
                                ))}
                            </div>

                            {/* Linhas */}
                            {escalasFiltradas.length === 0 ? (
                                <div className="col-span-3 p-10 text-center font-bold opacity-50">Nenhum plantão registrado para esta data.</div>
                            ) : (
                                escalasFiltradas.sort((a,b)=> safeStr(a.Unidade).localeCompare(safeStr(b.Unidade))).map((e, idx) => {
                                    
                                    const pInfo = profs.find(p => p.Nome === e.Nome_Profissional) || {};
                                    const isFolga = e.Status === 'FOLGA';
                                    
                                    // Cálculo de posicionamento da barra
                                    let leftPerc = 0; let widthPerc = 100;
                                    let barColor = isFolga ? '#94a3b8' : (e.Cor || '#0ea5e9');

                                    if (!isFolga && e.Horario && e.Horario !== 'A DEFINIR') {
                                        const [inH, outH] = e.Horario.split(' às ');
                                        const valIn = parseHorario(inH?.trim());
                                        let valOut = parseHorario(outH?.trim());
                                        
                                        if (valIn !== null && valOut !== null) {
                                            if(valOut < valIn) valOut += 24; // Virada de noite simples
                                            
                                            leftPerc = ((valIn - limites.min) / limites.range) * 100;
                                            widthPerc = ((valOut - valIn) / limites.range) * 100;
                                            
                                            // Trava visual para não estourar a tela
                                            if(leftPerc < 0) { widthPerc += leftPerc; leftPerc = 0; }
                                            if(leftPerc + widthPerc > 100) widthPerc = 100 - leftPerc;
                                        }
                                    }

                                    return (
                                        <React.Fragment key={e.ID || idx}>
                                            <div className="gantt-cell uppercase text-[10px] opacity-70">{e.Unidade || 'Geral'}</div>
                                            <div className="gantt-cell uppercase text-[11px] truncate" title={e.Sala}>{e.Sala}</div>
                                            <div className="gantt-cell p-0 gantt-timeline-container">
                                                {e.Horario === 'A DEFINIR' ? (
                                                    <div className="text-[10px] text-red-500 font-black pl-4">HORÁRIO A DEFINIR</div>
                                                ) : (
                                                    <div className="gantt-bar shadow-md" style={{left: `${leftPerc}%`, width: `${widthPerc}%`, backgroundColor: barColor}} title={`${e.Nome_Profissional} (${e.Horario})`}>
                                                        <div className="flex items-center gap-1.5 w-full">
                                                            {pInfo.FotoURL ? <img src={fmtImg(pInfo.FotoURL)} className="w-4 h-4 rounded-full object-cover shrink-0" /> : <div className="w-4 h-4 rounded-full bg-white/20 flex items-center justify-center shrink-0">{e.Nome_Profissional[0]}</div>}
                                                            <span className="truncate">{e.Nome_Profissional}</span>
                                                            <BadgeConvenio codUnimed={pInfo.CodUnimed} configLogo={cfg?.logoConvenio} />
                                                            {!isFolga && <span className="opacity-70 ml-auto shrink-0 font-normal">{e.Horario}</span>}
                                                            {isFolga && <span className="opacity-70 ml-auto shrink-0 font-normal">FOLGA</span>}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </React.Fragment>
                                    )
                                })
                            )}
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

// ================== APP ROOT ==================
const App = () => {
    const [u, setU] = useState(null); const [l, setL] = useState(true); const [t, setT] = useState('HOJE');
    const [dbD, setDb] = useState({ PROFISSIONAIS:[], ESCALAS:[], CONFIGURACOES:{} });
    const [isD, setIsD] = useState(() => localStorage.getItem('theme') === 'dark');
    
    useEffect(() => { if (isD) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); localStorage.setItem('theme', isD?'dark':'light'); }, [isD]);
    
    const f = async () => {
        const pr = await api.fetch('PROFISSIONAIS'); const es = await api.fetch('ESCALAS'); const cf = await api.fetch('CONFIGURACOES');
        const pCfg = cf.find(c=>c.ID==='parametros')||{}; const plCfg = cf.find(c=>c.ID==='plantao')||{};
        setDb({ PROFISSIONAIS: pr||[], ESCALAS: es||[], CONFIGURACOES: {...pCfg, ...plCfg} });
    };

    useEffect(() => { 
        const un = auth.onAuthStateChanged(async usr => { 
            if(usr){ 
                let role = 'Colaborador';
                const eml = usr.email.toLowerCase();
                if (eml.includes('admin') || eml.includes('gestao') || eml.includes('diretor')) role = 'Admin';
                else if (eml.includes('supervis')) role = 'Supervisor';
                setU({email:usr.email, nome:usr.email.split('@')[0], nivel:role}); 
                await f(); 
            } else setU(null); 
            setL(false); 
        }); 
        return ()=>un(); 
    }, []);

    if (l) return <div className="min-h-screen flex items-center justify-center"><div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>;

    if (!u) return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-900"><div className="w-full max-w-md clean-card p-10"><div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6"><i className="ph-fill ph-hospital"></i></div><h1 className="text-3xl font-black text-center mb-8">Escalas SV</h1><form onSubmit={async e=>{e.preventDefault();setL(true);try{await auth.signInWithEmailAndPassword(e.target.e.value, e.target.p.value);}catch(err){alert('Acesso Negado');setL(false);}}} className="space-y-4"><input name="e" type="email" placeholder="E-mail" className="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white outline-none bg-slate-50 dark:bg-slate-800" required /><input name="p" type="password" placeholder="Senha" className="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white outline-none bg-slate-50 dark:bg-slate-800" required /><button type="submit" className="w-full bg-primary text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-600 transition">Entrar no Sistema</button></form></div><button onClick={()=>setIsD(!isD)} className="absolute top-6 right-6 w-10 h-10 rounded-full bg-white dark:bg-slate-800 shadow flex items-center justify-center text-slate-500"><i className={isD?"ph-fill ph-sun text-yellow-500":"ph-fill ph-moon"}></i></button></div>
    );

    const isAd = u.nivel === 'Admin' || u.nivel === 'Supervisor';
    
    // NOVO MENU COM VISÃO AMPLA GANTT
    const menu = [ 
        {id:'HOJE', i:'ph-kanban', n:'Plantão'}, 
        {id:'CALENDARIO', i:'ph-calendar-plus', n:'Escalas'}, 
        {id:'GANTT', i:'ph-chart-gantt', n:'Visão Ampla'}, 
        {id:'EQUIPE', i:'ph-users', n:'Equipe', adminOnly:true}, 
        {id:'CONFIG', i:'ph-gear', n:'Ajustes', adminOnly:true} 
    ];

    return (
        <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0">
            <aside className="hidden md:flex flex-col h-screen fixed z-30 w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
                <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3"><div className="w-10 h-10 bg-primary text-white rounded-lg flex justify-center items-center"><i className="ph-fill ph-heartbeat text-xl"></i></div><div><h2 className="font-black text-lg">Escalas SV</h2><p className="text-[9px] uppercase opacity-50 font-bold tracking-widest">ERP Hospitalar</p></div></div>
                <nav className="flex-1 px-4 py-6 space-y-2">{menu.filter(m=>!m.adminOnly||isAd).map(m=><button key={m.id} onClick={()=>setT(m.id)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold text-sm transition ${t===m.id?'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400':'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`}><i className={`ph-fill ${m.i} text-xl`}></i> {m.n}</button>)}</nav>
                <div className="p-4 border-t border-slate-100 dark:border-slate-800"><button onClick={()=>auth.signOut()} className="text-red-500 font-bold flex items-center gap-2 p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded w-full transition"><i className="ph-bold ph-sign-out text-lg"></i> Sair do App</button></div>
            </aside>
            <nav className="md:hidden fixed bottom-0 inset-x-0 border-t border-slate-200 dark:border-slate-800 z-50 flex justify-around p-2 pb-safe bg-white dark:bg-slate-900 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">{menu.filter(m=>!m.adminOnly||isAd).map(m=><button key={m.id} onClick={()=>setT(m.id)} className={`flex flex-col items-center gap-1 p-2 rounded-xl w-16 transition ${t===m.id?'text-primary':'text-slate-400'}`}><i className={`ph-fill ${m.i} text-2xl`}></i><span className="text-[9px] font-black uppercase">{m.n}</span></button>)}</nav>
            
            <main className="flex-1 transition-all p-4 md:p-8 w-full md:ml-64">
                {(t==='HOJE'||t==='CALENDARIO'||t==='GANTT') && <div className="max-w-[1600px] mx-auto"><TopHeader user={u} isDark={isD} toggleDark={()=>setIsD(!isD)} /></div>}
                
                {t==='HOJE' && <PainelHojeView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
                {t==='CALENDARIO' && <CalendarioView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} user={u} onSave={api.saveRecord} onRefresh={f} />}
                {t==='GANTT' && <GanttView profs={dbD.PROFISSIONAIS} escalas={dbD.ESCALAS} cfg={dbD.CONFIGURACOES || {}} />}
                {t==='EQUIPE' && isAd && <EquipeView data={dbD.PROFISSIONAIS} cfg={dbD.CONFIGURACOES || {}} onSave={api.saveRecord} onDelete={api.deleteRecord} onRefresh={f} />}
                {t==='CONFIG' && isAd && <AjustesView cfg={dbD.CONFIGURACOES || {}} onSave={api.saveRecord} onRefresh={f} />}
            </main>
        </div>
    );
};
const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script></body></html>
