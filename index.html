<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script>
        window.addEventListener('error', function(event) {
            document.body.innerHTML = '<div style="background:#fee2e2;color:#991b1b;padding:40px;font-family:sans-serif;height:100vh;text-align:center;">' +
                '<h1 style="font-size:2rem;font-weight:900;margin-bottom:10px;">Sistema Protegido</h1>' +
                '<p>O navegador encontrou um erro. <b>Tire um print desta tela e envie para análise:</b></p>' +
                '<div style="background:white;padding:20px;border-radius:10px;text-align:left;max-width:600px;margin:20px auto;border:2px solid #f87171;">' +
                '<strong>ERRO:</strong> ' + event.message + '<br/><br/><strong>LINHA:</strong> ' + event.lineno + '</div>' +
                '<button onclick="window.location.reload()" style="padding:15px 30px;background:#991b1b;color:white;border-radius:10px;font-weight:bold;cursor:pointer;border:none;">Tentar Novamente</button></div>';
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { primary: '#1E40AF', secondary: '#F97316' },
                    animation: { 
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'pop-in': 'popIn 0.2s forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    },
                    keyframes: { 
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },

                    }
                } 
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background 1s ease-in-out; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .glass-panel-dark { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .card-hover { transition: all 0.3s ease; cursor: pointer; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.2); }
        
        .theme-morning { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); color: #0f172a; }
        .theme-afternoon { background: linear-gradient(135deg, #ffedd5 0%, #fed7aa 100%); color: #0f172a; }
        .theme-night { background: linear-gradient(135deg, #020617 0%, #1e1b4b 50%, #0f172a 100%); color: #f8fafc; }
        .stars { position: absolute; inset: 0; background-image: radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)), radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)); background-size: 200px 200px; opacity: 0.3; animation: pulse-slow 4s infinite alternate; pointer-events: none; }
    </style>

    <script>
        const VERSAO_ATUAL = "18.1.0"; 
        if (localStorage.getItem('escalas_versao') !== VERSAO_ATUAL) {
            localStorage.clear(); sessionStorage.clear();
            localStorage.setItem('escalas_versao', VERSAO_ATUAL);
            window.location.reload();
        }
    </script>
</head>
<body class="text-gray-800">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, Component } = React;

        // === COLOQUE A SUA CHAVE AQUI ===
        const firebaseConfig = {
           apiKey: "AIzaSyAtywH5sc1OEs0xa-c7IDOpGA9764ZhU6c",
  authDomain: "escalas-sao-vicente.firebaseapp.com",
  projectId: "escalas-sao-vicente",
  storageBucket: "escalas-sao-vicente.firebasestorage.app",
  messagingSenderId: "256697542067",
  appId: "1:256697542067:web:b8087390bb57d74def97c6"
};

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ==========================================
        // MOTOR DE BANCO DE DADOS (O QUE FALTAVA!)
        // ==========================================
        const api = {
            fetch: async (colName) => { 
                if(!db) return []; 
                try { 
                    const snap = await db.collection(colName).get(); 
                    return snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); 
                } catch (e) { return []; } 
            },
            saveRecord: async (colName, data, isEdit) => { 
                if(!db) return { success: false }; 
                try { 
                    let docData = { ...data }; 
                    // Limpa espaços vazios nas strings
                    Object.keys(docData).forEach(k => { if(typeof docData[k] === 'string') docData[k] = docData[k].trim(); }); 
                    let id = docData.ID; 
                    delete docData.ID; 
                    Object.keys(docData).forEach(k => docData[k] === undefined && delete docData[k]); 
                    
                    if (isEdit && id) {
                        await db.collection(colName).doc(id).update(docData); 
                    } else {
                        await db.collection(colName).add(docData); 
                    }
                    return { success: true }; 
                } catch (e) { return { success: false }; } 
            },
            deleteRecord: async (colName, id) => { 
                if(!db) return { success: false }; 
                try { 
                    await db.collection(colName).doc(id).delete(); 
                    return { success: true }; 
                } catch (e) { return { success: false }; } 
            }
        };

        // ==========================================
        // COMPONENTES VISUAIS
        // ==========================================

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, errStr: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { this.setState({ errStr: String(error) }); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-10 text-center flex flex-col items-center justify-center min-h-screen">
                            <i className="ph-fill ph-warning-circle text-6xl text-red-500 mb-4"></i>
                            <h2 className="text-2xl font-black mb-2">Erro de Visualização React</h2>
                            <p className="text-[10px] text-red-500 bg-red-50 p-4 font-mono mb-4 border border-red-200">{this.state.errStr}</p>
                            <button onClick={()=>window.location.reload()} className="bg-primary text-white px-8 py-3 rounded-xl font-bold shadow-lg">Recarregar App</button>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        const TopHeader = ({ user }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
            
            const h = time.getHours();
            let period = 'Bom dia'; let icon = 'ph-sun'; 
            let msgs = ["Um excelente turno para você!", "A saúde em primeiro lugar.", "Faça a diferença hoje!"];
            
            if (h >= 12 && h < 18) { period = 'Boa tarde'; icon = 'ph-cloud-sun'; msgs = ["Mantenha o foco e a energia!", "Quase lá, excelente trabalho.", "O cuidado continua."]; } 
            else if (h >= 18 || h < 6) { period = 'Boa noite'; icon = 'ph-moon-stars'; msgs = ["Um plantão tranquilo a todos.", "A noite também salva vidas.", "Bom descanso aos que saem, força aos que entram."]; }
            
            const randomMsg = msgs[time.getDate() % msgs.length]; 
            const userName = user && user.nome ? user.nome.split(' ')[0] : 'Equipe';

            return (
                <div className={`p-6 rounded-[2rem] shadow-sm mb-8 flex justify-between items-center ${h >= 18 || h < 6 ? 'glass-panel-dark' : 'glass-panel'}`}>
                    <div className="flex items-center gap-4">
                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-3xl ${h >= 18 || h < 6 ? 'bg-white/10' : 'bg-white/50 shadow-inner'}`}>
                            <i className={`ph-fill ${icon} animate-pulse-slow`}></i>
                        </div>
                        <div>
                            <h2 className="text-3xl font-black leading-none">{time.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</h2>
                            <p className="text-[10px] font-bold uppercase tracking-widest opacity-70 mt-1">{period}, {userName}</p>
                        </div>
                    </div>
                    <div className="hidden md:block text-right">
                        <p className="text-sm font-bold opacity-90">{randomMsg}</p>
                        <p className="text-[10px] uppercase tracking-widest opacity-50">Portal de Escalas SV</p>
                    </div>
                </div>
            );
        };

        const EquipeView = ({ data, onSave, onDelete, onRefresh, themeClass }) => {
            const [activeSector, setActiveSector] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({});
            const [newSectorName, setNewSectorName] = useState('');
            const [loading, setLoading] = useState(false);

            const defaultSectors = ['SUPERVISÃO', 'ADM E RECEPÇÃO', 'ENFERMAGEM', 'MÉDICOS PLANTÃO'];
            const allSectors = Array.from(new Set([...defaultSectors, ...data.map(p => p.Setor).filter(Boolean)])).sort();

            const openModal = (item = null) => {
                if (item) setFormData(item);
                else setFormData({ ID: '', Nome: '', Cargo: 'Médico', Setor: activeSector || allSectors[0], Especialidade: '', CargaHoraria: '', TempoIntervalo: '15', DiasTrabalho: [], Cor: '#1E40AF', Obs: '' });
                setIsModalOpen(true);
            };

            const toggleDia = (dia) => {
                const dias = Array.isArray(formData.DiasTrabalho) ? formData.DiasTrabalho : [];
                if (dias.includes(dia)) setFormData({...formData, DiasTrabalho: dias.filter(d => d !== dia)});
                else setFormData({...formData, DiasTrabalho: [...dias, dia]});
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setLoading(true);
                await onSave('PROFISSIONAIS', formData, !!formData.ID);
                setIsModalOpen(false);
                onRefresh();
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (confirm('Deseja excluir permanentemente?')) {
                    await onDelete('PROFISSIONAIS', id);
                    onRefresh();
                }
            };

            const isDark = (themeClass || '').includes('night');
            const panelClass = isDark ? 'glass-panel-dark' : 'glass-panel';

            if (activeSector) {
                const profsSetor = data.filter(p => p.Setor === activeSector).sort((a,b) => (a.Nome || '').localeCompare(b.Nome || ''));
                return (
                    <div className="animate-fade-in space-y-6">
                        <div className="flex justify-between items-center">
                            <button onClick={()=>setActiveSector(null)} className={`px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2 ${panelClass}`}><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                            <button onClick={()=>openModal()} className="bg-primary text-white px-6 py-2 rounded-xl font-bold shadow-lg flex items-center gap-2"><i className="ph-bold ph-plus"></i> Novo Profissional</button>
                        </div>
                        <h2 className="text-2xl font-black mb-4 flex items-center gap-2"><i className="ph-fill ph-users"></i> Setor: {activeSector}</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-6">
                            {profsSetor.map((prof, i) => {
                                const dias = Array.isArray(prof.DiasTrabalho) ? prof.DiasTrabalho : [];
                                return (
                                    <div key={i} className={`${panelClass} p-6 rounded-[2rem] relative group card-hover overflow-hidden`}>
                                        <div className="absolute top-0 inset-x-0 h-20 opacity-20" style={{backgroundColor: prof.Cor || '#000'}}></div>
                                        <div className="relative z-10 flex flex-col items-center text-center mt-2 w-full">
                                            <div className="w-20 h-20 rounded-full flex items-center justify-center text-2xl font-black text-white border-4 border-white shadow-md mb-3" style={{backgroundColor: prof.Cor || '#000'}}>
                                                {(prof.Nome || 'P').charAt(0).toUpperCase()}
                                            </div>
                                            <h3 className="font-black text-lg leading-tight">{prof.Nome || 'Sem Nome'}</h3>
                                            <p className="text-[10px] font-black mb-4 mt-1 uppercase tracking-widest px-3 py-1 rounded-full" style={{color: prof.Cor || '#000', backgroundColor: `${prof.Cor}20`}}>{prof.Cargo || 'Profissional'}</p>
                                            
                                            <div className="w-full bg-black/5 dark:bg-white/5 rounded-xl p-4 text-left space-y-2 mb-4 border border-black/5 dark:border-white/5">
                                                <p className="text-[10px] font-bold opacity-70 flex justify-between uppercase">
                                                    <span>Especialidade</span>
                                                    <span className="opacity-100">{prof.Especialidade || 'Geral'}</span>
                                                </p>
                                                <p className="text-[10px] font-bold opacity-70 flex justify-between uppercase pt-2 border-t border-black/5 dark:border-white/5">
                                                    <span>Intervalo</span>
                                                    <span className="opacity-100">{prof.TempoIntervalo || '15'} min</span>
                                                </p>
                                            </div>
                                            <p className="text-[10px] font-black uppercase tracking-widest opacity-50">Dias Padrão: {dias.join(', ') || 'Nenhum'}</p>
                                        </div>

                                        <div className="absolute top-4 right-4 opacity-100 lg:opacity-0 group-hover:opacity-100 flex gap-2 z-20">
                                            <button onClick={()=>openModal(prof)} className="w-10 h-10 bg-white dark:bg-slate-700 shadow-md rounded-full text-blue-600 flex items-center justify-center hover:scale-110 transition"><i className="ph-bold ph-pencil-simple text-lg"></i></button>
                                            <button onClick={()=>handleDelete(prof.ID)} className="w-10 h-10 bg-white dark:bg-slate-700 shadow-md rounded-full text-red-600 flex items-center justify-center hover:scale-110 transition"><i className="ph-bold ph-trash text-lg"></i></button>
                                        </div>
                                    </div>
                                )
                            })}
                            {profsSetor.length === 0 && <p className="col-span-full opacity-50 font-bold text-center p-10 border-2 border-dashed rounded-3xl">Ninguém cadastrado aqui.</p>}
                        </div>

                        {/* MODAL DE CADASTRO */}
                        {isModalOpen && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" onClick={()=>setIsModalOpen(false)}>
                                <div className={`${isDark ? 'bg-slate-800 text-white' : 'bg-white text-slate-800'} w-full max-w-2xl rounded-[2rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]`} onClick={e=>e.stopPropagation()}>
                                    <h3 className="text-2xl font-black mb-6 border-b border-black/10 dark:border-white/10 pb-4">{formData.ID ? 'Editar' : 'Novo'} Profissional</h3>
                                    <form id="form-equipe" onSubmit={handleSave} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="col-span-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest opacity-50">Nome Completo</label>
                                                <input type="text" value={formData.Nome || ''} onChange={e=>setFormData({...formData, Nome: e.target.value})} className={`w-full p-4 rounded-xl font-bold outline-none border ${isDark?'bg-slate-900 border-slate-700':'bg-slate-50 border-slate-200'}`} required />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase tracking-widest opacity-50">Cargo</label>
                                                <input type="text" value={formData.Cargo || ''} onChange={e=>setFormData({...formData, Cargo: e.target.value})} className={`w-full p-4 rounded-xl font-bold outline-none border ${isDark?'bg-slate-900 border-slate-700':'bg-slate-50 border-slate-200'}`} required />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase tracking-widest opacity-50">Setor</label>
                                                <select value={formData.Setor || ''} onChange={e=>setFormData({...formData, Setor: e.target.value})} className={`w-full p-4 rounded-xl font-bold outline-none border ${isDark?'bg-slate-900 border-slate-700':'bg-slate-50 border-slate-200'}`}>
                                                    {allSectors.map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase tracking-widest opacity-50">Tempo de Intervalo</label>
                                                <select value={formData.TempoIntervalo || '15'} onChange={e=>setFormData({...formData, TempoIntervalo: e.target.value})} className={`w-full p-4 rounded-xl font-bold outline-none border ${isDark?'bg-slate-900 border-slate-700':'bg-slate-50 border-slate-200'}`}>
                                                    <option value="15">15 Minutos</option>
                                                    <option value="30">30 Minutos</option>
                                                    <option value="60">1 Hora</option>
                                                    <option value="120">2 Horas</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase tracking-widest opacity-50">Cor no Calendário</label>
                                                <input type="color" value={formData.Cor || '#1E40AF'} onChange={e=>setFormData({...formData, Cor: e.target.value})} className={`w-full h-[54px] p-1 rounded-xl cursor-pointer border ${isDark?'border-slate-700':'border-slate-200'}`} />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase tracking-widest opacity-50 block mb-2 mt-4">Dias de Trabalho Padrão</label>
                                            <div className="flex flex-wrap gap-2">
                                                {['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'].map(d => {
                                                    const ativo = (Array.isArray(formData.DiasTrabalho) ? formData.DiasTrabalho : []).includes(d);
                                                    return (
                                                        <button type="button" key={d} onClick={()=>toggleDia(d)} className={`px-4 py-2 rounded-lg font-bold text-sm transition ${ativo ? 'bg-primary text-white shadow-md' : isDark?'bg-slate-900 text-slate-400':'bg-slate-100 text-slate-500'}`}>{d}</button>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                        <div className="pt-6 flex justify-end gap-3">
                                            <button type="button" onClick={()=>setIsModalOpen(false)} className="px-6 py-4 font-bold opacity-70 hover:opacity-100">Cancelar</button>
                                            <button type="submit" disabled={loading} className="bg-primary text-white px-8 py-4 rounded-xl font-black shadow-lg flex items-center gap-2">
                                                {loading ? <i className="ph animate-spin ph-spinner"></i> : <i className="ph-bold ph-check"></i>} Salvar
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="animate-fade-in space-y-6">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                        <div>
                            <h2 className="text-3xl font-black">Setores da Clínica</h2>
                            <p className="opacity-70 font-bold text-sm">Selecione um setor para gerenciar a equipe.</p>
                        </div>
                        <div className="flex gap-2 w-full md:w-auto">
                            <input type="text" placeholder="Nome do novo setor..." value={newSectorName} onChange={e=>setNewSectorName(e.target.value)} className={`px-4 py-3 rounded-xl font-bold outline-none w-full md:w-64 ${panelClass}`} />
                            <button onClick={()=>{if(newSectorName){ setActiveSector(newSectorName.toUpperCase()); setNewSectorName('');}}} className="bg-slate-800 text-white px-6 rounded-xl font-black shadow-lg hover:scale-105 transition"><i className="ph-bold ph-plus"></i> Add</button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        {allSectors.map((setor, i) => {
                            const count = data.filter(p => p.Setor === setor).length;
                            return (
                                <div key={i} onClick={()=>setActiveSector(setor)} className={`${panelClass} p-8 rounded-[2rem] card-hover flex flex-col justify-center items-center text-center h-48`}>
                                    <div className="w-16 h-16 bg-primary/10 text-primary rounded-2xl flex items-center justify-center text-3xl mb-4"><i className="ph-fill ph-buildings"></i></div>
                                    <h3 className="font-black text-xl leading-tight mb-1">{setor}</h3>
                                    <p className="text-xs font-bold opacity-50 uppercase tracking-widest">{count} Profissionais</p>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const PainelHojeView = ({ themeClass }) => {
            const isDark = (themeClass || '').includes('night');
            const panelClass = isDark ? 'glass-panel-dark' : 'glass-panel';
            
            return (
                <div className="animate-fade-in space-y-8">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-8">
                        <div>
                            <h2 className="text-3xl font-black">Plantão Ativo</h2>
                            <p className="opacity-70 font-bold text-sm">Mapa de salas e status em tempo real.</p>
                        </div>
                    </div>
                    <div className={`${panelClass} border border-slate-200 rounded-[2rem] p-10 text-center shadow-sm`}>
                        <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4"><i className="ph-fill ph-wrench text-3xl animate-pulse"></i></div>
                        <h3 className="font-black text-xl">Módulo em Construção</h3>
                        <p className="font-medium mt-2 max-w-sm mx-auto opacity-70">O mapa de salas interativo será liberado no próximo passo após testarmos o cadastro de equipe!</p>
                    </div>
                </div>
            );
        };

        // ==========================================
        // APP PRINCIPAL E ROTEAMENTO
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('HOJE');
            const [dataCentral, setDataCentral] = useState({ PROFISSIONAIS: [], ESCALAS: [] });

            // Hook para mudar o tema com base na hora
            const [themeClass, setThemeClass] = useState('theme-morning');
            useEffect(() => {
                const updateTheme = () => {
                    const h = new Date().getHours();
                    if (h >= 6 && h < 12) setThemeClass('theme-morning');
                    else if (h >= 12 && h < 18) setThemeClass('theme-afternoon');
                    else setThemeClass('theme-night');
                };
                updateTheme();
                const i = setInterval(updateTheme, 60000); // Checa a cada 1 min
                return () => clearInterval(i);
            }, []);

            // Adiciona classe de tema no Body
            useEffect(() => {
                document.body.className = `${themeClass} font-sans min-h-screen relative overflow-x-hidden`;
            }, [themeClass]);

            const fetchBanco = async () => {
                try {
                    const profs = await api.fetch('PROFISSIONAIS');
                    const esc = await api.fetch('ESCALAS');
                    setDataCentral({ PROFISSIONAIS: profs, ESCALAS: esc });
                } catch(e) { console.error(e); }
            };

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        let role = 'Colaborador';
                        const eStr = u.email.toLowerCase();
                        if (eStr.includes('admin') || eStr.includes('gestao') || eStr.includes('diretor')) role = 'Admin';
                        else if (eStr.includes('supervis')) role = 'Supervisor';
                        
                        setUser({ email: u.email, nome: u.email.split('@')[0], nivel: role });
                        await fetchBanco();
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try { await auth.signInWithEmailAndPassword(e.target.email.value, e.target.password.value); } 
                catch(err) { alert('Erro: ' + err.message); setLoading(false); }
            };

            if (loading) return <div className={`min-h-screen flex items-center justify-center ${themeClass}`}><div className="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) {
                return (
                    <div className={`min-h-screen flex items-center justify-center p-4 relative ${themeClass}`}>
                        {themeClass.includes('night') && <div className="stars"></div>}
                        <div className={`w-full max-w-md rounded-[2rem] shadow-2xl p-8 md:p-10 animate-fade-in relative z-10 ${themeClass.includes('night') ? 'glass-panel-dark' : 'glass-panel bg-white'}`}>
                            <div className="w-20 h-20 bg-primary/10 text-primary rounded-3xl flex justify-center items-center mx-auto mb-6 shadow-inner">
                                <i className="ph-fill ph-calendar-check text-5xl"></i>
                            </div>
                            <h1 className="text-3xl font-black text-center mb-2">Escalas SV</h1>
                            <p className="text-center font-bold mb-8 opacity-60">Gestão Inteligente de Plantões</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="relative">
                                    <i className="ph-fill ph-user absolute left-5 top-4.5 opacity-50 text-lg"></i>
                                    <input name="email" type="email" placeholder="E-mail" className="w-full pl-12 pr-4 py-4 rounded-2xl outline-none font-bold bg-black/5 dark:bg-white/10 border border-transparent focus:border-primary" required />
                                </div>
                                <div className="relative">
                                    <i className="ph-fill ph-lock-key absolute left-5 top-4.5 opacity-50 text-lg"></i>
                                    <input name="password" type="password" placeholder="Senha" className="w-full pl-12 pr-4 py-4 rounded-2xl outline-none font-bold bg-black/5 dark:bg-white/10 border border-transparent focus:border-primary" required />
                                </div>
                                <button type="submit" className="w-full bg-primary text-white font-black py-4 rounded-2xl shadow-lg hover:-translate-y-1 transition text-lg mt-4">Entrar no Sistema</button>
                            </form>
                        </div>
                    </div>
                );
            }

            const isAdmin = user.nivel === 'Admin' || user.nivel === 'Supervisor';
            const isDark = themeClass.includes('night');

            return (
                <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0 relative">
                    {isDark && <div className="stars"></div>}
                    
                    {/* SIDEBAR PC */}
                    <aside className={`hidden md:flex w-72 flex-col h-screen fixed z-30 shadow-2xl border-r ${isDark ? 'bg-slate-900/80 border-slate-700/50 backdrop-blur-xl' : 'bg-white/80 border-slate-200 backdrop-blur-xl'}`}>
                        <div className="p-8 border-b border-inherit flex items-center gap-4">
                            <div className="w-12 h-12 bg-primary text-white rounded-xl flex items-center justify-center shadow-md"><i className="ph-fill ph-heartbeat text-2xl animate-pulse"></i></div>
                            <div>
                                <h2 className="font-black text-xl leading-none">Escalas SV</h2>
                                <p className="text-[10px] uppercase tracking-widest opacity-60 font-bold">Portal Médico</p>
                            </div>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2">
                            <button onClick={()=>setActiveTab('HOJE')} className={`w-full flex items-center gap-3 px-5 py-4 rounded-2xl font-black text-sm transition ${activeTab === 'HOJE' ? 'bg-primary text-white shadow-lg' : 'opacity-60 hover:opacity-100 hover:bg-black/5'}`}><i className="ph-fill ph-kanban text-xl"></i> Mapa do Plantão</button>
                            <button onClick={()=>setActiveTab('CALENDARIO')} className={`w-full flex items-center gap-3 px-5 py-4 rounded-2xl font-black text-sm transition ${activeTab === 'CALENDARIO' ? 'bg-primary text-white shadow-lg' : 'opacity-60 hover:opacity-100 hover:bg-black/5'}`}><i className="ph-fill ph-calendar-blank text-xl"></i> Calendário</button>
                            {isAdmin && <button onClick={()=>setActiveTab('EQUIPE')} className={`w-full flex items-center gap-3 px-5 py-4 rounded-2xl font-black text-sm transition ${activeTab === 'EQUIPE' ? (isDark?'bg-white text-slate-900':'bg-slate-800 text-white') : 'opacity-60 hover:opacity-100 hover:bg-black/5'}`}><i className="ph-fill ph-users text-xl"></i> Gestão de Equipe</button>}
                        </nav>
                        <button onClick={()=>auth.signOut()} className="p-6 text-red-500 font-bold flex items-center gap-3 hover:bg-red-500/10 transition border-t border-inherit"><i className="ph-bold ph-sign-out text-xl"></i> Sair do App</button>
                    </aside>

                    {/* BOTTOM NAV MOBILE */}
                    <nav className={`md:hidden fixed bottom-0 inset-x-0 border-t z-50 flex justify-around p-3 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.1)] backdrop-blur-xl ${isDark?'bg-slate-900/90 border-slate-800':'bg-white/90 border-slate-200'}`}>
                        <button onClick={()=>setActiveTab('HOJE')} className={`flex flex-col items-center gap-1 p-2 rounded-xl transition w-20 ${activeTab === 'HOJE' ? 'text-primary' : 'opacity-40'}`}><i className={`${activeTab === 'HOJE' ? 'ph-fill' : 'ph'} ph-kanban text-2xl`}></i><span className="text-[9px] font-black uppercase tracking-wider">Hoje</span></button>
                        <button onClick={()=>setActiveTab('CALENDARIO')} className={`flex flex-col items-center gap-1 p-2 rounded-xl transition w-20 ${activeTab === 'CALENDARIO' ? 'text-primary' : 'opacity-40'}`}><i className={`${activeTab === 'CALENDARIO' ? 'ph-fill' : 'ph'} ph-calendar-blank text-2xl`}></i><span className="text-[9px] font-black uppercase tracking-wider">Mensal</span></button>
                        {isAdmin && <button onClick={()=>setActiveTab('EQUIPE')} className={`flex flex-col items-center gap-1 p-2 rounded-xl transition w-20 ${activeTab === 'EQUIPE' ? (isDark?'text-white':'text-slate-800') : 'opacity-40'}`}><i className={`${activeTab === 'EQUIPE' ? 'ph-fill' : 'ph'} ph-users text-2xl`}></i><span className="text-[9px] font-black uppercase tracking-wider">Equipe</span></button>}
                        <button onClick={()=>auth.signOut()} className="flex flex-col items-center gap-1 p-2 rounded-xl transition w-20 text-red-500 opacity-60 hover:opacity-100"><i className="ph ph-sign-out text-2xl"></i><span className="text-[9px] font-black uppercase tracking-wider">Sair</span></button>
                    </nav>

                    {/* CONTEÚDO */}
                    <main className="flex-1 md:ml-72 p-4 md:p-10 relative z-10 w-full">
                        <TopHeader user={user} />

                        {activeTab === 'HOJE' && <PainelHojeView themeClass={themeClass} />}
                        
                        {activeTab === 'EQUIPE' && isAdmin && <EquipeView data={dataCentral.PROFISSIONAIS} onSave={api.saveRecord} onDelete={api.deleteRecord} onRefresh={fetchBanco} themeClass={themeClass} />}

                        {activeTab === 'CALENDARIO' && (
                            <div className="animate-fade-in">
                                <h2 className="text-3xl font-black mb-6">Calendário</h2>
                                <div className={`p-10 text-center rounded-[2rem] border ${isDark?'glass-panel-dark border-white/10':'glass-panel border-black/10'}`}>
                                    <p className="font-bold opacity-70">O módulo de calendário está sendo preparado para receber os filtros e alocações.</p>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
